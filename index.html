<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- PWA: 安装到主屏幕/桌面所需的清单与图标 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0c22">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="异世界重开">
<meta name="mobile-web-app-capable" content="yes">

<title>异世界重开模拟器</title>
<style>
  :root{
    --bg-0:#0f0c22;
    --bg-1:#171233;
    --panel:#221a45;
    --panel-2:#2b2154;
    --line: rgba(216,178,106,0.18);
    --text:#ece4ff;
    --text-dim:#a99bd6;
    --gold:#d8b26a;
    --violet:#9075e0;
    --danger:#e0615c;
    --success:#6fd9a0;
    --font-display:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
    --font-body:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(144,117,224,0.25), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(216,178,106,0.12), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
    color:var(--text);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  #app{width:100%;max-width:720px;}

  /* 顶部纹样 */
  .rune-divider{
    display:flex;align-items:center;gap:10px;
    color:var(--gold); opacity:.85; margin:0 0 18px;
    font-size:12px; letter-spacing:.3em;
  }
  .rune-divider::before,.rune-divider::after{
    content:"";flex:1;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  h1.title{
    font-family:var(--font-display);
    text-align:center;
    font-size:34px;
    letter-spacing:.12em;
    margin:4px 0 2px;
    background:linear-gradient(180deg,#f2e2b8,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 24px rgba(216,178,106,0.25);
  }
  .subtitle{
    text-align:center;color:var(--text-dim);font-size:13px;
    letter-spacing:.05em; margin-bottom:22px;
  }

  /* 命书卡片 */
  .scroll{
    position:relative;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:14px;
    padding:26px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
    margin-bottom:18px;
  }
  .scroll::before, .scroll::after{
    content:"◆";
    position:absolute; color:var(--gold); opacity:.5; font-size:10px;
  }
  .scroll::before{top:10px;left:12px;}
  .scroll::after{top:10px;right:12px;}

  .section-label{
    font-family:var(--font-display);
    color:var(--gold); font-size:15px; letter-spacing:.15em;
    margin:0 0 14px; display:flex; align-items:center; gap:8px;
  }
  .section-label .idx{
    font-size:11px;color:var(--text-dim);border:1px solid var(--line);
    padding:1px 7px;border-radius:20px;
  }

  p, .desc{color:var(--text-dim); line-height:1.7; font-size:14px;}

  /* 按钮 */
  .btn{
    font-family:var(--font-body);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 20px;
    border-radius:9px;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .btn:hover{border-color:var(--gold); box-shadow:0 0 0 1px rgba(216,178,106,0.25);}
  .btn:active{transform:scale(.97);}
  .btn.primary{
    background:linear-gradient(180deg,#e9c98a,var(--gold));
    color:#241a09; border:none; font-weight:600;
  }
  .btn.primary:hover{box-shadow:0 6px 20px rgba(216,178,106,0.35);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}
  .btn-row.center{justify-content:center;}

  /* 转生方式 / 天赋 卡片 */
  .card-grid{display:grid; gap:12px;}
  .pick-card{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.02);
    border-radius:11px;
    padding:16px 16px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .pick-card:hover{border-color:var(--violet); background:rgba(144,117,224,0.08); transform:translateY(-1px);}
  .pick-card.selected{border-color:var(--gold); background:rgba(216,178,106,0.10);}
  .pick-card h3{margin:0 0 6px; font-family:var(--font-display); font-size:16px; color:var(--text);}
  .pick-card p{margin:0; font-size:13px;}
  .tag-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
  .mod-tag{
    font-size:11px; padding:2px 8px; border-radius:20px;
    border:1px solid var(--line); color:var(--text-dim);
  }
  .mod-tag.pos{color:var(--success); border-color:rgba(111,217,160,0.35);}
  .mod-tag.neg{color:var(--danger); border-color:rgba(224,97,92,0.35);}
  .mod-tag.mystery{color:var(--text-dim); border-style:dashed; font-style:italic; opacity:0.75;}

  .rarity-badge{
    font-size:11px; padding:2px 9px; border-radius:20px; font-weight:600;
    display:inline-block; margin-bottom:8px; letter-spacing:.05em;
  }
  .rarity-legendary{background:rgba(216,178,106,0.15); color:var(--gold); border:1px solid rgba(216,178,106,0.4);}
  .rarity-epic{background:rgba(144,117,224,0.15); color:#b9a4ff; border:1px solid rgba(144,117,224,0.4);}
  .rarity-rare{background:rgba(97,168,224,0.15); color:#8fc4f2; border:1px solid rgba(97,168,224,0.4);}
  .rarity-common{background:rgba(111,217,160,0.12); color:var(--success); border:1px solid rgba(111,217,160,0.35);}
  .rarity-flaw{background:rgba(224,97,92,0.12); color:var(--danger); border:1px solid rgba(224,97,92,0.35);}

  .chosen-strip{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .chosen-chip{
    font-size:12px; padding:5px 12px; border-radius:20px;
    border:1px solid var(--gold); color:var(--gold); background:rgba(216,178,106,0.08);
  }
  .chosen-chip.empty{color:var(--text-dim); border-color:var(--line); background:none;}

  /* 属性分配 */
  .stat-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-bottom:1px dashed var(--line);
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-name{width:64px; font-size:14px; color:var(--text); flex-shrink:0;}
  .stat-bar{
    flex:1; height:9px; border-radius:6px; background:rgba(255,255,255,0.06);
    overflow:hidden; position:relative;
  }
  .stat-bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--violet),var(--gold));}
  .stat-num{width:28px; text-align:right; font-family:var(--font-display); color:var(--gold); font-size:15px;}
  .stat-ctrl{display:flex; gap:4px;}
  .stat-ctrl button{
    width:26px;height:26px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); cursor:pointer; font-size:14px; line-height:1;
  }
  .stat-ctrl button:disabled{opacity:.3;cursor:not-allowed;}
  .stat-cost-hint{
    width:66px; flex-shrink:0; text-align:right;
    font-size:11px; color:var(--text-dim); opacity:.75;
  }

  .budget-line{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; font-size:13px; color:var(--text-dim);
  }
  .budget-line b{color:var(--gold); font-size:16px; font-family:var(--font-display);}

  /* 罗盘 */
  .compass-wrap{display:flex; justify-content:center; margin:6px 0 16px;}

  /* 模拟日志 */
  .status-bar{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:14px; padding:10px 12px;
    background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:10px;
  }
  .status-chip{
    display:flex; align-items:baseline; gap:4px;
    font-size:11px; padding:3px 9px; border-radius:20px;
    border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim);
  }
  .status-value{font-family:var(--font-display); font-size:13px; color:var(--gold); font-weight:600;}

  .log-wrap{max-height:420px; overflow-y:auto; padding-right:4px;}
  .log-wrap::-webkit-scrollbar{width:6px;}
  .log-wrap::-webkit-scrollbar-thumb{background:var(--panel-2); border-radius:3px;}
  .log-entry{
    display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);
    animation:fadeIn .35s ease;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-age{
    flex-shrink:0; width:52px; text-align:right; font-family:var(--font-display);
    color:var(--gold); font-size:13px; padding-top:1px;
  }
  .log-text{font-size:14px; line-height:1.65; color:var(--text);}
  .log-text.death{color:var(--danger);}
  .log-text.milestone{color:var(--gold);}
  .log-text.fortune{color:var(--success);}
  .log-text.misfortune{color:#e0a15c;}
  .log-text.choice{color:var(--violet); font-weight:600;}

  .choice-panel{
    border:1px solid var(--violet); border-radius:11px;
    background:rgba(144,117,224,0.08); padding:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .choice-hint{
    font-size:12px; color:#b9a4ff; text-align:center;
    letter-spacing:.1em; margin-bottom:4px;
  }
  .choice-option{
    width:100%; text-align:left; background:var(--panel-2);
    border:1px solid var(--line); padding:11px 14px;
  }
  .choice-option:hover{border-color:var(--violet);}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .progress-line{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--text-dim); margin-bottom:12px;
  }
  .speed-toggle{display:flex; gap:6px;}
  .speed-toggle button{
    font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--line);
    background:none; color:var(--text-dim); cursor:pointer;
  }
  .speed-toggle button.active{border-color:var(--gold); color:var(--gold);}

  /* 结局 */
  .ending-title{
    text-align:center; font-family:var(--font-display); font-size:26px;
    color:var(--gold); margin:6px 0 4px;
  }
  .ending-sub{text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:18px;}
  .score-box{
    display:flex; justify-content:center; align-items:baseline; gap:8px; margin-bottom:20px;
  }
  .score-num{font-family:var(--font-display); font-size:44px; color:var(--gold);}
  .score-label{font-size:12px; color:var(--text-dim);}
  .achieve-list{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 4px;}
  .achieve-chip{
    font-size:12px; padding:4px 11px; border-radius:20px;
    border:1px solid rgba(144,117,224,0.4); color:#b9a4ff; background:rgba(144,117,224,0.08);
  }

  .footer-note{text-align:center; color:var(--text-dim); font-size:11px; margin-top:22px; letter-spacing:.05em;}

  /* 成就殿堂 */
  .achieve-summary{
    text-align:center; color:var(--gold); font-family:var(--font-display);
    font-size:15px; margin-bottom:16px; letter-spacing:.05em;
  }
  .achieve-card{
    display:flex; align-items:flex-start; gap:12px;
    border:1px solid var(--line); border-radius:11px;
    padding:13px 14px; margin-bottom:10px;
    background:rgba(255,255,255,0.02);
  }
  .achieve-card.unlocked{border-color:rgba(216,178,106,0.45); background:rgba(216,178,106,0.06);}
  .achieve-icon{
    flex-shrink:0; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; border:1px solid var(--line); background:var(--panel-2);
  }
  .achieve-card.unlocked .achieve-icon{
    border-color:var(--gold); color:var(--gold); background:rgba(216,178,106,0.12);
  }
  .achieve-card.locked .achieve-icon{ color:var(--text-dim); opacity:.6; }
  .achieve-body{flex:1;}
  .achieve-name{font-size:14px; color:var(--text); font-weight:600; margin-bottom:2px;}
  .achieve-card.locked .achieve-name{color:var(--text-dim);}
  .achieve-desc{font-size:12px; color:var(--text-dim); line-height:1.5;}
  .achieve-progress{font-size:11px; color:var(--gold); margin-top:4px;}

  .new-unlock-banner{
    border:1px solid var(--gold); border-radius:10px;
    background:rgba(216,178,106,0.1); padding:12px 14px;
    margin-bottom:16px; font-size:13px; color:var(--gold); text-align:center;
  }
  .meta-progress-line{
    border:1px solid rgba(216,178,106,0.3); border-radius:10px;
    background:rgba(216,178,106,0.05); padding:10px 14px;
    margin:14px 0; font-size:12.5px; color:var(--text-dim); text-align:center; line-height:1.6;
  }
  .meta-progress-line div+div{ margin-top:4px; }
  .start-qr-box{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    margin:14px 0; padding:12px; border:1px solid var(--line); border-radius:10px;
    background:rgba(255,255,255,0.02);
  }
  .start-qr-svg{ border-radius:6px; overflow:hidden; line-height:0; }
  .start-qr-svg svg{ display:block; }
  .start-qr-caption{ font-size:12px; color:var(--text-dim); }
  .meta-progress-line b{ color:var(--gold); }

  @media (max-width:480px){
    h1.title{font-size:26px;}
    .scroll{padding:18px 16px;}
    .stat-name{width:52px; font-size:13px;}
    .stat-row{flex-wrap:wrap; row-gap:6px;}
    .stat-cost-hint{width:100%; text-align:left; padding-left:64px;}
  }
</style>
</head>

<div id="app"></div>

<script>
/* ---------------------------------------------------------------------
   QR Code Generator for JavaScript
   Copyright (c) 2009 Kazuhiko Arase, MIT License
   http://www.d-project.com/  https://github.com/kazuhikoarase/qrcode-generator
   直接内嵌这个小巧的公开库，用来在结局分享图片中生成可扫码进入游戏的二维码，
   避免依赖外部CDN，保证整个游戏依旧是可以离线运行的单文件。
--------------------------------------------------------------------- */
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

/* 选择天赋时，缺陷天赋在界面上的展示（徽章颜色与文字）都会当作"普通"来处理，
   不再有任何颜色或文字上的"危险信号"提示这是个缺陷——玩家必须真正读一遍描述，才能分辨出来。
   注意：这只影响展示，天赋本身的稀有度（抽取概率权重等）不受影响。 */
function displayRarity(rarity){ return rarity==="flaw" ? "common" : rarity; }
const RARITY_WEIGHT = {legendary:2, epic:6, rare:16, common:38, flaw:38};

/* 事件池：age:[min,max]  cond(ctx)=>bool   effect(ctx)=>void   weight   once   achievement  death */
function hasTag(ctx, tag){ return ctx.tags.has(tag); }
function hasFlag(ctx, flag){ return ctx.flags.has(flag); }
function stat(ctx, key){ return ctx.stats[key]; }
/* 事件的 text 字段可以是普通字符串（通用文案），也可以是按世界观区分的对象
   （如 {qixiu:"...", magic:"...", ...}），resolveText 负责按当前世界观取出对应文案 */
function resolveText(ev, ctx){
  if(typeof ev.text === "string") return ev.text;
  return ev.text[ctx.world] || ev.text.magic || Object.values(ev.text)[0];
}

    {text:"你尝试喊出人生第一句话，说的却是一口流利的异世界古语，把全家人都惊呆了。", weight:5},
    {text:"作为家境优渥的孩子，你三岁就被安排了整整五位启蒙先生，日程排得比谁都紧凑，喘息的功夫都没有。", weight:7, cond:c=>stat(c,"origin")>=7},
    {text:"家里穷得揭不开锅，你五岁就跟着大人下地干活，练就了一身与年龄不符的力气。", weight:7, cond:c=>stat(c,"origin")<=3},
    {text:"一场突如其来的魔兽袭击了村庄，襁褓中的你却安然无恙，仿佛冥冥中自有天意庇护。", weight:5},
    {text:"你抱着契约灵兽的幼崽睡了整整一夜，第二天两人已经心有灵犀。", weight:6, cond:c=>hasTag(c,"familiar")},
    {text:"你总是在恰好的时间哭闹，恰好躲过了几次原本会发生的意外，村民都说你自带主角光环。", weight:5, cond:c=>hasTag(c,"chosen")},
    {text:"你出生后第一次啼哭，竟引来窗外一群麻雀齐齐落在屋檐上安静地注视着你，村民都觉得诡异又新奇。", weight:6, cond:c=>state.age===0},
    {text:"你在满月宴上突然咯咯笑出了声，接生婆手一抖，差点打翻了满盆的洗儿汤。", weight:6, cond:c=>state.age===0},
    {text:"你四岁那年在河边捡到一枚造型古怪的石头，此后便一直随身携带，仿佛冥冥中有什么在牵引着你。", weight:6},
    {text:"村里的姑娘们总喜欢抢着抱你，都说你从小就长得讨喜，谁见了都要多逗弄两下。", weight:5, cond:c=>stat(c,"charm")>=7},
    {text:"你自小体弱多病，家里没少为你的汤药钱发愁，却也因此被养得格外仔细。", weight:5, cond:c=>stat(c,"power")<=3&&stat(c,"origin")<=3},
    {text:"邻居家几个年纪相仿的孩子总喜欢围着你转，理由五花八门，却殊途同归。", weight:5, cond:c=>hasTag(c,"harem")},
    {text:"你不过是抢了块糖，就被全村孩子联合起来编排成了「恶霸」，你觉得十分冤枉。", weight:5, cond:c=>hasTag(c,"villain")},
    {text:"你六岁时第一次尝试翻墙掏鸟窝，结果直接从墙头栽了下去，却奇迹般地毫发无伤。", weight:6},
    {text:"你参加村里举办的选美评比，评委端详了半天，愣是没能一眼认出你是哪家的孩子。", weight:5, cond:c=>hasTag(c,"passerby")},
    {text:"你捡到的每一枚硬币背面似乎都刻着同一个吉利的符号，虽然没人知道那到底是什么意思。", weight:5, cond:c=>stat(c,"luck")>=7},
    {text:"路过的野兽总会在你面前莫名其妙地放下戒心，甚至乖乖趴下任由你摸头。", weight:6, cond:c=>hasTag(c,"beast_tamer")},
    {death:true, text:"一场瘟疫悄然席卷了村庄，年幼体弱的你没能挺过那个寒冷的冬天。", weight:1, cause:"幼年夭折"},
    {death:true, text:"你自幼体弱多病，一场本不该致命的风寒，却还是没能让你挺过去。", weight:1, cond:c=>stat(c,"health")<=3, cause:"幼年病夭"},
    {choice:true, weight:5, text:"你还太小不能表达意见，可你的名字该怎么取，两位长辈争执不下。", options:[
      {label:"用寄托厚望的名字", result:"长辈们最终定下了一个寄托厚望的名字，希望你将来能不负所望。", statEffect:{origin:1}},
      {label:"用朴实好记的名字", result:"长辈们选了一个朴实好记的名字，图的就是顺口平安。", statEffect:{luck:1}},
      {label:"抽签决定，图个热闹", result:"长辈们谁也说服不了谁，最后抽签定了名字，倒也成了家里的一桩趣谈。", statEffect:{charm:1}}
    ], cond:c=>state.age===0},
    {choice:true, weight:5, text:"家里的第一口奶该由谁来喂，几位亲人抢着要，闹得不可开交。", options:[
      {label:"让最疼你的那个人喂", result:"最疼你的那位亲人抢到了这个机会，往后总念着这份最初的缘分。", statEffect:{charm:1}},
      {label:"让最有经验的那个人喂", result:"家里让最有经验的长辈来喂，稳妥地度过了这最初的关口。", statEffect:{health:1}},
      {label:"谁都不让，轮流喂", result:"谁都不肯相让，最后定了轮流喂养的规矩，倒也算是公平。", statEffect:{luck:1}}
    ], cond:c=>state.age===0},
    {choice:true, weight:5, text:"家里为要不要立刻办满月酒摆宴席产生了分歧，一边讲究传统，一边算着账。", options:[
      {label:"大办满月酒，图个热闹", result:"家里最终大办了一场满月酒，来客盈门，热闹是热闹，钱袋子也瘦了一圈。", statEffect:{charm:1,wealth:-1}},
      {label:"一切从简，省钱为上", result:"家里决定一切从简，把钱省下来留着往后用，实际得很。", statEffect:{wealth:1}},
      {label:"只请至亲，不广而告之", result:"家里只请了至亲小聚，既顾了情面，也没太破费。", statEffect:{luck:1}}
    ], cond:c=>state.age===0},
    {choice:true, weight:5, text:"你满月那天天降大雨，原定的赶集庆祝没法照常进行，家人纠结要不要冒雨照办。", options:[
      {label:"冒雨照办，图个仪式感", result:"家人还是冒着雨把庆祝办了，虽然折腾，却也算是给了这天一个说得过去的仪式感。", statEffect:{luck:1}},
      {label:"取消庆祝，等天晴再补办", result:"家人取消了当天的庆祝，等天晴之后才补办了一场，稳妥又周全。", statEffect:{wit:1}},
      {label:"简化流程，室内小办", result:"家人把庆祝简化成了室内的小聚会，虽不热闹，却也温馨。", statEffect:{charm:1}}
    ], cond:c=>state.age===0}
  ],
  youth: [ // 10-15
    {text:"集市的角落里，一位风尘仆仆的旅人多看了你两眼，欲言又止，最终只是把一枚不属于任何国度的铜币放在你摊开的掌心里。", weight:2, setFlag:"traveler_met1"},
    {text:"你与班上一个处处针锋相对的同学结下了梁子，两人谁都不服谁，明里暗里较量了好几回合。", weight:5, setFlag:"rival_met"},
    {text:"你无意间发现了一件与自己身世有关的信物，直觉告诉你，这背后藏着不为人知的秘密。", weight:5, setFlag:"secret_lineage"},
    {text:"一场突如其来的灾难降临，你侥幸捡回了一条命，却也因此留下了挥之不去的阴影。", weight:5, setFlag:"disaster_survivor", statEffect:{health:-1,luck:1}},
    {text:"你意外欠下了一位神秘人一个人情，对方只留下一句「日后再还」便悄然消失，让你心里一直悬着。", weight:5, setFlag:"owes_favor"},
    {choice:true, weight:6, text:"你无意间目睹了一个不该看到的秘密，要不要声张，全看你自己怎么想。", options:[

      {label:"装作什么都没看到", result:"你选择了什么都不说，权当自己什么都没看到，日子照常过着。", statEffect:{}},
      {label:"私下警告当事人，给个改过的机会", result:"你私下找到当事人，给了对方一个改过自新的机会，对方对你感激不尽。", statEffect:{wit:1,charm:1}}

    {text:"一位不知名的先生看出了你的潜力，主动提出要收你为徒，往后的日子里对你倾囊相授。", weight:5, setFlag:"mentor_found", statEffect:{wit:1}},
    {choice:true, weight:6, text:"你面前忽然出现了两条截然不同的道路，一时间竟不知该如何抉择。", options:[
      {label:"苦练体魄，走一条靠拳脚吃饭的路", result:"你选择了偏重力量的道路，从此在摸爬滚打中一点点磨出了本事。", statEffect:{power:1}},
      {label:"埋头苦读，走一条靠脑子吃饭的路", result:"你选择了偏重智慧的道路，一头扎进了知识的海洋，渐渐尝到了甜头。", statEffect:{wit:1}},
      {label:"两条路都不选，走一条谁也没走过的路", result:"你谁都没选，执意要走一条谁也没走过的路，旁人都说你倔，你却乐在其中。", statEffect:{luck:1}}
    ]},
    {text:{

      magic:"王都的魔法学院派人下乡选拔新生，你凭借出色的表现拿到了梦寐以求的入学资格。",
      scifi:"殖民地精英学院派人下到边陲选拔新生，你凭借出色的模拟测试成绩拿到了梦寐以求的入学资格。",
      warhammer:"帝国的征募官提前来到边境村庄选拔苗子，你凭借过人的体魄拿到了梦寐以求的候补生资格。",
      yaoguai:"城中小有名气的道观下山选拔弟子，你凭借与生俱来的敏锐直觉拿到了梦寐以求的入门资格。",
      cyberpunk:"废土上颇具名气的技术学徒营下乡招募新人，你凭借出色的表现拿到了梦寐以求的入营资格。"
    }, weight:10},
    {text:"你在集市上支起小摊，卖起了只有你才知道配方的「泡面」，意外成了抢手货。", weight:8},
    {text:{
      qixiu:"你在宗门的拜师测试中一鸣惊人，被长老称为「百年难遇的道胎」。",
      magic:"你在学院的入学测试中一鸣惊人，被教授称为「百年一遇的天才」。",
      scifi:"你在殖民地的模拟测试中一鸣惊人，被教官称为「百年一遇的天才」。",

      yaoguai:"你在道观的入门考验中一鸣惊人，被老道长称为「百年难遇的根骨」。",

    {text:{
      qixiu:"你在宗门的课堂上总是走神，吐纳基础课接连挂了三次科，被同门戏称为「吊车尾」。",
      magic:"你在学院的课堂上总是走神，魔法基础课接连挂了三次科，被同学戏称为「吊车尾」。",
      scifi:"你在殖民地的课堂上总是走神，基础理论课接连挂了三次科，被同学戏称为「吊车尾」。",
      warhammer:"你在新兵训练中总是分心，战术条令课接连挂了三次科，被战友戏称为「吊车尾」。",
      yaoguai:"你在道观的课堂上总是走神，符箓入门课接连挂了三次科，被师兄弟戏称为「吊车尾」。",
      cyberpunk:"你在技术营的课堂上总是走神，编程基础课接连挂了三次科，被同伴戏称为「吊车尾」。"
    }, weight:8, cond:c=>stat(c,"wit")<=3},
    {text:"你结识了一个同样来自地球的转生者，两人相视一笑，从此成了臭味相投的损友。", weight:7},
    {text:{
      qixiu:"宗门弟子堂前贴出了招募告示，你鼓起勇气报了名，成为一名记名弟子。",
      magic:"冒险者公会门口贴出了招募告示，你鼓起勇气报了名，成为一名见习冒险者。",
      scifi:"殖民地防卫队门口贴出了招募告示，你鼓起勇气报了名，成为一名见习学员。",
      warhammer:"帝国军团门口贴出了征募告示，你鼓起勇气报了名，成为一名见习新兵。",
      yaoguai:"驱邪门派门口贴出了收徒告示，你鼓起勇气报了名，成为一名见习弟子。",
      cyberpunk:"拾荒者公会门口贴出了招募告示，你鼓起勇气报了名，成为一名见习学徒。"
    }, weight:8},
    {text:"你在打工搬货时不小心一拳打穿了仓库的石墙，负责登记的人对你刮目相看。", weight:7, cond:c=>stat(c,"power")>=7},
    {text:"你养的契约灵兽突然产生了异变，一夜之间长成了半个村子大的巨兽。", weight:6, cond:c=>hasTag(c,"familiar")},
    {text:"一次重要的考核中，你莫名其妙打破了三百年来的历史记录，成了传说中的插班生。", weight:5, cond:c=>hasTag(c,"memory")},
    {text:"你暗恋的邻家青梅竹马要随家人搬去繁华的大城市，你追到车站却始终没能说出口。", weight:6},
    {text:"一次团体训练中，你独自一人闯入了本该由资历更深的人负责的危险区域。", weight:5},
    {text:{
      qixiu:"你在一次课堂展示中随手引动的灵气波动，被误认为是失传已久的秘术，引来不少侧目。",
      magic:"你在一次课堂展示中随手施展的小魔法，被误认为是失传已久的禁咒，引来不少侧目。",
      scifi:"你在一次课堂展示中随手表现出的基因反应，被误认为是绝密的实验数据，引来不少侧目。",
      warhammer:"你在一次训练展示中不经意流露的力量征兆，被误认为是帝皇亲赐的祝福，引来不少侧目。",
      yaoguai:"你在一次课堂展示中随手引动的妖气波动，被误认为是失传已久的秘法，引来不少侧目。",
      cyberpunk:"你在一次课堂展示中随手展现的义体反应，被误认为是黑市禁售的顶级改装，引来不少侧目。"
    }, weight:5, cond:c=>hasTag(c,"elf")},
    {text:"你在一场公开辩论会上舌灿莲花，把对手说得哑口无言，赢得了「铁齿铜牙」的外号。", weight:6},
    {text:"你在同学之间的插科打诨中总能一针见血，渐渐成了班里公认的开心果。", weight:6, cond:c=>hasTag(c,"tsukkomi")},
    {text:"你靠脑子而不是拳头解决了一场同学间的纠纷，从此赢得了「智多星」的称号。", weight:5, cond:c=>stat(c,"wit")>=7&&stat(c,"power")<=4},
    {text:"你偷偷报名参加了城里的地下擂台赛，虽然输得很惨，却也因此结识了不少江湖人。", weight:5},
    {text:"你在体育课上随手一投，篮球划出的弧线让体育老师当场愣住，怀疑自己是不是看错了。", weight:5, cond:c=>hasTag(c,"hiddenboss")},
    {text:"你在毕业旅行中偶然救下了一只受伤的小动物，它此后就一直跟在你身边不肯离去。", weight:5},
    {text:"你靠着课余打工攒下的钱，凑齐了人生中第一件像样的装备，攥在手里格外珍惜。", weight:5, cond:c=>stat(c,"origin")<=3&&stat(c,"power")>=6},
    {text:"你暗中参加了一场地下拍卖会，误打误撞拍下了一件来历不明却意外好用的物件。", weight:5},
    {text:"你在一次全区统考中轻松拿下第一，主考官反复核对试卷，怀疑是不是出了什么差错。", weight:6, cond:c=>hasTag(c,"genius")},
    {text:"你总觉得脑海深处有另一个「自己」在小声提醒你什么，虽然听不真切，却总能在关键时刻帮你避开麻烦。", weight:6, cond:c=>hasTag(c,"twin")},
    {death:true, text:{

    {text:"你本想去一个熟悉得不能再熟悉的地方办点事，结果还是绕了一大圈才发现自己走错了方向，白白折腾了大半天。", weight:5, cond:c=>hasTag(c,"directionless")},

    {text:"你在同龄人中显得格外沉稳可靠，几场较量下来展现出了不俗的爆发力，不少长辈都夸你是个响当当的男子汉。", weight:5, cond:c=>c.gender==="male", statEffect:{power:1}},

    {text:"你在路上跟一个热情地跟你打招呼、聊了半天的人告了别，事后才慢慢反应过来——自己压根不记得对方是谁。", weight:5, cond:c=>hasTag(c,"faceblind")}

  adult: [ // 16-30
    {text:"一场惨败在你心里留下了挥之不去的阴影——夜深人静时它就会爬出来，在你耳边一遍遍说：你不行。你知道，带着这道心魔去冲关，凶多吉少。", weight:3, breakthroughLuck:-0.06},
    {choice:true, weight:4, text:"一位游方商人向你兜售一味据说能辅助冲关的秘药，要价不菲——他拍着胸脯说童叟无欺，但这种东西，向来真假难辨。", options:[{label:"咬牙买下", result:"你咬牙付了钱。药入手的一刻你就知道值了——那股温润的药力沉入丹田深处，静静等着你下一次冲关的时刻。", statEffect:{wealth:-2}, breakthroughLuck:0.06},{label:"不信这个邪", result:"你摆摆手走开了。是真是假不重要——你的路，从来靠自己一步步走。", statEffect:{wit:1}}]},
    {text:"出门前，镜子里的你几不可察地摇了摇头——你鬼使神差地取消了行程。傍晚传来消息：那条路上出了大事。你回到镜子前道谢，镜中的你笑了笑，比你晚了半拍。", weight:5, cond:c=>hasTag(c,"mirror_friend"), statEffect:{luck:2}},
    {text:"你只是出门买个菜——结果亲眼见证了一场传奇的开幕：后来说书人讲那段故事时总会提一句『当时人群里有位提着菜篮的』。那就是你，你已经习惯了。", weight:5, cond:c=>hasTag(c,"story_magnet"), statEffect:{luck:1, charm:1}},
    {text:"你凭着一段绝不属于你的『记忆』，在一棵老树的第三条根下挖出了一坛前人的窖藏——坛口的封泥上按着一个陌生的手印，大小却与你的手分毫不差。", weight:5, cond:c=>hasTag(c,"past_treasure"), statEffect:{wealth:2, luck:1}},
    {text:"那明明是对方的主场——可比试进行到一半，全场观众莫名其妙地开始为你喝彩，连对方请来的乐手都不自觉地为你的节奏伴奏。赛后对手苦笑：『跟你比，全天下都是你家。』", weight:5, cond:c=>hasTag(c,"home_advantage"), statEffect:{charm:2}},
    {text:"所有人都抱怨那天过得飞快，只有你觉得那天格外漫长——你从容地做完了三天的事，太阳才慢悠悠落山。你偷来的时间，终究是花在了刀刃上。", weight:5, cond:c=>hasTag(c,"time_thief"), statEffect:{wit:2}},
    {text:"你刚嘀咕了一句『要是有把梯子就好了』——隔壁就传来一声吆喝：『谁要梯子？搬家用不上了，白送！』你沉默地看了看天，天也沉默地看了看你。", weight:5, cond:c=>hasTag(c,"coincidence_weaver"), statEffect:{luck:2}},
    {text:"危急关头，无数场你从未经历过的战争在血脉里同时苏醒——你的身体自己动了起来，等尘埃落定，同伴们看你的眼神，像在看一位从史书里走出来的将军。", weight:5, cond:c=>hasTag(c,"war_soul"), statEffect:{power:2}},
    {text:"你与借宿的老宅『谈』了一整夜——第二天起，宅子的门会为你自动上闩，梁上的灰再也不往你床上落，井水在你渴的时候格外甜。", weight:5, cond:c=>hasTag(c,"universal_contract"), statEffect:{luck:1, charm:1}},
    {text:"旁人排着队焦头烂额的三件大事，你同时着手、同时收尾——全部完成时你端起茶喝了一口，发现杯子还是温的。", weight:5, cond:c=>hasTag(c,"parallel_mind"), statEffect:{wit:2}},
    {text:"你酒后随口说了句『明年这条街该有个集市』——第二年，集市真的出现了，位置分毫不差。从那以后，人们开始非常认真地对待你说的每一句话，你也是。", weight:5, cond:c=>hasTag(c,"word_law"), statEffect:{charm:2}},
    {text:"那天山洪冲垮了你每天必经的桥——而你因为一只莫名拦路的狗，迟到了整整半刻钟。你蹲下来摸了摸它的头，它摇着尾巴走了，像是完成了什么任务。", weight:5, cond:c=>hasTag(c,"heaven_favorite"), statEffect:{luck:2}},
    {text:"你在旧货摊上花了几个小钱买下一件蒙尘的老物件——鉴定师看了足足一刻钟，抬起头问你：『你知道你买到了什么吗？』你说不知道。他说：『那你运气比我一辈子见过的都好。』", weight:6, cond:c=>hasTag(c,"bargain_king"), statEffect:{wealth:2}},
    {text:"那熟悉的五秒预感又来了——你鬼使神差地退后一步，下一瞬，一件重物砸在你刚才站的位置上。围观的人都说你命大，只有你知道，这不是命大。", weight:5, cond:c=>hasTag(c,"five_seconds"), statEffect:{health:1, luck:1}},
    {text:"几年前你救过的那只瘸腿野猫，今天带着一整条巷子的猫堵在你家门口——每只嘴里都叼着一样『礼物』。邻居说，这阵仗它们组织了很久。", weight:6, cond:c=>hasTag(c,"animal_friend"), statEffect:{charm:1, luck:1}},
    {text:"梦里演练过上百遍的那场危机真的来了——所有人都在慌乱，只有你闭着眼都知道下一步该做什么。事后有人问你怎么这么镇定，你说：这题我做过。", weight:6, cond:c=>hasTag(c,"dream_rehearsal"), statEffect:{wit:1, luck:1}},
    {text:"本地的赌坊贴出了你的画像——不是通缉，是拉黑：自从你路过之后，庄家已经连输了七天。你顺手在门口买了张彩票，中了。", weight:5, cond:c=>hasTag(c,"luck_thief"), statEffect:{wealth:2}},
    {text:"朋友们终于摸清了你乌鸦嘴的规律，现在大事之前都排队来求你『反着说一句』——你嫌弃地说了句『这事肯定成不了』，结果他们真的都成了。", weight:6, cond:c=>hasTag(c,"crow_mouth"), statEffect:{charm:2}},
    {choice:true, weight:2, text:"一位说不清来历的老者拦住你，摊开手心——一枚两面都刻着你侧脸的硬币。『赌一把吗？赌注是你的运气。』", options:[{label:"接过硬币，掷", riskyChance:0.5, successResult:"硬币落地，是笑着的那一面。老者抚掌大笑：『命运今天偏爱你。』你只觉得浑身轻快，仿佛连空气都在让路。", successEffect:{luck:2}, failResult:"", failDeathChance:0, regressResult:"硬币落地，是皱眉的那一面。老者叹了口气收起硬币：『改日再来。』那之后你倒霉了整整一个月。", regressEffect:{luck:-1}},{label:"婉拒这场来路不明的赌局", result:"你笑着摇了摇头。老者也不恼，收起硬币走远了——你隐约觉得，看破这场局本身就是一种胜利。", statEffect:{wit:1}}]},
    {text:"你又遇见了那位旅人。他看着你掌心那枚旧铜币笑了：『还留着呢。』这一次他坐下来陪你喝了杯酒，聊的都是些谁也听不懂的旧事。", weight:14, cond:c=>hasFlag(c,"traveler_met1"), setFlag:"traveler_met2"},
    {text:"当年那个针锋相对的同学如今也小有成就，你们又一次在某个场合针锋相对，谁都不肯让谁。", weight:6, cond:c=>hasFlag(c,"rival_met"), setFlag:"rival_escalated"},
    {text:"你终于查明了当年那件信物背后的真相——你的身世，远比想象中更加不凡。", weight:6, cond:c=>hasFlag(c,"secret_lineage"), setFlag:"lineage_revealed", statEffect:{origin:2}},
    {text:"一个眼神清澈的年轻人执意要拜你为师，软磨硬泡了许久，你最终答应收下了这个徒弟。", weight:5, setFlag:"took_apprentice"},
    {text:"那位神秘人忽然登门，说是时候兑现当年欠下的人情了，还提出了一个不大不小的请求。", weight:6, cond:c=>hasFlag(c,"owes_favor"), setFlag:"favor_called"},
    {choice:true, weight:6, text:"多年后，与当年如出一辙的灾难征兆再次出现，你要不要主动站出来提醒大家？", cond:c=>hasFlag(c,"disaster_survivor"), options:[

    {text:"你在一次机缘巧合下对一个人一见倾心，却因为种种缘故，一直没能鼓起勇气挑明心意。", weight:5, setFlag:"secret_crush"},
    {choice:true, weight:6, text:"你路遇一场打劫，受害者的呼救声传入耳中，你必须当场做出选择。", options:[
      {label:"挺身而出，出手相助", result:"你毫不犹豫地挺身而出，击退了劫匪，事后受害者对你千恩万谢，这件事很快就在周围传开了。", statEffect:{power:1,charm:1}, achievement:"路见不平"},
      {label:"悄悄记下细节，暗中报官", result:"你不动声色地绕开，暗中把细节告诉了官府，既避开了正面冲突的风险，也算尽了一份力。", statEffect:{wit:1}},
      {label:"视若无睹，转身离开", result:"你选择了视若无睹，转身离开，心里却始终留下了一根刺，往后很长一段时间都无法真正释怀。", statEffect:{luck:-1,charm:-1}}
    ]},
    {text:{
      qixiu:"你正式拜入宗门，接到的第一个任务，就是清剿在山脚附近作乱的野兽群。",
      magic:"你正式加入冒险者公会，接到的第一个委托，就是讨伐在村庄附近作乱的哥布林群。",
      scifi:"你正式加入殖民地防卫队，接到的第一个任务，就是清剿在边境滋事的变异兽群。",
      warhammer:"你正式编入帝国军团，接到的第一个任务，就是清剿潜伏在边境村庄附近的异形巢穴。",
      yaoguai:"你正式入了驱邪门派，接到的第一个差事，就是降服在村庄附近作祟的山精。",
      cyberpunk:"你正式加入拾荒者公会，接到的第一个委托，就是清剿在据点附近滋事的变异生物。"
    }, weight:9},
    {text:{
      qixiu:"你在客栈里听说了魔道邪修近来异动频繁的消息，心中隐隐觉得这与自己脱不了关系。",
      magic:"你在酒馆里听说了魔王军近来异动频繁的消息，心中隐隐觉得这与自己脱不了关系。",
      scifi:"你在酒吧里听说了外星敌对势力近来异动频繁的消息，心中隐隐觉得这与自己脱不了关系。",
      warhammer:"你在营地里听说了混沌异形近来异动频繁的消息，心中隐隐觉得这与自己脱不了关系。",
      yaoguai:"你在茶馆里听说了百年凶灵近来异动频繁的消息，心中隐隐觉得这与自己脱不了关系。",
      cyberpunk:"你在黑市酒馆里听说了敌对帮派近来异动频繁的消息，心中隐隐觉得这与自己脱不了关系。"
    }, weight:8},
    {text:{
      qixiu:"你只身一人击退了一整支邪修大军，从此声名大噪，被同道称为「本代最强新人」。",
      magic:"你只身一人击退了一整支魔物大军，从此声名大噪，被冒险者们称为「异世界最强新人」。",
      scifi:"你只身一人击退了一整支外星大军，从此声名大噪，被同僚称为「殖民地最强新人」。",
      warhammer:"你只身一人击退了一整支异形大军，从此声名大噪，被战友称为「军团最强新兵」。",
      yaoguai:"你只身一人击退了一整支妖兵，从此声名大噪，被同道称为「江湖最强新秀」。",
      cyberpunk:"你只身一人击退了一整支敌对帮派人马，从此声名大噪，被拾荒者们称为「废土最强新人」。"
    }, weight:8, cond:c=>stat(c,"power")>=8},
    {text:{
      qixiu:"你在宗门的藏经阁里发现了一本失传已久的上古秘籍，如获至宝。",
      magic:"你在魔法塔的禁书库里发现了一本失传已久的古代魔导书，如获至宝。",
      scifi:"你在殖民地的绝密档案库里发现了一份失传已久的古代科技图纸，如获至宝。",
      warhammer:"你在圣殿的禁忌典籍室里发现了一份失传已久的古老圣典，如获至宝。",
      yaoguai:"你在道观的密室里发现了一本失传已久的古老符箓典籍，如获至宝。",
      cyberpunk:"你在废墟深处的旧世界服务器里发现了一份失传已久的古老技术资料，如获至宝。"
    }, weight:8, cond:c=>stat(c,"wit")>=8},
    {text:"不知不觉间，身边聚集起了一群性格迥异却对你颇有好感的伙伴，队伍越来越热闹。", weight:8, cond:c=>hasTag(c,"harem")||stat(c,"charm")>=8},
    {text:{
      qixiu:"宗门的老祖亲自登门拜访，郑重地告诉你，你正是天命所归、注定不凡的存在。",
      magic:"教会的大主教亲自登门拜访，郑重地告诉你，你正是预言中拯救世界的关键人物。",
      scifi:"殖民地的最高议会亲自派人拜访，郑重地告诉你，你正是数据预测中扭转局势的关键人物。",
      warhammer:"教团的最高裁决官亲自登门拜访，郑重地告诉你，帝皇的意志似乎正指向你。",
      yaoguai:"城隍庙的老神仙亲自登门拜访，郑重地告诉你，你正是天命所归、注定不凡的存在。",
      cyberpunk:"废土上最有威望的长老亲自登门拜访，郑重地告诉你，你正是传说中能改变废土格局的人。"
    }, weight:7, cond:c=>hasTag(c,"chosen")},
    {text:{
      qixiu:"系统面板突然弹出一个隐藏任务：「铲除潜伏在宗门的邪修奸细」，奖励十分丰厚。",
      magic:"系统面板突然弹出一个隐藏任务：「铲除潜伏在王都的魔王眼线」，奖励十分丰厚。",
      scifi:"系统面板突然弹出一个隐藏任务：「铲除潜伏在殖民地的间谍」，奖励十分丰厚。",
      warhammer:"系统面板突然弹出一个隐藏任务：「铲除潜伏在军团内部的异形细胞」，奖励十分丰厚。",
      yaoguai:"系统面板突然弹出一个隐藏任务：「铲除潜伏在城中的作祟妖物」，奖励十分丰厚。",
      cyberpunk:"系统面板突然弹出一个隐藏任务：「铲除潜伏在据点里的敌对帮派眼线」，奖励十分丰厚。"
    }, weight:7, cond:c=>hasTag(c,"system")},
    {text:{
      qixiu:"你报名参加了宗门举办的论武大会，一路过关斩将，最终风光地站上了冠军的擂台。",
      magic:"你报名参加了王国举办的比武大会，一路过关斩将，最终风光地站上了冠军的领奖台。",
      scifi:"你报名参加了殖民地举办的格斗竞技赛，一路过关斩将，最终风光地站上了冠军的领奖台。",
      warhammer:"你报名参加了军团举办的角斗大赛，一路过关斩将，最终风光地站上了冠军的领奖台。",
      yaoguai:"你报名参加了江湖举办的比武大会，一路过关斩将，最终风光地站上了冠军的擂台。",
      cyberpunk:"你报名参加了废土举办的地下格斗赛，一路过关斩将，最终风光地站上了冠军的领奖台。"
    }, weight:7, achievement:"比武大会冠军"},
    {text:{
      qixiu:"你莫名其妙地被卷入了掌门之位的继承之争，稀里糊涂地成了某位少主最重要的盟友。",
      magic:"你莫名其妙地被卷入了王位继承之争，稀里糊涂地成了某位王子最重要的盟友。",
      scifi:"你莫名其妙地被卷入了殖民地总督的继任之争，稀里糊涂地成了某位候选人最重要的盟友。",
      warhammer:"你莫名其妙地被卷入了军团指挥权的继承之争，稀里糊涂地成了某位继承人最重要的盟友。",
      yaoguai:"你莫名其妙地被卷入了城隍之位的继承之争，稀里糊涂地成了某位少城隍最重要的盟友。",
      cyberpunk:"你莫名其妙地被卷入了帮派老大之位的继承之争，稀里糊涂地成了某位少主最重要的盟友。"
    }, weight:6, cond:c=>stat(c,"origin")>=6},
    {text:{
      qixiu:"你在游历中救下了一位落难的仙门女修，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      magic:"你在旅途中救下了一位落难的精灵少女，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      scifi:"你在任务中救下了一位落难的殖民地女科研员，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      warhammer:"你在战场上救下了一位落难的随军女祭司，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      yaoguai:"你在山野中救下了一位落难的狐族少女，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      cyberpunk:"你在废土上救下了一位落难的黑市女商人，她说要以身相许来报答救命之恩，被你婉言谢绝。"
    }, weight:6},
    {text:"你对着队友随口说了句「这次任务结束我就退休结婚」，队友们的脸色瞬间都变得很奇怪。", weight:6, cond:c=>hasTag(c,"deathflag")},
    {text:{
      qixiu:"你无意间路过了传说中的「真龙秘境」，一条上古真龙对你异常亲切，仿佛与你相识已久。",
      magic:"你无意间路过了传说中的「龙之谷」，一条巨龙对你异常亲切，仿佛与你相识已久。",
      scifi:"你无意间路过了传说中的「巨兽禁区」，一头深空巨兽对你异常亲切，仿佛与你相识已久。",
      warhammer:"你无意间路过了传说中的「泰坦墓场」，一台沉睡的泰坦机甲对你异常亲切，仿佛与你相识已久。",
      yaoguai:"你无意间路过了传说中的「应龙潭」，一条应龙对你异常亲切，仿佛与你相识已久。",
      cyberpunk:"你无意间路过了传说中的「机械巨兽禁区」，一台古老的机械巨兽对你异常亲切，仿佛与你相识已久。"
    }, weight:6, cond:c=>hasTag(c,"dragon")},
    {text:"不知为何，你的所作所为总是被人误解成反派，通缉令都快贴满了这片土地的每一个角落。", weight:6, cond:c=>hasTag(c,"villain")},
    {text:"你开了一家专卖地球风味小吃的餐馆，凭借「可乐」和「炸鸡」意外成了当地最火的网红店。", weight:6},
    {text:{
      qixiu:"魔道邪修的一位大能似乎对你颇为忌惮，特意派出精锐弟子想要提前将你除掉。",
      magic:"魔王军的一位高层似乎对你颇为忌惮，特意派出精锐部队想要提前将你除掉。",
      scifi:"敌对势力的一位高层似乎对你颇为忌惮，特意派出精锐部队想要提前将你除掉。",
      warhammer:"混沌势力的一位头目似乎对你颇为忌惮，特意派出精锐异形想要提前将你除掉。",
      yaoguai:"妖界的一位大妖似乎对你颇为忌惮，特意派出精锐妖兵想要提前将你除掉。",
      cyberpunk:"敌对帮派的一位头目似乎对你颇为忌惮，特意派出精锐打手想要提前将你除掉。"
    }, weight:6, cond:c=>stat(c,"power")>=6},
    {text:{
      qixiu:"你偶然习得了一门出神入化的剑诀，一套剑招使出，连围观的宗门长老都自愧不如。",
      magic:"你偶然习得了一手出神入化的剑法，一套剑招使出，连围观的骑士团长都自愧不如。",
      scifi:"你偶然习得了一手出神入化的近战格斗术，一套招式使出，连围观的教官都自愧不如。",
      warhammer:"你偶然习得了一手出神入化的近身搏杀技，一套招式使出，连围观的连长都自愧不如。",
      yaoguai:"你偶然习得了一门出神入化的剑术，一套剑招使出，连围观的掌门都自愧不如。",
      cyberpunk:"你偶然习得了一手出神入化的义体格斗术，一套招式使出，连围观的帮派老大都自愧不如。"
    }, weight:6, cond:c=>hasTag(c,"swordsman")},
    {text:{
      qixiu:"曾经并肩作战的道友，因为一场变故彻底走火入魔，成了邪修的干将，与你在战场上兵戎相见。",
      magic:"曾经并肩作战的挚友，因为一场变故彻底黑化，成了魔王军的干部，与你在战场上兵戎相见。",
      scifi:"曾经并肩作战的战友，因为一场变故彻底叛变，成了敌对势力的高层，与你在战场上兵戎相见。",
      warhammer:"曾经并肩作战的兄弟，因为一场变故被混沌腐化，成了异形的傀儡，与你在战场上兵戎相见。",
      yaoguai:"曾经并肩作战的师兄弟，因为一场变故彻底入魔，成了妖界的干将，与你在战场上兵戎相见。",
      cyberpunk:"曾经并肩作战的兄弟，因为一场变故彻底黑化，成了敌对帮派的骨干，与你在战场上兵戎相见。"
    }, weight:5, cond:c=>hasTag(c,"blackening")},
    {text:"你被误认成了传说中「深藏不露的隐藏大佬」，一群小混混上门挑衅后被你的气场吓退了。", weight:5, cond:c=>hasTag(c,"hiddenboss")},
    {text:{
      qixiu:"你在宗门的功勋榜上稳步攀升，任务完成度渐渐成了新弟子们争相模仿的标杆。",
      magic:"你在冒险者公会的排行榜上稳步攀升，任务完成度渐渐成了新人们争相模仿的标杆。",
      scifi:"你在殖民地防卫队的战绩榜上稳步攀升，任务完成度渐渐成了新人们争相模仿的标杆。",
      warhammer:"你在军团的战功榜上稳步攀升，任务完成度渐渐成了新兵们争相模仿的标杆。",
      yaoguai:"你在门派的功绩簿上稳步攀升，降妖数量渐渐成了新弟子们争相模仿的标杆。",
      cyberpunk:"你在拾荒者公会的排行榜上稳步攀升，任务完成度渐渐成了新人们争相模仿的标杆。"
    }, weight:5},
    {text:{
      qixiu:"你在门派论剑大会上一鸣惊人，剑锋所指，几乎无人能挡，被誉为剑修界的一颗新星。",
      magic:"你在剑术大会上一鸣惊人，剑锋所指，几乎无人能挡，被誉为剑术界的一颗新星。",
      scifi:"你在格斗竞技赛上一鸣惊人，出手所指，几乎无人能挡，被誉为格斗界的一颗新星。",
      warhammer:"你在近身搏杀赛上一鸣惊人，出手所指，几乎无人能挡，被誉为军团里的一颗新星。",
      yaoguai:"你在江湖论剑大会上一鸣惊人，剑锋所指，几乎无人能挡，被誉为剑修界的一颗新星。",
      cyberpunk:"你在地下格斗赛上一鸣惊人，出手所指，几乎无人能挡，被誉为格斗圈的一颗新星。"
    }, weight:6, cond:c=>hasTag(c,"swordsman")},
    {text:"系统面板悄悄弹出提示：「本周任务完成度100%，宿主经验值大幅提升」。", weight:6, cond:c=>hasTag(c,"system")},
    {text:"你凭借三寸不烂之舌，兵不血刃地化解了一场本该大打出手的冲突。", weight:5, cond:c=>stat(c,"charm")>=7&&stat(c,"power")<=4},
    {text:{
      qixiu:"你无意间救下了一位乔装出行的宗主之女，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      magic:"你无意间救下了一位乔装出行的公主，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      scifi:"你无意间救下了一位乔装出行的总督千金，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      warhammer:"你无意间救下了一位乔装出行的贵族继承人，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      yaoguai:"你无意间救下了一位乔装出行的城隍之女，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      cyberpunk:"你无意间救下了一位乔装出行的帮派老大之女，对方非要以身相许，被你婉拒后两人反倒成了知己。"
    }, weight:5},
    {text:"你的契约灵兽突然开口说出了人话，把你自己都吓了一跳。", weight:5, cond:c=>hasTag(c,"familiar")},
    {text:"你明明什么都没做，却总是莫名其妙地被卷进各种麻烦事里，百口莫辩。", weight:5, cond:c=>stat(c,"luck")<=3},
    {text:"你在冒险途中偶遇了另一位同样来自地球的转生者，两人抱头痛哭，聊起了各自的辛酸血泪史。", weight:5},
    {text:{
      qixiu:"你从外门弟子一路拼杀，硬是靠实力挤进了宗门核心弟子的圈子。",
      magic:"你从底层冒险者一路拼杀，硬是靠实力挤进了王都精英冒险者的圈子。",
      scifi:"你从底层学员一路拼杀，硬是靠实力挤进了殖民地精英机甲师的圈子。",
      warhammer:"你从底层新兵一路拼杀，硬是靠实力挤进了军团精锐部队的圈子。",
      yaoguai:"你从底层弟子一路拼杀，硬是靠实力挤进了门派核心弟子的圈子。",
      cyberpunk:"你从底层拾荒者一路拼杀，硬是靠实力挤进了废土精英拾荒队的圈子。"
    }, weight:5, cond:c=>stat(c,"origin")<=3&&stat(c,"power")>=7},
    {text:{
      qixiu:"山中的隐世仙族对你格外礼遇，甚至邀请你参加了灵山深处的秘密祭典。",
      magic:"精灵长老族对你格外礼遇，甚至邀请你参加了森林深处的秘密祭典。",
      scifi:"殖民地的元老议会对你格外礼遇，甚至邀请你参加了核心舱深处的机密仪式。",
      warhammer:"教团的高阶祭司对你格外礼遇，甚至邀请你参加了圣殿深处的秘密仪式。",
      yaoguai:"山中的狐族长老对你格外礼遇，甚至邀请你参加了深山狐窟的秘密祭典。",
      cyberpunk:"废土的地下长老会对你格外礼遇，甚至邀请你参加了地下堡垒深处的秘密仪式。"

    {text:"你信誓旦旦地说「这次一定不会有事」，队友们齐刷刷地往后退了一步。", weight:5, cond:c=>hasTag(c,"deathflag")},
    {text:"你参与了一场跨境的商队护卫任务，途中结识的商人后来成了你重要的合作伙伴。", weight:5},

    {text:"你做了一个语焉不详却异常真实的梦，没过几天梦中的场景真的发生了，把你自己都吓了一跳。", weight:5, cond:c=>hasTag(c,"prophecy")},
    {text:"你在一次几乎必死的意外中奇迹生还，郎中反复检查也查不出所以然，只当是运气使然。", weight:5, cond:c=>hasTag(c,"immortal")},
    {text:"你在路边随手翻了翻旧货摊，淘到的东西转手一卖，竟赚了一笔实实在在的意外之财。", weight:5, cond:c=>hasTag(c,"richluck")},
    {text:"你把多年前一件鸡毛蒜皮的小事记恨到了现在，气得对方百思不得其解你到底在气什么。", weight:5, cond:c=>hasTag(c,"cursed")},

    {text:"你又一次把一件本该轻而易举的事情搞砸了，旁人看着你的手忙脚乱，都忍不住摇头苦笑，你自己倒也习惯了这份『废柴』的名声。", weight:5, cond:c=>hasTag(c,"trash")},
    {text:"走在路上，一滩水、一个空花盆、一根不知从哪飘来的绳子，总有莫名其妙的意外找上你，好在这一次也只是磕了一下，没伤到要紧地方。", weight:5, cond:c=>hasTag(c,"unlucky")},
    {text:"一个难得的好机会摆在你面前，你却反反复复纠结了老半天，迟迟拿不定主意，等你终于想清楚时，那个机会早已经溜走了。", weight:5, cond:c=>hasTag(c,"indecisive")},
    {text:"你在一群人中很自然地扛起了带头的责任，大伙儿遇到难事，第一个想到的总是你。", weight:5, cond:c=>c.gender==="male", statEffect:{origin:1}},
    {text:"你总能敏锐地察觉到旁人没注意的细节，好几次都靠这份心细，提前避开了明摆着的麻烦。", weight:5, cond:c=>c.gender==="female", statEffect:{wit:1}}

  prime: [ // 31-50
    {choice:true, weight:3, text:"黑市上有人向你兜售一种来路不明的禁药，据说能强行拔高冲关的胜算——代价写在卖家躲闪的眼神里。", options:[{label:"铤而走险", result:"药力霸道得超乎想象——你能清晰地感到关口在药力面前变薄了，也能清晰地感到身体里有什么东西被永久地烧掉了。", statEffect:{health:-2}, breakthroughLuck:0.08},{label:"敬而远之", result:"你转身离开了。有些捷径的尽头不是终点，是悬崖。", statEffect:{luck:1}}]},
    {text:"家业、纷争、人情往来……俗务像藤蔓一样缠了上来。你的修行没有停，但你自己知道：心境已经不复当年的纯粹，下一道关口会比想象中更难。", weight:3, cond:c=>transcendRank(c)>=1, breakthroughLuck:-0.04},
    {text:"你偶然得到了一位先行者留下的手记，里面事无巨细地记着他当年突破时踩过的每一个坑——最后一页写着：『愿后来者，不必再用命试错。』", weight:4, breakthroughLuck:0.05},
    {text:"那桩全城都看好的买卖，你只看了一眼就摇头退出了——三个月后它轰然崩盘。有人问你怎么知道的，你说：『我没看它的开始，我看的是它的结尾。』", weight:5, cond:c=>hasTag(c,"ending_eye"), statEffect:{wit:2, wealth:1}},
    {text:"你曾郑重地对一个绝望的孩子承诺『会好起来的』——第二天，一位游方名医『恰好』路过；第三天，药材商『恰好』降价；第七天，孩子退烧了。世界在替你兑现诺言，你听见了它挽起袖子的声音。", weight:5, cond:c=>hasTag(c,"promise_gold"), statEffect:{charm:2, luck:1}},
    {text:"你大喜的那一天，久旱三月的天空落下了透雨——全城的人都在雨里欢呼。只有你隐约明白，这场雨是谁的心情。你决定以后要经常高兴。", weight:5, cond:c=>hasTag(c,"weather_heart"), statEffect:{charm:2}},
    {text:"三十年前你随手借出去的一袋米，今天以一座粮仓的形式还了回来——当年那个饿肚子的少年如今是粮行大东家，他说这些年一直在找你。账房先生说得对：这本账，从不烂尾。", weight:5, cond:c=>hasTag(c,"karma_ledger"), statEffect:{wealth:2, charm:1}},
    {text:"一场本该致命的意外之后，你在鬼门关前被『退』了回来——医者说是奇迹，你却清楚地记得，门后有个声音不耐烦地说：『还不是时候，回去。』", weight:5, cond:c=>hasTag(c,"second_life"), statEffect:{health:2, luck:1}},
    {text:"昨夜的梦里你走进了一座完全陌生的城市——那里的天空挂着两个月亮，街上的人说着你听不懂却莫名熟悉的语言。醒来时，你的鞋底沾着一种本地绝不出产的红色沙土。", weight:5, cond:c=>hasTag(c,"dream_walker"), achievement:"位面裂隙", statEffect:{luck:2}},
    {text:"你住下的这条街已经连续三年无灾无病、五谷丰登——邻居们悄悄为你立了一块长生牌位，每逢初一十五都有人上香。你假装不知道，但每次路过都会走得很慢。", weight:5, cond:c=>hasTag(c,"blessing_radiator"), statEffect:{charm:2}},
    {text:"你发现这个世界有个小小的『漏洞』：某个特定的街角，物价永远会算错一文钱。你没有滥用它——只是偶尔去站一站，确认这个世界还是那个不太完美、但很可爱的世界。", weight:5, cond:c=>hasTag(c,"rule_glitch"), statEffect:{wit:1, luck:1}},
    {text:"你忽然觉得刚才那一幕『不该是这样』——世界仿佛卡顿了一瞬，然后同样的场景重新上演了一遍。这一次，结局如你所愿。你决定不告诉任何人。", weight:5, cond:c=>hasTag(c,"fate_editor"), statEffect:{luck:1, wit:1}},
    {text:"劫道的拦住了你——然后他的裤腰带断了，同伙的刀鞘卡住了，马惊了，树枝断了。你在一连串莫名其妙的事故里安然走远，身后传来一声哀嚎：『今天真他娘的邪门！』你的霉运，原来是护体的。", weight:5, cond:c=>hasTag(c,"broom_star"), statEffect:{luck:1}},
    {text:"生意最难的那个月，一位素不相识的旧主顾突然找上门来结清了一笔你早已忘记的旧账——不多不少，正好够你渡过难关。老天爷赏的饭，一粒米都不会少。", weight:5, cond:c=>hasTag(c,"heaven_fed"), statEffect:{wealth:2}},
    {text:"年轻时那场大难的『后福』终于兑现了——一笔意料之外的机缘不偏不倚落在你头上，老人们都说：看吧，天在记账。", weight:5, cond:c=>hasTag(c,"survivor_blessing") && state.age>=40, statEffect:{luck:2, wealth:1}},
    {text:"公司要竞标大项目那周，同事们排着队来摸你的头沾好运——最后真中标了，庆功宴上你被敬酒敬到扶墙。", weight:6, cond:c=>hasTag(c,"koi"), statEffect:{charm:1}},
    {text:"你在梦里遇见了另一个自己——那个在每一个岔路口都做了相反选择的你。你们相顾无言，末了他笑着说：『放心，我这条路也不坏。』", weight:1, statEffect:{wit:1}},
    {text:"第三次遇见那位旅人时，他终于开口：『其实我和你一样，也不是这个世界的人。』你们在异乡的星空下聊了整整一夜——原来漂泊的灵魂，从来不止你一个。", weight:14, cond:c=>hasFlag(c,"traveler_met2"), achievement:"同是天涯沦落人", statEffect:{charm:1,luck:1}},
    {text:"你与那位纠缠半生的宿敌最终在一次意外的重逢中握手言和，多年的心结在一笑之间烟消云散。", weight:6, cond:c=>hasFlag(c,"rival_escalated"), achievement:"相逢一笑泯恩仇", statEffect:{charm:1}},
    {text:"你收的徒弟渐渐能够独当一面了，看着他青出于蓝的样子，你心里说不出的欣慰。", weight:6, cond:c=>hasFlag(c,"took_apprentice"), setFlag:"apprentice_grown", statEffect:{charm:1}},
    {text:"当年那场灾难的阴影，终于彻底从你心里散去，你觉得自己是真正地走出来了。", weight:5, cond:c=>hasFlag(c,"disaster_survivor"), statEffect:{health:1}},
    {choice:true, weight:6, text:"你的真实身世传开后，各方势力都想拉拢你，你必须做出选择。", cond:c=>hasFlag(c,"lineage_revealed"), options:[
      {label:"归顺权贵阵营，借势而起", result:"你选择了归顺权贵阵营，借着这份身世的势，你的地位水涨船高。", statEffect:{origin:1,power:1}},
      {label:"自立门户，谁也不依附", result:"你选择谁也不依附，凭着这份身世自立门户，走出了一条属于自己的路。", statEffect:{power:1,luck:1}, achievement:"另起炉灶"},
      {label:"隐姓埋名，远离这一切纷争", result:"你最终选择隐姓埋名，把这份身世的秘密继续尘封，只想安安静静地过完这一生。", statEffect:{luck:1}}
    ]},
    {choice:true, weight:6, text:"神秘人的请求牵扯到一件棘手的事，你必须决定怎么回应。", cond:c=>hasFlag(c,"favor_called"), options:[

    {text:"一位曾经败在同一道关口前的老友专程来访，把他失败的全过程原原本本讲给你听——『我摔过的跤，你替我跨过去。』", weight:4, cond:c=>transcendRank(c)>=1, breakthroughLuck:0.05},
    {text:"你收了一个隔了不知几代的小徒弟——她学得很慢，你教得很慢，你们都觉得这样刚刚好。", weight:6, repeatable:true, cond:c=>transcendRank(c)>=1 && state.age>=95, statEffect:{charm:1}},
    {text:"你着手整理毕生所学，一页页写下来——不为传世，只为某天有缘人翻开时，能少走一些你走过的弯路。", weight:6, repeatable:true, cond:c=>transcendRank(c)>=1 && state.age>=95, statEffect:{wit:1}},
    {text:"你花了整整一天坐在高处看云——活得足够久之后你才明白，这种什么都不做的日子，才是最奢侈的修行。", weight:6, repeatable:true, cond:c=>transcendRank(c)>=1 && state.age>=95},
    {text:"你听见街头的孩子们在传唱关于你的歌谣——歌词已经和事实相去甚远，但你听得津津有味。", weight:6, repeatable:true, cond:c=>transcendRank(c)>=1 && state.age>=95},
    {text:"一位白发苍苍的老者登门拜访，颤巍巍地唤你的名字——你认了半天才认出来：那是你几十年前救过的那个孩子。", weight:6, repeatable:true, cond:c=>transcendRank(c)>=1 && state.age>=95, statEffect:{charm:1}},
    {text:"你静静看着又一代人长大、老去——岁月在你身上放慢了脚步，你便替那些走得快的人，多记住一些事。", weight:6, repeatable:true, cond:c=>transcendRank(c)>=1 && state.age>=95},
    {text:"某个寻常的午后，你忽然产生了一种奇妙的错觉——仿佛自己走过的这一生，正被什么人一行一行地读着。你对着空气举了举茶杯：无论你是谁，希望这个故事没让你失望。", weight:1, achievement:"戏中人", statEffect:{luck:1}},
    {text:"你想起当年那位不知名的恩师，提笔写下了一本纪念他教诲的书，希望这份师徒情谊能被后人一直记住。", weight:6, cond:c=>hasFlag(c,"mentor_honored"), achievement:"师恩难忘"},
    {choice:true, weight:6, text:"你的徒弟如今已经成了气候，兴冲冲地跑来问你要不要跟他们一起再干一票大的。", cond:c=>hasFlag(c,"apprentice_grown"), options:[
      {label:"欣然同意，再战一场", result:"你欣然同意，宝刀未老地跟着徒弟又干了一票漂亮的，年轻人都对你刮目相看。", statEffect:{power:1}, achievement:"老当益壮"},
      {label:"婉拒，把舞台留给年轻人", result:"你婉言谢绝了，笑着说这个舞台该留给年轻人，自己在一旁看着就够高兴的了。", statEffect:{charm:1}, achievement:"青出于蓝"},
      {label:"提出更稳妥的方案，从旁指导", result:"你没有直接参与，却在背后提出了一套更稳妥的方案，帮徒弟把风险降到了最低。", statEffect:{wit:1}}

    {choice:true, weight:6, text:"邻居家的孩子走投无路，硬着头皮上门向你借钱，你要怎么处理这件事。", options:[
      {label:"慷慨相助，不求回报", result:"你二话不说地拿出钱来接济了对方，对方千恩万谢，你却只是笑笑说这没什么大不了的。", statEffect:{charm:1,wealth:-1}},
      {label:"婉拒借钱，但指了条明路", result:"你婉拒了直接借钱，却给对方指了一条能靠自己挣钱的明路，对方后来还真的靠此翻了身。", statEffect:{wit:1}},
      {label:"无视这件事，不想蹚浑水", result:"你选择了无视这件事，不想蹚这趟浑水，虽说心安理得，却也难免被人说了几句闲话。", statEffect:{luck:-1}}
    ]},
    {choice:true, weight:6, text:"你到了该考虑身后事的年纪，膝下儿孙也好，徒弟也好，都眼巴巴地等着你的决定。", options:[
      {label:"把毕生所学倾囊相授", result:"你把毕生所学一点不留地传授了下去，看着后辈渐渐成才，你觉得此生已无遗憾。", statEffect:{wit:1}, achievement:"倾囊相授"},
      {label:"把家业公平分配，谁也不偏心", result:"你把家业公平地分给了每一个人，过程中虽少不了几句抱怨，最终倒也算得上圆满。", statEffect:{origin:1}},
      {label:"什么都不留，潇洒地花个精光", result:"你想通了，什么都没留下，反倒把剩下的日子过得潇洒恣意，任谁劝也不改主意。", statEffect:{luck:1,wealth:-2}}

    {text:"你在自家小院里颐养天年，偶尔坐在门槛上，给围坐的孙辈讲讲当年闯荡异世界的往事。", weight:8},
    {text:"你收了一名资质平平却异常努力的徒弟，恍惚间仿佛看到了当年懵懂无知的自己。", weight:7},
    {text:"系统面板最后一次悄然亮起，只留下一行字：「宿主人生进度100%，感谢一路陪伴」。", weight:6, cond:c=>hasTag(c,"system")},
    {text:"你在一次静坐冥想中悄然消散，没有人知道你去了哪个位面，只在世间留下了一段传说。", weight:4},
    {text:"你在自家的葡萄架下打盹，梦里又回到了年轻时初到这个世界的那个清晨。", weight:7},
    {text:"系统面板弹出一条迟到多年的成就提示：「隐藏彩蛋已解锁」，随后再无更新。", weight:6, cond:c=>hasTag(c,"system")},
    {text:"你把珍藏多年的旧物一件件分给了子孙，每一件都藏着一段不为人知的往事。", weight:6},
    {text:"陪伴你一生的契约灵兽在你面前安静地闭上了眼睛，你抱着它落了很久的泪。", weight:6, cond:c=>hasTag(c,"familiar")},
    {text:{
      qixiu:"你受邀参加了年轻一代弟子的出师典礼，被众人尊称为「活着的传说」。",
      magic:"你受邀参加了年轻一代冒险者的毕业典礼，被众人尊称为「活着的传说」。",
      scifi:"你受邀参加了年轻一代学员的结业典礼，被众人尊称为「活着的传说」。",
      warhammer:"你受邀参加了年轻一代士兵的授勋典礼，被众人尊称为「活着的传说」。",
      yaoguai:"你受邀参加了年轻一代弟子的出师典礼，被众人尊称为「活着的传说」。",
      cyberpunk:"你受邀参加了年轻一代学徒的出师典礼，被众人尊称为「活着的传说」。"

    {text:"你的家族在你的经营下枝繁叶茂，子孙满堂，个个都算得上人中翘楚。", weight:6, cond:c=>stat(c,"origin")>=7},
    {text:"你在集市上偶遇了当年一同并肩作战的老友，两人相认后抱头痛哭了一场。", weight:6},
    {text:"你终于等到了这个世界给你的最后一个答案，心中再无遗憾。", weight:5, cond:c=>hasTag(c,"chosen")},
    {text:"你把自己的一生写成了回忆录，托付给最信任的弟子，嘱咐他好好保管。", weight:6},
    {text:{
      qixiu:"你受邀在宗门大殿开设了最后一堂课，座无虚席，掌声经久不息。",
      magic:"你受邀在王立学院开设了最后一堂课，座无虚席，掌声经久不息。",
      scifi:"你受邀在殖民地学院开设了最后一堂课，座无虚席，掌声经久不息。",
      warhammer:"你受邀在军团学堂开设了最后一堂课，座无虚席，掌声经久不息。",
      yaoguai:"你受邀在道观开设了最后一堂课，座无虚席，掌声经久不息。",
      cyberpunk:"你受邀在技术营开设了最后一堂课，座无虚席，掌声经久不息。"

    {text:"你在小院里种满了从各地带回的奇花异草，晚年常常在花丛间流连忘返。", weight:6},
    {text:"一群不知深浅的江湖后辈慕名而来想要挑战你，被你三言两语劝退，还倒赔了顿酒钱。", weight:5, cond:c=>hasTag(c,"hiddenboss")},
    {text:"你收到了一封来自远方老友的信，信里絮絮叨叨地写满了这些年的琐碎近况。", weight:6},
    {text:"你把自己毕生练就的武艺整理成谱，作为传家之宝留给了后人。", weight:5, cond:c=>stat(c,"power")>=7},
    {text:"你在某个寻常的午后，突然想起了故乡的模样，却发现自己早已彻底释然。", weight:6},
    {text:"你最终等来了昔日挚友的悔悟，两人在暮年重归于好，尽释前嫌。", weight:5, cond:c=>hasTag(c,"blackening")},
    {text:"你受邀为新落成的纪念碑揭幕，碑上刻着这些年发生的种种传奇。", weight:5},
    {text:"你的乔迁宴上来了半个大陆的宾客，热闹得像一场盛大的节日。", weight:5, cond:c=>stat(c,"charm")>=7},
    {text:"你笑着对孙辈说「这次是真的要退休了」，谁也没想到这句话这次真的应验了。", weight:5, cond:c=>hasTag(c,"deathflag")},
    {text:"你在临终前把一枚陪伴多年的旧物交给了最疼爱的晚辈，只说了句「往后的路，你们自己走」。", weight:6},
    {text:"你从一无所有到子孙满堂，晚年常笑着说这辈子过得比话本里写的还要精彩。", weight:5, cond:c=>stat(c,"origin")<=3},
    {text:"你在深夜独自坐在院子里仰望星空，仿佛又看到了当年那个懵懂降临此世的自己。", weight:6},
    {text:"你这一生几乎从未真正为难过，晚年回想起来，都觉得像是被谁悄悄眷顾着一样。", weight:5, cond:c=>stat(c,"luck")>=7},
    {text:"你把自己毕生的积蓄捐给了照顾孤寡老人的善堂，安安静静地准备迎接人生的终章。", weight:6},
    {text:"郎中检查你的身体时啧啧称奇，说你这把年纪的骨密度和气血，简直不像是会老去的样子。", weight:5, cond:c=>hasTag(c,"immortal")},
    {text:"你这辈子稀里糊涂攒下的家底，临了一算竟比整个村子加起来还多，连你自己都觉得不可思议。", weight:5, cond:c=>hasTag(c,"richluck")},
    {text:"你在午后的阳光里晒着太阳，慢悠悠地翻着一本泛黄的旧书，书页间还夹着一片干枯的树叶。", weight:6},
    {text:"你被邻里请去帮忙调解一场鸡毛蒜皮的纠纷，三言两语就让双方握手言和。", weight:6},
    {text:"你在院子里搭了个简易的鸟窝，没想到真的引来了一窝雀鸟安家落户。", weight:6},
    {text:"你收到镇上孩子们亲手做的贺卡，稚嫩的字迹写满了对你的敬佩与感谢。", weight:6},
    {text:"你翻出年轻时穿过的旧衣裳，试了试，发现早已不再合身，笑着摇了摇头。", weight:6},
    {text:"你在集市上碰到一个卖艺的孩子，随手赏了些盘缠，对方非要给你唱一整段曲子作为回礼。", weight:6},
    {text:"你时常坐在窗边，看着来来往往的行人，心里想着这大概就是所谓的岁月静好。", weight:6},
    {text:"你收养的野猫如今已经儿孙满堂，时常带着一群小猫崽来你门前蹭吃蹭喝。", weight:6},
    {text:"你在集市上被一个卖花小贩认出，对方非要免费送你一束花，说是感谢你多年前的一次援手。", weight:6},
    {text:"你把院子里的老藤椅修了又修，怎么也舍不得换掉，说这椅子比谁都懂你。", weight:6},
    {text:"你偶尔还会去当年常去的那家小酒馆坐坐，尽管老板早已换了好几茬。", weight:6},
    {text:"你在给晚辈讲故事时，总爱把自己的经历添油加醋一番，逗得满堂欢笑。", weight:6},
    {text:"你把院子里那棵陪你多年的老树认作了老友，闲来无事总要在树下坐上半晌。", weight:6},
    {text:"你时常翻看那些泛黄的旧信件，字里行间都是曾经鲜活滚烫的岁月。", weight:6},
    {death:true, text:"你在自家门前散步时突发急症，倒地不起，走得毫无征兆，倒也算是一种解脱。", weight:1, cond:c=>stat(c,"health")<=3 && transcendRank(c)===0, cause:"急症猝逝"},
    {death:true, text:"你在深夜里安静地睡去，再也没有醒来——比起苦熬到自然终老，这更像是老天爷悄悄给的一次成全。", weight:1, cond:c=>transcendRank(c)===0, cause:"无疾而终"},
    {death:true, text:"你预感到了自己的大限，从容地交代好一切，在一个晴朗的清晨端坐而逝——以你如今的存在层次，死亡不是被带走，而是一场你亲自主持的体面告别。", weight:1, cond:c=>transcendRank(c)>=1 && !(BREAKTHROUGH_LADDER[c.world] && BREAKTHROUGH_LADDER[c.world][transcendRank(c)]), cause:"坐化归真"},

      {death:true, text:"你在冲击金丹的关键时刻不慎走火入魔，经脉尽断，含恨陨落于自己的闭关洞府之中。", weight:1, cond:c=>worldStateVal(c,"qixiu_realm")===1, cause:"走火入魔"},
      {choice:true, weight:6, text:"你在一次历练中同时发现了两件上古法器，宗门规矩只许你带走一件，你必须做出选择。", options:[
        {label:"带走攻击性法器，锋锐无双", result:"你选择了那件锋锐无双的攻击法器，从此杀伐之道更进一层。", statEffect:{power:2}},
        {label:"带走辅助性法器，暗藏玄机", result:"你选择了那件暗藏玄机的辅助法器，修炼路上少走了不少弯路。", statEffect:{wit:2}},
        {label:"两件都不要，只带走一本残破的功法书", result:"你出人意料地放弃了两件法器，只带走了一本被人遗弃的残破功法书，后来才发现这才是真正的无价之宝。", statEffect:{luck:2}, achievement:"独具慧眼"}
      ]},
      {text:"你受邀参加了一场三教九流齐聚的『论道盛会』，会上各方争论不休，你的一番见解却让全场安静了下来。", weight:6},
      {text:"你在下山历练时遭遇了一群拦路的散修，双方剑拔弩张。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你几个照面便打退了对方，还顺手缴获了几件法器，倒是意外之喜。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你自知打不过，只能忍痛留下随身财货换取平安，灰头土脸地离开了。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番周旋唇枪舌剑，双方都留了几分面子，各自退去，倒也没伤了和气。", statEffect:{luck:1}}}
      ]},
      {text:"你在整理师门藏书时，发现了一本记载着『尸解重生』秘法的孤本，看得心惊肉跳。", weight:6},
      {text:"你在一次心境试炼中直面自己内心最深处的恐惧，虽然浑身冷汗，最终却也从容通过。", weight:6},
      {text:"你无意间路过一处尸变横生之地，凭着果断的手段全身而退，也算是长了不少见识。", weight:6},
      {text:"你在游历途中与一位红尘中人结下一段情缘，却因为修行之路而不得不面临抉择。", weight:6, setFlag:"qixiu_love"},
      {choice:true, weight:5, repeatable:true, text:"你感觉到体内的灵气已经充盈到了极限，一次筑基的契机就在眼前——这是你踏上仙途的第一道关卡，虽不算太凶险，却也十人九散。", cond:c=>worldStateVal(c,"qixiu_realm")===0 && state.age>=(hasTag(c,"transcendent")?16:20) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?5:8)), options:[
        {label:"尝试筑基", riskyChance:0.65, lifespanBonus:60, successEffect:{power:3,wit:2,health:1},
         successResult:"你成功筑基，灵气如江河般在经脉中流转，从此正式踏入了修仙之途，寿元也随之增长。", successAchievement:"强行筑基", worldStateKey:"qixiu_realm", worldStateDelta:1,
         failResult:"灵气反噬冲垮了你的经脉，你气血逆流，就此气绝身亡。", failDeath:true, failDeathChance:0.3, failCause:"筑基失败",
         regressResult:"筑基失败，经脉受到不小的冲击，你只能日后再寻机会重新尝试。", regressEffect:{health:-1}},
        {label:"不冒险，安心做个凡俗修士", result:"你决定不再冒险，安心做个凡俗修士，把这份心思用在了别处。", statEffect:{luck:1}, startCooldown:true}
      ]}
    ],
    prime:[
      {text:"为了凑齐图谱上的天材地宝，你走遍了七州三海：陨铁、心火、千年寒髓……如今万事俱备，只欠祭炼。", weight:12, cond:c=>hasFlag(c,"qixiu_quest1"), setFlag:"qixiu_quest2"},
      {text:"你在一处塌方的山腹里发现了一具锈蚀的巨大铁人残骸，其内构造之精密远超凡俗工匠的想象——它仿佛来自一个完全不同的世界。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {choice:true, weight:6, text:"你终于攒够了开辟自己洞府的资粮，只是选址颇费思量。", options:[{label:"筑在灵脉之上", result:"你把洞府筑在了一条灵脉之上，修炼事半功倍，只是树大招风，往后少不了要应付觊觎之人。", statEffect:{power:1}},{label:"藏于深山无名处", result:"你把洞府藏进了深山无名之处，清净自在，倒也落得逍遥。", statEffect:{luck:1}},{label:"安在坊市之侧", result:"你把洞府安在了坊市之侧，消息灵通、买卖便利，人脉与家底都厚了几分。", statEffect:{charm:1,wealth:1}}]},
      {text:"你在一次门派秘境探索中力压群修，夺得一件上古法器——凭借此宝，你的实力大涨，名动一方。", weight:10, achievement:"秘境夺宝", statEffect:{power:1,luck:1}},
      {text:"你执掌门中长老之位，门下弟子云集，俨然成了这方修仙盛派的中流砥柱。", weight:8, cond:c=>stat(c,"origin")>=7},
      {text:"你游历三千大千世界，在一场量劫之中助本命宗门渡过了灭顶之灾，声望一时无两。", weight:7},
      {text:"你受邀参加了百年一次的诸派论剑大会，与各大宗门的顶尖高手过招，虽未夺魁，却也扬名一方。", weight:6, cond:c=>hasTag(c,"swordsman")},
      {text:"你意外获得了那处传承之地留下的一份上古残篇，其中记载的修炼法门让你的境界突飞猛进。", weight:6, cond:c=>hasFlag(c,"qixiu_inheritance"), achievement:"缘定三生", statEffect:{wit:1}},
      {text:"你门下弟子在外惹下祸事，你不得不亲自出面为其善后，此事也让你在宗门内的威望经历了一番起落。", weight:6},
      {text:"你被卷入了一场持续数十年的正邪之争，最终选择站在了看似弱势的一方，却也因此声名鹤起。", weight:6},
      {text:"你受邀主持了一场同门大比，看着台下意气风发的年轻弟子们，恍惚间又想起了自己当年的模样。", weight:6},
      {choice:true, weight:6, text:"宗门内部就『修炼资源该论资排辈还是论才分配』产生了分歧，你的一句话可能左右宗门未来的风气。", options:[
        {label:"支持论才分配，唯才是举", result:"你支持了论才分配，往后宗门里天赋出众的弟子越来越多，风气焕然一新。", statEffect:{charm:1}, worldStateKey:"qixiu_sectInfluence", worldStateDelta:2},
        {label:"支持论资排辈，维持传统", result:"你支持维持论资排辈的老规矩，宗门风气一如既往，只是渐渐留不住那些真正的天才。", statEffect:{origin:1}, worldStateKey:"qixiu_sectInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这件事最终不了了之，宗门还是老样子。", statEffect:{luck:1}}
      ]},
      {choice:true, weight:6, text:"你的洞府突然涌入一股躁动的天地灵气，你必须决定如何引导它。", options:[
        {label:"强行吸收，冒险突破", result:"你强行吸收了这股躁动的灵气，冒险搏了一次突破，代价是浑身经脉都受了不小的震荡。", statEffect:{power:2,health:-1}},
        {label:"稳妥压制，安然渡过", result:"你选择了稳妥压制，安然渡过了这场意外的灵气涌动，虽然错过了机缘，却也平安无事。", statEffect:{luck:1}},
        {label:"分享给同门，共同受益", result:"你把这股灵气分享给了同门，几人共同受益，情分也因此更深了几分。", statEffect:{charm:2}}
      ]},
      {text:"你被推举为附近散修联盟的盟主，从此不再是孤身一人游历，肩上多了份责任。", weight:6},
      {text:"你在一次跨界游历中结识了不少同道，彼此切磋交流，修为在这番历练中更进一步。", weight:6},
      {choice:true, weight:6, text:"多年后你与那位红尘故人重逢，对方已经苍老，你却因为修行而容颜未改，你必须决定如何面对这段尘缘。", cond:c=>hasFlag(c,"qixiu_love"), options:[
        {label:"放下修行执念，陪伴此生", result:"你放下了多年的修行执念，选择陪对方走完剩下的岁月，心境却在这份陪伴中愈发通透。", statEffect:{charm:2,power:-1}, achievement:"红尘了悟"},
        {label:"赠予延寿之法，续写情缘", result:"你赠予了对方一份延寿之法，两人的情缘因此得以续写，只是往后要面对的因果，谁也说不清。", statEffect:{wealth:-2,charm:1}},
        {label:"含泪作别，专心修行", result:"你含泪与对方作别，转身专心投入修行，只是这份牵挂，此后多年都未曾真正放下。", statEffect:{power:1,luck:-1}}
      ]},
      {choice:true, weight:5, repeatable:true, text:"筑基多年后，你终于感觉到凝丹的时机已经成熟——金丹一道，十人九丹散，这是修仙路上真正意义上的第一道生死关。", cond:c=>!hasFlag(c,"qixiu_devoted") && worldStateVal(c,"qixiu_realm")===1 && state.age>=(hasTag(c,"transcendent")?36:42) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?10:15)), options:[
        {label:"尝试凝丹", riskyChance:0.45, lifespanBonus:400, successEffect:{power:4,wit:3,health:2},
         successResult:"金丹凝聚成功！丹田中那一粒金丹光华流转，你的寿元大幅增长，修为也今非昔比。", successAchievement:"金丹圆满", worldStateKey:"qixiu_realm", worldStateDelta:1,
         failResult:"凝丹失败，丹田彻底崩碎，气血逆冲之下，你当场气绝身亡。", failDeath:true, failDeathChance:0.5, failCause:"凝丹失败",
         regressResult:"凝丹失败，丹田受创，你只能眼看着即将成型的金丹碎裂消散，修为也因此倒退了不少。", regressEffect:{power:-2,wit:-2}, regressLifespanPenalty:10},
        {label:"将毕生修为反哺宗门", result:"你选择将毕生修为反哺宗门，滋养了整个宗门的根基——修为散尽的那一刻你笑了：这条路走到这里，也算功德圆满。", statEffect:{origin:2}, achievement:"反哺宗门", setFlag:"qixiu_devoted"},
        {label:"不冒险，止步于筑基之境", result:"你决定不再冒险，安心停留在筑基之境，把这具身子好好养着。", statEffect:{luck:1}, startCooldown:true}
      ]}
    ],
    elder:[
      {text:"某个落叶的清晨，你在扫地时忽然停住了——一片叶子坠地的轨迹里，你看见了此前百思不解的那一线天机。顿悟无声，但你知道，关口已经比昨天薄了一层。", weight:3, cond:c=>worldStateVal(c,"qixiu_realm")>=1, breakthroughLuck:0.08},
      {text:"你在山门开坛讲道，十里内的修士都赶来听讲——教学相长，你在弟子们的提问里也悟出了些新东西。", weight:6, repeatable:true, cond:c=>worldStateVal(c,"qixiu_realm")>=1, statEffect:{charm:1}},
      {text:"你开炉炼丹，三炉废丹之后终得一炉上品——服下之后气血充盈，肉身又被淬炼了一分。", weight:6, repeatable:true, cond:c=>worldStateVal(c,"qixiu_realm")>=1, statEffect:{health:1}},
      {text:"你闭门推演功法，将毕生所学去芜存菁——一套更契合自身的修行路数在你手中渐渐成形。", weight:6, repeatable:true, cond:c=>worldStateVal(c,"qixiu_realm")>=1, statEffect:{wit:1}},
      {text:"你花了数年云游访道，与各路同修坐而论道——归来时收获满满，对天地法则的理解又深了一层。", weight:7, repeatable:true, cond:c=>worldStateVal(c,"qixiu_realm")>=1, statEffect:{luck:1}},
      {text:"你又一次闭关静修，再睁眼时洞府外的松树粗了一圈——体内的道行也随着岁月沉淀，愈发圆融厚重。", weight:7, repeatable:true, cond:c=>worldStateVal(c,"qixiu_realm")>=1, statEffect:{wit:1}},
      {choice:true, weight:40, text:"那道虚空裂缝就悬在头顶，天光流转——迈进去，便是渡劫飞升、超脱此界；迈不进去，便是形神俱灭。", cond:c=>!hasFlag(c,"qixiu_gate_closed") && hasFlag(c,"qixiu_beyond2") && hasTag(c,"qixiu_destiny") && worldStateVal(c,"qixiu_realm")>=5, options:[{label:"踏入天门，渡劫飞升", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"qixiu_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"qixiu_gate_closed"}]},
      {text:"大乘圆满的这一日，虚空在你洞府上方裂开了一道细缝——缝隙后是从未见过的天光。你明白了：那是超脱此界的门。", weight:18, cond:c=>hasFlag(c,"qixiu_beyond1") && worldStateVal(c,"qixiu_realm")>=5, setFlag:"qixiu_beyond2"},
      {text:"化神之后的某次深夜吐纳，你听见了一个不属于这方天地的声音——它很轻，像是隔着一层膜在唤你的道号。", weight:12, cond:c=>hasTag(c,"qixiu_destiny") && worldStateVal(c,"qixiu_realm")>=4, setFlag:"qixiu_beyond1"},
      {choice:true, weight:14, text:"闭关祭炼本命法宝的最后一步到了——以自身精血温养器胚，成则器灵觉醒与你性命相连，败则精血反噬。", cond:c=>hasFlag(c,"qixiu_quest2"), options:[{label:"以精血祭炼，唤醒器灵", riskyChance:0.4, lifespanBonus:15, successEffect:{power:3,wit:2,luck:2}, successResult:"器胚中传来一声清鸣，一缕稚嫩的器灵意识与你的心神紧紧相连——毕生所求，今日功成。这件本命法宝从此与你同修共长。", successAchievement:"毕生所求", failResult:"精血反噬的那一刻，器胚轰然炸裂，你的心神随之俱碎。", failDeath:true, failDeathChance:0.30, failCause:"炼器反噬", regressResult:"祭炼在最后关头失控，器胚化作齑粉，你呕血倒地——数十年心血毁于一旦，好在命还在。", regressEffect:{health:-2,wit:-1}},{label:"封存器胚，传于后人", result:"你终究没有下定决心以命相搏，把器胚与图谱一同封存，留待有缘的后人——也算是另一种传承。", statEffect:{wit:1,charm:1}}]},
      {text:"你在洞府后山种的灵茶终于到了采摘的年头，用山泉煮上一壶，茶香能飘满整个山谷。", weight:6},
      {text:"当年收留的那名落魄弟子如今已是一方大能，逢年过节都会亲自登门拜望，同道无不称羡你有识人之明。", weight:6, cond:c=>hasFlag(c,"qixiu_disciple"), statEffect:{charm:1}},
      {text:"你闭关时无意间引来了一场罕见的灵雨，方圆百里的草木一夜之间灵气盎然，同道都说你福缘深厚。", weight:6, cond:c=>stat(c,"luck")>=8, statEffect:{health:1}},
      {text:"你于山巅盘膝而坐，感悟天地大道，肉身与灵魂在漫天雷劫中一同蜕变、升华。", weight:10, cond:c=>worldStateVal(c,"qixiu_realm")>=1},
      {text:"你将毕生功法尽数传于座下弟子，随后飘然远游，从此再未在这方世界现身。", weight:8},
      {text:"你以肉身之躯硬撼天道法则的传说早已传遍修真界——如今大乘之境的你，是寻常修士穷尽一生都难以仰望的存在。", weight:6, cond:c=>worldStateVal(c,"qixiu_realm")>=5},
      {text:"你在圆寂前夜梦见了年轻时错过的那条修炼之路，醒来后却只是笑笑，觉得如今这条路也没什么不好。", weight:6},
      {text:"你把毕生炼制的丹方悉数交给了宗门的炼丹阁，只求这份手艺能一直传下去。", weight:6},
      {text:"你在最后一次讲经时，座下弟子济济一堂，你忽然觉得，这一生修的不只是道，也是这满堂的师徒情分。", weight:6},
      {text:"你把这一生游历过的山川湖海都仔细记录了下来，编成了一部游记，坊间称之为《寰宇散记》。", weight:6},
      {text:"你临终前将自己压箱底的最后一件法宝悄悄藏进了后山，只留下一句让人参悟半生的偈语。", weight:6},
      {text:"你把自己毕生游历散修界的见闻整理成册，留给了后来的年轻散修们作为参考。", weight:6},
      {text:"你在临终前将自己培育多年的那株灵药树移栽回了宗门后山，希望它能继续庇护后来人。", weight:6},
      {choice:true, weight:35, repeatable:true, text:"金丹圆满之后，你终于迎来了凝结元婴的契机——元婴一道，是凡俗与真正长生之间的分水岭。", cond:c=>!hasFlag(c,"qixiu_devoted") && worldStateVal(c,"qixiu_realm")===2 && state.age>=(hasTag(c,"transcendent")?120:150) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?70:100)), options:[
        {label:"尝试凝结元婴", riskyChance:0.28, lifespanBonus:1200, successEffect:{power:6,wit:5,luck:2},
         successResult:"元婴凝结成功！你终于跨过了凡俗与长生的分水岭，寿元大幅跃升，一举成为方圆百里罕见的元婴真人。", successAchievement:"元婴大成", worldStateKey:"qixiu_realm", worldStateDelta:1,
         failResult:"元婴凝结失败，法力反噬彻底击溃了你的道基，你形神俱灭。", failDeath:true, failDeathChance:0.6, failCause:"元婴溃散",
         regressResult:"元婴凝结失败，法力反噬几乎击溃了你的道基，修为大幅倒退，好在勉强保住了这条命。", regressEffect:{power:-3,wit:-3,health:-2}, regressLifespanPenalty:20},
        {label:"将毕生修为反哺宗门", result:"你选择将毕生修为反哺宗门，滋养了整个宗门的根基——修为散尽的那一刻你笑了：这条路走到这里，也算功德圆满。", statEffect:{origin:2}, achievement:"反哺宗门", setFlag:"qixiu_devoted"},
        {label:"不冒险，止步于金丹之境", result:"你决定不再冒险，安心停留在金丹之境，把这具身子好好养着。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:35, repeatable:true, text:"元婴大成之后，你隐隐触摸到了化神的门槛——这一步跨过去，便是真正意义上的半步登仙，跨不过去，便是形神俱灭。", cond:c=>!hasFlag(c,"qixiu_devoted") && worldStateVal(c,"qixiu_realm")===3 && state.age>=(hasTag(c,"transcendent")?900:1150) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?700:1000)), options:[
        {label:"尝试化神", riskyChance:0.15, lifespanBonus:12000, successEffect:{power:8,wit:7,luck:3},
         successResult:"化神成功！你的神魄与天地灵气彻底交融，寿元一举跃升数百年，方圆数千里再无人敢轻视你的存在。", successAchievement:"化神有成", worldStateKey:"qixiu_realm", worldStateDelta:1,
         failResult:"化神失败，神魄当场被彻底撕碎，一缕残念都未能留下。", failDeath:true, failDeathChance:0.7, failCause:"神魄破碎",
         regressResult:"化神失败，神魄险些被撕碎，你侥幸保住了这条命，只是境界大幅倒退，短时间内再难有二次尝试的余力。", regressEffect:{power:-4,wit:-4,luck:-2}, regressLifespanPenalty:40},
        {label:"将毕生修为反哺宗门", result:"你选择将毕生修为反哺宗门，滋养了整个宗门的根基——修为散尽的那一刻你笑了：这条路走到这里，也算功德圆满。", statEffect:{origin:2}, achievement:"反哺宗门", setFlag:"qixiu_devoted"},
        {label:"不冒险，止步于元婴之境", result:"你决定不再冒险，安心停留在元婴之境，把这具身子好好养着。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:35, repeatable:true, text:"化神大成之后，你终于站在了大乘之境的门口——这一步，便是真正意义上的渡劫飞升，一旦功成，便是脱离凡俗轮回、位列仙班。", cond:c=>!hasFlag(c,"qixiu_devoted") && worldStateVal(c,"qixiu_realm")===4 && state.age>=(hasTag(c,"transcendent")?8500:11000) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?7000:10000)), options:[
        {label:"渡劫飞升", riskyChance:0.08, lifespanBonus:30000, successEffect:{power:10,wit:10,luck:5},
         successResult:"你渡过了这最后一劫，肉身与神魄同时蜕变，正式踏入大乘之境——从今往后，你已不再是这个世界的凡俗生灵。", successAchievement:"大乘飞升", worldStateKey:"qixiu_realm", worldStateDelta:1,
         failResult:"天劫骤然降临，你没能扛住这最后一劫，形神俱灭，一缕真魂消散在漫天雷光之中。", failDeath:true, failDeathChance:0.8, failCause:"渡劫失败",
         regressResult:"天劫骤然降临，你侥幸没有形神俱灭，却也被劈得道基受损、境界大幅倒退，往后的路要从头再来。", regressEffect:{power:-5,wit:-5,luck:-3}, regressLifespanPenalty:80},
        {label:"将毕生修为反哺宗门", result:"你选择将毕生修为反哺宗门，滋养了整个宗门的根基——修为散尽的那一刻你笑了：这条路走到这里，也算功德圆满。", statEffect:{origin:2}, achievement:"反哺宗门", setFlag:"qixiu_devoted"},
        {label:"不冒险，止步于化神之境", result:"你决定不再冒险，安心停留在化神之境，把这具身子好好养着。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {death:true, text:"突破后的境界并不如想象中那般稳固，一场突如其来的心魔反噬，让你道基崩碎，形神俱灭。", weight:1, cond:c=>worldStateVal(c,"qixiu_realm")>=1, cause:"心魔反噬"},
      {text:"突破之后，你的一举一动都隐隐带着几分吞天噬地的威压，寻常修士见了你都要退避三分。", weight:6, cond:c=>worldStateVal(c,"qixiu_realm")>=1 && stat(c,"power")>=8},
      {text:"这些年宗门唯才是举的风气早已深入人心，你亲眼见证了这片修仙界因为当年那个决定，多出了多少意气风发的年轻面孔。", weight:6, cond:c=>worldStateVal(c,"qixiu_sectInfluence")>=2},
      {text:"这些年宗门依旧论资排辈，你看着一个个真正有天赋的弟子黯然离宗，心里明白，这条路终究还是走窄了。", weight:6, cond:c=>worldStateVal(c,"qixiu_sectInfluence")<=-1}
    ]
  },
  magic: {
    infant:[
      {text:"你出生的那个夜晚，家门口的魔法水晶突然大放异彩，附近的魔法学院很快就派人前来登记造册。", weight:10, cond:c=>state.age===0},
      {text:"接生的产婆惊讶地发现，你出生时周身萦绕着淡淡的元素波动，像是与生俱来的魔力共鸣。", weight:9, cond:c=>state.age===0},
      {text:"一位路过村庄的精灵旅人特意在你的摇篮边留下了一枚小巧的祝福徽章，随后悄然离去。", weight:7, cond:c=>stat(c,"charm")>=7},
      {text:"你出生时窗台上的魔法蜡烛无风自燃，助产的女巫连声说这是与生俱来的元素亲和之兆。", weight:7, cond:c=>state.age===0},
      {text:"村里的德鲁伊路过时特意为你祈福，临走前留下一句意味深长的话：『这孩子与森林很有缘分』。", weight:6},
      {text:"你尚在襁褓中便能让摇篮上的小铃铛无故作响，把全家人都唬得不轻。", weight:6, cond:c=>state.age<=1},
      {text:"你出生时家里的魔法书架无风自动翻开了一页，正好停在一段谁也看不懂的古老咒语上。", weight:6, cond:c=>state.age===0},
      {text:"接生的助产士后来常提起，你出生那一刻，窗外的星辰似乎罕见地连成了一条直线。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，家中饲养的元素精灵幼体第一次开口说话，说的却是一句谁也听不懂的古语。", weight:6, setFlag:"magic_elemental_spirit", cond:c=>state.age===0},
      {text:"接生的女巫翻遍了她那本厚厚的占卜书，也没能算出你此生命运的走向，只留下意味深长的叹息。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中时，一位游历四方的精灵法师主动提出想收养你，你的父母必须做出决定。", options:[
        {label:"同意，让精灵法师带走抚养", result:"父母最终同意了，你自幼便跟着那位精灵法师游历四方。", statEffect:{wit:1,charm:1,origin:-1}, setFlag:"magic_elf_raised"},
        {label:"拒绝，留在人类家庭中长大", result:"父母拒绝了这个提议，坚持要把你留在身边亲自抚养长大。", statEffect:{origin:1}},
        {label:"折中，让精灵法师定期探望教导", result:"双方各退一步，精灵法师定期前来探望教导，你的成长多了几分奇妙的色彩。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"你在魔药课上把一锅治疗药剂熬成了会唱歌的粘液，教授哭笑不得地给了你一个『创意分』。", weight:6},
      {text:"你收到了梦寐以求的魔法学院录取通知书，怀揣忐忑与期待踏上了前往学院的马车。", weight:10},
      {text:"你在入学考试中独自破解了一道困扰教授们多年的古代符文谜题，一时间名声大噪。", weight:8, cond:c=>stat(c,"wit")>=7},
      {text:"你在图书馆的角落里结识了一位沉默寡言的同学，两人一见如故，很快成了形影不离的搭档。", weight:8},
      {text:"你在魔法学院的元素亲和测试中，罕见地对两种以上元素都展现出了不俗的天赋。", weight:7},
      {text:"你误闯进学院禁地，撞见了一场秘密的魔法契约仪式，从此对『契约魔法』产生了浓厚的兴趣。", weight:6, setFlag:"magic_contract_interest"},
      {text:"你在野外课程中救下了一头受伤的幼龙，对方虽不能言语，眼神里却满是依恋。", weight:6, setFlag:"magic_dragon_youth"},
      {choice:true, weight:6, text:"魔法学院的教务处让你选择主修方向：元素系、召唤系还是附魔系，这将决定你往后的法术道路。", options:[
        {label:"元素系，锋芒毕露", result:"你选择了元素系，从此法术锋芒毕露，威力惊人。", statEffect:{power:2}},
        {label:"召唤系，广结善缘", result:"你选择了召唤系，学会了与各类生物沟通契约，人脉也随之广阔起来。", statEffect:{charm:2}},
        {label:"附魔系，精工细作", result:"你选择了附魔系，从此专精于打造各类附魔器物，日子过得踏实富足。", statEffect:{wealth:2}}
      ]},
      {text:"你在校内的元素控制课上不慎引发了小规模的失控，虽然吓坏了同学，却也因此摸清了自己的能力上限。", weight:6},
      {text:"你参加了学院间的魔法竞技赛，虽然首战失利，却也从此结识了一群志同道合的对手。", weight:6},
      {text:"你参加了学院组织的魔法竞拍会，误打误撞拍下了一件连教授都没能认出的神秘法器。", weight:6, setFlag:"magic_mystery_artifact"},
      {text:"你被选为学院禁书库的临时守护者，负责看管那些不能轻易示人的危险典籍。", weight:6},
      {text:"你自幼跟着精灵法师游历四方，见识远比同龄人更广，谈吐间总带着几分从容气度。", weight:6, cond:c=>hasFlag(c,"magic_elf_raised"), statEffect:{charm:1}}
    ],
    adult:[
      {text:"你在一本残破的古籍里读到一段被官方魔法史刻意抹去的记载——传说中失落的『第九系魔法』，据说它连接着魔法最初的本源。", weight:5, setFlag:"magic_quest1"},
      {choice:true, weight:6, text:"一本会说话的魔导书从拍卖行逃了出来，躲进你的书房请求收留。", options:[{label:"收留它做研究伙伴", result:"你收留了这本聒噪却博学的魔导书，书房从此再没安静过，你的研究却也快了不少。", statEffect:{wit:1}, setFlag:"magic_talkingbook"},{label:"送它去学院图书馆", result:"你把它送去了学院图书馆，那里有它最爱的同类，临别时它给你留了一页藏书密录作谢礼。", statEffect:{charm:1}},{label:"婉言请它另寻高明", result:"你婉言请它另寻高明——一本会半夜念诗的书，实在不适合你的作息。", statEffect:{luck:1}}]},
      {choice:true, weight:6, text:"到了缔结使魔契约的年纪，三只候选的魔物在你面前各显神通。", options:[{label:"选择火蜥蜴", result:"你与一只脾气火爆的火蜥蜴缔结了契约，它总嫌你施法太慢，倒也逼着你的战斗法术突飞猛进。", statEffect:{power:1}},{label:"选择夜枭", result:"你与一只博闻强识的夜枭缔结了契约，它陪你熬过了无数个啃书的深夜。", statEffect:{wit:1}},{label:"选择幻猫", result:"你与一只慵懒的幻猫缔结了契约，它最擅长在你social的场合悄悄替你撑场面。", statEffect:{charm:1}}]},
      {text:"你在毕业典礼上正式获得了「持证魔法师」的资格认证，胸前别上了属于自己的法师徽章。", weight:10, achievement:"持证魔法师"},
      {text:"你只身一人平定了边境城镇的一场魔物暴乱，从此被当地居民亲切地称为「守护者」。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你与一位圣骑士并肩作战，击退了一群企图渗透王城的魔王军谍报人员。", weight:6},
      {text:"你签下了人生中第一份正式的魔法契约，从此多了一份需要恪守的责任与力量。", weight:6},
      {choice:true, weight:6, text:"当年你救下的那头幼龙如今已濒临死境，兽医说除非有人愿意与它签订生死相连的契约，否则它命不久矣。", cond:c=>hasFlag(c,"magic_dragon_youth"), options:[
        {label:"签订契约，与它共同承担风险", result:"你毫不犹豫地与幼龙签订了契约，从此两人一龙的命运紧紧相连。", statEffect:{power:1,luck:-1}, setFlag:"magic_dragon_bond", achievement:"生死相托"},
        {label:"找专业驯龙师帮忙，稳妥为上", result:"你找来了专业的驯龙师帮忙，虽然稳妥，却也因此错过了这段独特的缘分。", statEffect:{wit:1}},
        {label:"遗憾放手，尊重自然规律", result:"你最终选择了放手，虽然心里满是遗憾，却也明白这是对生命规律的尊重。", statEffect:{luck:1}}
      ]},
      {death:true, text:"一次禁咒实验意外失控，法力反噬彻底撕裂了你的魂魄，再无生还的可能。", weight:1, cause:"禁咒反噬"},
      {text:"你在探索一处古老的魔法遗迹时，意外触发了一段封存已久的防御法术，惊险脱身后收获颇丰。", weight:6},
      {text:"你受托翻译一份记载着失传咒语的传说卷轴，过程中数次险些走火入魔，好在最终平安完成。", weight:6},
      {choice:true, weight:6, text:"一位落魄贵族请你帮忙鉴定一件传世法器的真伪，酬金诱人，却也可能得罪人。", options:[
        {label:"如实鉴定，哪怕结果不利", result:"你如实鉴定了这件法器，虽然结果对雇主不利，这份坦诚却也让你的名声更加牢靠。", statEffect:{charm:1}},
        {label:"睁一只眼闭一只眼", result:"你睁一只眼闭一只眼，含糊地给出了个模糊的结论，虽然拿了酬金，心里却总有些不踏实。", statEffect:{wealth:1,charm:-1}},
        {label:"拒绝这趟差事", result:"你拒绝了这趟差事，不想卷进这桩说不清的麻烦事里。", statEffect:{luck:1}}
      ]},
      {text:"你无意间被卷入了两大魔法学院之间的百年争端，被迫要在两个母校之间选择立场。", weight:6},
      {text:"你驯养的元素精灵在一次意外中吞噬了过量的魔力，濒临暴走，你必须冷静应对。", weight:6, cond:c=>hasFlag(c,"magic_elemental_spirit")},
      {text:"你在旅途中遭遇了一群索要过路费的强盗法师，气氛一度十分紧张。", weight:6, next:[
        {cond:c=>stat(c,"wit")>=7, next:{text:"你三言两语便识破了对方的虚张声势，反倒吓得他们主动退让，还留下了一点『赔礼』。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"wit")<=3, next:{text:"你没能看穿对方的把戏，被唬得乖乖交出了随身财物才得以脱身。", statEffect:{wealth:-1,charm:-1}}},
        {next:{text:"一番讨价还价后，你付了一笔『过路费』，双方倒也算是相安无事。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"循着古籍的线索，你花了半生走访遗迹、破译铭文，终于拼凑出了第九系魔法的完整咒式——只差最后一次实际验证。", weight:12, cond:c=>hasFlag(c,"magic_quest1"), setFlag:"magic_quest2"},
      {text:"深夜的观星塔上，你看见一颗流星拖着诡异的规则轨迹坠向远方——落点处没有火光，只有一圈短暂亮起的、精确得可怕的蓝色光环。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你在一次学术辩论中当众推翻了一条沿用百年的魔法定律，大陆的魔法期刊连载了整整三期你的论证。", weight:6, cond:c=>stat(c,"wit")>=8 || transcendRank(c)>=2, statEffect:{wit:1}},
      {text:"当年在禁地撞见的那场契约仪式始终萦绕在你心头，多年钻研之后，你终于复原了那门失传的高阶契约术，在契约魔法一脉声名鹊起。", weight:6, cond:c=>hasFlag(c,"magic_contract_interest"), statEffect:{wit:1}},
      {text:"你受王国委托前往边境平息了一场精灵与人类之间的冲突，声望在大陆上迅速传开。", weight:10, cond:c=>stat(c,"charm")>=7 || transcendRank(c)>=1, achievement:"边境和事佬"},
      {text:"王室正式册封你为宫廷魔导师，从此你的名字被郑重地载入了王国的编年史册。", weight:8, cond:c=>hasTag(c,"royalmagic")},
      {text:"你受邀主持了一届魔法学院的毕业典礼，看着台下满怀憧憬的新人，恍惚看到了当年懵懂的自己。", weight:7},
      {choice:true, weight:6, text:"王国就『魔法教育该对平民开放还是继续贵族垄断』产生了分歧，你的立场可能影响这个国家未来的魔法生态。", options:[
        {label:"支持向平民开放", result:"你支持了魔法教育对平民开放，从此往后，出身寒微的孩子也有了学习魔法的机会。", statEffect:{charm:1}, worldStateKey:"magic_kingdomInfluence", worldStateDelta:2},
        {label:"支持维持贵族垄断", result:"你支持维持贵族对魔法教育的垄断，旧有的秩序得以延续，只是渐渐埋没了不少寒门天才。", statEffect:{origin:1}, worldStateKey:"magic_kingdomInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你受邀参与了王国魔法议会的年度大典，你的一项理论被正式收录进了官方魔法典籍。", weight:6, cond:c=>stat(c,"wit")>=7},
      {text:"你与那头幼龙一同长大，如今它已成了令人闻风丧胆的成年巨龙，你们俩的传说也随之流传开来。", weight:6, cond:c=>hasFlag(c,"magic_dragon_bond"), achievement:"龙裔之友", statEffect:{power:1}},
      {text:"你在边境建立了一座小型的魔法学堂，专门教授那些没钱进正规学院的孩子。", weight:6},
      {choice:true, weight:6, text:"王国境内爆发了一场关于魔法立法的争论，议会请你以持证魔法师的身份发表立场。", options:[
        {label:"支持严格管控魔法", result:"你支持严格管控魔法的使用，虽然招来了一些非议，却也在王室那里赢得了信任。", statEffect:{origin:2}},
        {label:"支持魔法自由化", result:"你支持魔法自由化，主张人人皆可修习，此举在民间为你赢得了不小的声望。", statEffect:{luck:2}},
        {label:"保持中立，谁也不站", result:"你选择了保持中立，两边都不得罪，日子过得反倒轻省不少。", statEffect:{wit:2}}
      ]},
      {text:"你受邀参加王国举办的魔法博览会，你展示的一项新咒语引起了各国魔法师的关注。", weight:6},
      {text:"你收留了一名因家族纷争而流离失所的年轻法师学徒，把她当成了自己的孩子一般教养。", weight:6},
      {text:"你调解了那场持续百年的学院争端，让两所母校终于放下芥蒂，共同举办了联合典礼。", weight:6},
      {text:"你培育的元素精灵终于完全成熟，成了整片大陆罕见的稀有生灵，各方都想一睹真容。", weight:6, cond:c=>hasFlag(c,"magic_elemental_spirit")}
    ],
    elder:[
      {choice:true, weight:40, text:"原初法则之门在面前缓缓张开——门后是魔法诞生之前的地方。", cond:c=>!hasFlag(c,"magic_gate_closed") && hasFlag(c,"magic_beyond2") && hasTag(c,"magic_destiny") && worldStateVal(c,"magic_breakthrough")>=3, options:[{label:"推开原初之门", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"magic_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"magic_gate_closed"}]},
      {text:"当你的法则造诣抵达顶点，那道『频率』终于显形——半空中悬着一扇由纯粹原初法则构成的门。", weight:18, cond:c=>hasFlag(c,"magic_beyond1") && worldStateVal(c,"magic_breakthrough")>=3, setFlag:"magic_beyond2"},
      {text:"某个雨夜，你察觉魔网的波动里混进了一段陌生的『频率』——它不来自这个大陆，甚至不来自这个世界。", weight:12, cond:c=>hasTag(c,"magic_destiny") && worldStateVal(c,"magic_breakthrough")>=2, setFlag:"magic_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"贤者化身之后，你在魔网的最深处听见了一个更古老的声音——那是魔法诞生之前的『原初法则』，它向你敞开了一道门缝。", cond:c=>worldStateVal(c,"magic_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"触碰原初法则", riskyChance:0.13, lifespanBonus:90, successEffect:{wit:4,luck:2}, successResult:"你的指尖真切地碰到了原初法则的边缘——从此你施展的已经不能叫『魔法』，大陆上的存在开始用『阁下』称呼你。", successAchievement:"触及法则", worldStateKey:"magic_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"法则灼烧", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"第九系魔法的完整咒式就摊在面前——念出它，你将成为千年来第一个触及魔法本源的人，或者成为下一个被历史抹去的名字。", cond:c=>hasFlag(c,"magic_quest2"), options:[{label:"念出失落的咒式", riskyChance:0.4, lifespanBonus:15, successEffect:{wit:4,charm:2}, successResult:"咒式生效的瞬间，整片大陆的魔力潮汐为之一滞——你成功了。教科书从此要为你新增一个章节：第九系魔法，重现于世。", successAchievement:"毕生所求", failResult:"咒式失控的魔力洪流吞没了你——正如千年前那些被抹去的名字一样。", failDeath:true, failDeathChance:0.30, failCause:"咒式反噬", regressResult:"咒式在最后一个音节上崩溃了，反冲的魔力重创了你的魔力回路——你保住了命，却再也无力重试。", regressEffect:{wit:-2,health:-1}},{label:"封存研究，匿名发表", result:"你把毕生研究匿名投给了魔法学会——让更年轻、更有天赋的人去走完最后一步吧。", statEffect:{wit:1,charm:1}}]},
      {choice:true, weight:30, repeatable:true, text:"第一次回春之后，你在禁忌法典的最后一页发现了真正的终极之法——『贤者化身』：把自身的存在彻底转写进大陆的魔网之中，与魔法本源同寿。", cond:c=>worldStateVal(c,"magic_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?58:64) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"尝试贤者化身", riskyChance:0.15, lifespanBonus:60, successEffect:{wit:3,luck:2}, successResult:"转写成功——你的意识与大陆魔网融为一体，从此四海八荒有魔法处，皆是你的耳目，寿元更是与魔网同流。", successAchievement:"二度超脱", worldStateKey:"magic_breakthrough", worldStateDelta:1, failResult:"转写进行到一半，你的存在被魔网的洪流彻底冲散，世间再无你这个人存在过的痕迹。", failDeath:true, failDeathChance:0.55, failCause:"存在消散", regressResult:"转写中途失控，你侥幸把自己从魔网里拽了回来，只是灵魂已经磨损得厉害。", regressEffect:{wit:-3,charm:-2}, regressLifespanPenalty:25},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你晚年最大的乐趣，是坐在学院门口的长椅上，看新生们第一次施法把自己头发烧焦的样子。", weight:6},
      {text:"那本会说话的魔导书陪了你大半辈子，如今它记满了你们共同的研究成果，学界称之为『双作者奇书』。", weight:6, cond:c=>hasFlag(c,"magic_talkingbook"), statEffect:{wit:1}},
      {text:"你晚年终于鉴定出了当年拍下的那件神秘法器的来历——那竟是初代贤者的遗物，消息一出，整个大陆的收藏界都为之震动。", weight:6, cond:c=>hasFlag(c,"magic_mystery_artifact"), statEffect:{wealth:1,luck:1}},
      {text:"你将自己毕生钻研的魔法奥秘编纂成书，郑重地存放进了魔法学院的禁书阁，供后人瞻仰。", weight:10},
      {text:"你在魔法塔顶层设立了一处静谧的观星台，晚年常在此地推演星辰运转与魔法本源之间的关联。", weight:8},
      {text:"你收养多年的幼龙如今已经长大，临别前依依不舍地用龙语向你道别。", weight:6, cond:c=>hasFlag(c,"magic_dragon_bond")},
      {text:"你在暮年时终于学会了那句年轻时怎么也发不准的高阶咒语，笑说这辈子总算没白学魔法。", weight:7},
      {text:"你把自己一生研究的失传咒语整理成了一本厚厚的合集，取名为《咒语溯源》，献给了魔法学院。", weight:6},
      {text:"你晚年时常受邀参加各地的魔法交流会，虽然行动不便，讲起理论来依然神采奕奕。", weight:6},
      {text:"你把自己收藏多年的稀有法器悉数捐赠给了魔法学院的展览馆，供后人瞻仰学习。", weight:6},
      {text:"你与陪伴多年的元素精灵一同看过了大陆上的四季变换，如今终于要一同安然谢幕。", weight:6, cond:c=>hasFlag(c,"magic_elemental_spirit")},
      {choice:true, weight:5, repeatable:true, text:"你翻出了一本记载着回春仪式的禁忌法典，这个仪式或许能让你脱离凡人的寿命枷锁——但代价同样凶险。", cond:c=>worldStateVal(c,"magic_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:56) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?8:12)), options:[
        {label:"拼死施展回春仪式", riskyChance:0.3, lifespanBonus:45, successEffect:{wit:10,charm:4,health:2},
         successResult:"仪式在生死一线间成功了，你的身体重新焕发出年轻的活力，魔力也随之澎湃起来，寿命的枷锁被硬生生打开了一道缝。", successAchievement:"突破天命", worldStateKey:"magic_breakthrough", worldStateDelta:1,
         failResult:"仪式失控，魔力反噬瞬间席卷了你的全身，你甚至没能来得及喊出一声。", failDeath:true, failDeathChance:0.55, failCause:"仪式失控",
         regressResult:"仪式失控，魔力反噬狂潮席卷全身，你侥幸没有当场殒命，法力却因此大损，许多咒语都要重新学起。", regressEffect:{wit:-2,charm:-1,health:-1}, regressLifespanPenalty:5},
        {label:"稳妥施展基础回春咒", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只施展了基础的回春咒，效果有限，却也让你的身子骨多撑了几年。",
         failResult:"这次咒语没能奏效，好在稳妥的施法方式没有带来任何危险。"},
        {label:"放弃仪式，坦然面对天命", result:"你放弃了这个念头，坦然接受了凡人的天命，把余生过得平静而充实。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"魔法学院请你在退休前指定一位继承人接掌你的研究方向，你必须做出选择。", options:[
        {label:"选择最有天赋的学生", result:"你选择了那位最有天赋的学生作为继承人，你的研究方向从此有了更进一步的可能。", statEffect:{wit:2}},
