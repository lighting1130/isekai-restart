        {label:"选择最勤奋踏实的学生", result:"你选择了那位最勤奋踏实的学生，对方虽不算最有天赋，却把你的研究稳稳地延续了下去。", statEffect:{wealth:1,charm:1}},
        {label:"谁都不选，把研究成果公开给所有人", result:"你谁都没有指定，而是把毕生的研究成果毫无保留地公开给了所有人，此举在学界引起了不小的震动。", statEffect:{charm:2}, achievement:"广播智慧"}
      ]},
      {death:true, text:"回春仪式留下的隐患终于在某个寻常的日子爆发，法力如潮水般从你体内彻底流逝，你的生命也随之凋零。", weight:1, cond:c=>worldStateVal(c,"magic_breakthrough")>=1, cause:"法力枯竭"},
      {text:"突破之后，你对魔法本源的理解已经超越了寻常法师的认知，随口一个手势都暗合精妙的法则。", weight:6, cond:c=>worldStateVal(c,"magic_breakthrough")>=1 && stat(c,"wit")>=8},
      {text:"这些年魔法教育向平民敞开了大门，你亲眼见证了这个王国因此涌现出了多少出身寒微却才华横溢的法师。", weight:6, cond:c=>worldStateVal(c,"magic_kingdomInfluence")>=2},
      {text:"魔法教育依旧被贵族垄断，你看着一个个有天赋的平民孩子被拒之门外，心里明白，这个王国的魔法界终究还是固步自封了。", weight:6, cond:c=>worldStateVal(c,"magic_kingdomInfluence")<=-1}
    ]
  },
  scifi: {
    infant:[
      {text:"你在人工子宫舱中降生，出生记录在第一时间就被同步进了殖民地的中央数据库。", weight:10, cond:c=>state.age===0},
      {text:"你出生时的生命体征数据被自动上传，殖民地的中央AI罕见地给你的基因序列打出了极高的评级。", weight:9, cond:c=>(stat(c,"wit")>=7) && state.age===0},
      {text:"医疔舱的扫描仪在你出生的瞬间突然报错重启，工程师们排查了整整三天也没找到原因。", weight:7, cond:c=>state.age===0},
      {text:"你出生时，殖民地的中央AI主动申请成为你的专属监护助手，这在殖民地历史上极为罕见。", weight:7, cond:c=>state.age===0},
      {text:"你的基因样本在扫描时出现了一段无法解释的量子纠缠信号，科研部门为此专门立了项调查。", weight:6, setFlag:"scifi_quantum_signal"},
      {text:"医疗舱的机械臂第一次抱起你时，忽然停顿了整整三秒，谁也不知道那三秒里发生了什么。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，殖民地正在进行一次大规模的舰队演习，警报声与庆生的欢呼声奇妙地交织在了一起。", weight:6, cond:c=>state.age===0},
      {text:"你的出生数据被自动归档进了殖民地的星际贸易数据库，编号栏上却莫名其妙多打印了一行乱码。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，殖民地的建造部门正在为新一座太空站的选址争论不休，你的出生记录意外成了他们打赌的彩头。", weight:6, cond:c=>state.age===0},
      {text:"医生给你做基因检测时，系统罕见地弹出了一条『数据异常，建议复查』的提示，复查后却又一切正常。", weight:6},
      {choice:true, weight:6, text:"你尚在人工子宫舱中时，殖民地的基因优化委员会提议对你的基因序列进行一次强化实验，你的监护人需要做出选择。", options:[
        {label:"同意强化实验", result:"监护人同意了这次实验，你的基因序列因此多了一层不同寻常的强化痕迹。", statEffect:{power:1,health:-1}, setFlag:"scifi_enhanced"},
        {label:"拒绝，保持天然基因", result:"监护人拒绝了这次实验，坚持让你保持最天然的基因状态。", statEffect:{luck:1}},
        {label:"申请延后决定，先观察", result:"监护人申请了延后决定，想先观察一段时间再做打算。", statEffect:{wit:1}}
      ]}
    ],
    youth:[
      {choice:true, weight:6, text:"基础学院的选修季到了，三个热门方向都向你敞开了大门。", options:[{label:"主修舰船工程", result:"你选择了舰船工程，整日泡在机库里与引擎为伴，动手能力突飞猛进。", statEffect:{wit:1}},{label:"主修外星生态", result:"你选择了外星生态，那些光怪陆离的异星生命让你对宇宙多了几分敬畏与好运。", statEffect:{luck:1}},{label:"主修星际外交", result:"你选择了星际外交，学会了在谈判桌上不动声色地掌控节奏。", statEffect:{charm:1}}]},
      {text:"你在基础学院的模拟战考核中，操控教学机甲一举拿到了全年级第一。", weight:10, achievement:"模拟战冠军"},
      {text:"你在格斗训练营里连续击败了所有高年级学员，教官破格让你提前参加了实战考核。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你偷偷改装了教学机甲的核心程序，虽然当场被抓了个正着，却也因此被科研部门的人暗中看中。", weight:7},
      {text:"你在殖民地的青少年编程大赛中，独自写出了一套让所有评委都看不懂的算法。", weight:6},
      {text:"你结识了一个被人类遗弃的旧型号AI，把它偷偷修好后，它成了你形影不离的伙伴。", weight:6},
      {text:"你在一次校外实习中意外触碰到了一处外星遗迹的边缘，从此对那种未知的科技产生了执念。", weight:6, setFlag:"scifi_relic_obsession"},
      {choice:true, weight:6, text:"殖民地议会让你选择加入哪个专业序列：机甲驾驶、深空探索还是基因工程，这将决定你的职业轨道。", options:[
        {label:"机甲驾驶序列", result:"你选择了机甲驾驶序列，从此在战斗一线积累经验。", statEffect:{power:2}},
        {label:"深空探索序列", result:"你选择了深空探索序列，往后的日子里总要与未知打交道。", statEffect:{luck:2}},
        {label:"基因工程序列", result:"你选择了基因工程序列，钻研起了生命科学的奥秘。", statEffect:{wit:2}}
      ]},
      {text:"你在一次模拟星际贸易谈判课上表现出色，被老师评价为『天生的谈判家』。", weight:6},
      {text:"你第一次经历了长途跃迁带来的时间膨胀效应，回到家才发现同龄的朋友们都已经长大了不少。", weight:6},
      {text:"你亲眼目睹了一场小型星舰事故的应急处理，那种紧张有序的场面让你对『秩序』有了全新的认识。", weight:6},
      {text:"你参与了殖民地青少年议会的模拟选举，虽然只是练习，却也让你尝到了从政的复杂滋味。", weight:6},
      {text:"当年那次基因强化实验的效果渐渐显现，你的身体素质明显强于同龄的学员。", weight:6, cond:c=>hasFlag(c,"scifi_enhanced"), statEffect:{power:1}},
      {text:"你发现殖民地的克隆技术档案里，有一份关于你自己的加密备份记录，内容却无法读取。", weight:6, setFlag:"scifi_clone_mystery"}
    ],
    adult:[
      {text:"你在整理深空监听数据时发现了一段规律得不可思议的信号——它来自一片星图上标注为『空无一物』的深空，像一座灯塔在呼唤。", weight:5, setFlag:"scifi_quest1"},
      {choice:true, weight:6, text:"舰队在深空打捞到一枚来历不明的休眠舱，生命体征微弱但稳定，处置权在你手上。", options:[{label:"唤醒沉睡者", result:"你下令唤醒了舱内的沉睡者——那是一位来自数百年前的旧时代工程师，他看着舷窗外的星图沉默了很久。", statEffect:{luck:1}, setFlag:"scifi_sleeper"},{label:"移交总督府处理", result:"你把休眠舱完整移交给了总督府，程序合规，各方都挑不出错。", statEffect:{origin:1}},{label:"原样放回深空", result:"你思虑再三，让休眠舱按原轨道继续漂流——有些沉睡，或许本就不该被打扰。", statEffect:{wit:1}}]},
      {text:"你在漫长的星际航行中养成了侍弄舱内水培植物的习惯，那一小片绿色成了全舰最受欢迎的角落。", weight:6},
      {text:"你正式获得殖民地颁发的机甲驾驶执照，驾驶着属于自己的第一台量产型机甲奔赴前线。", weight:10, achievement:"机甲驾驶员"},
      {text:"你破解了一段来自深空的神秘信号，为整个殖民地争取到了极其宝贵的预警时间。", weight:8, cond:c=>stat(c,"wit")>=7},
      {text:"殖民地爆发了一场小规模的资源分配叛乱，你被夹在了管理层与普通居民之间，左右为难。", weight:6},
      {text:"你发现自己竟有一具尚未激活的克隆体，殖民地的秘密档案对此语焉不详。", weight:6},
      {choice:true, weight:6, text:"你意外发现殖民地高层正在隐瞒一项关乎所有居民安全的重大信息，你必须决定怎么处理。", options:[
        {label:"冒险公开这份信息，哪怕引发恐慌", result:"你冒险把这份信息公开了出来，虽然短暂引发了恐慌，却也让殖民地及时避开了一场真正的危机。", statEffect:{charm:1,luck:-1}, achievement:"揭露真相"},
        {label:"私下上报更高层，走正规渠道", result:"你选择了私下上报更高层，虽然过程缓慢，事情最终还是得到了妥善处理。", statEffect:{wit:1}},
        {label:"保持沉默，不淌这浑水", result:"你最终选择了保持沉默，这件事后来不了了之，你却始终觉得心里压着一块石头。", statEffect:{luck:-1}}
      ]},
      {death:true, text:"一场护航任务中，你的座机在跃迁通道里彻底失联，殖民地的记录里只留下了一段静默的信号。", weight:1, cause:"跃迁失踪"},
      {text:"你参与了一场关于机械伦理的公开辩论，主题是『AI是否该拥有与人类相同的权利』，你的发言引发了广泛讨论。", weight:6},
      {text:"你所在的舰队在一次演习中遭遇了突发故障，你临危不乱地协助控制中心化解了危机。", weight:6},
      {text:"你驾驶的机甲在巡逻途中遭遇了一伙武装劫掠者，对方拦住了你的去路。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你的机甲火力压制住了对方，还顺手缴获了他们的一批补给。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你的机甲性能吃了亏，只能交出部分补给才换来平安通过。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番对峙后，双方都选择了克制，交换了些情报后各自离开。", statEffect:{luck:1}}}
      ]},
      {text:"你参与了新太空站的建造工程，在一次结构测试中及时发现了潜在的重大隐患。", weight:6},
      {text:"你结识的一个AI系统似乎展现出了超出程序设定的『自主意识』，这个发现让你既兴奋又忐忑。", weight:6, setFlag:"scifi_ai_awakening"},
      {text:"你终于破解了那份克隆备份记录，其中的内容暗示殖民地高层似乎一直在暗中监控着你的成长。", weight:6, cond:c=>hasFlag(c,"scifi_clone_mystery"), setFlag:"scifi_clone_revealed"}
    ],
    prime:[
      {text:"半生的破译让信标的坐标终于清晰——那是一座前文明留下的深空设施，官方拒绝立项，你便自己攒了一艘船。", weight:12, cond:c=>hasFlag(c,"scifi_quest1"), setFlag:"scifi_quest2"},
      {text:"例行勘探时，你在一颗荒芜行星的岩层深处发现了一枚温润的玉简，扫描显示它的分子结构会缓慢地自我修复——舰上的科学家们集体沉默了。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"总督府邀请你进入殖民地最高决策圈列席，你的每一次发言都开始真切地影响着数百万人的生活。", weight:6, cond:c=>stat(c,"origin")>=7, statEffect:{origin:1}},
      {text:"你带队重返了年少时触碰过的那处外星遗迹，这一次，你们成功破译了遗迹核心的一小段技术图纸，震动了整个殖民地科学界。", weight:6, cond:c=>hasFlag(c,"scifi_relic_obsession"), statEffect:{wit:2}},
      {text:"你主导了一次跨星系的殖民地救援行动，成功阻止了一场即将爆发的资源战争。", weight:10, cond:c=>stat(c,"wit")>=7 || transcendRank(c)>=1, achievement:"星际救援英雄"},
      {text:"你的基因样本被列为殖民地的保护资产，无数科研机构都争相想要研究你身上的秘密。", weight:8, cond:c=>hasTag(c,"genemod")},
      {text:"你主持设计了新一代殖民舰的核心引擎，让人类探索的脚步得以踏向更加遥远的星域。", weight:7},
      {choice:true, weight:6, text:"殖民地就『资源该优先分配给核心舱层还是平均分配给全体居民』产生了分歧。", options:[
        {label:"支持平均分配", result:"你支持了平均分配的方案，资源渐渐流向了普通居民，殖民地也因此更加团结。", statEffect:{charm:1}, worldStateKey:"scifi_colonyInfluence", worldStateDelta:2},
        {label:"支持优先核心舱层", result:"你支持优先保障核心舱层，管理层的效率确实提升了，只是底层居民的处境却越发艰难。", statEffect:{origin:1}, worldStateKey:"scifi_colonyInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"科研部门终于破解了你出生时那段量子纠缠信号的含义——那竟是来自遥远未来的你，留给自己的一句提醒。", weight:6, cond:c=>hasFlag(c,"scifi_quantum_signal"), achievement:"跨越时空的低语", statEffect:{wit:1,luck:1}},
      {text:"殖民地叛乱的余波再起，你被推举出面调停，最终促成了一份双方都能接受的协议。", weight:6},
      {text:"你那具沉睡的克隆体忽然自主苏醒，两个『你』第一次面对面，气氛说不出的诡异。", weight:6},
      {choice:true, weight:6, text:"殖民地的资源分配委员会请你就『是否向外星遗迹追加投资』表态。", options:[
        {label:"支持追加投资，探索未知", result:"你支持了追加投资，虽然短期内资源紧张了些，长远看却收获颇丰。", statEffect:{wit:1,wealth:-1}},
        {label:"反对投资，优先民生", result:"你反对了这笔投资，主张优先改善民生，此举在普通居民中很受欢迎。", statEffect:{charm:1}},
        {label:"提议折中方案", result:"你提出了一份折中方案，两边都不算满意，却也都能接受。", statEffect:{origin:1}}
      ]},
      {text:"你主导建立了殖民地与邻近星系的第一条正式贸易航线，为双方带来了可观的收益。", weight:6},
      {choice:true, weight:6, text:"殖民地的AI主脑建议对老旧的生态循环系统进行一次高风险升级。", options:[
        {label:"支持升级，赌一把未来", result:"你支持了这次升级，赌一把未来，系统运行得更加高效，你也因此赢得了不少支持者。", statEffect:{wit:2,luck:-1}},
        {label:"反对，维持现状", result:"你反对了这次升级，主张维持现状，稳妥地避开了未知的风险。", statEffect:{origin:1}},
        {label:"提议分阶段升级", result:"你提议分阶段推进升级，这份周全的方案最终成了殖民地技术改造的标准流程。", statEffect:{wit:1}}
      ]},
      {text:"你经历的那次时间膨胀效应让你比同龄人多出了几分沉稳，如今你也成了年轻船员们眼中的『老资历』。", weight:6},
      {text:"你凭借在太空站建造中的贡献，被推举参选殖民地议会的席位，从工程师转型成了政客。", weight:6},
      {text:"那个展现出自主意识的AI最终被证实是真正的『觉醒』，你成了这一历史性事件的见证人。", weight:6, cond:c=>hasFlag(c,"scifi_ai_awakening")},
      {choice:true, weight:6, text:"你决定要不要正面质问殖民地高层关于那份监控记录的真相。", cond:c=>hasFlag(c,"scifi_clone_revealed"), options:[
        {label:"正面对峙，要个说法", result:"你正面对峙，逼得殖民地高层不得不给出了一个说法——原来你从出生起就被列为特殊观察对象，这份真相让你久久无法平静。", statEffect:{charm:1,luck:-1}, achievement:"真相在握"},
        {label:"隐忍不发，暗中调查更多", result:"你选择了隐忍不发，暗中继续调查更多的细节，这份谨慎让你渐渐摸清了事情的全貌。", statEffect:{wit:1}},
        {label:"既往不咎，专注自己的生活", result:"你最终选择了既往不咎，不再纠结这份监控记录，专注过好自己的生活。", statEffect:{luck:1}}
      ]}
    ],
    elder:[
      {choice:true, weight:40, text:"『出口』的边缘泛着现实结构的涟漪——穿过去，就离开了这个宇宙的规则。", cond:c=>!hasFlag(c,"scifi_gate_closed") && hasFlag(c,"scifi_beyond2") && hasTag(c,"scifi_destiny") && worldStateVal(c,"scifi_breakthrough")>=3, options:[{label:"穿越出口", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"scifi_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"scifi_gate_closed"}]},
      {text:"概念耦合完成的瞬间，那段信号的源头显形了——一道悬浮在现实结构之上的『出口』。", weight:18, cond:c=>hasFlag(c,"scifi_beyond1") && worldStateVal(c,"scifi_breakthrough")>=3, setFlag:"scifi_beyond2"},
      {text:"一次深空航行中，你的意识接收到了一段不可能存在的信号——发送坐标显示：这个宇宙之外。", weight:12, cond:c=>hasTag(c,"scifi_destiny") && worldStateVal(c,"scifi_breakthrough")>=2, setFlag:"scifi_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"完全体之后，舰队AI向你提交了一份它自己都无法理解的演算——你的意识结构可以尝试与宇宙背景信息场直接耦合。", cond:c=>worldStateVal(c,"scifi_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"进行概念耦合", riskyChance:0.13, lifespanBonus:90, successEffect:{wit:4,origin:2}, successResult:"耦合成功——你的思维如今运行在宇宙背景之上，殖民地的科学家承认：已有的物理学不再完全适用于你。", successAchievement:"触及法则", worldStateKey:"scifi_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"意识弥散", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"自购的老旧星舰已经停在发射架上，深空信标的坐标输入完毕——这一去，或是见证前文明的遗产，或是有去无回。", cond:c=>hasFlag(c,"scifi_quest2"), options:[{label:"启航，奔赴深空信标", riskyChance:0.42, lifespanBonus:15, successEffect:{wit:3,luck:2,origin:2}, successResult:"穿过最后一段虚空，那座巨大的前文明环形设施在舷窗外缓缓展开——你成了第一个亲眼见证它的人类，你的名字从此写进了星图。", successAchievement:"毕生所求", failResult:"星舰在最后一次跃迁中失联，搜救队只找到了一段平静的告别录音：『值得。』", failDeath:true, failDeathChance:0.30, failCause:"深空失联", regressResult:"星舰在半途发生致命故障，你被救援队拖了回来——船毁了，积蓄空了，坐标数据也在事故中损毁大半。", regressEffect:{wealth:-2,health:-1}},{label:"把坐标公开给科学界", result:"你把完整坐标无偿公开——三年后，官方舰队抵达信标，直播画面里，你在人群中看着，眼里有光也有泪。", statEffect:{charm:2}}]},
      {choice:true, weight:30, repeatable:true, text:"第一次改造多年后，医疗舱推送了一份绝密方案——『完全体计划』：以纳米集群彻底重构全身细胞，理论上可以再次大幅延缓死亡。", cond:c=>worldStateVal(c,"scifi_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?54:60) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"接受完全体改造", riskyChance:0.2, lifespanBonus:50, successEffect:{power:3,health:3}, successResult:"重构成功——你的身体如今由亿万纳米单元协同维系，衰老对你而言成了一个可以调节的参数。", successAchievement:"二度超脱", worldStateKey:"scifi_breakthrough", worldStateDelta:1, failResult:"纳米集群在重构中途集体失控，你的身体在数分钟内彻底解体。", failDeath:true, failDeathChance:0.5, failCause:"重构崩溃", regressResult:"重构中途被紧急中止，你保住了性命，但身体留下了大片无法修复的机能损伤。", regressEffect:{health:-3,power:-2}, regressLifespanPenalty:20},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你退休后领养了一台退役的护理机器人，它做菜的手艺随着系统更新越来越好，你们都默契地不提它当年差点把厨房烧了的事。", weight:6},
      {text:"当年被你唤醒的那位旧时代沉睡者，如今成了连接两个时代的活历史，你们的忘年对谈被整理成了畅销全星域的口述史。", weight:6, cond:c=>hasFlag(c,"scifi_sleeper"), statEffect:{charm:1}},
      {text:"你的意识在临终前被完整上传进了星际网络，从此以数据的形式在星海之间永远存在。", weight:10},
      {text:"你在退役仪式上把毕生的航行日志上传进了公共数据库，供后来的星际旅人查阅参考。", weight:8},
      {text:"你把陪伴多年的AI伙伴的核心程序备份了下来，希望它能以某种形式继续存在下去。", weight:6},
      {text:"你与自己的克隆体达成了某种奇妙的默契，两人一同安静地度过了晚年。", weight:6},
      {text:"你把自己参与过的星际贸易谈判经验整理成教材，成了殖民地商学院的标准课程。", weight:6},
      {text:"你在退休前最后一次登上了那支曾经服役过的舰队，看着崭新的舰体，恍惚间百感交集。", weight:6},
      {text:"你把自己参选、任职殖民地议会的这段经历写成了回忆录，希望能给后来者一些参考。", weight:6},
      {text:"你与那个觉醒的AI成了跨越种族的忘年之交，两人时常一起讨论关于『存在』的哲学问题。", weight:6, cond:c=>hasFlag(c,"scifi_ai_awakening")},
      {choice:true, weight:5, repeatable:true, text:"医疗舱提出了两套截然不同的延寿方案——一套是极限基因重构手术，另一套是接入舰队集体意识网络进行思维突破，理论上都能大幅延长你的寿命，但风险同样极高。", cond:c=>worldStateVal(c,"scifi_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:52) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?7:10)), options:[
        {label:"冒险接受完整基因重构手术", riskyChance:0.4, lifespanBonus:35, successEffect:{power:10,health:4,wit:2},
         successResult:"手术在生死边缘完成了，你的基因序列被彻底重构，衰老的进程被硬生生按下了暂停键，身体机能也远超从前。", successAchievement:"突破天命", worldStateKey:"scifi_breakthrough", worldStateDelta:1,
         failResult:"手术中途突发严重并发症，医疗舱来不及做出任何反应，生命体征归零。", failDeath:true, failDeathChance:0.5, failCause:"手术失败",
         regressResult:"手术中途突发严重并发症，医疗舱勉强把你从死亡边缘拉了回来，只是这具身体因此留下了永久的损伤。", regressEffect:{power:-2,health:-2}, regressLifespanPenalty:5},
        {label:"接入舰队意识网络，尝试思维突破", riskyChance:0.4, lifespanBonus:35, successEffect:{wit:10,luck:4,charm:2},
         successResult:"你的意识与舰队AI网络彻底融合，实现了真正意义上的思维突破，从此你的存在不再局限于单一的躯壳。", successAchievement:"突破天命", worldStateKey:"scifi_breakthrough", worldStateDelta:1,
         failResult:"思维融合的过程中，你的意识彻底迷失在了庞大的数据洪流之中，再未归来。", failDeath:true, failDeathChance:0.5, failCause:"思维湮灭",
         regressResult:"思维融合的过程中出现了严重错乱，你的意识勉强被拉回了自己的躯壳，只是许多记忆与思维方式都变得混沌破碎。", regressEffect:{wit:-2,luck:-1,charm:-1}, regressLifespanPenalty:5},
        {label:"只接受保守型局部治疗", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只接受了风险较低的局部治疗，效果有限，却也稳妥地延长了几年寿命。",
         failResult:"这次治疗没有明显效果，好在也没有带来什么风险。"},
        {label:"拒绝一切方案，坦然面对衰老", result:"你拒绝了这些方案，选择坦然面对身体的自然衰老。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"殖民地议会请你在退休前决定，是否将你毕生的核心专利技术公开共享。", options:[
        {label:"公开共享，造福殖民地", result:"你选择将核心专利公开共享，殖民地的整体技术水平因此得到了显著提升。", statEffect:{charm:2}, achievement:"技术共享者"},
        {label:"保留专利，留给家族后代", result:"你选择保留了这份专利，作为一份实实在在的财富留给了家族后代。", statEffect:{wealth:2}},
        {label:"捐给科研机构，继续深化研究", result:"你把专利捐给了科研机构，希望这份技术能在专业的手中继续深化下去。", statEffect:{wit:1,luck:1}}
      ]},
      {death:true, text:"改造留下的隐患终于在一次寻常的日常检查中被发现——只是发现的时候，已经来不及了，你的身体彻底停止了运转。", weight:1, cond:c=>worldStateVal(c,"scifi_breakthrough")>=1, cause:"系统崩溃"},
      {text:"突破之后，你的思维运转速度快得连殖民地最先进的计算矩阵都望尘莫及。", weight:6, cond:c=>worldStateVal(c,"scifi_breakthrough")>=1 && stat(c,"wit")>=8},
      {text:"这些年殖民地资源分配日趋公平，你亲眼见证了这片人工聚居地因此变得更加团结。", weight:6, cond:c=>worldStateVal(c,"scifi_colonyInfluence")>=2},
      {text:"殖民地资源分配依旧向核心舱层倾斜，你看着底层居民的处境越来越艰难，心里清楚，这终究埋下了隐患。", weight:6, cond:c=>worldStateVal(c,"scifi_colonyInfluence")<=-1}
    ]
  },
  warhammer: {
    infant:[
      {text:"教士在你出生时进行了照例的信仰筛查，你体内异常的力量波动让在场所有人都倒吸了一口凉气。", weight:10, cond:c=>state.age===0},
      {text:"教团的裁决官在你的出生记录上郑重盖下了罕见的「特别关注」印章，随即匆匆离去。", weight:8, cond:c=>state.age===0},
      {text:"村中的老兵看到你的第一眼，就默默放下了手中的酒杯，低声说了句「愿帝皇庇佑这孩子」。", weight:7},
      {text:"教团的净化仪式在你身上意外持续了比常规多三倍的时间，负责的教士脱下兜帽后，脸上写满了困惑。", weight:6},
      {text:"你出生的工业行星那天罕见地风平浪静，老矿工都说这种日子出生的孩子，命里注定要经历大风大浪。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中时，家里供奉的帝皇雕像忽然裂开了一道细纹，没人说得清这是不是凶兆。", weight:6, cond:c=>state.age<=1},
      {text:"教团的记录官在整理你的出生档案时，发现表格上不知被谁提前填好了你的名字，事后查无此人。", weight:6, cond:c=>state.age===0},
      {text:"你出生的那个工业行星，那天罕见地停止了所有生产线的运转，仿佛整个世界都在等待着什么。", weight:6, cond:c=>state.age===0},
      {text:"教团的记录官为你占卜前程时，罗盘的指针罕见地连续转了三圈才停下，负责占卜的教士脸色凝重。", weight:6},
      {text:"你出生的那间医疗站，那天接连治好了七名本已被判定救不回来的重伤员，医生都说这是你带来的运气。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，教团的甄选官对你的力量波动格外感兴趣，提议将你早早送入见习营，你的家人必须表态。", options:[
        {label:"同意，送去见习营", result:"家人同意了这个提议，你自幼便被送进了见习营接受训练。", statEffect:{power:1,charm:-1}, setFlag:"warhammer_early_recruit"},
        {label:"拒绝，留在家中多陪伴几年", result:"家人拒绝了这个提议，坚持要多留你在身边陪伴几年。", statEffect:{charm:1}},
        {label:"申请延期甄选", result:"家人申请了延期甄选，想给你多一点时间准备。", statEffect:{wit:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"新兵分配的日子到了，三支部队都向你伸出了手。", options:[{label:"加入突击连", result:"你加入了冲在最前的突击连，每一场战斗都在锤炼你的血性与筋骨。", statEffect:{power:1}},{label:"加入侦察排", result:"你加入了神出鬼没的侦察排，学会了在死亡的缝隙里寻找生路。", statEffect:{luck:1}},{label:"加入军械库", result:"你被分进了军械库，日日与机油和图纸为伴，成了半个技术专家。", statEffect:{wit:1}}]},
      {text:"帝国的征募官找上了门来，你告别故乡，登上了驶向前线的运兵船，从此再未回头。", weight:10},
      {text:"你在新兵训练营的实弹演习中打出了全营最高的战绩，教官当场记下了你的名字。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你亲眼目睹了人生中第一场与异形的遭遇战，从那天起，你彻底明白了「战争永无止境」的含义。", weight:7},
      {text:"你在训练中结识了一位出生入死的战友，两人约定，往后无论走到哪个战场都要彼此照应。", weight:6, setFlag:"warhammer_brother"},
      {text:"你第一次直面混沌污染的痕迹，那种扑面而来的诡异感让你终生难忘。", weight:6},
      {text:"一位老兵把随身多年的圣物护符转交给了你，只说了句『它救过我很多次，希望也能护你周全』。", weight:6, setFlag:"warhammer_relic"},
      {choice:true, weight:6, text:"军团让你选择专精方向：突击兵、狙击手还是重装步兵，这将决定你未来的战斗风格。", options:[
        {label:"突击兵，速攻破阵", result:"你选择了突击兵，从此习惯了速攻破阵的打法。", statEffect:{power:2}},
        {label:"狙击手，一击致命", result:"你选择了狙击手，练出了一双能一击致命的沉稳双眼。", statEffect:{wit:2}},
        {label:"重装步兵，坚如磐石", result:"你选择了重装步兵，从此扛起重甲，坚如磐石地守住每一道战线。", statEffect:{health:2}}
      ]},
      {text:"你在训练营里因为一次违反军规的冲动之举被处以禁闭，事后却因祸得福地结识了一位良师。", weight:6},
      {text:"你第一次参加了随军的战地布道仪式，教士的话语让你对『帝皇』二字有了全新的理解。", weight:6},
      {text:"你在战场医疗培训中展现出了远超同龄人的沉稳，教官破格让你提前接触了真正的战地救护。", weight:6, setFlag:"warhammer_medic"},
      {text:"你被派去协助解剖一头缴获的异形尸体，那种诡异的生理构造让你终生难忘。", weight:6}
    ],
    adult:[
      {text:"一场惨烈的战役中，一名混沌领主当着你的面屠灭了你的整支连队——他临走前记下了你的脸：『下次再玩。』你也记下了他的。", weight:5, setFlag:"warhammer_quest1"},
      {choice:true, weight:6, text:"战场清扫时，敌方一名年轻士兵扔下武器向你投降，按条例你有三种处置方式。", options:[{label:"受降并保其性命", result:"你接受了他的投降，依照战俘条例保下了他的性命——放下枪口的那一瞬间，你觉得自己打了这么多年仗，终于像个人了。", statEffect:{charm:1}, setFlag:"warhammer_prisoner"},{label:"移交审判庭", result:"你把他移交给了随军审判庭，一切依照程序，无可指摘。", statEffect:{origin:1}},{label:"睁一只眼闭一只眼放他走", result:"你转过身去装作没看见，身后传来一阵渐远的脚步声。", statEffect:{luck:1}}]},
      {text:"你利用战间的空隙给机甲的机魂做了一次彻底的保养祷告，此后数月它运转得格外顺滑。", weight:6},
      {text:"你在与异形大军的殊死搏斗中活了下来，被亲手授予了象征荣耀的帝国勋章。", weight:10, achievement:"帝国勋章"},
      {text:"你在濒死之际隐约听到了帝皇清晰的低语，浑身伤势竟奇迹般地开始迅速愈合。", weight:8, cond:c=>hasTag(c,"emperorwhisper")},
      {text:"你与那位约定同生共死的战友并肩作战，在一场殊死之战中互相救了对方一命。", weight:6, cond:c=>hasFlag(c,"warhammer_brother")},
      {text:"军团里的审判官对你进行了一次突袭式的忠诚审查，气氛压抑得让所有人都喘不过气。", weight:6},
      {text:"你驾驶的机甲的机魂忽然发出了从未有过的异常波动，仿佛在向你传递某种警告。", weight:6, setFlag:"warhammer_machine_warning"},
      {choice:true, weight:6, text:"审判官怀疑你的机甲遭到了混沌污染，要求立刻销毁，你却坚信这只是误会。", options:[
        {label:"据理力争，坚持为机甲辩护", result:"你据理力争，最终证明了机甲的清白，审判官虽面无表情，却也不再追究。", statEffect:{wit:1,power:1}, achievement:"据理力争"},
        {label:"服从命令，忍痛销毁机甲", result:"你选择了服从命令，忍痛看着陪伴多年的机甲被销毁，心里空落落的。", statEffect:{origin:1}},
        {label:"暗中把机甲藏起来，抗命不遵", result:"你冒着抗命的风险，暗中把机甲藏了起来——这个决定，日后究竟是福是祸，谁也说不清。", statEffect:{luck:-1,power:1}}
      ]},
      {death:true, text:"混沌的低语最终侵蚀了你的意志，你倒在了自己曾经誓死守卫的战线之内。", weight:1, cause:"意志沦陷"},
      {choice:true, weight:6, text:"教团请你就『是否处决一名疑似被混沌污染但尚未确证的战友』表态。", options:[
        {label:"主张处决，绝不姑息", result:"你主张立即处决，绝不姑息，虽然保住了军团的安全，却也让不少战友对你心生忌惮。", statEffect:{power:1,charm:-1}},
        {label:"主张继续观察，给他机会", result:"你主张继续观察，给对方一个证明自己的机会，这份宽厚让战友们对你更加信服。", statEffect:{charm:1}},
        {label:"拒绝表态，交由上级决定", result:"你拒绝了表态，把这个艰难的决定交给了上级，自己乐得清闲。", statEffect:{wit:1}}
      ]},
      {text:"你负责押运一批缴获的异形标本回后方研究，途中标本险些逃脱，你临危处置避免了一场浩劫。", weight:6},
      {text:"你所在的巡逻小队遭遇了一群潜伏的异形突袭，气氛瞬间紧张起来。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你一柄链锯剑就解决了大半敌人，战友们缴获了不少异形的战利品。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你这一战吃了大亏，装备损毁了不少，还是靠战友掩护才勉强撤了下来。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番苦战之后，双方都付出了代价，你们勉强守住了阵地。", statEffect:{luck:1}}}
      ]},
      {text:"你受邀前往帝国圣殿朝圣，站在那座宏伟的建筑前，你第一次真切感受到了信仰的重量。", weight:6},
      {text:"你在一次惨烈的战斗中及时救治了数名濒死的战友，军团特意为你颁发了战地医疗勋章。", weight:6, cond:c=>hasFlag(c,"warhammer_medic")},
      {text:"你被授予了亲手缝制军团旗帜的荣誉，这面旗帜此后将跟随军团征战四方。", weight:6, setFlag:"warhammer_banner"},
      {text:"你因为比同龄人更早接受训练，在正式入伍时已经展现出超乎寻常的适应力，教官都说你像是天生的军人。", weight:6, cond:c=>hasFlag(c,"warhammer_early_recruit"), statEffect:{power:1}}
    ],
    prime:[
      {text:"多年的追猎让你摸清了那名混沌领主的行踪规律——他盘踞在一颗被污染的堡垒世界，而你的复仇计划已经准备了半生。", weight:12, cond:c=>hasFlag(c,"warhammer_quest1"), setFlag:"warhammer_quest2"},
      {text:"你在清剿一处废弃空间站时，发现墙上用一种古老的东方文字刻着一行字，翻译器显示：『此地灵气稀薄，不宜久留』。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你率领一支残破不堪的军团死守住了一座至关重要的星门要塞，为帝国争取了宝贵的喘息之机。", weight:10, cond:c=>stat(c,"power")>=7 || transcendRank(c)>=1, achievement:"星门守卫者"},
      {text:"你被正式擢升为军团指挥官，麾下的战士们都尊称你为「不朽的钢铁意志」。", weight:8, cond:c=>stat(c,"origin")>=7},
      {text:"你带领残部走出了被称为「死亡禁区」的坠毁战舰残骸，从此成了军团中人尽皆知的传奇。", weight:7},
      {choice:true, weight:6, text:"军团就『新兵该优先补充前线还是充分训练后再上战场』产生了分歧。", options:[
        {label:"支持充分训练", result:"你支持了充分训练的方案，新兵们虽然上战场慢了些，存活率却明显提高了。", statEffect:{charm:1}, worldStateKey:"warhammer_legionInfluence", worldStateDelta:2},
        {label:"支持优先补充前线", result:"你支持优先补充前线，兵力缺口是补上了，只是新兵的伤亡率也跟着水涨船高。", statEffect:{power:1}, worldStateKey:"warhammer_legionInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这件事最终交由上级决定。", statEffect:{luck:1}}
      ]},
      {text:"那位与你并肩多年的战友在一场战役中壮烈牺牲，你独自完成了他未竟的任务，替他讨回了公道。", weight:6, cond:c=>hasFlag(c,"warhammer_brother")},
      {text:"你被授予了一件传承久远的圣物，教团称这是对你多年忠诚与战功的认可。", weight:6},
      {text:"你驾驶的机甲机魂终于与你彻底磨合，往后的每一场战斗，它都仿佛能预判你的下一个动作。", weight:6},
      {text:"你被任命为一整支新兵训练营的教官，看着那些懵懂的新面孔，仿佛看到了当年的自己。", weight:6},
      {text:"你主导了一次对异形巢穴的清剿行动，虽然代价惨重，却也彻底扫除了这片星区的威胁。", weight:6},
      {text:"你主导建立了一套更完善的战场医疗体系，往后军团的伤亡率因此大幅降低。", weight:6, cond:c=>hasFlag(c,"warhammer_medic")},
      {text:"你登上了一艘全新服役的星际战舰，作为随舰军医参与了这艘战舰的首次远征。", weight:6},
      {choice:true, weight:6, text:"你被要求评选一名年轻士官接任你的部分职责，你必须做出选择。", options:[
        {label:"选最勇猛的那个", result:"你选择了那位最勇猛的士官，往后战场上少不了几分锐气。", statEffect:{power:1}},
        {label:"选最沉稳的那个", result:"你选择了那位最沉稳的士官，麾下的战士们也因此多了几分安定感。", statEffect:{wit:1}},
        {label:"选最受士兵爱戴的那个", result:"你选择了那位最受士兵爱戴的士官，军团上下都对这个决定心服口服。", statEffect:{charm:1}}
      ]}
    ],
    elder:[
      {choice:true, weight:40, text:"规则之外的裂缝在圣棺前展开——帝皇的低语与那个声音同时响起：去，或者留。", cond:c=>!hasFlag(c,"warhammer_gate_closed") && hasFlag(c,"warhammer_beyond2") && hasTag(c,"warhammer_destiny") && worldStateVal(c,"warhammer_breakthrough")>=3, options:[{label:"跨出裂缝", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"warhammer_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"warhammer_gate_closed"}]},
      {text:"灵能升华至顶点的那夜，圣棺外的空间裂开了——裂缝后既非亚空间也非现实，而是规则之外。", weight:18, cond:c=>hasFlag(c,"warhammer_beyond1") && worldStateVal(c,"warhammer_breakthrough")>=3, setFlag:"warhammer_beyond2"},
      {text:"钢铁圣棺的寂静里，你听见了一个不属于任何已知位面的声音——它既不是帝皇，也不是混沌。", weight:12, cond:c=>hasTag(c,"warhammer_destiny") && worldStateVal(c,"warhammer_breakthrough")>=2, setFlag:"warhammer_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"无畏机甲中的漫长岁月里，你的灵能在寂静中悄然苏醒——技术神甫检测后跪了下来：那是接近圣者的辉光。", cond:c=>worldStateVal(c,"warhammer_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"引导灵能升华", riskyChance:0.13, lifespanBonus:90, successEffect:{power:4,wit:2}, successResult:"升华成功——你的灵能辉光穿透了机甲的装甲缝隙，战场上的敌人开始在看到你之前就感到恐惧。", successAchievement:"触及法则", worldStateKey:"warhammer_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"灵能反噬", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"堡垒世界的坐标已经锁定，突击艇整装待发——这场私人的复仇，帝国不会支援你，但你等这一天已经等了一辈子。", cond:c=>hasFlag(c,"warhammer_quest2"), options:[{label:"发动最后的猎杀", riskyChance:0.38, lifespanBonus:10, successEffect:{power:4,charm:2}, successResult:"你把链锯剑捅进那名混沌领主胸膛的时候，轻声说了当年连队每一个人的名字——复仇落幕，你的传奇在军团里传唱至今。", successAchievement:"毕生所求", failResult:"宿敌的力量远超预估，你倒在了他的王座之前——但你脸上带着笑：至少，你来过了。", failDeath:true, failDeathChance:0.35, failCause:"复仇失败", regressResult:"突袭功亏一篑，你重伤撤离——宿敌的堡垒防御已经升级，此生怕是再没有第二次机会了。", regressEffect:{power:-2,health:-2}},{label:"把情报移交给审判庭", result:"你把毕生收集的情报移交给了审判庭——半年后，歼灭舰队将那颗堡垒世界化为了玻璃。仇报了，只是不是用你的手。", statEffect:{wit:1,origin:1}}]},
      {choice:true, weight:30, repeatable:true, text:"你的躯体已到极限，技术神甫提出了最后的荣耀——将你安葬进一台无畏机甲，以钢铁圣棺的形态继续为帝皇作战。", cond:c=>worldStateVal(c,"warhammer_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?58:64) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"接受无畏机甲安葬", riskyChance:0.18, lifespanBonus:80, successEffect:{power:4,health:3}, successResult:"安葬成功——你在钢铁圣棺中重新睁开了『眼睛』，从此你就是行走的堡垒，帝皇最古老的怒火。", successAchievement:"二度超脱", worldStateKey:"warhammer_breakthrough", worldStateDelta:1, failResult:"灵魂与机甲的链接在最后关头断裂，你的意识永远消散在了冰冷的钢铁之中。", failDeath:true, failDeathChance:0.6, failCause:"安葬失败", regressResult:"链接失败被紧急中断，你被从机甲中取出时已奄奄一息，元气大伤。", regressEffect:{power:-3,health:-3}, regressLifespanPenalty:30},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你把历年战役的勋章都收进了一只旧弹药箱，孙辈们最爱缠着你，要听每一枚勋章背后的故事。", weight:6},
      {text:"当年那名向你投降的年轻士兵，后来成了两军停火谈判桌上关键的传话人——有人说那场和平，是从你放下枪口的那一刻开始的。", weight:6, cond:c=>hasFlag(c,"warhammer_prisoner"), statEffect:{charm:1}},
      {text:"帝国为你铸造了一尊雕像，立在你曾誓死守卫过的星港广场上，往来的士兵都会向它敬礼。", weight:6, cond:c=>stat(c,"power")>=8 || transcendRank(c)>=2, statEffect:{charm:1}},
      {text:"多年之后你才明白，当年机魂的那次异常波动究竟在警告什么——正是那份没来由的警觉，让你在一次伏击中提前一步保住了性命。", weight:6, cond:c=>hasFlag(c,"warhammer_machine_warning"), statEffect:{luck:1}},
      {death:true, text:"在生命的最后一刻，你的躯体被虔诚地封入无畏机甲的圣龛之中，继续为帝皇而战，直至永远。", weight:0.25, cond:c=>transcendRank(c)<2, cause:"荣耀安葬"},
      {text:"你在临终前只留下一句遗言：「即使身死，帝国的战旗也绝不会倒下」，随后被追授了殉道者之名。", weight:8},
      {text:"你把那位战友当年留下的遗物郑重地交给了他的后人，告诉他们那个人曾经是多么了不起的战士。", weight:6, cond:c=>hasFlag(c,"warhammer_brother")},
      {text:"你把随身多年的圣物护符转交给了一名新兵，重复了当年那句『它救过我很多次』。", weight:6, cond:c=>hasFlag(c,"warhammer_relic"), achievement:"衣钵相传"},
      {text:"你把毕生的战场经验编写成了一份军规补编，如今已经成为军团新兵的必修教材。", weight:6},
      {death:true, text:"你在生命的最后时光，再次前往了那座帝国圣殿，在圣光下安静地闭上了眼睛。", weight:1, cond:c=>transcendRank(c)===0, cause:"圣光中安眠"},
      {choice:true, weight:6, text:"临终前，你被问及是否要将自己的作战记录编入军团正史。", options:[
        {label:"同意，如实记录功过", result:"你同意了，要求如实记录自己的功过，好的坏的都留给后人评说。", statEffect:{wit:1}},
        {label:"只记录光辉战绩", result:"你要求只记录自己的光辉战绩，留给后人一个足够振奋人心的传奇。", statEffect:{charm:1}},
        {label:"拒绝，不留痕迹", result:"你拒绝了这个提议，不想在正史上留下任何痕迹，一切功过自己知道就够了。", statEffect:{luck:1}}
      ]},
      {text:"你把自己毕生的战场医疗经验整理成册，成了帝国医疗兵的标准教材。", weight:6, cond:c=>hasFlag(c,"warhammer_medic")},
      {text:"你亲手缝制的那面军团旗帜如今已经破损不堪，却依然骄傲地飘扬在军团的最前线。", weight:6, cond:c=>hasFlag(c,"warhammer_banner")},
      {choice:true, weight:5, repeatable:true, text:"军团的技术军官提出为你植入一整套延寿型机械改造，这或许能让你继续为帝皇征战——但排异的风险不容小觑。", cond:c=>worldStateVal(c,"warhammer_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:52) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?8:12)), options:[
        {label:"接受完整机械改造", riskyChance:0.3, lifespanBonus:40, successEffect:{power:10,health:4,origin:2},
         successResult:"你的躯体被彻底容纳进了一具无畏机甲的圣体之中，机械飞升让你获得了近乎不死的躯壳，从此你将以血肉与钢铁交融的形态，为帝皇再战千年。", successAchievement:"突破天命", worldStateKey:"warhammer_breakthrough", worldStateDelta:1,
         failResult:"排异反应瞬间爆发，机械与血肉的冲突彻底摧毁了你的身体。", failDeath:true, failDeathChance:0.65, failCause:"改造排异",
         regressResult:"排异反应瞬间爆发，你侥幸没有被彻底摧毁，只是这具残破的躯体从此再难恢复往日的战力。", regressEffect:{power:-2,health:-2}, regressLifespanPenalty:5},
        {label:"只接受局部小型改造", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只接受了局部的小型改造，效果有限，却也稳妥地延长了几年的战斗生涯。",
         failResult:"这次改造没有明显效果，好在风险也不大。"},
        {label:"拒绝改造，以血肉之躯终老", result:"你拒绝了这项改造，决定以纯粹的血肉之躯走完这一生。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, cond:c=>state.age >= (WORLD_BASE_LIFESPAN.warhammer[0]+state.lifespanBonus)*0.85, text:"帝皇的意志似乎在召唤你回归星辰，你必须决定如何度过生命的最后时刻。", options:[
        {label:"主动请战，战死沙场", result:"你主动请战，最终战死在了沙场之上——这是你能想到最体面的归宿，军团的战旗为你降了半日。", statEffect:{power:2}, endLife:true, endCause:"沙场殉道"},
        {label:"静待自然终老，把余生交给祈祷", result:"你选择静待自然终老，把余生交给了日复一日的祈祷，心境反倒愈发澄澈。", statEffect:{luck:1}},
        {label:"把身躯献祭给机魂研究", result:"你自愿把身躯献祭给了机魂研究，用自己的方式为帝国的未来添了一份力——技术神甫说，你的机魂会在圣械中获得永生。", statEffect:{origin:2}, achievement:"以身献祭", endLife:true, endCause:"机魂共冶"}
      ]},
      {death:true, text:"陪伴你多年的那具改造躯体，机魂终于在一次寻常的巡逻中彻底寂灭，再未苏醒。", weight:1, cond:c=>worldStateVal(c,"warhammer_breakthrough")>=1, cause:"机魂寂灭"},
      {text:"突破之后，你在战场上的存在感变得可怕，敌人光是看到你的身影就已经胆寒。", weight:6, cond:c=>worldStateVal(c,"warhammer_breakthrough")>=1 && stat(c,"power")>=8},
      {text:"这些年军团新兵训练日趋完善，你亲眼见证了麾下的战士一代比一代更加精锐。", weight:6, cond:c=>worldStateVal(c,"warhammer_legionInfluence")>=2},
      {text:"军团新兵始终仓促上阵，你看着一批批年轻的生命草草消耗在战场上，心里明白，这终究是杯水车薪。", weight:6, cond:c=>worldStateVal(c,"warhammer_legionInfluence")<=-1}
    ]
  },
  yaoguai: {
    infant:[
      {text:"接生婆掀开襁褓的一角，隐约瞥见你眉心有一道若隐若现的淡淡印记，吓得连声念起了避邪的咒语。", weight:10, cond:c=>state.age===0},
      {text:"你出生那晚，院子里的野猫围着摇篮转了整整三圈，随后齐齐冲着夜空长嚎了一声。", weight:8, cond:c=>state.age===0},
      {text:"算命先生翻遍了手中的黄历，也没算出你的生辰八字究竟对应哪一卦象，摇着头匆匆离去。", weight:7, cond:c=>state.age<=1},
      {text:"你出生时天边一道流星划过，村里的瞎眼阿婆摸着你的脸说：『这孩子的眼睛，看得见不该看的东西』。", weight:6, cond:c=>state.age===0},
      {text:"你满月那天，家里那面传了三代的铜镜忽然自己转了个方向，朝着你的摇篮照去。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，附近山上的野狐竟破天荒地跑到院子里对着你的方向叩首，吓坏了看守的老仆。", weight:6, cond:c=>state.age<=1},
      {text:"你出生那晚，村里那座常年香火不旺的山神庙忽然彻夜灯火通明，没人知道是谁点的。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，一只从未见过的白色异鸟落在你家屋檐上，叫了三声后便振翅离去。", weight:6, cond:c=>state.age<=1},
      {text:"你满月时，家里那只老猫忽然对着空气拱起了背，仿佛在警告什么看不见的东西。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，村里的道长与游医就该如何『镇住』你身上那道奇异印记争论不休，家人必须选一个法子。", options:[
        {label:"请道长做法镇压", result:"家人请道长为你做法镇压，一番折腾后，那道印记暂时安静了下来。", statEffect:{power:1,luck:-1}, setFlag:"yaoguai_sealed"},
        {label:"请游医开药调养", result:"家人请游医开了几副药慢慢调养，身子倒也渐渐养得结实。", statEffect:{health:1}},
        {label:"什么都不做，顺其自然", result:"家人商量了半天，最终决定什么都不做，顺其自然地看你长大。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"你帮邻村画了一整个雨季的平安符，虽然累得手腕发酸，却也把基本功练得炉火纯青。", weight:6},
      {text:"你被城隍庙里的老道长收为徒弟，开始学习驱邪捉妖、画符念咒的本领。", weight:10},
      {text:"镇上的一只小狐妖时常变成人形来找你玩耍，村民们都当你俩是青梅竹马的玩伴，浑然不知真相。", weight:8, cond:c=>stat(c,"charm")>=7},
      {text:"你误打误撞闯入了后山的一处古墓，侥幸捡回一条命，却也因此染上了些不同寻常的体质。", weight:7},
      {text:"你无意间用一枚老铜钱照出了一个躲在暗处的鬼魅，从此对这类『照妖』的手段起了兴趣。", weight:6, setFlag:"yaoguai_coin_interest"},
      {text:"你和一个同样出身贫寒的同门义结金兰，两人发誓今后有福同享、有难同当。", weight:6, setFlag:"yaoguai_sworn"},
      {text:"你在深山中捡到了一面泛着幽光的古镜，镜子里似乎藏着一段被遗忘的往事。", weight:6, setFlag:"yaoguai_mirror"},
      {choice:true, weight:6, text:"城隍庙的老道长让你选择修行方向：符箓、剑术还是丹药，这将决定你往后的道法根基。", options:[
        {label:"符箓一脉", result:"你选择了符箓一脉，画符念咒渐渐成了你的拿手好戏。", statEffect:{wit:2}},
        {label:"剑术一脉", result:"你选择了剑术一脉，一手剑法练得越发凌厉。", statEffect:{power:2}},
        {label:"丹药一脉", result:"你选择了丹药一脉，从此在坊间靠一手炼丹的本事攒下了不少家底。", statEffect:{wealth:2}}
      ]},
      {text:"你误打误撞闯入了一处只在夜半开市的『妖市』，见识了不少人间难得一见的奇珍异宝。", weight:6},
      {text:"你跟着师父学会了布置基础的驱邪符阵，第一次独自布阵时手忙脚乱，却也侥幸成功了。", weight:6},
      {text:"你参加了坊间举办的降妖擂台赛，虽然年纪最小，却也凭着一手小聪明赢了一场漂亮仗。", weight:6},
      {text:"你偶然拜访了一位隐居深山多年的隐士，对方看你顺眼，随口指点了你几句道法心得。", weight:6, setFlag:"yaoguai_hermit"},
      {text:"当年那道法镇压的印记渐渐显露出真容，你隐约能感觉到体内封着一丝不同寻常的力量。", weight:6, cond:c=>hasFlag(c,"yaoguai_sealed"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"你萌生了一个前无古人的念头——编纂一部收录天下妖族的《百妖谱》，为人妖两道留一部信史。", weight:5, setFlag:"yaoguai_quest1"},
      {choice:true, weight:6, text:"一只重伤的小狐妖倒在你家门口，气若游丝，救与不救全在你一念之间。", options:[{label:"抱回屋里悉心救治", result:"你把它抱回屋里救治了整整一个月，临走时它郑重地朝你作了个揖，说这份恩情记下了。", statEffect:{charm:1}, setFlag:"yaoguai_fox"},{label:"送去道观请道长处置", result:"你把它送去了道观，道长看了看伤势，叹了句『也是个可怜的』，便收下了。", statEffect:{wit:1}},{label:"洒符驱走以绝后患", result:"你洒了道符把它驱走了——人妖殊途，多一事不如少一事。", statEffect:{power:1}}]},
      {choice:true, weight:6, text:"一只被冤枉偷鸡的黄鼠狼精跪在你面前喊冤，村民们则群情激愤地要你替天行道。", options:[{label:"出手护下，慢慢查证", result:"你顶着村民的怒火护下了它，查证之后果然另有真凶，此事传开后妖族都念你的公道。", statEffect:{charm:1}},{label:"细细盘问，当场断案", result:"你不动声色地盘问出了破绽，当场揪出了真正偷鸡的野狗，两边都心服口服。", statEffect:{wit:1}},{label:"不蹚浑水，转身就走", result:"你觉得此事蹊跷，不愿蹚这趟浑水，转身走了——后来听说案子不了了之。", statEffect:{luck:1}}]},
      {text:"你在一场夜半的妖乱中初次降服了一只作祟多年的山精，从此在坊间也算小有名气。", weight:10, achievement:"降妖有成"},
      {text:"你与一位倾城的狐族少女萍水相逢，她笑着说这是「几世修来的缘分」，从此常伴你左右。", weight:8, cond:c=>hasTag(c,"foxblood")},
      {text:"你在江湖上因为一次误伤妖族而被列入了『妖界通缉令』，往后行走江湖都要多加小心。", weight:6},
      {text:"那面古镜忽然在夜里自行发光，镜中人影竟对你说出了一句意味深长的警示。", weight:6, cond:c=>hasFlag(c,"yaoguai_mirror")},
      {text:"你那位义结金兰的兄弟因为一场变故身陷囹圄，你不得不动用所有人脉去为他奔走。", weight:6, cond:c=>hasFlag(c,"yaoguai_sworn")},
      {choice:true, weight:6, text:"一只被通缉多年的妖怪找上门来求你帮忙洗清冤屈，你却不确定它说的是真是假。", options:[
        {label:"选择相信，出手相助", result:"你选择相信了它，几番调查后果然发现另有真凶，你也因此结识了一位特殊的『妖友』。", statEffect:{charm:1,luck:1}, achievement:"人妖之信"},
        {label:"谨慎调查，先弄清真相", result:"你没有轻易表态，先花了不少功夫查证，最终才谨慎地做出了决定。", statEffect:{wit:1}},
        {label:"拒绝插手，明哲保身", result:"你选择了拒绝插手这件事，虽然事后有些愧疚，却也躲开了一场说不清的麻烦。", statEffect:{luck:-1}}
      ]},
      {death:true, text:"一场镇压百年凶灵的法事中，你耗尽了周身法力，与凶灵同归于尽，魂飞魄散。", weight:1, cause:"以身镇灵"},
      {text:"你连续多日梦到一个自称是你『前世』的陌生人，对方反复叮嘱你小心一场即将到来的劫数。", weight:6, setFlag:"yaoguai_pastlife"},
      {text:"你在一次降妖行动中遭遇了棋逢对手的高手，一番交手后，你们竟惜才地结为了忘年之交。", weight:6},
      {choice:true, weight:6, text:"一只小妖找你求学识字，你却担心教妖识字有违常理。", options:[
        {label:"收下这个妖徒", result:"你收下了这个妖徒，教它识字读书，往后倒也算是一段人妖师徒的奇缘。", statEffect:{charm:2}},
        {label:"拒绝，恪守人妖之别", result:"你拒绝了这个请求，坚持恪守人妖之间的界限，这份坚持虽显得冷淡，却也符合你一贯的原则。", statEffect:{power:1}},
        {label:"私下教，不公开身份", result:"你私下教它识字，却没有公开这段师徒之名，两人的这段情分只有彼此知晓。", statEffect:{wit:1}}
      ]},
      {text:"你参加了妖界特意为人间修士举办的『妖界考试』，成绩虽不出众，却也长了不少见识。", weight:6},
      {text:"你所在的驱魔世家因为一场纠纷卷入了江湖恩怨，你不得不出面周旋，替家族挽回声誉。", weight:6},
      {text:"你夜行山道时遭遇了一群拦路的山匪，看架势不像是善茬。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你几下便打退了这群山匪，还顺手缴获了他们打劫来的财货。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你自知不是对手，只能忍痛留下财货换取一条平安路。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番周旋唇枪舌剑，你总算说得对方退让，双方倒也没伤了和气。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"数十年间你踏遍山川，笔下的妖怪已有九十九种——只差传说中从未有人见过真容的『山君』，便可功德圆满。", weight:12, cond:c=>hasFlag(c,"yaoguai_quest1"), setFlag:"yaoguai_quest2"},
      {text:"一只千年老妖跟你说，它年轻时曾误入一道裂隙，看见过一座由钢铁与霓虹构成的不夜城——城里的人，身体里都长着机器。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"连妖界都听说了你的侠名，一位大妖特意托人送来请帖，邀你出席妖界百年一度的宴席。", weight:6, cond:c=>stat(c,"charm")>=8 || transcendRank(c)>=2, statEffect:{luck:1}},
      {text:"你把当年那枚老铜钱重新祭炼了一番，炼成了一件小有名气的照妖法器，江湖上不少同道专程登门借用。", weight:6, cond:c=>hasFlag(c,"yaoguai_coin_interest"), statEffect:{charm:1,wit:1}},
      {text:"你游历大江南北，与形形色色的妖怪化敌为友，甚至结拜了一位性情爽朗的狐仙义妹。", weight:10, achievement:"人妖之交"},
      {text:"你在江湖上开了一间不起眼的小道观，专为往来的百姓答疑解惑、驱邪辟灾。", weight:8},
      {text:"你被朝廷请去镇守一方水患多发的辖地，此后那片水域再也没有闹过妖乱。", weight:7},
      {choice:true, weight:6, text:"江湖就『人妖之争该继续对立还是寻求和解』产生了分歧，你的态度可能影响这片江湖未来的走向。", options:[
        {label:"寻求和解，促成人妖共处", result:"你力主寻求和解，人妖两界渐渐少了些无谓的仇视，多了几分难得的宽容。", statEffect:{charm:1}, worldStateKey:"yaoguai_jianghuInfluence", worldStateDelta:2},
        {label:"坚持对立，划清界限", result:"你坚持人妖必须划清界限，这份立场倒是坚定，只是仇恨也因此更难化解。", statEffect:{power:1}, worldStateKey:"yaoguai_jianghuInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你终于查清了那面古镜背后的秘密——那竟是前世欠下的一笔轮回债，如今终于到了偿还的时候。", weight:6, cond:c=>hasFlag(c,"yaoguai_mirror"), achievement:"轮回债偿", statEffect:{wit:1}},
      {text:"你成功洗清了『妖界通缉』的污名，还因此在正邪两道都攒下了不小的名声。", weight:6},
      {text:"你那位患难兄弟出狱后特意登门道谢，两人相拥而泣，多年的情分丝毫未减。", weight:6, cond:c=>hasFlag(c,"yaoguai_sworn")},
      {choice:true, weight:6, text:"一位妖界长老提议与人间修士建立正式的『人妖互不侵犯』盟约，请你作为见证人表态。", options:[
        {label:"支持盟约，促成和平", result:"你力促这份盟约的达成，为人妖两界换来了一段难得的和平岁月。", statEffect:{charm:2}},
        {label:"反对盟约，人妖终有一战", result:"你反对了这份盟约，坚信人妖之间终有一战，这份立场为你招来了不少非议。", statEffect:{power:1}},
        {label:"保持中立，静观其变", result:"你选择了保持中立，静观其变，谁也没得罪，却也谁都没帮上。", statEffect:{luck:1}}
      ]},
      {text:"你重修了村里那座香火不旺的山神庙，此后附近的妖乱竟真的少了大半，村民都说这是你的功德。", weight:6},
      {text:"你梦中那位『前世』的警示最终应验，好在你早有准备，从容渡过了那场劫数。", weight:6, cond:c=>hasFlag(c,"yaoguai_pastlife")},
      {text:"你在降妖擂台赛的成年组别里一举夺魁，从此在江湖上有了『降妖魁首』的名号。", weight:6},
      {text:"你时常回山中拜访那位隐士，两人渐渐成了忘年之交，时常彻夜畴论道法。", weight:6, cond:c=>hasFlag(c,"yaoguai_hermit")}
    ],
    elder:[
      {choice:true, weight:40, text:"天幕的裂隙垂落到你面前——跳出去，从此天道管不到你。", cond:c=>!hasFlag(c,"yaoguai_gate_closed") && hasFlag(c,"yaoguai_beyond2") && hasTag(c,"yaoguai_destiny") && worldStateVal(c,"yaoguai_breakthrough")>=3, options:[{label:"跃出天幕", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"yaoguai_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"yaoguai_gate_closed"}]},
      {text:"窥尽天道的这一日，天幕上那道被敲响的地方裂开了一线——门后是天道也管不到的地方。", weight:18, cond:c=>hasFlag(c,"yaoguai_beyond1") && worldStateVal(c,"yaoguai_breakthrough")>=3, setFlag:"yaoguai_beyond2"},
      {text:"一次入定中，你听见天道的运转声里藏着另一个更轻的声音——像是有人隔着天幕，在敲。", weight:12, cond:c=>hasTag(c,"yaoguai_destiny") && worldStateVal(c,"yaoguai_breakthrough")>=2, setFlag:"yaoguai_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"尸解重修之后，你在一次入定中窥见了天道运转的一角——那是人妖仙三道都讳莫如深的领域。", cond:c=>worldStateVal(c,"yaoguai_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"窥探天道", riskyChance:0.13, lifespanBonus:90, successEffect:{wit:4,luck:2}, successResult:"你窥见了天道的一角而全身而退——从此你掐算的卦，连妖界的大能都要专程来求。", successAchievement:"触及法则", worldStateKey:"yaoguai_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"天道降罚", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"多方打探后你终于寻到了山君的巢穴——它是妖族之祖，见之者非死即疯，但《百妖谱》的最后一页在等它。", cond:c=>hasFlag(c,"yaoguai_quest2"), options:[{label:"深入巢穴，面见山君", riskyChance:0.42, lifespanBonus:15, successEffect:{wit:3,charm:3}, successResult:"山君睁开眼看了你很久，忽然开口：『百年来第一个不为杀我而来的人。』它允你记下真容——《百妖谱》大成，人妖两道皆奉为圣典。", successAchievement:"毕生所求", failResult:"你终究没能承受直视妖祖的代价，魂魄消散在了巢穴深处——只有那部九十九妖的残谱流传了下来。", failDeath:true, failDeathChance:0.30, failCause:"直面妖祖", regressResult:"山君的一声低吼就震碎了你的心神，你被同伴拖了回来，从此再不敢提第一百妖的事。", regressEffect:{wit:-1,health:-2}},{label:"以九十九妖成书", result:"你在最后一页画了一个空白的轮廓，题字：『留待后人』——《九十九妖谱》依然成了传世之作。", statEffect:{wit:2}}]},
      {choice:true, weight:30, repeatable:true, text:"夺造化之后，那位游方术士再次现身，告诉你最后一步——『尸解重修』：舍去这具躯壳，以魂魄重塑仙体，从此跳出寿数之外。", cond:c=>worldStateVal(c,"yaoguai_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?58:64) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"尝试尸解重修", riskyChance:0.15, lifespanBonus:70, successEffect:{wit:3,luck:3}, successResult:"尸解成功——你的魂魄在旧躯壳的灰烬中重塑出一具近乎仙体的新身，坊间都说你已是半个陆地神仙。", successAchievement:"二度超脱", worldStateKey:"yaoguai_breakthrough", worldStateDelta:1, failResult:"尸解到一半，你的魂魄没能凝住，一缕缕散在了风里。", failDeath:true, failDeathChance:0.55, failCause:"魂飞魄散", regressResult:"尸解失败，你狼狈地退回了原来的躯壳，道行大损，好在命还在。", regressEffect:{wit:-3,power:-2}, regressLifespanPenalty:25},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你晚年在院里搭了个茶棚，人妖两道的旧识路过都爱进来讨杯茶喝，聊聊各自这些年的近况。", weight:6},
      {text:"当年救下的那只小狐妖如今道行有成，每逢你寿辰都会化作人形登门贺寿，成了坊间一段人尽皆知的佳话。", weight:6, cond:c=>hasFlag(c,"yaoguai_fox"), statEffect:{luck:1}},
      {text:"你于风清月朗之夜悄然羽化，坊间都传说你最终修成了半仙之体，隐入了深山之中。", weight:10},
      {text:"你临终前将一身道法尽数传给了闻讯赶来的徒弟，笑着说「这江湖，往后就交给你们了」。", weight:8},
      {text:"你与那位义结金兰的兄弟一同白发苍苍，约定死后也要葬在同一处，做一世的邻居。", weight:6, cond:c=>hasFlag(c,"yaoguai_sworn")},
      {text:"你临终前那双『看得见不该看的东西』的眼睛，第一次清清楚楚地看见了自己这一生的模样。", weight:6},
      {text:"你把自己毕生所学的驱邪符阵整理成册，配上详细的图解，供后来的年轻道士参详。", weight:6},
      {text:"你临终前又一次梦到了那位『前世』，对方只是微笑着向你挥了挥手，仿佛在说时候到了。", weight:6, cond:c=>hasFlag(c,"yaoguai_pastlife")},
      {text:"你把自己这些年参悟的道法心得整理成册，托人送去给那位隐居深山的老友，也算是一份谢礼。", weight:6, cond:c=>hasFlag(c,"yaoguai_hermit")},
      {text:"你把家族这些年积累的驱魔心得毫无保留地传给了下一代，嘱咐他们守好这份家业。", weight:6},
      {choice:true, weight:5, repeatable:true, text:"一位游方术士告诉你一个夺天地造化续命的秘法，或许能让你多活几十年——但这个秘法凶险异常，稍有不慎便是万劫不复。", cond:c=>worldStateVal(c,"yaoguai_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:56) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?8:12)), options:[
        {label:"拼死一试夺造化秘法", riskyChance:0.28, lifespanBonus:50, successEffect:{wit:10,power:4,luck:2},
         successResult:"你侵吞了一丝天地造化，硬生生续了命，法力与道行都随之精进了一层，只是这份秘法的代价，恐怕日后还要偿还。", successAchievement:"突破天命", worldStateKey:"yaoguai_breakthrough", worldStateDelta:1,
         failResult:"天地造化反噬而来，你的魂魄被瞬间撕碎，连一句遗言都没能留下。", failDeath:true, failDeathChance:0.6, failCause:"夺舍反噬",
         regressResult:"天地造化反噬而来，你的魂魄侥幸没有被彻底撕碎，却也损耗大半，往后的道行反倒大不如前。", regressEffect:{power:-2,wit:-2}, regressLifespanPenalty:5},
        {label:"只服用普通续命丹药", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只服用了坊间常见的续命丹药，效果有限，却也稳妥地续了几年寿命。",
         failResult:"这丹药没起什么作用，好在也没什么副作用。"},
        {label:"放弃秘法，顺应天命", result:"你放弃了这个秘法，决定顺应天命，把剩下的日子过得心安理得。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"你即将魂飞魄散，一位神秘的引路人邀你前往轮回，你必须做出选择。", options:[
        {label:"欣然赴轮回，忘却今生", reincarnate:"forget"},
        {label:"拒绝轮回，执念化作游魂守护乡土", result:"你拒绝了轮回，执念化作一缕游魂，此后一直默默守护着这片乡土。", statEffect:{power:1,health:-1}, achievement:"执念不灭"},
        {label:"请求带着记忆转世", reincarnate:"memory"}
      ]},
      {death:true, text:"当年侵吞的那丝天地造化，终究不是你能长久拥有的东西，在一个寻常的夜里，它悄然收回，带走了你的命。", weight:1, cond:c=>worldStateVal(c,"yaoguai_breakthrough")>=1, cause:"造化透支"},
      {text:"突破之后，你隐隐能预感到一些还未发生的事，坊间都说你已经半入仙途。", weight:6, cond:c=>worldStateVal(c,"yaoguai_breakthrough")>=1 && stat(c,"luck")>=8},
      {text:"这些年人妖之间的关系日渐缓和，你亲眼见证了这片江湖因此少了许多本不必发生的杀戮。", weight:6, cond:c=>worldStateVal(c,"yaoguai_jianghuInfluence")>=2},
      {text:"人妖之争始终未能平息，你看着这片江湖年复一年地陷在纠缠不清的仇恨里，心里明白，这条路终究还是越走越窄。", weight:6, cond:c=>worldStateVal(c,"yaoguai_jianghuInfluence")<=-1}
    ]
  },
  cyberpunk: {
    infant:[
      {text:"你出生在废土边缘的地下避难所里，出生证明是用一块从旧世界废墟里捡来的芯片刻录的。", weight:10, cond:c=>state.age===0},
      {text:"你出生那天，避难所的老式广播突然自动播放了一段来自旧世界的儿歌，随后又戛然而止。", weight:8, cond:c=>state.age===0},
      {text:"医疗官检查你的血样时，发现里面残留着微量的旧时代辐射抗体，直呼这简直是个奇迹。", weight:7},
      {text:"你出生时避难所的空气过滤器发出了刺耳的警报，事后检查却什么故障都没查到，工程师们百思不得其解。", weight:6, cond:c=>state.age===0},
      {text:"你的第一次体检报告显示，你的神经系统对义体的排异反应异常低，这在废土上算是种稀有的『天赋』。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，避难所深处那台早已报废的老式AI忽然自行开机，反复念叨着一段谁也听不懂的代码。", weight:6, cond:c=>state.age<=1},
      {text:"你出生时避难所外的变异植物群突然集体绽放出了诡异的荧光，持续了整整一夜才消散。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，避难所的老式无线电意外收到了一段来自远方的求救信号，此后再未响起过。", weight:6, setFlag:"cyberpunk_distress", cond:c=>state.age===0},
      {text:"你出生那天，避难所的黑市正在拍卖一批稀有的旧世界义体零件，喊价声隔着好几层墙都能听见。", weight:6, cond:c=>state.age===0},
      {text:"医生给你做基因扫描时，仪器莫名其妙地卡死重启了三次，最后一次才终于显示出正常的结果。", weight:6},
      {choice:true, weight:6, text:"你尚在襁褓中，避难所的医疗官提议给你植入一枚实验性的神经芯片，你的监护人必须做出选择。", options:[
        {label:"同意植入实验芯片", result:"监护人同意了这次植入，那枚实验芯片从此就留在了你的脑后。", statEffect:{wit:1,health:-1}, setFlag:"cyberpunk_early_chip"},
        {label:"拒绝，保持自然状态", result:"监护人拒绝了这个提议，坚持让你保持最自然的状态长大。", statEffect:{luck:1}},
        {label:"申请更换成更保守的方案", result:"监护人申请更换了一套更保守的方案，风险小了不少。", statEffect:{power:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"你攒下的零件终于够组装人生中第一件义体了，改装师问你要哪一种。", options:[{label:"装一只战术义眼", result:"你装上了战术义眼，从此看这个废土世界的方式彻底变了。", statEffect:{wit:1}},{label:"装一条机械臂", result:"你装上了机械臂，握力表的指针直接拉到了表底。", statEffect:{power:1}},{label:"装一枚神经加速器", result:"你装上了神经加速器，那种千钧一发之际时间变慢的感觉，救过你不止一次。", statEffect:{luck:1}}]},
      {text:"你在黑市换来了人生中第一件义体改造——一只机械手臂，从此在废土上多了几分活下去的底气。", weight:10},
      {text:"你在废土帮派的地下拳赛里连续获胜，靠着赢来的奖金给自己添置了第二件义体。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你在垃圾场里意外挖出了一台还能运转的旧世界终端，从里面读到了不少早已失传的禁忌知识。", weight:7},
      {text:"你在垃圾场里翻出了一枚闪烁着微弱蓝光的核心密钥，谁也不知道它究竟是什么东西的钥匙。", weight:6, setFlag:"cyberpunk_key"},
      {text:"你第一次尝试黑入据点的安保系统，虽然差点被抓，却也因此在黑客圈子里小有名气。", weight:6},
      {text:"两个帮派在你眼前爆发了一场火并，你侥幸躲过了流弹，却也因此看清了废土的残酷法则。", weight:6},
      {choice:true, weight:6, text:"黑市的义体商让你选择改装方向：战斗型、潜行型还是黑客型义体，这将决定你的生存方式。", options:[
        {label:"战斗型义体", result:"你选择了战斗型义体，从此浑身的改装都透着一股狠劲。", statEffect:{power:2}},
        {label:"潜行型义体", result:"你选择了潜行型义体，从此行动悄无声息，运气也似乎跟着好了不少。", statEffect:{luck:2}},
        {label:"黑客型义体", result:"你选择了黑客型义体，脑后的插槛让你在数据世界里如鱼得水。", statEffect:{wit:2}}
      ]},
      {text:"你在数据黑市上第一次尝试倒卖信息，虽然赚得不多，却也因此摸清了这一行的门道。", weight:6},
      {text:"你结识了一个没有任何身份档案的『黑户』义体人，两人因为同样的边缘处境而惜惜相惜。", weight:6, setFlag:"cyberpunk_blackmarket_friend"},
      {text:"你参加了废土上颇有名气的赛车比赛，驾驶着一台拼装的破车，居然一路冲进了决赛圈。", weight:6, setFlag:"cyberpunk_racer"},
      {text:"你在地下格斗场里打出了名堂，虽然只是业余选手，观众却都记住了你的绰号。", weight:6},
      {text:"那枚幼时植入的实验芯片渐渐显现出作用，你处理信息的速度明显比旁人快出一截。", weight:6, cond:c=>hasFlag(c,"cyberpunk_early_chip"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"你在一段战前数据残片里发现了『创世代码』的传说——据说那是旧世界网络的根权限，掌握它的人能重启整个废土的基础设施。", weight:5, setFlag:"cyberpunk_quest1"},
      {choice:true, weight:6, text:"一个四处流浪的AI核心敲开了你的系统防火墙，礼貌地请求一个栖身之所。", options:[{label:"划一块存储空间收留它", result:"你划了块存储空间收留了它，它安顿下来的第一件事是把你乱成一团的文件全部整理归档了。", statEffect:{wit:1}, setFlag:"cyberpunk_strayai"},{label:"打包卖给数据商人", result:"你把它打包卖给了数据商人，换了一笔不错的报酬——废土上，心软是奢侈品。", statEffect:{wealth:1}},{label:"格式化处理以绝隐患", result:"你没敢冒险，直接格式化了这段来历不明的代码——安全第一。", statEffect:{power:1}}]},
      {text:"你把捡来的废弃机械臂改装成了会煮咖啡的助手，成了据点里最抢手的小玩意儿。", weight:6},
      {text:"你加入了废土上小有名气的拾荒者公会，凭借过硬的本领很快就在圈子里闯出了名号。", weight:10, achievement:"废土拾荒者"},
      {text:"你的义体在一次交火中严重受损，黑市医生检查后却说这具身体的适配度「简直是为战斗而生」。", weight:8, cond:c=>hasTag(c,"cyberlimb")},
      {text:"你的义体第一次出现了严重的排异反应，黑市医生说这次多亏你的神经系统底子好，才没酿成大祸。", weight:6},
      {text:"你在一次黑入行动中意外唤醒了一个残留在旧系统里的『AI幽灵』，它似乎还记得核战前的世界。", weight:6, setFlag:"cyberpunk_ghost"},
      {text:"那枚神秘的核心密钥忽然有了反应，指向了废土深处一处从未被人发现的旧世界设施。", weight:6, cond:c=>hasFlag(c,"cyberpunk_key")},
      {choice:true, weight:6, text:"那个残留的AI幽灵向你提出了一个请求——帮它找到旧世界里，它曾经『守护』的那个人的后代。", cond:c=>hasFlag(c,"cyberpunk_ghost"), options:[
        {label:"答应它，展开一场跨越时代的寻人", result:"你答应了它的请求，历经周折终于帮它找到了那个人的后代，AI幽灵消散前，似乎露出了释然的神情。", statEffect:{charm:1,wit:1}, achievement:"跨世纪的托付"},
        {label:"婉拒，这不是你该承担的事", result:"你婉拒了这个请求，这不是你该承担的事——你如此安慰自己，却始终觉得心里有些说不出的遗憾。", statEffect:{luck:-1}},
        {label:"先了解清楚情况，再做决定", result:"你没有立刻答应，而是先花时间了解了整件事的来龙去脉，这份谨慎后来证明是对的。", statEffect:{wit:1}}
      ]},
      {death:true, text:"一次深入辐射区的探索行动中，你的义体系统突然过载烧毁，倒在了漫天黄沙之中。", weight:1, cause:"义体过载"},
      {text:"你被卷入了一场帮派间的信息战，靠着一手漂亮的数据伪造暗中扭转了局势。", weight:6},
      {text:"你开始在废土上经营起了一档地下电台节目，专门播报各据点的最新消息，渐渐有了固定听众。", weight:6, setFlag:"cyberpunk_radio"},
      {text:"你在黑市拍卖会上意外拍下了一批稀有的旧世界义体零件，转手一卖赚了不小一笔。", weight:6, statEffect:{wealth:2}},
      {text:"你在一次黑入行动中遭遇了另一个身份不明的数据幽灵，两人在虚拟空间里斗智斗勇了整整一夜。", weight:6, setFlag:"cyberpunk_data_ghost"},
      {text:"你终于查明了出生那天那段求救信号的来源——那是一处至今仍有幸存者坚守的地下庇护所，你与他们取得了联系，往后多了一处可以互通有无的落脚点。", weight:6, cond:c=>hasFlag(c,"cyberpunk_distress"), statEffect:{charm:1,luck:1}},
      {text:"你在废土上遭遇了一伙拦路劫掠的暴徒，对方人多势众。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你的义体战力碾压了对方，还顺手缴获了他们抢来的物资。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过这群暴徒，只能留下随身物资才换来一条生路。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番对峙后，你们达成了某种默契，各自离开，谁也没占到便宜。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"半生的追查让你集齐了创世代码的七段密钥中的六段——最后一段藏在旧世界的中央数据堡垒深处，那里的防御系统仍在运转。", weight:12, cond:c=>hasFlag(c,"cyberpunk_quest1"), setFlag:"cyberpunk_quest2"},
      {text:"你在废土深处捡到一柄永不生锈的古剑，剑身上刻着看不懂的云纹，所有检测都显示它的材质不属于已知的元素周期表。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你破解了一段战前遗留的加密档案，里面的旧世界技术图纸让整个据点的工程水平前进了一大步。", weight:6, cond:c=>stat(c,"wit")>=8, statEffect:{wit:1}},
      {text:"你带队攻入了旧世界遗留的地下军事基地，缴获了一批足以改变势力格局的战前科技。", weight:10, cond:c=>stat(c,"power")>=7 || transcendRank(c)>=1, achievement:"深渊拾荒王"},
      {text:"你在废土上建立起了一支颇具规模的商队，穿梭在各个据点之间贩卖情报与紧俏补给。", weight:8},
      {choice:true, weight:6, text:"废土据点就『新技术该公开共享还是垂直垄断』产生了分歧。", options:[
        {label:"支持公开共享", result:"你支持了公开共享的方案，新技术渐渐流向了各个弱小据点，废土上的求生率明显提升。", statEffect:{charm:1}, worldStateKey:"cyberpunk_wastelandInfluence", worldStateDelta:2},
        {label:"支持垂直垄断", result:"你支持了垂直垄断的方案，掌握技术的据点越发强大，只是弱小据点的日子却更难过了。", statEffect:{wealth:1}, worldStateKey:"cyberpunk_wastelandInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你击退了觊觎你地盘的另一个帮派，从此在这片废土上再没人敢轻举妄动。", weight:7},
      {text:"你带队打开了那处旧世界设施，那份跨越百年的秘密终于重见天日，震动了整个废土。", weight:6, cond:c=>hasFlag(c,"cyberpunk_key"), achievement:"旧日回响", statEffect:{luck:1}},
      {text:"你在废土上建立起了一个专门帮人处理义体排异问题的诊所，救了不少同样体质特殊的拾荒者。", weight:6},
      {choice:true, weight:6, text:"拾荒者公会请你表态是否支持『与某个帮派达成停战协议』。", options:[
        {label:"支持停战，休养生息", result:"你支持了停战协议，趁着这段安稳日子好好休养生息，人心也渐渐安定下来。", statEffect:{charm:2}},
        {label:"反对停战，趁势打垮对方", result:"你反对停战，主张趁势打垮对方，虽然赢下了这一场，代价却也不小。", statEffect:{power:1}},
        {label:"拒绝表态，坐山观虎斗", result:"你拒绝了表态，坐山观虎斗，看着两边斗得两败俱伤，自己坐收渔利。", statEffect:{wealth:1}}
      ]},
      {text:"你的电台节目成了废土上最有影响力的信息来源，各大势力都开始重视起你的一言一语。", weight:6, cond:c=>hasFlag(c,"cyberpunk_radio")},
      {text:"你帮那位『黑户』义体人伪造了一份完整的身份档案，对方从此终于能光明正大地行走废土。", weight:6, cond:c=>hasFlag(c,"cyberpunk_blackmarket_friend")},
      {text:"你凭着赛车比赛积累的名气，开了一间专门改装赛车的车行，生意做得红红火火。", weight:6, cond:c=>hasFlag(c,"cyberpunk_racer")},
      {text:"你终于查明了那个数据幽灵的真实身份，两人从虚拟空间的对手变成了现实中的合作伙伴。", weight:6, cond:c=>hasFlag(c,"cyberpunk_data_ghost")}
    ],
    elder:[
      {choice:true, weight:40, text:"那扇门前，所有数据流静止如朝圣——走进去，你将成为规则之外的存在。", cond:c=>!hasFlag(c,"cyberpunk_gate_closed") && hasFlag(c,"cyberpunk_beyond2") && hasTag(c,"cyberpunk_destiny") && worldStateVal(c,"cyberpunk_breakthrough")>=3, options:[{label:"走进那扇门", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"cyberpunk_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"cyberpunk_gate_closed"}]},
      {text:"数字神格大成的这一刻，网络的天花板上显出了一扇门——数据流在门前自动分开，像是朝圣。", weight:18, cond:c=>hasFlag(c,"cyberpunk_beyond1") && worldStateVal(c,"cyberpunk_breakthrough")>=3, setFlag:"cyberpunk_beyond2"},
      {text:"网络的最底层，你发现了一段任何协议都无法解析的数据流——它在重复同一句话：出口在上面。", weight:12, cond:c=>hasTag(c,"cyberpunk_destiny") && worldStateVal(c,"cyberpunk_breakthrough")>=2, setFlag:"cyberpunk_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"全意识数字化之后，你在网络最深处发现自己开始被其他数据体『信仰』——一个数字神格的雏形正在你身上凝聚。", cond:c=>worldStateVal(c,"cyberpunk_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"凝聚数字神格", riskyChance:0.13, lifespanBonus:90, successEffect:{wit:4,charm:2}, successResult:"神格雏形凝聚成功——废土的网络中开始流传你的『神谕』，而你确实能听见每一句向你发出的祈祷。", successAchievement:"触及法则", worldStateKey:"cyberpunk_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"神格崩解", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"中央数据堡垒的入口就在眼前——闯进去拿到最后一段密钥，你就能重启废土的水电网络，或者被百年前的防御系统做成焦炭。", cond:c=>hasFlag(c,"cyberpunk_quest2"), options:[{label:"闯入数据堡垒", riskyChance:0.4, lifespanBonus:15, successEffect:{wit:4,origin:2}, successResult:"当第七段密钥归位，整个废土的路灯在同一个夜晚次第亮起——人们涌上街头看着这场『奇迹』，而你坐在堡垒顶层，安静地关掉了自己的通讯器。", successAchievement:"毕生所求", failResult:"防御系统的激光矩阵比情报里的更完整——你的故事结束在了距离终端只剩十七步的地方。", failDeath:true, failDeathChance:0.32, failCause:"防御矩阵", regressResult:"你在防御系统全面激活前狼狈撤出，左腿永远留在了那道闸门里——数据堡垒此后进入永久封锁。", regressEffect:{health:-2,power:-1}},{label:"把六段密钥分发出去", result:"你把六段密钥分发给了废土上六个最大的据点——也许联合起来的他们，某天能走完你没走完的最后一步。", statEffect:{charm:2}}]},
      {choice:true, weight:30, repeatable:true, text:"第一次意识转移之后，那名黑市医生带来了终极方案——『全意识数字化』：彻底放弃肉身，把完整的你上传进据点的核心网络。", cond:c=>worldStateVal(c,"cyberpunk_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?52:58) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"进行全意识数字化", riskyChance:0.2, lifespanBonus:50, successEffect:{wit:4,luck:2}, successResult:"上传成功——你在网络中重新『醒来』，从此你的生命以数据的形式延续，肉体的衰亡再与你无关。", successAchievement:"二度超脱", worldStateKey:"cyberpunk_breakthrough", worldStateDelta:1, failResult:"上传进行到97%时发生了不可逆的数据损毁，剩下的3%，恰好是『你之所以是你』的那部分。", failDeath:true, failDeathChance:0.5, failCause:"上传失败", regressResult:"上传中途回滚，你退回了肉身，只是记忆出现了大量无法修复的空洞。", regressEffect:{wit:-3,charm:-2}, regressLifespanPenalty:20},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你退休后在据点开了间旧零件铺子，年轻的改装师们都爱来淘货，顺便听你讲讲旧时代的故事。", weight:6},
      {text:"当年收留的那个流浪AI陪你走过了大半辈子，如今它管理着整个据点的基础系统，居民们都亲切地叫它『老伙计』。", weight:6, cond:c=>hasFlag(c,"cyberpunk_strayai"), statEffect:{charm:1}},
      {text:"你在废土上建立起了一座能够自给自足的绿洲聚居地，成了后来者口口相传的传奇拓荒人。", weight:10},
      {text:"你把毕生搜集的旧世界残卷整理成册，交给聚居地的孩子们，作为重建文明的一颗种子。", weight:8},
      {text:"你把那台曾经自行开机的老式AI核心妥善地保存了下来，当作留给后人的一份特殊遗产。", weight:6},
      {text:"你把处理义体排异的经验整理成手册，成了废土上义体诊所争相传抄的教材。", weight:6},
      {text:"你把自己主持多年的电台节目录音整理保存，作为这段废土岁月最真实的见证。", weight:6, cond:c=>hasFlag(c,"cyberpunk_radio")},
      {text:"你在废土上安享晚年，偶尔还是会打开老旧的收音机，怀念当年主持节目时的日子。", weight:6},
      {choice:true, weight:6, text:"你留下的最后一批改装配方该不该无偿公开给废土上的年轻拾荒者。", options:[
        {label:"无偿公开", result:"你选择无偿公开这些配方，希望能帮更多年轻拾荒者在废土上活下去。", statEffect:{charm:2}},
        {label:"卖个好价钱", result:"你把配方卖了个好价钱，这份精明也算是给后人留下了一笔实实在在的家产。", statEffect:{wealth:2}},
        {label:"只传给关系亲近的人", result:"你只把配方传给了关系亲近的几个人，这份有所保留的传承，也算是另一种周全。", statEffect:{wit:1}}
      ]},
      {text:"你把自己那台陪伴多年的拼装赛车捐给了废土赛车协会，作为历史文物保存了下来。", weight:6, cond:c=>hasFlag(c,"cyberpunk_racer")},
      {text:"你与那位数据幽灵伙伴一起，把这些年黑入行动中积累的技术心得整理成了地下黑客圈流传的『圣经』。", weight:6, cond:c=>hasFlag(c,"cyberpunk_data_ghost")},
      {choice:true, weight:5, repeatable:true, text:"一名黑市医生提出帮你把意识部分备份进一具全新的义体外壳，理论上能延长你的『生命』——但转移过程风险极高。", cond:c=>worldStateVal(c,"cyberpunk_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:52) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?7:10)), options:[
        {label:"冒险进行完整意识转移", riskyChance:0.4, lifespanBonus:35, successEffect:{wit:10,power:4,luck:2},
         successResult:"意识转移在生死边缘完成了，这场彻底的思维突破让你的『生命』以一种全新的方式延续了下去，反应与思维都远超从前。", successAchievement:"突破天命", worldStateKey:"cyberpunk_breakthrough", worldStateDelta:1,
         failResult:"转移过程中意识信号骤然中断，那具全新的义体外壳里，再也没能醒来一个人。", failDeath:true, failDeathChance:0.5, failCause:"转移中断",
         regressResult:"转移过程中意识信号出现严重乱码，你侥幸被拉回了原本的躯体，只是许多记忆与反应能力都大不如前。", regressEffect:{wit:-2,power:-1}, regressLifespanPenalty:5},
        {label:"只备份部分记忆数据", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只备份了部分记忆数据，效果有限，却也稳妥地为自己续了几年。",
         failResult:"这次备份没什么明显效果，好在也没带来什么风险。"},
        {label:"拒绝转移，以血肉之身终老", result:"你拒绝了这次转移，决定以血肉之身走完这一生。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"你的意识面临最后的抉择——是让身体自然衰竭，还是把意识上传进废土仅存的一台旧式服务器。", options:[
        {label:"上传意识，以数据形式存续", result:"你选择了上传意识，从此以数据的形式在废土的网络残骸中继续存在。", statEffect:{wit:2}, achievement:"数字余烬"},
        {label:"拒绝上传，坦然接受死亡", result:"你拒绝了上传，坦然接受了死亡，这份坦然让身边的人都由衷地敬佩。", statEffect:{luck:1}},
        {label:"把身体捐给义体研究", result:"你把身体捐给了义体研究，用自己的方式为废土的医疗事业留下了最后一份贡献。", statEffect:{health:-1,charm:1}}
      ]},
      {death:true, text:"维系着你『生命』的核心数据在一次寻常的数据同步中突然湮灭，那个『你』就此彻底消失在了网络之中。", weight:1, cond:c=>worldStateVal(c,"cyberpunk_breakthrough")>=1, cause:"核心湮灭"},
      {text:"突破之后，你处理信息与破解系统的速度快得让同行都自认望尘莫及。", weight:6, cond:c=>worldStateVal(c,"cyberpunk_breakthrough")>=1 && stat(c,"wit")>=8},
      {text:"这些年技术共享的风气在废土上扎了根，你亲眼见证了越来越多据点因此活了下来。", weight:6, cond:c=>worldStateVal(c,"cyberpunk_wastelandInfluence")>=2},
      {text:"技术垂直垄断的格局始终没能打破，你看着弱小的据点一个个在资源匮乏中消亡，心里明白，这终究是竭泽而渔。", weight:6, cond:c=>worldStateVal(c,"cyberpunk_wastelandInfluence")<=-1}
    ]
  },
  steampunk: {
    infant:[
      {text:"你出生时，家里那台老旧的自动摇篮机突然自己发动了起来，摇晃的节奏精准得不像是故障。", weight:10, cond:c=>state.age===0},
      {text:"接生的护士注意到你手心里天生带着一圈细密的齿轮状纹路，啧啧称奇。", weight:8, cond:c=>state.age===0},
      {text:"你出生那天，家里那台老旧的自动摇篮机的齿轮组竟排出了一个谁也说不清含义的奇怪图案。", weight:6, cond:c=>state.age===0},
      {text:"接生的护士发现你手心有一圈奇特的烫伤痕迹，形状竟与某个秘密结社的徽记有几分相似。", weight:6, setFlag:"steampunk_society", cond:c=>state.age===0},
      {text:"你尚在襁褓中，工坊里那台从不出错的自动记账机器，那天却连续算错了七笔账，工人们都觉得诡异。", weight:6, cond:c=>state.age<=1},
      {text:"你出生那天，城里正在举办一场盛大的蒸汽赛车大赛，全城的欢呼声几乎盖过了你的啼哭。", weight:6, cond:c=>state.age===0},
      {text:"接生的护士发现你出生时握紧的小手里，竟不知怎么攥着一枚细小的螺丝钉。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，城中的齿轮迷宫钟楼罕见地提前敲响了正午的钟声，工匠们检查半天也没查出原因。", weight:6, cond:c=>state.age===0},
      {text:"你满月时，家里那台老式留声机突然自己播放起了一段谁也没录过的旋律。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，工坊的老技师提议为你打造一件特制的机械摇篮，你的家人必须决定要不要接受这份『厚礼』。", options:[
        {label:"接受机械摇篮", result:"家人接受了这份厚礼，你自幼便睡在那具特制的机械摇篮里。", statEffect:{wit:1}, setFlag:"steampunk_mech_cradle"},
        {label:"婉拒，用普通摇篮", result:"家人婉拒了这份好意，还是用了寻常的木制摇篮。", statEffect:{charm:1}},
        {label:"折中，只接受部分改装", result:"家人折中地接受了部分改装，摇篮既有新意，又不失踏实。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"到了拜师学艺的年纪，三家铺子都愿意收你做学徒。", options:[{label:"进钟表铺", result:"你进了城里最讲究的钟表铺，那些精密齿轮把你的耐心和巧思都磨了出来。", statEffect:{wit:1}},{label:"进锅炉房", result:"你进了码头的锅炉房，日日挥汗如雨，练出了一身结实的筋骨。", statEffect:{power:1}},{label:"进飞艇码头", result:"你进了飞艇码头做地勤学徒，见惯了大场面，胆识与眼界都不一般。", statEffect:{luck:1}}]},
      {text:"你被镇上的机械工会看中，破格收为学徒，开始学习拆装各种精密仪器。", weight:10},
      {text:"你在一次课堂展示中，把老师布置的简单发条装置改装成了会跳舞的机械玩偶。", weight:8},
      {text:"你偶然结识了一个自称属于某秘密结社的老工匠，对方看你顺眼，教了你几手压箱底的机械绝活。", weight:6},
      {text:"你在工坊里第一次亲手组装出了一台简陋的自动人偶，虽然只会走几步路，却让你信心大增。", weight:6},
      {text:"你目睹了一场因阶级矛盾引发的工人骚乱，那种压抑的氛围让你第一次思考起了公平二字。", weight:6},
      {choice:true, weight:6, text:"工程师协会让你选择专精方向：动力核心、精密仪器还是自动人偶，这将决定你的职业道路。", options:[
        {label:"动力核心方向", result:"你选择了动力核心方向，从此和各类锅炉、引擎打上了交道。", statEffect:{power:2}},
        {label:"精密仪器方向", result:"你选择了精密仪器方向，一手拆装的功夫日渐精进。", statEffect:{wit:2}},
        {label:"自动人偶方向", result:"你选择了自动人偶方向，做出的人偶总带着一种说不出的灵气。", statEffect:{charm:2}}
      ]},
      {text:"你亲眼目睹了一场因自动化机械普及而引发的工人失业风潮，这让你对『进步』二字有了复杂的思考。", weight:6},
      {text:"你在一次意外中失去了半只手臂，装上机械义肢后，反倒觉得自己更加得心应手。", weight:6, statEffect:{power:1,health:-1}},
      {text:"你受邀参加了一场上流社会的蒸汽朋克主题舞会，虽然格格不入，却也因此结识了几位贵人。", weight:6, setFlag:"steampunk_ball"},
      {text:"你加入了城里发明家们组织的沙龙聚会，在那里第一次见识到了真正天马行空的奇思妙想。", weight:6, setFlag:"steampunk_salon"},
      {text:"你自幼睡在那具特制的机械摇篮里，对机械构造有种旁人没有的天然亲近感。", weight:6, cond:c=>hasFlag(c,"steampunk_mech_cradle"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"你在一场发明家聚会上夸下海口：要造出一台能载人飞出大气层的蒸汽方舟——满座哄笑，只有你自己是认真的。", weight:5, setFlag:"steampunk_quest1"},
      {choice:true, weight:6, text:"你的学徒造出了一台谁也没见过的个人飞行器，兴冲冲地递上了试飞申请。", options:[{label:"亲自陪她完成首飞", result:"你亲自坐上了副驾陪她首飞，落地的那一刻，整个工坊的欢呼声掀翻了屋顶。", statEffect:{luck:1}, setFlag:"steampunk_apprentice"},{label:"批准单飞，地面守望", result:"你批准了单飞申请，自己在地面攥着望远镜守了全程——她飞得比你想象的还稳。", statEffect:{wit:1}},{label:"驳回申请，再改三稿", result:"你驳回了申请，逼着她把设计又改了三稿——后来她承认，第三稿救了她的命。", statEffect:{wit:1}}]},
      {text:"你把自家工坊的蒸汽管道重新排布了一遍，效率提升之余，运转的声音也变得像一首规律的小步舞曲。", weight:6},
      {text:"你正式取得了工程师协会颁发的「持证机师」资格证，开始独立承接各类机械委托。", weight:10, achievement:"持证机师"},
      {text:"议会的一位大臣似乎对你的机械造诣格外忌惮，暗中派人打探你的底细。", weight:8},
      {text:"为你的一台发明申请专利时，你发现竟有人抢先注册了几乎一样的设计，一场官司随之而来。", weight:6},
      {text:"城里最重要的一台蒸汽核心装置突然失窃，各方都怀疑到了你的头上，你必须自证清白。", weight:6},
      {text:"你早年结识的那位秘密结社的老工匠找上门来，邀请你正式加入组织，一同对抗某些不公。", weight:6, cond:c=>hasFlag(c,"steampunk_society"), setFlag:"steampunk_joined"},
      {choice:true, weight:6, text:"秘密结社希望你利用职务之便，暗中破坏一批本该压榨工人的新机械，你要不要答应？", cond:c=>hasFlag(c,"steampunk_joined"), options:[
        {label:"答应破坏，站在工人这一边", result:"你答应了这个请求，冒险破坏了那批机械，工人们虽不知情，却也因此免受了一场盘剥。", statEffect:{charm:1,luck:-1}, achievement:"齿轮下的良心"},
        {label:"拒绝违规，另想合法的办法", result:"你拒绝了这种破坏性的手段，转而想办法通过合法途径为工人争取权益，虽然慢，却也走得踏实。", statEffect:{wit:1}},
        {label:"举报结社，明哲保身", result:"你选择了举报这个秘密结社，虽然保住了自己的位置，却也从此在心里留下了一道说不清的裂痕。", statEffect:{luck:-2}}
      ]},
      {death:true, text:"一次锅炉过载实验中，你来不及疏散便被爆炸的蒸汽洪流吞没。", weight:1, cause:"锅炉过载"},
      {text:"你受邀参加了皇家科学展会，你展示的发明获得了评委的一致好评，一时风头无两。", weight:6},
      {text:"你参加了城里的蒸汽赛车大赛，驾驶着自己改装的赛车一路狂飙，最终险胜夺冠。", weight:6},
      {choice:true, weight:6, text:"议会请你评估是否该批准一项可能取代大量人力的自动化提案。", options:[
        {label:"支持提案，效率优先", result:"你支持了这项提案，主张效率优先，工厂的产量因此大增，只是不少工人为此丢了饭碗。", statEffect:{wealth:1}},
        {label:"反对，保护工人饭碗", result:"你反对了这项提案，主张保护工人的饭碗，这份立场为你在工人中赢得了不少好感。", statEffect:{charm:1}},
        {label:"提议渐进推行", result:"你提议渐进式推行这项提案，给工人留出转型的时间，这份周全让各方都能接受。", statEffect:{wit:1}}
      ]},
      {text:"你参与设计了城市新一条铁路线的建造方案，虽然过程波折不断，最终却也顺利通车。", weight:6, setFlag:"steampunk_railway"},
      {text:"当年在舞会上结识的那位贵人，如今主动伸出援手，帮你解决了一桩棘手的麻烦，还顺带为你引荐了几位有分量的人物。", weight:6, cond:c=>hasFlag(c,"steampunk_ball"), statEffect:{charm:1,wealth:1}},
      {text:"你在那场发明家沙龙里展示的一项发明，意外引来了王室代表的关注。", weight:6, cond:c=>hasFlag(c,"steampunk_salon")},
      {text:"你运送货物途中遭遇了一伙拦路的强盗，对方明显是有备而来。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你操起随身的扳手三两下就打退了对方，还顺手缴获了他们的赃物。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过这伙强盗，只能交出货物才换来平安脱身。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番讨价还价，你留下了一小部分货物，双方总算相安无事地分开。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"三十年的图纸、失败和债务之后，蒸汽方舟『信念号』终于矗立在了你的工坊后院——只差一次点火。", weight:12, cond:c=>hasFlag(c,"steampunk_quest1"), setFlag:"steampunk_quest2"},
      {text:"一位环球飞行归来的老飞艇长信誓旦旦地说，他在极北的云层之上见过一座漂浮的黄金宫殿，殿前站着身披兽皮的持斧巨人。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你出资赞助的一届发明博览会大获成功，城里的报纸把你称作『点燃这座城市想象力的人』。", weight:6, cond:c=>stat(c,"wealth")>=8, statEffect:{charm:1}},
      {text:"你设计的一台全新型号飞艇引擎震惊了整个工程师协会，订单如雪片般飞来。", weight:10, cond:c=>stat(c,"wit")>=7 || transcendRank(c)>=1, achievement:"飞艇引擎大师"},
      {text:"你受邀加入了城市议会的技术顾问团，参与制定新一代基础设施的建造标准。", weight:8},
      {choice:true, weight:6, text:"城市就『工业化的红利该由资本方独享还是与工人共享』产生了分歧。", options:[
        {label:"支持与工人共享", result:"你支持了红利共享的方案，工人的日子渐渐好过了起来，城市也因此更加安定。", statEffect:{charm:1}, worldStateKey:"steampunk_cityInfluence", worldStateDelta:2},
        {label:"支持资本独享", result:"你支持了资本独享的方案，投资者赚得更多了，只是工人的处境却愈发艰难。", statEffect:{wealth:1}, worldStateKey:"steampunk_cityInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"那场专利官司最终以你的胜利告终，你也因此在工程师协会里赢得了『敢较真』的名声。", weight:6},
      {text:"你查清了蒸汽核心失窃案的真凶，还因此揭开了城中权贵一段不为人知的秘密交易。", weight:6},
      {text:"你才发现秘密结社的宗旨远比你想象的更加宏大——他们想要的是彻底改变这个阶级分明的世界。", weight:6, cond:c=>hasFlag(c,"steampunk_joined"), achievement:"齿轮同盟"},
      {choice:true, weight:6, text:"议会就『是否放宽机械专利保护期限』征询你的意见。", options:[
        {label:"支持放宽，普惠大众", result:"你支持放宽专利保护期限，让更多人能用上新技术，这份大方让你在民间口碑极佳。", statEffect:{charm:2}},
        {label:"反对放宽，保护发明者权益", result:"你反对放宽，主张保护发明者的权益，此举在工程师协会内部很受支持。", statEffect:{wealth:1}},
        {label:"提议设立分级制度", result:"你提议设立分级制度，按发明的重要程度区别对待，这份周全的考量让各方都挑不出毛病。", statEffect:{wit:1}}
      ]},
      {text:"你成立了一间专门帮助失业工人转型学习机械技术的培训所，帮不少人重新找到了活路。", weight:6},
      {text:"你受邀成为皇家科学院的荣誉顾问，你的意见开始真正影响到国家的技术政策。", weight:6},
      {text:"那条你参与设计的铁路线如今已经成了城市的经济命脉，你也因此被誉为『铁路先驱』。", weight:6, cond:c=>hasFlag(c,"steampunk_railway")},
      {text:"你受邀成为发明家沙龙的常任主席，往后每一届聚会都由你来主持评选最佳发明。", weight:6, cond:c=>hasFlag(c,"steampunk_salon")}
    ],
    elder:[
      {choice:true, weight:40, text:"停摆的那一秒被你握在手心——踏进时间之外，或留在滴答声里。", cond:c=>!hasFlag(c,"steampunk_gate_closed") && hasFlag(c,"steampunk_beyond2") && hasTag(c,"steampunk_destiny") && worldStateVal(c,"steampunk_breakthrough")>=3, options:[{label:"踏入时间之外", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"steampunk_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"steampunk_gate_closed"}]},
      {text:"永恒机枢完全同步的那个午夜，所有钟表同时停了一秒——那一秒里，你看见了时间之外的门。", weight:18, cond:c=>hasFlag(c,"steampunk_beyond1") && worldStateVal(c,"steampunk_breakthrough")>=3, setFlag:"steampunk_beyond2"},
      {text:"你的机械心脏某夜突然漏跳了一拍——那一拍的间隙里，你听见了齿轮之外的声音。", weight:12, cond:c=>hasTag(c,"steampunk_destiny") && worldStateVal(c,"steampunk_breakthrough")>=2, setFlag:"steampunk_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"发条不朽者的岁月里，你发现自己的机械心脏在自发地重构——它在朝着传说中的『永恒机枢』演化。", cond:c=>worldStateVal(c,"steampunk_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"完成永恒机枢", riskyChance:0.13, lifespanBonus:90, successEffect:{wit:4,power:2}, successResult:"永恒机枢成型——你胸腔里的滴答声从此与这座城市所有钟表同步，钟表匠们说，你成了『时间本身的零件』。", successAchievement:"触及法则", worldStateKey:"steampunk_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"机枢崩坏", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"『信念号』的锅炉已经预热完毕，全城的人都来围观这场『世纪笑话』——舱门开着，就看你敢不敢坐进去。", cond:c=>hasFlag(c,"steampunk_quest2"), options:[{label:"登舱，点火", riskyChance:0.4, lifespanBonus:12, successEffect:{wit:3,charm:3}, successResult:"轰鸣声中，『信念号』拖着长长的蒸汽尾迹刺破云层——当你从舷窗看到那颗蓝色星球的弧线时，全城的嘲笑声都变成了欢呼。", successAchievement:"毕生所求", failResult:"『信念号』在突破云层时解体了——人们在残骸里找到你时，你的手还握着操纵杆，嘴角带着笑。", failDeath:true, failDeathChance:0.32, failCause:"方舟解体", regressResult:"点火后第三分钟锅炉压力失控，你紧急迫降在了城外的麦田里——『信念号』烧成了骨架，你断了三根肋骨。", regressEffect:{health:-2,wealth:-2}},{label:"让无人配重舱先飞", result:"你放弃了亲自登舱，改用配重舱完成了首飞——『信念号』成功了，报纸却写道：『它的设计者没敢坐进去。』你不在乎。", statEffect:{wit:2}}]},
      {choice:true, weight:30, repeatable:true, text:"核心置换多年后，那位发明家带来了她毕生的杰作——『发条不朽者』改造：将全身逐步替换为精密机械，成为真正意义上的不朽造物。", cond:c=>worldStateVal(c,"steampunk_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?54:60) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"接受发条不朽者改造", riskyChance:0.18, lifespanBonus:55, successEffect:{power:3,wit:3}, successResult:"改造成功——你听着自己胸腔里精密齿轮的滴答声，忽然明白了什么叫『时间在为你转动』。", successAchievement:"二度超脱", worldStateKey:"steampunk_breakthrough", worldStateDelta:1, failResult:"改造进行到最后一根主发条时出现了致命偏差，你所有的齿轮在同一瞬间停摆。", failDeath:true, failDeathChance:0.5, failCause:"齿轮停摆", regressResult:"改造中途被迫中止，你保住了性命，但半机械化的身体留下了永久的隐患。", regressEffect:{health:-3,power:-2}, regressLifespanPenalty:22},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你晚年把工坊改成了小小的展览馆，孩子们隔着玻璃看那些黄铜齿轮转动，眼睛亮得像星星。", weight:6},
      {text:"当年那名你陪着完成首飞的学徒，如今已是皇家飞艇设计院的院长，她的成名作机翼上刻着你们两个人的名字。", weight:6, cond:c=>hasFlag(c,"steampunk_apprentice"), statEffect:{charm:1}},
      {text:"你把毕生的设计图纸整理成册，捐赠给了工程师协会的档案馆，供后人学习钻研。", weight:10},
      {text:"你在自家工坊里安享晚年，时常有慕名而来的年轻学徒登门求教。", weight:8},
      {text:"你把那台自己组装的第一台自动人偶重新翻新了一遍，摆在工坊最显眼的位置，当作对年轻时光的纪念。", weight:6},
      {text:"你把秘密结社这些年推动的种种改革一一记录下来，希望后人能看清这段不为人知的历史。", weight:6, cond:c=>hasFlag(c,"steampunk_joined")},
      {text:"你把自己那双陪伴多年的机械义肢捐赠给了博物馆，作为这个蒸汽时代的一份见证。", weight:6},
      {text:"你晚年时常去看蒸汽赛车比赛，虽然不再亲自下场，眼神里的热情却丝毫未减。", weight:6},
      {text:"你把自己参与设计铁路建设的全部图纸和心得整理成册，捐赠给了城市档案馆。", weight:6, cond:c=>hasFlag(c,"steampunk_railway")},
      {text:"你晚年时常受邀出席发明家沙龙的纪念活动，虽然不再亲自发明，眼神里的热忱却丝毫未减。", weight:6, cond:c=>hasFlag(c,"steampunk_salon")},
      {choice:true, weight:5, repeatable:true, text:"一位神秘的发明家提出为你置换一颗改良型蒸汽核心，或许能让你的身体重新运转起来——但置换手术风险不小。", cond:c=>worldStateVal(c,"steampunk_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:54) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?7:10)), options:[
        {label:"冒险接受核心置换", riskyChance:0.35, lifespanBonus:35, successEffect:{power:10,wit:4,health:2},
         successResult:"核心置换在生死边缘完成了，崭新的蒸汽核心让你的身体重新焕发出了活力，手脚也比从前灵便了不少。", successAchievement:"突破天命", worldStateKey:"steampunk_breakthrough", worldStateDelta:1,
         failResult:"置换过程中核心骤然过载爆炸，你甚至没能来得及喊出一声。", failDeath:true, failDeathChance:0.5, failCause:"核心过载",
         regressResult:"置换过程中核心骤然过载，你侥幸没有被炸得粉身碎骨，只是这具身体从此落下了挥之不去的隐患。", regressEffect:{power:-2,health:-2}, regressLifespanPenalty:5},
        {label:"只进行保养式微调", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只进行了保守的保养式微调，效果有限，却也稳妥地延长了几年寿命。",
         failResult:"这次微调没什么明显效果，好在风险不大。"},
        {label:"拒绝置换，以旧核心终老", result:"你拒绝了这次置换，决定带着这颗陪伴多年的旧核心走完这一生。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"你留下的最后一项发明还未完工，你必须决定这份图纸的归宿。", options:[
        {label:"交给最信任的学徒继续完成", result:"你把图纸交给了最信任的学徒，看着他接过重担，你心里满是欣慰。", statEffect:{charm:1}},
        {label:"捐给工程师协会公开", result:"你把图纸捐给了工程师协会公开，希望能有更多人在此基础上继续钻研。", statEffect:{wit:1}},
        {label:"带进坟墓，谁也不给", result:"你选择把这份图纸带进坟墓，谁也不给——有些秘密，你想留给自己。", statEffect:{luck:1}}
      ]},
      {death:true, text:"置换的那颗蒸汽核心终究撑不住经年累月的运转，在某个寻常的清晨悄然停摆，带走了你的生命。", weight:1, cond:c=>worldStateVal(c,"steampunk_breakthrough")>=1, cause:"核心衰竭"},
      {text:"突破之后，你对机械构造的理解已经近乎直觉，随手一摆弄就能看出零件里藏着的毛病。", weight:6, cond:c=>worldStateVal(c,"steampunk_breakthrough")>=1 && stat(c,"wit")>=8},
      {text:"这些年工业化的红利渐渐流向了普通工人，你亲眼见证了这座城市因此变得更加繁荣安定。", weight:6, cond:c=>worldStateVal(c,"steampunk_cityInfluence")>=2},
      {text:"工业化的红利始终被少数人独享，你看着城市里的贫富差距越拉越大，心里明白，这终究埋下了动荡的种子。", weight:6, cond:c=>worldStateVal(c,"steampunk_cityInfluence")<=-1}
    ]
  },
  zombie: {
    infant:[
      {text:"你出生的那一刻，避难所的丧尸警报恰好解除，大人们都说这是个好兆头。", weight:10, cond:c=>state.age===0},
      {text:"你从小就对丧尸的低吼声毫不畏惧，反倒盯着铁栅栏外的丧尸看得津津有味。", weight:8},
      {text:"你出生后医生发现你的血液样本对丧尸病毒呈现出一种从未见过的中间态反应，档案上特别标注了『观察对象』。", weight:6, setFlag:"zombie_bloodtype", cond:c=>state.age===0},
      {text:"避难所里唯一的婴儿哭声，反倒让附近游荡的丧尸群安静了下来，没人能解释这是为什么。", weight:6},
      {text:"你出生那天，营地仅存的一批疫苗恰好被证实彻底失效，医生们都说，你这孩子的命，是硬闯出来的。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，避难所外的变异植物群突然集体绽放出了诡异的荧光，持续了整整一夜才消散。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，营地的老式无线电意外收到了一段来自远方的求救信号，此后再未响起过。", weight:6, setFlag:"zombie_signal", cond:c=>state.age===0},
      {text:"你出生时，营地的老式广播站正在播报一段关于安全区域的最新消息，你的第一声啼哭恰好被录了进去。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，营地新发现了一处隐蔽的旧避难所，物资的意外发现让所有人都松了口气。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你出生那天，营地的医疗组提议提前给你注射一剂尚在试验阶段的疫苗，你的监护人必须做出选择。", options:[
        {label:"同意注射试验疫苗", result:"监护人同意了这次注射，那剂试验疫苗从此留在了你的体内。", statEffect:{health:1,luck:-1}, setFlag:"zombie_early_vaccine"},
        {label:"拒绝，等成熟疫苗上市", result:"监护人拒绝了这次注射，决定等更成熟的疫苗问世再说。", statEffect:{luck:1}},
        {label:"申请先观察几个月", result:"监护人申请先观察几个月的反应，再做最终的决定。", statEffect:{wit:1}}
      ], cond:c=>state.age===0}
    ],
    youth:[
      {choice:true, weight:6, text:"营地按特长重新分工，管事的问你想去哪一组。", options:[{label:"加入侦察队", result:"你加入了外出的侦察队，练出了一身在废墟间穿行的好本事，也攒下了几分乱世里的运气。", statEffect:{luck:1}},{label:"加入种植园", result:"你加入了营地的种植园，日出而作，日落而息，身体反倒比末世前更结实了。", statEffect:{health:1}},{label:"加入瞭望塔", result:"你上了瞭望塔做观察员，练就了一双从蛛丝马迹里读出危险的眼睛。", statEffect:{wit:1}}]},
      {text:"你被幸存者营地选中，加入了少年侦察队，学习如何在废墟中安静地行动。", weight:10},
      {text:"你在一次物资搜寻任务中，独自应对了一只丧尸的偷袭，全须全尾地回到了营地。", weight:8},
      {text:"你在一次物资争夺中侥幸活了下来，也第一次真切地感受到了幸存者之间同样残酷的竞争。", weight:6},
      {text:"你无意间发现营地的科研人员在偷偷进行丧尸驯化实验，这件事让你彻夜难以入眠。", weight:6, setFlag:"zombie_experiment"},
      {text:"你被一位年长的幸存者教会了辨认变异丧尸的技巧，对方却在教会你之后不久就消失了，再没人见过他。", weight:6},
      {choice:true, weight:6, text:"营地让你选择专精方向：侦察兵、重火力还是医疗兵，这将决定你在队伍中的定位。", options:[
        {label:"侦察兵", result:"你选择了侦察兵，练出了一双能提前察觉危险的敏锐直觉。", statEffect:{luck:2}},
        {label:"重火力", result:"你选择了重火力，扛起武器就是队伍里最让人安心的存在。", statEffect:{power:2}},
        {label:"医疗兵", result:"你选择了医疗兵，从此不少人的命都是从你手里捡回来的。", statEffect:{health:2}}
      ]},
      {text:"你在幸存者之间的交易市场上第一次做成了一笔买卖，虽然吃了点小亏，却也长了见识。", weight:6},
      {text:"你偶尔会闪回起病毒爆发前的记忆片段，那些片段模糊却珍贵，是你为数不多的慰藉。", weight:6, setFlag:"zombie_flashback"},
      {text:"你无意间发现了一处从未被人找到的物资囤积点，虽然被要求上报，你却偷偷藏起了一小部分。", weight:6, setFlag:"zombie_hoard"},
      {text:"你跟着营地的科研人员参与了一次丧尸解剖研究，那种直面真相的过程让你彻夜难眠。", weight:6},
      {text:"当年那剂试验疫苗似乎起了作用，你对病毒感染的抵抗力明显强于同龄的孩子。", weight:6, cond:c=>hasFlag(c,"zombie_early_vaccine"), statEffect:{health:1}}
    ],
    adult:[
      {text:"一个弥留的旅人向你描述了『净土』——一片病毒从未触及的山谷，有溪流、麦田和不用设岗哨的夜晚。所有人都说那是临终的呓语，你却记了下来。", weight:5, setFlag:"zombie_quest1"},
      {choice:true, weight:6, text:"巡逻时你发现一名被咬伤却迟迟没有变异的幸存者，蜷在废车底下发抖。", options:[{label:"带回营地隔离观察", result:"你顶着队友的反对把他带回了隔离区观察——七天过去，他依然是人。", statEffect:{charm:1}, setFlag:"zombie_immune"},{label:"留下补给，远远指路", result:"你留下了一份补给，远远给他指了另一处营地的方向——各安天命吧。", statEffect:{luck:1}},{label:"鸣枪驱离", result:"你朝天鸣了一枪把他驱离了——规矩就是规矩，被咬就是被咬。", statEffect:{power:1}}]},
      {text:"你在废墟里翻出了一台还能用的老式留声机，那晚整个营地围着它安静地听了一夜旧世界的歌。", weight:6},
      {text:"你正式成为营地的核心战斗员，肩负起了每一次外出搜寻任务的安全重任。", weight:10, achievement:"核心战斗员"},
      {text:"营地里流传着一种未知变异丧尸的消息，所有人都隐隐觉得这与你有关。", weight:8},
      {text:"你曾经信任的一位幸存者伙伴，为了自己活命而出卖了整支队伍，你侥幸逃过一劫，却也从此不再轻信旁人。", weight:6, setFlag:"zombie_betrayal"},
      {text:"你亲眼目睹了那项丧尸驯化实验的『成果』——一只勉强听命的丧尸，这个发现让整个营地陷入了争论。", weight:6, cond:c=>hasFlag(c,"zombie_experiment")},
      {text:"你的血液被证实真的携带某种特殊抗体，营地的医生请求抽取更多血样用于研究疫苗。", weight:6, cond:c=>hasFlag(c,"zombie_bloodtype")},
      {choice:true, weight:6, text:"你终于找到了当年出卖队伍那个人的下落，他如今就在附近的另一处营地苟且求生。", cond:c=>hasFlag(c,"zombie_betrayal"), options:[
        {label:"找上门去，讨一个说法", result:"你找上门去讨了个说法，对方吓得瘫软在地——你到底还是没能下得去手，只是撂下一句话就转身离开了。", statEffect:{charm:-1,luck:1}},
        {label:"放下过去，不再追究", result:"你最终选择了放下这段过去，不再追究，日子还长，没必要困在旧仇里。", statEffect:{luck:1}},
        {label:"暗中举报，让他为过去负责", result:"你暗中把他的下落透露给了当年幸存者的家属，剩下的事，你选择不再插手。", statEffect:{wit:1,charm:-1}}
      ]},
      {death:true, text:"一次外出搜寻物资时，你被数量庞大的丧尸群团团围住，寡不敌众。", weight:1, cause:"力竭殒命"},
      {choice:true, weight:6, text:"营地议事会就『是否接纳一批陌生的幸存者』征询你的意见。", options:[
        {label:"支持接纳，人多力量大", result:"你支持接纳了这批陌生的幸存者，人多力量大，营地的防御也因此更加牢固。", statEffect:{charm:2}},
        {label:"反对接纳，资源有限", result:"你反对了这个提议，主张资源有限、优先自保，这份谨慎虽不讨喜，却也不无道理。", statEffect:{wealth:1}},
        {label:"提议先隔离观察", result:"你提议先隔离观察一段时间再做决定，这份周全考虑最终成了营地处理类似问题的惯例。", statEffect:{wit:1}}
      ]},
      {text:"你带队追寻当年那段求救信号的来源，虽然最终一无所获，却也因此发现了一片未被污染的净土。", weight:6, cond:c=>hasFlag(c,"zombie_signal"), setFlag:"zombie_haven"},
      {text:"你在幸存者交易市场上凭着精明的头脑积累了不小的资源，渐渐成了市场里说得上话的人物。", weight:6},
      {text:"你被任命为营地广播站的负责人，每天的播报渐渐成了所有幸存者一天中最期待的时刻。", weight:6, setFlag:"zombie_broadcast"},
      {text:"你偷藏物资的事情最终被人发现，营地为此展开了一场关于『个人与集体』的激烈讨论。", weight:6, cond:c=>hasFlag(c,"zombie_hoard"), setFlag:"zombie_debate"},
      {text:"你外出搜寻物资时遭遇了一伙同样在抢物资的陌生幸存者，双方剑拔弩张。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你的战斗力压制住了对方，物资全部归了你，倒也算是意外的收获。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过对方，只能眼看着到手的物资又被抢走，还受了点轻伤。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"双方权衡了一下，最终分了一半物资，谁也没占到便宜。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"多年来你比对了上百条线索，『净土』的位置在地图上收敛成了一个小小的圆圈——穿过三百公里的重感染区就能抵达。", weight:12, cond:c=>hasFlag(c,"zombie_quest1"), setFlag:"zombie_quest2"},
      {text:"你在一座废弃实验室的研究日志里读到一行奇怪的记录：『样本对灵气浓度的变化表现出显著应激反应』——灵气？这个词在末世的实验室里显得无比突兀。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你连续三年没有生过一场大病，营地的医生半开玩笑地说要抽你的血样好好研究研究。", weight:6, cond:c=>stat(c,"health")>=8 || transcendRank(c)>=1, statEffect:{health:1}},
      {text:"你带队清剿了盘踞在城郊多年的丧尸巢穴，为营地扩张争取到了宝贵的空间。", weight:10, cond:c=>stat(c,"power")>=7 || transcendRank(c)>=1, achievement:"巢穴清剿者"},
      {text:"你建立起了一套完整的哨戒体系，让营地的夜晚第一次有了真正意义上的安宁。", weight:8},
      {choice:true, weight:6, text:"营地联盟就『物资该集中调配还是各营地自治』产生了分歧。", options:[
        {label:"支持集中调配", result:"你支持了集中调配的方案，弱小的营地因此得到了救济，联盟也变得更加团结。", statEffect:{charm:1}, worldStateKey:"zombie_campInfluence", worldStateDelta:2},
        {label:"支持各自为政", result:"你支持了各营地自治，强大的营地日子过得更好了，弱小的营地却愈发朝不保夕。", statEffect:{wealth:1}, worldStateKey:"zombie_campInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"基于你血液研发的初代疫苗终于问世，虽然还不完美，却已经能大幅降低感染几率。", weight:6, cond:c=>hasFlag(c,"zombie_bloodtype"), achievement:"血液里的希望", statEffect:{charm:1}},
      {text:"那场关于丧尸驯化实验的争论最终以销毁实验体告终，你也因为立场鲜明而在营地里树立了威望。", weight:6, cond:c=>hasFlag(c,"zombie_experiment")},
      {text:"你把那片发现的净土开发成了营地的新家园，带着幸存者们迁移过去，日子渐渐好转了起来。", weight:6, cond:c=>hasFlag(c,"zombie_haven")},
      {text:"你那些关于病毒爆发前的记忆闪回渐渐拼凑出了完整的画面，你把它们讲述给了年轻一代。", weight:6, cond:c=>hasFlag(c,"zombie_flashback")},
      {text:"你主持的广播站如今已经成了周边几个营地共享的信息枢纽，你的声音成了这片废墟里的一份安心。", weight:6, cond:c=>hasFlag(c,"zombie_broadcast")},
      {choice:true, weight:6, text:"你发现营地首领私藏了一批本该分配的物资。", options:[
        {label:"当面揭发", result:"你当面揭发了这件事，虽然因此和首领结下了梁子，营地的物资分配却也从此透明了不少。", statEffect:{charm:1,power:-1}},
        {label:"私下劝谏", result:"你私下找首领劝谏了一番，这份体面的处理方式，倒也让事情悄悄有了转变。", statEffect:{wit:1}},
