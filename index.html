        {label:"睁一只眼闭一只眼", result:"你选择了睁一只眼闭一只眼，不想惹上这桩麻烦事，心里却也留了个疙瘩。", statEffect:{luck:-1}}
      ]},
      {text:"那场关于『个人与集体』的讨论最终推动营地制定了更公平的物资分配制度，你也算是因祸得福。", weight:6, cond:c=>hasFlag(c,"zombie_debate")},
      {choice:true, weight:6, text:"营地决定要不要把你多年搜集的稀有物资分一部分给邻近的另一个营地，你需要表态。", options:[
        {label:"支持分享，共渡难关", result:"你支持了分享，两个营地因此结下了共渡难关的情分。", statEffect:{charm:2}},
        {label:"反对分享，自己人优先", result:"你反对了分享，主张自己人优先，这份现实虽不讨喜，却也保住了营地的根基。", statEffect:{wealth:1}},
        {label:"提议以物换物", result:"你提议以物换物，两边各取所需，这份精明让营地里的人对你更加信服。", statEffect:{wit:1}}
      ]}
    ],
    elder:[
      {choice:true, weight:40, text:"半开的门后透出崭新的光——那里没有病毒，没有旧人类与新人类之分。", cond:c=>!hasFlag(c,"zombie_gate_closed") && hasFlag(c,"zombie_beyond2") && hasTag(c,"zombie_destiny") && worldStateVal(c,"zombie_breakthrough")>=3, options:[{label:"推开那扇门", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"zombie_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"zombie_gate_closed"}]},
      {text:"物种跃迁完成的清晨，你看见了别人看不见的东西——世界的边缘处，立着一扇半开的门。", weight:18, cond:c=>hasFlag(c,"zombie_beyond1") && worldStateVal(c,"zombie_breakthrough")>=3, setFlag:"zombie_beyond2"},
      {text:"共生体在你血液里突然安静了下来——然后你听见它用你自己的声音说：有什么东西，在墙的外面。", weight:12, cond:c=>hasTag(c,"zombie_destiny") && worldStateVal(c,"zombie_breakthrough")>=2, setFlag:"zombie_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"病毒共生多年后，你体内的平衡演化出了全新的东西——医生颤抖着说：这不是感染，这是『下一个物种』的雏形。", cond:c=>worldStateVal(c,"zombie_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"完成物种跃迁", riskyChance:0.13, lifespanBonus:90, successEffect:{health:4,power:2}, successResult:"跃迁完成——你成了旧人类与新世界之间的第一座桥梁，营地的孩子们身上，开始出现与你同源的稳定突变。", successAchievement:"触及法则", worldStateKey:"zombie_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"跃迁失败", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"营地里愿意跟你走的有三十七个人——三百公里的重感染区横在面前，是带他们去赌那个传说，还是让传说继续只是传说？", cond:c=>hasFlag(c,"zombie_quest2"), options:[{label:"带队穿越感染区", riskyChance:0.42, lifespanBonus:15, successEffect:{charm:4,luck:2}, successResult:"第十九天的黎明，走在最前面的孩子突然停住了脚步——山谷里，真的有溪流，有野麦，有一整片没有嘶吼声的寂静。有人跪下来哭了，你只是回头数了数：三十七个，一个不少。", successAchievement:"毕生所求", failResult:"感染区的规模远超所有情报——你把最后一发信号弹交给队伍里最年轻的人，独自引开了尸潮。", failDeath:true, failDeathChance:0.32, failCause:"引开尸潮", regressResult:"穿越在第九天被迫中止，你们退回了营地，减员四人——此后再没有人提起净土，包括你。", regressEffect:{charm:-1,health:-2}},{label:"只把地图传下去", result:"你把毕生整理的地图交给了营地档案室，附了一句话：『等世界再好一点，替我去看看。』", statEffect:{wit:1,charm:1}}]},
      {choice:true, weight:30, repeatable:true, text:"血清之后，研究员提出了最疯狂的设想——『共生计划』：主动引入弱化病毒与你的免疫系统共生，理论上能获得感染者的生命力而不失去人性。", cond:c=>worldStateVal(c,"zombie_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?50:56) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"接受病毒共生", riskyChance:0.15, lifespanBonus:40, successEffect:{power:3,health:3}, successResult:"共生成功——病毒与你的身体达成了微妙的平衡，你获得了远超常人的生命力，眼睛在黑暗中会泛起微光，但你还是你。", successAchievement:"二度超脱", worldStateKey:"zombie_breakthrough", worldStateDelta:1, failResult:"共生在第七天失控，你在意识彻底消散前，请战友对你扣下了扳机。", failDeath:true, failDeathChance:0.6, failCause:"共生失败", regressResult:"共生失败被紧急清除，你保住了人性，但免疫系统遭受重创。", regressEffect:{health:-4}, regressLifespanPenalty:18},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你在营地的墙上画满了旧世界的城市天际线，年轻人总爱指着问，哪一栋楼里有过你的故事。", weight:6},
      {text:"当年那名被你带回的幸存者体内的抗体，最终成了血清研究的关键突破口——营地的医生说，你那天的决定救了后来的所有人。", weight:6, cond:c=>hasFlag(c,"zombie_immune"), statEffect:{luck:1}},
      {text:"你把这些年摸索出的求生经验编写成册，成为新一代幸存者人手一份的生存手册。", weight:10},
      {text:"你在自己一手建起的安全区里安享晚年，看着当年的废墟渐渐重新长出了绿意。", weight:8},
      {text:"以你血液为基础研发的疫苗如今已经推广开来，你从没想过自己会以这种方式『拯救』了这么多人。", weight:6, cond:c=>hasFlag(c,"zombie_bloodtype")},
      {text:"你在安全区的晚年生活里，偶尔还会想起那个消失的老幸存者，希望他在某个地方，也活得还算好。", weight:6},
      {text:"你在新家园的门前种满了当年那种诡异发光的变异植物，如今看来，倒也算是一种别样的风景。", weight:6},
      {text:"你把自己关于旧世界的记忆一点一点讲给了孩子们，成了营地里活着的历史书。", weight:6, cond:c=>hasFlag(c,"zombie_flashback")},
      {text:"你把自己主持广播站这些年积累的经验记录下来，交给了接替你的年轻播音员。", weight:6, cond:c=>hasFlag(c,"zombie_broadcast")},
      {text:"你晚年时常想起当年那场关于物资分配的讨论，觉得那或许是自己这一生做得最有意义的一件事。", weight:6, cond:c=>hasFlag(c,"zombie_debate")},
      {choice:true, weight:5, repeatable:true, text:"营地的科研人员提出了两套截然不同的延寿方案——一套是注射尚在实验阶段的特殊血清，另一套是尝试连接感染者的集体潜意识、以虫群思维的方式续命，两者的副作用都完全未知。", cond:c=>worldStateVal(c,"zombie_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:51) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?7:10)), options:[
        {label:"冒险注射实验血清", riskyChance:0.3, lifespanBonus:30, successEffect:{power:10,health:4,luck:2},
         successResult:"血清在你体内发挥出了惊人的效果，你的身体状况大幅改善，力量与耐力都远超从前，寿命也因此大大延长。", successAchievement:"突破天命", worldStateKey:"zombie_breakthrough", worldStateDelta:1,
         failResult:"血清的副作用瞬间爆发，你的身体机能急速崩溃，抢救都来不及。", failDeath:true, failDeathChance:0.65, failCause:"血清崩溃",
         regressResult:"血清的副作用瞬间爆发，你侥幸没有当场崩溃，只是这具身体从此落下了难以恢复的病根。", regressEffect:{power:-2,health:-2}, regressLifespanPenalty:5},
        {label:"尝试连接感染者的集体潜意识", riskyChance:0.3, lifespanBonus:30, successEffect:{wit:10,luck:4,charm:2},
         successResult:"你的意识与那片庞大的感染者集体潜意识彻底连接，仿佛化身为虫群思维的一部分，你的『生命』以一种诡异却真实的方式延续下去，对危险的感知也变得异常敏锐。", successAchievement:"突破天命", worldStateKey:"zombie_breakthrough", worldStateDelta:1,
         failResult:"集体意识的浪潮瞬间将你的自我意识彻底吞没，你的身体虽然还在，那个『你』却再也没有回来。", failDeath:true, failDeathChance:0.65, failCause:"意识吞噬",
         regressResult:"集体意识的浪潮几乎将你的自我意识彻底吞没，你侥幸把自己拉了回来，只是精神大受损耗，往后总觉得脑子里嗡嗡作响。", regressEffect:{wit:-2,luck:-1}, regressLifespanPenalty:5},
        {label:"只注射稀释后的低剂量", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只注射了稀释后的低剂量血清，效果有限，却也稳妥地延长了几年寿命。",
         failResult:"这次注射没什么明显效果，好在也没什么风险。"},
        {label:"拒绝一切方案，相信身体自愈", result:"你拒绝了这些方案，选择相信身体本身的自愈能力。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"你即将走到生命的终点，营地就该不该为你举办一场正式的葬礼产生了争论。", options:[
        {label:"支持隆重葬礼，纪念这些年的贡献", result:"营地为你举办了一场隆重的葬礼，纪念你这些年为大家做出的贡献。", statEffect:{charm:2}},
        {label:"反对，一切从简", result:"你坚持一切从简，不想给活着的人添麻烦，这份朴素让人心生敬意。", statEffect:{luck:1}},
        {label:"提议把仪式变成一场生存技巧传授课", result:"你提议把这场仪式变成最后一堂生存技巧课，把毕生所学再教一遍给年轻人。", statEffect:{wit:1}}
      ]},
      {death:true, text:"当年那剂血清（或那次连接）留下的隐患终于迟发，你的身体在一夜之间彻底衰竭，没能等到天亮。", weight:1, cond:c=>worldStateVal(c,"zombie_breakthrough")>=1, cause:"副作用迟发"},
      {text:"突破之后，你的身体状态好得不像话，队友们都说你简直不像是这个末世里该有的样子。", weight:6, cond:c=>worldStateVal(c,"zombie_breakthrough")>=1 && stat(c,"power")>=8},
      {text:"这些年物资集中调配的制度救了不少营地，你亲眼见证了这片末世废墟里难得的团结。", weight:6, cond:c=>worldStateVal(c,"zombie_campInfluence")>=2},
      {text:"各营地始终各自为政，你看着弱小的营地一个个在资源匮乏中崩溃，心里明白，这终究是一盘散沙。", weight:6, cond:c=>worldStateVal(c,"zombie_campInfluence")<=-1}
    ]
  },
  westworld: {
    infant:[
      {text:"你出生时，镇上酒馆正好响起一阵枪战，接生的大夫是在桌子底下把你接生下来的。", weight:10, cond:c=>state.age===0},
      {text:"你满月那天，一群路过的商队特意停下来，送了你一顶小小的牛仔帽作为礼物。", weight:8, cond:c=>state.age===0},
      {text:"你出生那天，一支路过的商队特意停下来，说要沾沾这个『枪火之夜』降生孩子的运气。", weight:6, cond:c=>state.age===0},
      {text:"镇上的印第安向导路过你家时，破例进门看了你一眼，临走前留下一句『这孩子与荒野有缘』。", weight:6},
      {text:"你满月那天，镇上唯一的一台留声机放的曲子莫名其妙卡带反复重播，倒像是特意在为你庆生。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，镇上的矿工正在酝酿一场罢工，紧张的气氛却丝毫没有影响你响亮的啼哭。", weight:6, setFlag:"westworld_strike", cond:c=>state.age===0},
      {text:"你满月时，一位路过的猎人送了你一枚打磨光滑的响尾蛇尾骨，说是能带来好运。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，镇上的马术表演正好在进行最后一场压轴表演，观众的喝彩声几乎盖过了你的啼哭。", weight:6, cond:c=>state.age===0},
      {text:"接生的大夫是镇上铁匠的妻子，她笑着说你这孩子出生时的哭声，跟她丈夫打铁的节奏一样有力。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，镇上的牧师与猎人就你该受洗还是该学野外生存争论不休，家人必须选一个先来。", options:[
        {label:"先受洗，走正道", result:"家人决定先让你受洗，走一条正正当当的路。", statEffect:{charm:1}},
        {label:"先学生存，硬气一点", result:"家人决定先让你学野外生存，从小就把你当成半个猎人来养。", statEffect:{power:1}, setFlag:"westworld_survivalist"},
        {label:"两者都要，家人格外操劳", result:"家人决定两者都要，为此格外操劳了几年，好在你也算不负所望。", statEffect:{health:-1,wit:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"到了自己挣饭钱的年纪，镇上有三份活计等着你挑。", options:[{label:"去驿站当马夫", result:"你去驿站当了马夫，风吹日晒之间，身子骨结实得像头小牛。", statEffect:{health:1}},{label:"去酒馆做帮工", result:"你去酒馆做了帮工，见惯了南来北往的旅人，练出了一张能说会道的嘴。", statEffect:{charm:1}},{label:"去矿上做学徒", result:"你去矿上做了学徒，抡镐的日子苦是苦，一身力气却是实打实的。", statEffect:{power:1}}]},
      {text:"你在镇上的靶场里第一次摸到手枪，教官说你的手感好得不像个新手。", weight:10},
      {text:"你在一次镇上的骚乱中，冷静地帮着大人疏散了受惊的孩子，被镇长记在了心里。", weight:8},
      {text:"你在一次意外中救了一位路过的印第安少年，对方的部落从此对你多了几分善意与信任。", weight:6, setFlag:"westworld_tribe_bond"},
      {text:"你无意间听到了铁路大亨手下密谋侵占矿脉的对话，虽然不明白具体内情，却隐隐觉得这事不简单。", weight:6, setFlag:"westworld_railroad_plot"},
      {text:"一位神秘的流浪歌手在镇上驻留了几天，临走前弹唱了一曲专门讲你故事的小调，让你哭笑不得。", weight:6},
      {choice:true, weight:6, text:"镇上的枪匠让你选择专精武器：左轮手枪、猎枪还是套索，这将决定你的作战方式。", options:[
        {label:"左轮手枪", result:"你选择了左轮手枪，从此拔枪的速度快得让人来不及反应。", statEffect:{power:2}},
        {label:"猎枪", result:"你选择了猎枪，扛着它走在路上，寻常宵小都不敢招惹你。", statEffect:{health:2}},
        {label:"套索", result:"你选择了套索，练出了一手令人拍案叫绝的绳上功夫。", statEffect:{luck:2}}
      ]},
      {text:"你参加了镇上一年一次的牛仔竞技会，虽然只是个孩子组别，也让你尝到了赢的滋味。", weight:6},
      {text:"你无意间撞见了一伙在边境走私违禁品的商人，吓得连夜逃回了家，好几天没敢出门。", weight:6, setFlag:"westworld_smugglers"},
      {text:"你在镇上的铁匠铺里帮工，渐渐学会了简单的锻造手艺，打出的第一把小刀虽然粗糙，却让你颇有成就感。", weight:6, setFlag:"westworld_smithy"},
      {text:"你跟着镇上的骑手们参加了一场马术表演，虽然摔了好几次，最终还是稳稳地完成了全场。", weight:6},
      {text:"你自幼被当成半个猎人来养，在荒野求生的本事上比同龄孩子扎实得多。", weight:6, cond:c=>hasFlag(c,"westworld_survivalist"), statEffect:{power:1}}
    ],
    adult:[
      {text:"一个醉醺醺的老矿工用半瓶威士忌换你听一个故事——峡谷深处有一座『黄金城』，西班牙人两百年前藏起来的，他见过入口，但没敢进去。", weight:5, setFlag:"westworld_quest1"},
      {choice:true, weight:6, text:"铁路公司开出了一个令人心动的价格，要收购你家那块祖传的地。", options:[{label:"卖掉，落袋为安", result:"你签了字，铁路公司的支票厚得能压弯口袋——这片草场，往后只在梦里见了。", statEffect:{wealth:2}},{label:"死守祖地，寸土不让", result:"你把合同原样退了回去，在栅栏上加了道锁——有些东西，多少钱都不卖。", statEffect:{power:1}, setFlag:"westworld_land"},{label:"联合邻居们抬价谈判", result:"你挨家挨户串联邻居们抱团谈判，最后大伙都多拿了三成的价钱。", statEffect:{charm:1}}]},
      {text:"你养的那匹老马认得回家的每一条路，有几次你在马背上睡着了，醒来时已经稳稳停在自家门口。", weight:6},
      {text:"你正式领到了赏金猎人执照，开始在这片荒芜的大陆上追捕悬赏名单上的通缉犯。", weight:10, achievement:"赏金猎人"},
      {text:"铁路公司的一位工头似乎对你颇为忌惮，暗中雇了人想要找你的麻烦。", weight:8},
      {text:"你被悬赏令误标成了通缉犯，费了好大力气才在赏金猎人的围捕中证明了自己的清白。", weight:6},
      {text:"你帮那个印第安部落挡下了铁路大亨强占矿脉的企图，从此在部落里落下了『荒野义士』的名声。", weight:6, cond:c=>hasFlag(c,"westworld_tribe_bond")},
      {choice:true, weight:6, text:"铁路大亨开出一笔巨款，想收买你对那场矿脉阴谋保持沉默，你必须做出选择。", cond:c=>hasFlag(c,"westworld_railroad_plot"), options:[
        {label:"拒绝收买，坚持揭露真相", result:"你毫不犹豫地拒绝了那笔巨款，坚持要把真相公之于众，这份硬气让你在西部声名大噪。", statEffect:{charm:1,luck:-1}, achievement:"荒野义士"},
        {label:"假意接受，暗中收集更多证据", result:"你表面上假意接受了那笔钱，暗地里却借机收集了更多确凿的证据，来了个反将一军。", statEffect:{wit:2}},
        {label:"接受收买，明哲保身", result:"你接受了那笔巨款，选择了明哲保身——只是往后每次路过那片矿脉，心里总有些说不出的滋味。", statEffect:{wealth:2,charm:-1}}
      ]},
      {death:true, text:"一场势均力敌的对决中，你慢了对方半拍，倒在了尘土飞扬的决斗场上。", weight:1, cause:"决斗落败"},
      {text:"你参与调解了那场持续已久的矿工罢工，凭着公道的态度让双方都握手言和。", weight:6, cond:c=>hasFlag(c,"westworld_strike")},
      {text:"你从一位垂垂老矣的枪手手中买下了一支传说中的古董手枪，从此爱若珍宝。", weight:6, setFlag:"westworld_antique_gun"},
      {text:"你被派驻到边境要塞协助守备，那段日子里见识了不少荒野上真正的刀光剑影。", weight:6, setFlag:"westworld_fort"},
      {choice:true, weight:6, text:"一位逃犯躲进了你家寻求庇护，赏金猎人正在镇上到处搜查。", options:[
        {label:"收留庇护，冒险相助", result:"你收留了这位逃犯，冒险帮他躲过了搜查，这份仗义让对方一辈子念着你的恩情。", statEffect:{charm:1,luck:-1}},
        {label:"交出逃犯，换取赏金", result:"你交出了这位逃犯，换来了一笔赏金，只是这份钱赚得多少有些说不清的滋味。", statEffect:{wealth:1,charm:-1}},
        {label:"装作不知，静观其变", result:"你装作什么都不知道，静观其变，最终这件事悄无声息地过去了。", statEffect:{wit:1}}
      ]},
      {text:"你在悬赏公告栏前意外撕下了一张自己名字都写错的悬赏令，一时间成了镇上的笑谈。", weight:6},
      {text:"你骑马赶路时遭遇了一伙拦路的悍匪，对方来势不善。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你拔枪速度快人一步，几下就打退了这伙悍匪，还顺手缴获了他们的马匹。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过这伙悍匪，只能留下随身财物才换来一条生路。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番对峙后，你稳住了场面，双方总算没真的动起手来。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"多年的勘探让你在峡谷深处真的找到了那道被藤蔓掩盖的石门——门后的黑暗深不见底，门楣上刻着西班牙语：『贪婪者止步』。", weight:12, cond:c=>hasFlag(c,"westworld_quest1"), setFlag:"westworld_quest2"},
      {text:"篝火边，一位老牛仔说他年轻时在峡谷深处见过一扇凭空立着的门——门里是白天，门外是黑夜。他这辈子都在后悔没敢走进去。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你在镇上的射击大赛上连中十靶，庄家赔得脸色发白，从此再没人敢在你面前提『比划两下』。", weight:6, cond:c=>stat(c,"power")>=8, statEffect:{charm:1}},
      {text:"你在一场惊心动魄的决斗中击败了赏金榜上排名第一的悬赏犯，声名传遍了整片大陆。", weight:10, cond:c=>stat(c,"power")>=8 || transcendRank(c)>=1, achievement:"决斗之王"},
      {text:"你出资帮小镇修建了第一条像样的水渠，镇民们都说你是这片土地上的活菩萨。", weight:8},
      {choice:true, weight:6, text:"小镇就『铁路带来的发展该由镇民共享还是任由资本掠夺』产生了分歧。", options:[
        {label:"支持镇民共享", result:"你支持了红利共享的方案，铁路带来的繁荣渐渐流向了普通镇民，小镇也因此蒸蒸日上。", statEffect:{charm:1}, worldStateKey:"westworld_townInfluence", worldStateDelta:2},
        {label:"支持任由资本掠夺", result:"你没有阻拦铁路公司的攫取，公司赚得更多了，只是镇民的日子却愈发艰难。", statEffect:{wealth:1}, worldStateKey:"westworld_townInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你彻底揭穿了铁路大亨侵占矿脉的阴谋，这件事轰动了整片西部，报纸上都印上了你的名字。", weight:6, cond:c=>hasFlag(c,"westworld_railroad_plot")},
      {text:"那个印第安部落正式认你做了荣誉族人，还教给你一套只在族内流传的追踪之术。", weight:6, cond:c=>hasFlag(c,"westworld_tribe_bond"), achievement:"荣誉族人", statEffect:{wit:1}},
      {choice:true, weight:6, text:"镇议会就『是否允许铁路公司在镇上修建新站』征询民意。", options:[
        {label:"支持修建，带来商机", result:"你支持了新站的修建，小镇因此热闹了不少，商机随之滚滚而来。", statEffect:{wealth:2}},
        {label:"反对修建，保护传统", result:"你反对了这个提议，主张保护小镇原有的样子，这份坚持为你赢得了不少老镇民的支持。", statEffect:{charm:1}},
        {label:"提议附加条件", result:"你提议在修建时附加一些保护条款，两边都能接受，事情也就这么定了下来。", statEffect:{wit:1}}
      ]},
      {text:"你在牛仔竞技会的成人组别里一举夺冠，成了整片西部小有名气的传奇牛仔。", weight:6},
      {text:"你查出了当年那伙边境走私商人的下落，一番较量后，彻底清除了这个隐患。", weight:6, cond:c=>hasFlag(c,"westworld_smugglers")},
      {text:"你凭借边境要塞守备的经历，被推举为镇上的治安官，专门负责维护这片荒野的秩序。", weight:6, cond:c=>hasFlag(c,"westworld_fort")},
      {text:"你在铁匠铺的手艺日渐精湛，打造的武器渐渐在整片西部小有名气，不少枪手专程前来求购。", weight:6, cond:c=>hasFlag(c,"westworld_smithy")}
    ],
    elder:[
      {choice:true, weight:40, text:"门里是白天，门外是黑夜——老牛仔一辈子没敢走进去的门，如今为你敞开。", cond:c=>!hasFlag(c,"westworld_gate_closed") && hasFlag(c,"westworld_beyond2") && hasTag(c,"westworld_destiny") && worldStateVal(c,"westworld_breakthrough")>=3, options:[{label:"走进门里的白天", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"westworld_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"westworld_gate_closed"}]},
      {text:"承接荒野之魂的圆满之日，峡谷尽头那扇传说中的门再次显形——这一次，它是为你开的。", weight:18, cond:c=>hasFlag(c,"westworld_beyond1") && worldStateVal(c,"westworld_breakthrough")>=3, setFlag:"westworld_beyond2"},
      {text:"荒野的风声里，你分辨出了一句不属于任何语言的低语——大地告诉你：那来自天空的更上面。", weight:12, cond:c=>hasTag(c,"westworld_destiny") && worldStateVal(c,"westworld_breakthrough")>=2, setFlag:"westworld_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"与大地缔约之后，你开始能听懂风声里的语言——巫医的传承里管这叫『荒野之魂』，千年只出一位。", cond:c=>worldStateVal(c,"westworld_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"承接荒野之魂", riskyChance:0.13, lifespanBonus:90, successEffect:{luck:4,health:2}, successResult:"你承接了荒野之魂——从此这片土地上的每一场雨、每一次兽群迁徙，你都提前知晓，原住民各部落共尊你为活着的图腾。", successAchievement:"触及法则", worldStateKey:"westworld_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"魂归大地", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"补给、绳索、火把都已备齐，石门就在面前——两百年来无数人为这个传说而死，如今轮到你做选择了。", cond:c=>hasFlag(c,"westworld_quest2"), options:[{label:"推门，深入黄金城", riskyChance:0.4, lifespanBonus:12, successEffect:{wealth:4,luck:2}, successResult:"穿过最后一道石廊，火把的光落在了满室的金锭上——传说是真的。你只取了背囊装得下的部分，把石门重新封好：让传说继续活着。", successAchievement:"毕生所求", failResult:"石门在你身后轰然关闭的那一刻，你就明白了门楣上那行字的意思——峡谷从此多了一个没能回来的名字。", failDeath:true, failDeathChance:0.32, failCause:"困死密道", regressResult:"地道在半途坍塌，你死里逃生地爬了出来——入口被彻底掩埋，这辈子是再也找不到第二次了。", regressEffect:{health:-2,wealth:-1}},{label:"把线索卖给勘探公司", result:"你把石门的位置卖给了东部来的勘探公司，拿钱置了地——半年后听说他们的挖掘队全军覆没，你没再打听。", statEffect:{wealth:2}}]},
      {choice:true, weight:30, repeatable:true, text:"那位巫医临终前把你叫到床边，传授了他真正压箱底的秘仪——『与大地缔约』：让灵魂扎根在这片土地里，与山川同寿。", cond:c=>worldStateVal(c,"westworld_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?60:66) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"举行大地缔约仪式", riskyChance:0.12, lifespanBonus:40, successEffect:{luck:3,health:2}, successResult:"缔约成功——你能感觉到自己的心跳与这片土地的脉动渐渐同步，镇上的人都说，你成了这片荒野真正的守望者。", successAchievement:"二度超脱", worldStateKey:"westworld_breakthrough", worldStateDelta:1, failResult:"仪式进行到一半，大地拒绝了你的灵魂，你被反噬的力量当场带走。", failDeath:true, failDeathChance:0.55, failCause:"仪式反噬", regressResult:"仪式失败，你侥幸捡回一条命，只是从此再难承受第二次尝试。", regressEffect:{health:-3,luck:-2}, regressLifespanPenalty:20},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你在门廊的摇椅上度过了无数个黄昏，那把猎枪早就不上膛了，只是习惯放在手边。", weight:6},
      {text:"当年你死守下来的那块地，如今成了镇上最后一片没被铁轨切开的完整草场，晚霞落在上面的时候，全镇的人都爱来散步。", weight:6, cond:c=>hasFlag(c,"westworld_land"), statEffect:{charm:1}},
      {text:"你把自己多年闯荡积累的经验写成了一本小册子，成了后辈赏金猎人争相传抄的教材。", weight:10},
      {text:"你在自家牧场的摇椅上悠闲地晒着太阳，偶尔给孙辈讲讲当年的枪战故事。", weight:8},
      {text:"你受邀参加了那个印第安部落的篝火盛会，围坐在火堆旁，听着年轻人复述你当年的英勇事迹。", weight:6, cond:c=>hasFlag(c,"westworld_tribe_bond")},
      {text:"你晚年时常听着那位流浪歌手当年留下的歌谣唱片，恍惚间又回到了枪火纷飞的年轻岁月。", weight:6},
      {text:"你把那支心爱的古董手枪郑重地传给了最信任的后辈，嘱咐他好好保管这份传承。", weight:6, cond:c=>hasFlag(c,"westworld_antique_gun")},
      {text:"你受邀成为牛仔竞技会的终身荣誉评委，每年都要亲自到场为年轻选手们喝彩。", weight:6},
      {text:"你把自己这些年担任治安官积累的经验写成了小册子，成了后辈治安官的参考教材。", weight:6, cond:c=>hasFlag(c,"westworld_fort")},
      {text:"你把自己打铁的手艺毫无保留地传给了镇上的年轻人，看着炉火依旧旺盛，心里满是感慨。", weight:6, cond:c=>hasFlag(c,"westworld_smithy")},
      {choice:true, weight:5, repeatable:true, text:"一位印第安巫医提出为你举行一场神秘的续命仪式，据说这仪式曾让部落里的长老多活了数十年——但仪式本身凶险异常。", cond:c=>worldStateVal(c,"westworld_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:56) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?10:15)), options:[
        {label:"参加凶险的续命仪式", riskyChance:0.22, lifespanBonus:30, successEffect:{power:10,luck:4,health:2},
         successResult:"仪式在生死边缘完成了，巫医口中的『大地馈赠』真的延续了你的生命，浑身也涌动着一股说不清的野性力量。", successAchievement:"突破天命", worldStateKey:"westworld_breakthrough", worldStateDelta:1,
         failResult:"仪式中途出了岔子，你的心跳在众人的祈祷声中彻底停了下来。", failDeath:true, failDeathChance:0.6, failCause:"仪式失败",
         regressResult:"仪式中途出了岔子，你的心跳侥幸没有彻底停下，只是这具身子骨从此大不如前，往日的枪法与身手都生疏了不少。", regressEffect:{power:-2,health:-2}, regressLifespanPenalty:5},
        {label:"只接受温和的草药疗法", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只接受了温和的草药疗法，效果有限，却也稳妥地延长了几年寿命。",
         failResult:"这次疗法没什么明显效果，好在也没什么风险。"},
        {label:"拒绝仪式，坦然面对天命", result:"你拒绝了这场仪式，选择坦然面对天命，把余生过得平静。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"镇上要为你竖一座纪念碑，你必须决定碑文该怎么写。", options:[
        {label:"写实记录一生功过", result:"你选择了如实记录自己的一生功过，好的坏的都摆在了碑上，不加粉饰。", statEffect:{wit:1}},
        {label:"只写豪言壮语，图个痛快", result:"你选择了只写几句豪言壮语，图个痛快，倒是很符合你这一辈子的性子。", statEffect:{power:1}},
        {label:"什么都不写，一块光碑", result:"你什么都没让人写，一块光碑立在那儿，反倒让人多了几分猜想的余地。", statEffect:{luck:1}}
      ]},
      {death:true, text:"那场续命仪式留下的隐患终于在某个寻常的夜晚发作，你在睡梦中悄然离世，没有惊动任何人。", weight:1, cond:c=>worldStateVal(c,"westworld_breakthrough")>=1, cause:"仪式隐患"},
      {text:"突破之后，你的枪法与身手快得让镇上最好的枪手都自认不是对手。", weight:6, cond:c=>worldStateVal(c,"westworld_breakthrough")>=1 && stat(c,"power")>=8},
      {text:"这些年铁路带来的繁荣真正惠及了镇民，你亲眼见证了这座小镇因此蒸蒸日上。", weight:6, cond:c=>worldStateVal(c,"westworld_townInfluence")>=2},
      {text:"铁路带来的红利始终被资本攫取，你看着镇民的日子越过越艰难，心里明白，这终究不是长久之计。", weight:6, cond:c=>worldStateVal(c,"westworld_townInfluence")<=-1}
    ]
  },
  urbanpower: {
    infant:[
      {text:"你出生时，医院里所有的灯光同时闪烁了一下，值班医生都觉得莫名其妙。", weight:10, cond:c=>state.age===0},
      {text:"你还在襁褓中时，就总能准确地转头看向房间里没人注意到的角落，仿佛能察觉到什么。", weight:8, cond:c=>state.age<=1},
      {text:"医院的监控设备在你出生的瞬间集体出现了几秒的雪花噪点，事后维修人员怎么查都查不出原因。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，产房里所有金属器械都轻微地震动了一下，值班护士后来提起这事，语气总带着一丝心虚的回避。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，家里养的猫总喜欢趴在你的摇篮边，用一种近乎警戒的姿态盯着你，怎么赶都不走。", weight:6, cond:c=>state.age<=1},
      {text:"医院的常规检测意外扫出了你体内一丝极其微弱的异能波动，医生们私下里议论了很久。", weight:6},
      {text:"你出生时，家里的智能设备集体重启了一遍，工程师检查后却说系统一切正常。", weight:6, cond:c=>state.age===0},
      {text:"你出生的医院附近，正巧有一间地下异能实验室悄然搬走，两件事的时间点巧合得让人浮想联翩。", weight:6, setFlag:"urbanpower_lab_nearby", cond:c=>state.age===0},
      {text:"你出生时，产房里的仪器数据出现了一段无法解释的异常波动，随后又恢复了正常。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，一间私立机构提议对你进行早期异能筛查，你的监护人必须做出选择。", options:[
        {label:"同意筛查", result:"监护人同意了这次筛查，你的相关数据从此留在了那间机构的档案里。", statEffect:{wit:1,luck:-1}, setFlag:"urbanpower_early_screen"},
        {label:"拒绝，保护隐私", result:"监护人拒绝了这次筛查，坚持要保护你的隐私。", statEffect:{charm:1}},
        {label:"申请匿名筛查", result:"监护人申请了匿名筛查，既满足了好奇心，也保住了隐私。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"觉醒后的第一堂课，导师让你自己选训练的侧重。", options:[{label:"侧重控制训练", result:"你选择了枯燥的控制训练，如今你的异能收放自如，精细得能夹起一粒米。", statEffect:{wit:1}},{label:"侧重体能强化", result:"你选择了体能强化，异能与肉身相辅相成，爆发力今非昔比。", statEffect:{power:1}},{label:"侧重隐匿练习", result:"你选择了隐匿练习，学会了在人群中把自己藏得像个最普通的路人。", statEffect:{luck:1}}]},
      {text:"你在一次体育课上意外展现出远超常人的反应速度，被班主任悄悄记录了下来。", weight:10},
      {text:"你结识了班上一个同样有些「奇怪」的同学，两人一拍即合，成了无话不谈的朋友。", weight:8},
      {text:"你逐渐发现自己的能力似乎伴随着某种说不清的副作用，每次使用后总要付出点小小的代价。", weight:6},
      {text:"你开始过上了『白天普通学生、私下神秘觉醒者』的双重生活，小心翼翼地不让任何人发现。", weight:6},
      {text:"你第一次遇到了另一个觉醒者，对方却对你充满敌意，两人之间说不清由来的宿怨就此埋下。", weight:6, setFlag:"urbanpower_rival"},
      {choice:true, weight:6, text:"互助组织让你选择能力专精方向：战斗型、支援型还是潜伏型，这将决定你在组织中的角色。", options:[
        {label:"战斗型", result:"你选择了战斗型，从此在组织里是当仁不让的前排力量。", statEffect:{power:2}},
        {label:"支援型", result:"你选择了支援型，队友们都说有你在，大家心里就多了一份底气。", statEffect:{charm:2}},
        {label:"潜伏型", result:"你选择了潜伏型，行事总能悄无声息，运气也似乎因此更好了。", statEffect:{luck:2}}
      ]},
      {text:"你偷偷参加了地下的异能等级评定，结果出来后，评定员罕见地多看了你两眼。", weight:6, setFlag:"urbanpower_rank"},
      {text:"你和朋友们一起探索了一处被称为『都市传说』的废弃建筑，虽然什么都没找到，却也乐在其中。", weight:6},
      {text:"你和同伴一起调查了一起在校园里流传已久的『闹鬼』传闻，最后发现竟与某个觉醒者的失控能力有关。", weight:6},
      {text:"你偶然结识了一位神秘的隐秘导师，对方看你有潜力，答应私下指点你几招。", weight:6, setFlag:"urbanpower_mentor"},
      {text:"当年那次早期筛查的记录，让你比其他新觉醒者更早明白了自己能力的边界。", weight:6, cond:c=>hasFlag(c,"urbanpower_early_screen"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"你在调查中发现所有觉醒者的能力波形都指向同一个源头——三十年前官方档案里被涂黑的『零号事件』。", weight:5, setFlag:"urbanpower_quest1"},
      {choice:true, weight:6, text:"深夜，一名濒临失控边缘的新觉醒者辗转找到你，声音发抖地向你求助。", options:[{label:"亲自陪她度过失控期", result:"你陪着她熬过了最凶险的七十二小时，失控的能量在你的引导下一点点平复了下来。", statEffect:{charm:1}, setFlag:"urbanpower_mentee"},{label:"转介给专业互助机构", result:"你连夜联系了互助中心，把她安全地转介了过去——专业的事交给专业的人。", statEffect:{wit:1}},{label:"隔着门给些建议", result:"你隔着门给了她几条保命的建议——失控者太危险，你有你的顾虑。", statEffect:{luck:1}}]},
      {text:"你学会了在通勤的地铁上用异能悄悄托住打瞌睡乘客歪倒的脑袋，这是只属于你一个人的小小善举。", weight:6},
      {text:"你正式加入了一个地下的异能者互助组织，第一次见到了和自己一样的「异类」。", weight:10, achievement:"觉醒者同盟"},
      {text:"某个神秘组织的人似乎盯上了你的能力，开始暗中调查你的行踪。", weight:8},
      {text:"你那个能力副作用忽然在一次关键时刻发作，差点让你在众人面前暴露了身份。", weight:6},
      {text:"你曾经的那个宿敌觉醒者忽然主动找上门来，语气里竟带着几分难以察觉的示好之意。", weight:6, cond:c=>hasFlag(c,"urbanpower_rival")},
      {choice:true, weight:6, text:"你目睹了一名新觉醒者因为无法控制力量而濒临『暴走』，你必须当场决定怎么处理。", options:[
        {label:"冒险上前，尝试帮他稳定情绪", result:"你冒险上前尝试帮他稳定情绪，虽然过程惊险，最终还是成功阻止了一场悲剧。", statEffect:{charm:1,health:-1}, achievement:"稳定者"},
        {label:"联系互助组织，寻求专业支援", result:"你第一时间联系了专业的互助组织，虽然慢了一步，最终还是妥善解决了这次危机。", statEffect:{wit:1}},
        {label:"保持距离，等风头过去", result:"你选择了保持距离，等这阵风头过去——事后你却始终没能说服自己，这是不是正确的决定。", statEffect:{luck:-1}}
      ]},
      {death:true, text:"一次力量失控的对抗中，你耗尽了全部本源力量，再也没能站起来。", weight:1, cause:"本源枯竭"},
      {text:"你意外发现了一处隐藏的异能者秘密基地，里面存放的资料揭开了不少你从未知晓的往事。", weight:6, setFlag:"urbanpower_basehidden"},
      {text:"你逐渐察觉自己的能力似乎是从家族血脉里遗传而来，这让你对自己的身世有了新的猜测。", weight:6, setFlag:"urbanpower_lineage"},
      {text:"你参加了地下举办的异能竞技赛，虽然首战便被淘汰，却也因此认清了自己能力的短板。", weight:6, setFlag:"urbanpower_arena"},
      {choice:true, weight:6, text:"一名记者想采访你，深挖异能者群体的真实生活。", options:[
        {label:"接受采访，坦诚相告", result:"你接受了采访，坦诚地讲述了异能者的真实生活，这份勇气让不少人对这个群体多了几分理解。", statEffect:{charm:1}},
        {label:"拒绝，保护隐私", result:"你拒绝了这次采访，选择保护自己与同伴的隐私，这份谨慎虽然低调，却也稳妥。", statEffect:{luck:1}},
        {label:"匿名接受，有所保留", result:"你以匿名的方式接受了采访，既满足了对方的好奇，也保住了自己的身份。", statEffect:{wit:1}}
      ]},
      {text:"你被卷入了对那间神秘异能实验室的调查，发现的真相远比你想象的更加复杂。", weight:6, cond:c=>hasFlag(c,"urbanpower_lab_nearby")},
      {text:"你在街头遭遇了一伙寻衅滋事的不良分子，对方明显是有意找茬。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你三两下就把这伙人打退了，路人纷纷为你叫好，还有人塞给你一点谢礼。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过这伙人，只能忍气吞声地留下财物才脱身，心里憋屈得很。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番周旋后，你巧妙地脱身了，双方总算没真的动起手来。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"半生的追查让零号事件的轮廓渐渐清晰——那是一次失败的实验，而实验体『零号』据说至今仍被封存在城市地下最深处。", weight:12, cond:c=>hasFlag(c,"urbanpower_quest1"), setFlag:"urbanpower_quest2"},
      {text:"你的异能在某个雨夜突然与什么东西共振了一瞬——那一刻，你仿佛看见无数个平行的城市在眼前展开又合拢，每一座城里都有一个你。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你总结的异能控制心法在觉醒者圈子里广为流传，不少新人都尊称你一声『前辈』。", weight:6, cond:c=>stat(c,"wit")>=8 || transcendRank(c)>=2, statEffect:{charm:1}},
      {text:"你在一次城市危机中挺身而出，力挽狂澜，事后却选择隐姓埋名，不愿暴露身份。", weight:10, cond:c=>stat(c,"power")>=7 || transcendRank(c)>=1, achievement:"无名英雄"},
      {text:"你建立起了一个专门帮助新觉醒者适应能力的互助中心，成了这个圈子里德高望重的前辈。", weight:8},
      {choice:true, weight:6, text:"觉醒者圈子就『异能资源该公开培训还是把持在少数人手中』产生了分歧。", options:[
        {label:"支持公开培训", result:"你支持了公开培训的方案，越来越多新觉醒者因此能安稳地掌控自己的能力。", statEffect:{charm:1}, worldStateKey:"urbanpower_cityInfluence", worldStateDelta:2},
        {label:"支持少数把持", result:"你支持了资源集中的方案，少数强者更加强大，普通觉醒者的处境却愈发艰难。", statEffect:{wealth:1}, worldStateKey:"urbanpower_cityInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你终于学会了完全掌控能力的副作用，从此使用起来再无后顾之忧。", weight:6},
      {text:"你与那个曾经的宿敌觉醒者不知不觉间成了并肩作战的战友，两人都说不清这段关系是怎么变的。", weight:6, cond:c=>hasFlag(c,"urbanpower_rival"), achievement:"殊途同归"},
      {choice:true, weight:6, text:"觉醒者圈子就『是否应该向政府公开异能者的存在』展开辩论，请你表态。", options:[
        {label:"支持公开，争取合法地位", result:"你支持了公开，主张争取合法地位，这份勇气在觉醒者圈子里赢得了不少支持。", statEffect:{charm:2}},
        {label:"反对公开，继续隐藏", result:"你反对公开，主张继续隐藏身份，这份谨慎虽然保守，却也保住了不少人的安全。", statEffect:{luck:1}},
        {label:"提议部分公开，谨慎试探", result:"你提议先部分公开，谨慎试探社会的反应，这份周全后来被证明是最稳妥的路子。", statEffect:{wit:1}}
      ]},
      {text:"你被评定为这座城市里数一数二的高阶异能者，各方势力都对你礼遇有加。", weight:6, cond:c=>hasFlag(c,"urbanpower_rank")},
      {text:"你追查清楚了自己能力的家族血脉来源，还借此联系上了几位素未谋面的远亲。", weight:6, cond:c=>hasFlag(c,"urbanpower_lineage")},
      {text:"你在异能竞技赛的舞台上东山再起，凭借着这些年的磨练一路杀入了决赛。", weight:6, cond:c=>hasFlag(c,"urbanpower_arena")},
      {text:"你彻底揭开了那间异能实验室的秘密，并将其公之于众，推动了这个圈子的一次重大变革。", weight:6, cond:c=>hasFlag(c,"urbanpower_lab_nearby")}
    ],
    elder:[
      {choice:true, weight:40, text:"城市上空的门静静垂下一道阶梯——走上去，你将超越『觉醒』这个词本身。", cond:c=>!hasFlag(c,"urbanpower_gate_closed") && hasFlag(c,"urbanpower_beyond2") && hasTag(c,"urbanpower_destiny") && worldStateVal(c,"urbanpower_breakthrough")>=3, options:[{label:"登上阶梯", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"urbanpower_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"urbanpower_gate_closed"}]},
      {text:"灵能奇点彻底稳定的雨夜，共振的源头撕开了维度——一扇门静静悬在城市上空，只有你看得见。", weight:18, cond:c=>hasFlag(c,"urbanpower_beyond1") && worldStateVal(c,"urbanpower_breakthrough")>=3, setFlag:"urbanpower_beyond2"},
      {text:"灵能奇点的深处传来了一次陌生的共振——频率显示，源头不在这个维度。", weight:12, cond:c=>hasTag(c,"urbanpower_destiny") && worldStateVal(c,"urbanpower_breakthrough")>=2, setFlag:"urbanpower_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"三次觉醒之后，你的灵能开始自发地向内坍缩——研究者说那是『灵能奇点』的前兆，理论上的存在。", cond:c=>worldStateVal(c,"urbanpower_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"引导灵能奇点", riskyChance:0.13, lifespanBonus:90, successEffect:{wit:4,luck:2}, successResult:"奇点稳定成型——你的存在本身开始轻微地影响周围的概率，觉醒者们私下叫你『行走的都市传说』。", successAchievement:"触及法则", worldStateKey:"urbanpower_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"奇点湮灭", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"你找到了通往地下封存设施的入口——见到零号，你就能知道所有觉醒者存在的意义，或者成为下一个被涂黑的名字。", cond:c=>hasFlag(c,"urbanpower_quest2"), options:[{label:"深入设施，面见零号", riskyChance:0.4, lifespanBonus:12, successEffect:{wit:4,charm:2}, successResult:"零号原来只是一个睡着的孩子——她睁开眼看到你的瞬间，你脑海里涌入了一切真相。你替她掖好被角，转身把真相写成了匿名档案，寄给了每一个觉醒者。", successAchievement:"毕生所求", failResult:"设施的防御机制在你触碰封存舱的瞬间启动——官方档案里，又多了一个被涂黑的名字。", failDeath:true, failDeathChance:0.32, failCause:"设施防御", regressResult:"你在最后一道闸门前触发了警报，被迫撤离——设施随即整体迁移，线索彻底断了。", regressEffect:{wit:-1,luck:-2}},{label:"把调查交给觉醒者联盟", result:"你把毕生的调查资料交给了觉醒者联盟——真相也许会迟到，但一个人的执念，从此成了一群人的事业。", statEffect:{charm:2}}]},
      {choice:true, weight:30, repeatable:true, text:"二次觉醒之后，你隐约触摸到了第三道门槛——彻底舍弃血肉之躯的桎梏，让自己升华为纯粹的灵能存在体。", cond:c=>worldStateVal(c,"urbanpower_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?54:60) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"尝试三次觉醒", riskyChance:0.18, lifespanBonus:60, successEffect:{wit:3,charm:3}, successResult:"觉醒成功——你的身体如今由稳定的灵能构成，衰老、疾病、饥饿都成了过去式，你成了这座城市的都市传说本身。", successAchievement:"二度超脱", worldStateKey:"urbanpower_breakthrough", worldStateDelta:1, failResult:"第三次觉醒失控，你的存在如烟花般绚烂地溃散在了城市上空。", failDeath:true, failDeathChance:0.52, failCause:"灵能溃散", regressResult:"觉醒中途被强行压回，你保住了肉身，但异能出现了长期的紊乱。", regressEffect:{wit:-3,power:-2}, regressLifespanPenalty:22},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你晚年最爱在天台上用异能给邻居家的孩子们变些无伤大雅的小戏法，成了整栋楼口耳相传的传说。", weight:6},
      {text:"当年被你从失控边缘拉回来的那名觉醒者，如今成了互助中心的负责人，她说她带的每一个新人，都算是你的徒孙。", weight:6, cond:c=>hasFlag(c,"urbanpower_mentee"), statEffect:{charm:1}},
      {text:"你把自己多年来对异能的研究心得整理成册，秘密传给了值得信赖的下一代。", weight:10},
      {text:"你隐居在城市边缘的一处小屋里，偶尔还是会有慕名而来的年轻觉醒者登门请教。", weight:8},
      {text:"你与当年的宿敌——如今的老友，一起回忆起初次见面时那份说不清由来的敌意，两人相视大笑。", weight:6, cond:c=>hasFlag(c,"urbanpower_rival")},
      {text:"你晚年偶尔还会梦到那个神秘组织的招募邀请，梦里你总会想，如果当年答应了，人生会不会不一样。", weight:6},
      {text:"你把自己发现的那处隐藏基地资料妥善封存，留给后来的觉醒者们作为一份特殊的遗产。", weight:6, cond:c=>hasFlag(c,"urbanpower_basehidden")},
      {text:"你与那几位素未谋面的远亲成了忘年交，时常聚在一起聊起这份奇妙的血脉传承。", weight:6, cond:c=>hasFlag(c,"urbanpower_lineage")},
      {text:"你把那位隐秘导师当年教给你的心得，原封不动地传授给了新一代的年轻觉醒者。", weight:6, cond:c=>hasFlag(c,"urbanpower_mentor")},
      {text:"你把揭露异能实验室秘密的全部经过写成了记录，作为这个圈子历史的一份重要见证。", weight:6, cond:c=>hasFlag(c,"urbanpower_lab_nearby")},
      {choice:true, weight:5, repeatable:true, text:"一位神秘的科学家提出帮你诱发一次危险的『二次觉醒』，理论上能让你的异能与生命同时进化——但过程可能让你的身体彻底崩溃。", cond:c=>worldStateVal(c,"urbanpower_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:54) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?7:10)), options:[
        {label:"冒险诱发二次觉醒", riskyChance:0.35, lifespanBonus:40, successEffect:{wit:10,charm:4,power:2},
         successResult:"二次觉醒在生死边缘成功了，你的精神力彻底突破了凡人的桎梏，实现了真正意义上的灵能飞升，身体与异能都被重塑，仿佛获得了新生。", successAchievement:"突破天命", worldStateKey:"urbanpower_breakthrough", worldStateDelta:1,
         failResult:"觉醒过程中能量彻底失控，你的身体在剧烈的反噬中土崩瓦解。", failDeath:true, failDeathChance:0.55, failCause:"觉醒崩溃",
         regressResult:"觉醒过程中能量一度彻底失控，你侥幸稳住了最后一丝心神，只是精神力大受损耗，异能也大不如前。", regressEffect:{wit:-2,charm:-1}, regressLifespanPenalty:5},
        {label:"只进行低风险的能量调理", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只进行了低风险的能量调理，效果有限，却也稳妥地延长了几年寿命。",
         failResult:"这次调理没什么明显效果，好在也没什么风险。"},
        {label:"拒绝二次觉醒，安于现状", result:"你拒绝了这次冒险，决定安于现状，把剩下的日子过得平静。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"你临终前，组织问你要不要把自己的能力样本留存下来供后人研究。", options:[
        {label:"同意留存样本", result:"你同意留存了样本，希望自己的能力能为后来的研究提供一点线索。", statEffect:{wit:1}},
        {label:"拒绝，带着秘密离去", result:"你拒绝了这个请求，选择带着这份秘密安然离去。", statEffect:{luck:1}},
        {label:"只留存一部分，有所保留", result:"你只同意留存一部分样本，多少留了个心眼。", statEffect:{charm:1}}
      ]},
      {death:true, text:"灵能飞升后的力量终究不总是温顺听话，一次寻常的力量波动突然失控反噬，彻底带走了你的生命。", weight:1, cond:c=>worldStateVal(c,"urbanpower_breakthrough")>=1, cause:"力量反噬"},
      {text:"突破之后，你身上散发出一种难以言喻的气场，寻常人光是靠近都会感到一丝莫名的敬畏。", weight:6, cond:c=>worldStateVal(c,"urbanpower_breakthrough")>=1 && stat(c,"charm")>=8},
      {text:"这些年异能培训体系日渐开放，你亲眼见证了越来越多新觉醒者因此活得更加安稳。", weight:6, cond:c=>worldStateVal(c,"urbanpower_cityInfluence")>=2},
      {text:"异能资源始终被少数人把持，你看着普通觉醒者的处境愈发艰难，心里明白，这终究会激化矛盾。", weight:6, cond:c=>worldStateVal(c,"urbanpower_cityInfluence")<=-1}
    ]
  },
  pirates: {
    infant:[
      {text:"你出生的那一夜，港口上空罕见地出现了一道彩虹状的极光，老水手们都说这是吉兆。", weight:10, cond:c=>state.age===0},
      {text:"你还是婴儿时就格外喜欢海浪的声音，只要一抱到甲板上就会立刻停止哭闹。", weight:8, cond:c=>state.age<=1},
      {text:"接生的产婆是船长的遗孀，她一看到你就红了眼眶，说你的眉眼像极了她那早逝多年的儿子。", weight:6, cond:c=>state.age===0},
      {text:"你满月时，家里那张祖传的残破海图忽然自己展开了一角，露出了一小段谁也认不出的古老文字。", weight:6, setFlag:"pirates_map_fragment", cond:c=>state.age===0},
      {text:"你出生那天，港口正在举行一场热闹非凡的海上拍卖会，叫价声几乎盖过了你的啼哭。", weight:6, cond:c=>state.age===0},
      {text:"接生的产婆是位退役的女海盗，她笑着说你这孩子，天生就带着一股不服输的劲儿。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，港口的海盗黑市正在进行一场秘密交易，喧闹声混着你的啼哭传遍了整个码头。", weight:6, cond:c=>state.age===0},
      {text:"接生的产婆是位经验丰富的老船医，她说你出生时的哭声，像极了远航归来的号角。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，船上的老水手与港口的商人就你将来该走哪条路争论不休，家人必须先定个方向。", options:[
        {label:"送去学航海", result:"家人决定送你去学航海，从小就在船上摸爬滚打。", statEffect:{wit:1}, setFlag:"pirates_early_sailor"},
        {label:"送去学经商", result:"家人决定送你去学经商，指望你将来能靠精明的头脑吃饭。", statEffect:{wealth:1}},
        {label:"谁都不送，先在港口长大再说", result:"家人谁都没送，决定先让你在港口自由自在地长大再说。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"第一次正式上船，水手长问你想从哪个岗位干起。", options:[{label:"做瞭望手", result:"你做了桅杆顶上的瞭望手，练出了一双最先看见陆地与风暴的眼睛。", statEffect:{luck:1}},{label:"做帆缆手", result:"你做了甲板上的帆缆手，每天与风浪较劲，手掌磨出了厚厚的茧。", statEffect:{power:1}},{label:"做领航学徒", result:"你跟着老领航员学看星象与海图，脑子里渐渐装下了整片大海。", statEffect:{wit:1}}]},
      {text:"你偷偷溜上了一艘即将启航的商船，靠着机灵劲儿被船长留下来当了见习水手。", weight:10},
      {text:"你在一次风暴中协助船员们抢险，虽然吓得腿软，却也因此赢得了水手们的认可。", weight:8},
      {text:"你无意间从一位老水手那里听到了关于『海妖』的传说，从此对那片被称为禁海的区域充满了好奇。", weight:6},
      {text:"你偶然拼上了家传残破海图缺失的一角，图上赫然标注着一处从未被记录的神秘海域。", weight:6, cond:c=>hasFlag(c,"pirates_map_fragment"), setFlag:"pirates_map_complete"},
      {choice:true, weight:6, text:"船长让你选择专精岗位：舵手、炮手还是瞭望手，这将决定你在船上的职责。", options:[
        {label:"舵手", result:"你选择了舵手，练出了一手能在惊涛骇浪中稳住航向的本事。", statEffect:{wit:2}},
        {label:"炮手", result:"你选择了炮手，一手炮法练得又准又狠。", statEffect:{power:2}},
        {label:"瞭望手", result:"你选择了瞭望手，一双眼睛总能在最恰当的时机发现机会与危险。", statEffect:{luck:2}}
      ]},
      {text:"你跟着船队潜入了一处传说中的珍珠潭，收获了几枚成色极佳的珍珠，也算长了不少见识。", weight:6, setFlag:"pirates_pearl"},
      {text:"你第一次亲眼见识了海盗旗议会的议事场面，各路船长唇枪舌剑，让你大开眼界。", weight:6},
      {text:"你跟着船队打捞了一艘传说中的沉船，虽然没找到传说中的宝藏，却也收获了不少值钱的古董。", weight:6, setFlag:"pirates_shipwreck"},
      {text:"你跟着船上的老水手学习绘制航海图，一笔一划间渐渐摸清了这门手艺的门道。", weight:6, setFlag:"pirates_cartography"},
      {text:"你自幼就跟着老水手在船上厮混，对海上的门道比同龄孩子熟悉得多。", weight:6, cond:c=>hasFlag(c,"pirates_early_sailor"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"一张从垂死老船长手里接过的残破海图——图上标注着『海神的宝库』，据说那里沉着历代所有葬身风暴的宝船。", weight:5, setFlag:"pirates_quest1"},
      {choice:true, weight:6, text:"俘获的商船上有一名自称医生的乘客，镇定地问你要不要留下他。", options:[{label:"邀他入伙做船医", result:"你邀他做了船医，第一个月他就从鬼门关拉回来三个船员——全船再没人质疑你的眼光。", statEffect:{health:1}, setFlag:"pirates_doctor"},{label:"按行情收取赎金放人", result:"你按行情收了赎金放了人，临走时他给你留了一小盒备用药品，算是行医者的体面。", statEffect:{wealth:1}},{label:"连人带船一并放行", result:"你大手一挥连人带船都放了——那天你心情好，海上传闻你『盗亦有道』。", statEffect:{charm:1}}]},
      {text:"你在甲板上养了一只会学人说话的鹦鹉，它最爱在你打牌输了的时候大声嚷嚷，全船人都笑作一团。", weight:6},
      {text:"你正式成为了一名独当一面的航海士，在船队里逐渐站稳了脚跟。", weight:10, achievement:"独当一面的航海士"},
      {text:"海上流传着一支神秘海盗团正在四处寻找传说中宝藏地图的消息，你隐隐觉得与自己有关。", weight:8},
      {text:"你申请到了一份官方的私掠许可证，从此可以名正言顺地在指定海域劫掠敌对势力的商船。", weight:6},
      {text:"船员们因为长期的低劣待遇而酝酿哗变，你必须在船长与船员之间找到一个平衡。", weight:6},
      {choice:true, weight:6, text:"你终于集齐了那张神秘海图，可船员们却因为传说中的禁海心生畏惧，你必须做出决定。", cond:c=>hasFlag(c,"pirates_map_complete"), options:[
        {label:"强行下令，闯入禁海", result:"你强行下令闯入了禁海，一路上险象环生，好在最终平安脱身，也让你的威望更上一层。", statEffect:{power:1,luck:-1}},
        {label:"耐心说服船员，共同前往", result:"你耐心地说服了船员们一同前往，这份耐心也让船员们对你的信任更深了一层。", statEffect:{charm:2}, achievement:"同舟共济"},
        {label:"放弃冒险，转而寻找其他财路", result:"你最终放弃了这场冒险，转而带着船员们去寻找更稳妥的财路，虽然少了传奇色彩，却也平安顺遂。", statEffect:{wealth:1}}
      ]},
      {death:true, text:"一场突如其来的风暴击碎了你的船，你和整支船队一同沉入了深海。", weight:1, cause:"葬身深海"},
      {choice:true, weight:6, text:"船员们就『是否接受一份护送贵重货物的高风险委托』征询你的意见。", options:[
        {label:"接受委托，博一次大的", result:"你接受了委托，虽然过程惊险，最终还是赚到了一笔丰厚的报酬。", statEffect:{wealth:2,luck:-1}},
        {label:"拒绝委托，安稳为上", result:"你拒绝了这份委托，安安稳稳地过日子，虽然少赚了一笔，身子骨倒也保养得好。", statEffect:{health:1}},
        {label:"提议压价后接受", result:"你提议压低报价后接受委托，这份精明让船员们对你的算账本事赞不绝口。", statEffect:{wit:1}}
      ]},
      {text:"你独自驾船穿越了一片布满暗礁的险境，凭着过人的胆识和运气全身而退。", weight:6},
      {text:"你受邀参加了一场海盗旗议会，各路船长就『海域划分』展开了激烈的争论，你的发言起到了关键作用。", weight:6, setFlag:"pirates_council"},
      {text:"你参加了海上举办的一场热闹婚礼，宾客们全是各路船员，场面比陆地上的婚礼更加豪放不羁。", weight:6},
      {text:"你在海盗黑市上做成了一笔大买卖，靠着精明的头脑赚到了人生第一笔可观的财富。", weight:6, statEffect:{wealth:2}},
      {text:"你的船只在海上遭遇了一伙拦路的海盗，对方明显是有心找茬。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你带着船员几个回合就打退了这伙海盗，还顺手缴获了他们的一批货物。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过这伙海盗，只能留下部分货物才换来一条生路。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番周旋后，双方达成了某种默契，各自扬帆离开，谁也没占到便宜。", statEffect:{luck:1}}}
      ]}
    ],
    prime:[
      {text:"半生的航行让你集齐了海图的另外两块残片——三图合一，宝库的位置指向了永夜风暴带的正中心。", weight:12, cond:c=>hasFlag(c,"pirates_quest1"), setFlag:"pirates_quest2"},
      {text:"你在无风带的海面上看见了一场持续整夜的海市蜃楼——那不是任何已知的港口，而是一座灯火通明、高楼直插云霄的钢铁之城。", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"你的船在一场突如其来的风暴中被吹离了航线，却因此意外发现了一座标注在任何海图之外的小岛。", weight:6, cond:c=>stat(c,"luck")>=8, statEffect:{wealth:1}},
      {text:"你率领船队找到了传说中的宝藏岛，一夜之间成了整片海域最富有的船长。", weight:10, cond:c=>stat(c,"luck")>=7 || transcendRank(c)>=1, achievement:"寻宝船长"},
      {text:"你在海上建立起了自己的势力范围，各路商船都愿意花钱请你的船队护航。", weight:8},
      {choice:true, weight:6, text:"海域各方船队就『航道该共同维护还是各自为战』产生了分歧。", options:[
        {label:"支持共同维护", result:"你支持了共同维护航道的方案，各路船队渐渐少了火并，海上贸易也因此更加繁荣。", statEffect:{charm:1}, worldStateKey:"pirates_seaInfluence", worldStateDelta:2},
        {label:"支持各自为战", result:"你支持了各自为战的老规矩，强大的船队占尽了便宜，弱小的船队却愈发难以立足。", statEffect:{power:1}, worldStateKey:"pirates_seaInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你率船闯入了传说中的禁海，那些关于海妖的传说究竟是真是假，你终于亲眼见证了答案。", weight:6, cond:c=>hasFlag(c,"pirates_map_complete"), achievement:"禁海探秘", statEffect:{luck:1}},
      {text:"那场船员哗变最终以你的妥善调解告终，你也因此在水手圈子里赢得了『护航船长』的美名。", weight:6},
      {text:"你在那处珍珠潭建立了自己的秘密据点，往后每年都能稳定地收获一批珍珠财富。", weight:6, cond:c=>hasFlag(c,"pirates_pearl")},
      {text:"你凭借着那次议会上的发言积累下的声望，被推举为新一任海盗旗议会的座上宾。", weight:6, cond:c=>hasFlag(c,"pirates_council")},
      {text:"你绘制的航海图因为精准详实，成了整片海域船长们争相求购的抢手货。", weight:6, cond:c=>hasFlag(c,"pirates_cartography")},
      {text:"你在那艘沉船的残骸里，意外发现了当年遗漏的一处密室，里面果然藏着传说中的宝藏。", weight:6, cond:c=>hasFlag(c,"pirates_shipwreck")},
      {choice:true, weight:6, text:"你的船队面临一个岔路口——是继续劫掠为生，还是转型做正经的护航生意，船员们等你拍板。", options:[
        {label:"继续劫掠，快意江湖", result:"你决定继续劫掠为生，快意江湖，虽然日子刺激，风险却也不小。", statEffect:{power:1,luck:-1}},
        {label:"转型护航，稳妥赚钱", result:"你决定转型做护航生意，稳稳当当地赚钱，日子过得踏实了不少。", statEffect:{wealth:2}},
        {label:"两条腿走路", result:"你决定两条腿走路，劫掠与护航两不耽误，这份灵活让船员们都服气。", statEffect:{wit:1}}
      ]}
    ],
    elder:[
      {choice:true, weight:40, text:"以海为扉的巨门在满月下敞开——海神在门后说：来，或者不来，只此一次。", cond:c=>!hasFlag(c,"pirates_gate_closed") && hasFlag(c,"pirates_beyond2") && hasTag(c,"pirates_destiny") && worldStateVal(c,"pirates_breakthrough")>=3, options:[{label:"驶入海之门", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"pirates_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"pirates_gate_closed"}]},
      {text:"海之意志圆满的满月夜，海平线立了起来——那不是海市蜃楼，是一扇以整片海为门扉的门。", weight:18, cond:c=>hasFlag(c,"pirates_beyond1") && worldStateVal(c,"pirates_breakthrough")>=3, setFlag:"pirates_beyond2"},
      {text:"无风的深夜，海面平静得像镜子——镜子里倒映的星空，比头顶的天空多出了一颗星。", weight:12, cond:c=>hasTag(c,"pirates_destiny") && worldStateVal(c,"pirates_breakthrough")>=2, setFlag:"pirates_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"沉海归来之后，海开始对你显露真容——老水手们说，海神在考察你，考察你配不配成为『海的化身』。", cond:c=>worldStateVal(c,"pirates_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"承接海之意志", riskyChance:0.13, lifespanBonus:90, successEffect:{luck:4,charm:2}, successResult:"你承接了海之意志的一缕——从此你的船永远顺风，你说的每一句关于海的话，都会成真。", successAchievement:"触及法则", worldStateKey:"pirates_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"被海收回", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"永夜风暴带就在船首正前方——两百年来驶入它的船没有一艘回来过，而海图说，宝库就在风暴眼里。", cond:c=>hasFlag(c,"pirates_quest2"), options:[{label:"驶入永夜风暴带", riskyChance:0.4, lifespanBonus:15, successEffect:{luck:3,wealth:3}, successResult:"当船冲进风暴眼的那一刻，海面忽然平静如镜——月光下，数百艘沉船的桅杆从海底升起，像一片森林。你成了传说本身。", successAchievement:"毕生所求", failResult:"风暴带没有给你机会——你的船成了那片桅杆森林里最新的一棵。", failDeath:true, failDeathChance:0.32, failCause:"葬身风暴", regressResult:"主桅在风暴边缘折断，你们被吐了出来——船废了大半，三块海图残片也散落进了海里。", regressEffect:{wealth:-2,health:-1}},{label:"把海图封进漂流瓶", result:"你把合一的海图封进漂流瓶抛回了大海——让海神自己决定，下一个读到它的人配不配。", statEffect:{luck:2}}]},
      {choice:true, weight:30, repeatable:true, text:"老水手临终前告诉你深海秘药真正的用法——沉入海渊最深处服下它，若海神认可你，便会赐下与海同寿的祝福。", cond:c=>worldStateVal(c,"pirates_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"沉入海渊服药", riskyChance:0.15, lifespanBonus:50, successEffect:{luck:3,health:2}, successResult:"海神认可了你——当你从海渊浮上来时，全身的伤疤都消失了，从此风暴绕着你的船走，岁月也绕着你走。", successAchievement:"二度超脱", worldStateKey:"pirates_breakthrough", worldStateDelta:1, failResult:"你沉入了海渊，再也没有浮上来。水手们说，那晚的海面安静得可怕。", failDeath:true, failDeathChance:0.55, failCause:"葬身海渊", regressResult:"海神拒绝了你，你被一股暖流托回了海面，捡回一条命，身体却大不如前。", regressEffect:{health:-3,luck:-2}, regressLifespanPenalty:22},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你退休后在港口开了间小酒馆，墙上挂着泛黄的旧海图，老船员们路过都要进来碰一杯。", weight:6},
      {text:"当年入伙的那位船医陪着你的船队走过了无数风浪，船员们都说，这条船上最锋利的不是炮，是他那双手。", weight:6, cond:c=>hasFlag(c,"pirates_doctor"), statEffect:{health:1}},
      {text:"你把自己一生的航海日志整理成册，留给了后来的年轻水手当作航海指南。", weight:10},
      {text:"你在自己名下的一座海岛上安度晚年，偶尔还会望着大海，想起当年扬帆远航的日子。", weight:8},
      {text:"你把那张拼凑完整的家传海图重新誊抄了一份，作为传家宝留给了膝下的水手后辈。", weight:6, cond:c=>hasFlag(c,"pirates_map_complete")},
      {text:"你时常向年轻水手讲述当年闯入禁海的经历，至于海妖到底是真是假，你总是笑而不答。", weight:6},
      {text:"你把那处珍珠潭据点的位置连同一份详细的海图，留给了自己最信任的水手后辈。", weight:6, cond:c=>hasFlag(c,"pirates_pearl")},
      {text:"你受邀最后一次出席海盗旗议会，各路船长纷纷起身，向你这位传奇致以最高的敬意。", weight:6, cond:c=>hasFlag(c,"pirates_council")},
      {text:"你把自己绘制多年的航海图整理成了一整套地图集，作为传家宝留给了后辈。", weight:6, cond:c=>hasFlag(c,"pirates_cartography")},
      {text:"你晚年时常受邀参加海上的婚礼，坐在贵宾席上，看着一对对新人，总会想起自己年轻时的岁月。", weight:6},
      {choice:true, weight:5, repeatable:true, text:"一位神秘的老水手向你透露了一种传说中的深海秘药，据说能让人多活数十年——但这秘药同样以夺命闻名。", cond:c=>worldStateVal(c,"pirates_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:52) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?8:12)), options:[
        {label:"冒险服下深海秘药", riskyChance:0.25, lifespanBonus:35, successEffect:{power:10,luck:4,health:2},
         successResult:"秘药在你体内发挥出了惊人的效果，你的身体状况大幅改善，仿佛年轻了十岁，一身筋骨也变得格外硬朗。", successAchievement:"突破天命", worldStateKey:"pirates_breakthrough", worldStateDelta:1,
         failResult:"秘药的毒性瞬间发作，你倒在了甲板上，再也没能起来。", failDeath:true, failDeathChance:0.6, failCause:"秘药中毒",
         regressResult:"秘药的毒性瞬间发作，你侥幸没有当场毒发身亡，只是这具身子骨从此落下了病根，再不如从前硬朗。", regressEffect:{power:-2,health:-2}, regressLifespanPenalty:5},
        {label:"只服用稀释后的少量秘药", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只服用了稀释后的少量秘药，效果有限，却也稳妥地续了几年寿命。",
         failResult:"这次尝试没什么明显效果，好在也没什么风险。"},
        {label:"拒绝秘药，相信天命", result:"你拒绝了这瓶秘药，选择相信天命，把余生过得踏实。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"你珍藏多年的一瓶烈酒，该留着自己喝还是分给老水手们。", options:[
        {label:"独自珍藏", result:"你选择独自珍藏这瓶烈酒，慢慢品味，倒也是晚年一份独属自己的乐趣。", statEffect:{luck:1}},
        {label:"分给大家，共叙旧情", result:"你把这瓶烈酒分给了老水手们，几杯下肚，大家共叙旧情，笑声传遍了整个甲板。", statEffect:{charm:2}},
        {label:"卖给识货的人", result:"你把这瓶烈酒卖给了识货的人，换来一笔不小的钱，倒也算是老来的一份实惠。", statEffect:{wealth:1}}
      ]},
      {choice:true, weight:6, text:"你即将撒手人寰，船员们争论着该把你葬在海里还是葬在陆地上，等你拍板。", options:[
        {label:"葬于大海，魂归故里", result:"你选择葬于大海，魂归故里——这片海洋，本就是你此生真正的家。", statEffect:{luck:1}},
        {label:"葬于陆地，入土为安", result:"你选择葬于陆地，入土为安，好歹给自己找一处踏实的归处。", statEffect:{origin:1}},
        {label:"骨灰撒在两处，各留一半", result:"你决定骨灰撒在两处，海洋与陆地各留一半，两边都算是你的家。", statEffect:{charm:1}}
      ]},
      {death:true, text:"深海秘药的余毒终究还是找上了门，在一个寻常的夜晚，你在睡梦中悄然离世，甲板上只留下一片安静的月光。", weight:1, cond:c=>worldStateVal(c,"pirates_breakthrough")>=1, cause:"余毒发作"},
      {text:"突破之后，你的运气好得出奇，仿佛连大海本身都在庇护着你的船。", weight:6, cond:c=>worldStateVal(c,"pirates_breakthrough")>=1 && stat(c,"luck")>=8},
      {text:"这些年航道共同维护的默契渐渐形成，你亲眼见证了这片海域因此少了许多不必要的争斗。", weight:6, cond:c=>worldStateVal(c,"pirates_seaInfluence")>=2},
      {text:"各路船队始终各自为战，你看着这片海域年复一年地陷在纷争里，心里明白，这终究不是长久的活法。", weight:6, cond:c=>worldStateVal(c,"pirates_seaInfluence")<=-1}
    ]
  },
  norse: {
    infant:[
      {text:"你出生的那一夜，天空中的极光格外绚烂，村里的贤者说这是诸神在关注你。", weight:10, cond:c=>state.age===0},
      {text:"你尚在襁褓中时，家里饲养的渡鸦就总喜欢落在你的摇篮边，一动不动地盯着你看。", weight:8, cond:c=>state.age<=1},
      {text:"你出生那夜，村中的智者正在纺织命运之线，忽然停下手中的活计，说这孩子的丝线格外特别。", weight:6, cond:c=>state.age===0},
      {text:"你满月时，家传的符文石毫无征兆地亮起了从未见过的光芒，族老们围着它议论了整整一夜。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，村边森林深处传来一声悠长的狼啸，此后接连数日都不曾再响起。", weight:6, cond:c=>state.age<=1},
      {text:"你出生那夜，族中长老取出了那枚代代相传的誓言之环，说要等你成年后再郑重交予你。", weight:6, setFlag:"norse_oath_ring", cond:c=>state.age===0},
      {text:"你尚在襁褓中，屋外的暴雪竟奇异地绕开了你家的方向，族人都说这是诸神的庇护。", weight:6, cond:c=>state.age<=1},
      {text:"你出生那夜，村中铁匠神庙的炉火罕见地彻夜未熄，铁匠们都说这是神明特意庇护的征兆。", weight:6, setFlag:"norse_smith_blessing", cond:c=>state.age===0},
      {text:"你尚在襁褓中，家中的贤者用极光占卜为你算了一卦，卦象显示你此生注定要经历一场重大的抉择。", weight:6, cond:c=>state.age<=1},
      {choice:true, weight:6, text:"你尚在襁褓中，村中的战士长与贤者就你该早早习武还是研习占卜争论不休，家人必须先选一条路。", options:[
        {label:"早早习武", result:"家人决定让你早早习武，从小就握起了武器。", statEffect:{power:1}, setFlag:"norse_early_warrior"},
        {label:"研习占卜", result:"家人决定让你跟着贤者研习占卜，从小就学着解读命运的征兆。", statEffect:{wit:1}},
        {label:"两者都学，格外辛苦", result:"家人决定两者都学，为此格外辛苦了几年，好在你也算撑住了。", statEffect:{health:-1,luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {choice:true, weight:6, text:"成年礼的试炼到了，长老给了你三种证明自己的方式。", options:[{label:"独自猎回一头巨熊", result:"你独自入山，三天后拖着一头巨熊回到部落，篝火边的欢呼声整夜未歇。", statEffect:{power:1}},{label:"远航寻回失落的圣物", result:"你驾着小船远航寻回了部落失落的圣物，长老说你是被诸神眷顾的孩子。", statEffect:{luck:1}},{label:"守夜圣坛七日", result:"你在圣坛独自守夜七日，风雪里悟出了许多平日想不明白的道理。", statEffect:{wit:1}}]},
      {text:"你被村中的战士长选中，开始学习使用战斧与长盾，稚嫩的手臂却渐渐有了力量。", weight:10},
      {text:"你在一次成年礼的试炼中表现优异，被族中长老称赞「颇有先祖遗风」。", weight:8},
      {text:"你在一次狼群袭击中被咬伤，伤口愈合后却隐隐觉得自己的感官比从前敏锐了许多，仿佛沾上了某种诅咒的痕迹。", weight:6, setFlag:"norse_wolf_curse"},
      {text:"你偶然触碰到了那块家传的符文石，脑海中闪过一段谁也看不懂的古老画面。", weight:6},
      {text:"一位游历四方的先知路过村落，看了你一眼后郑重宣布：诸神似乎已经为你准备了一场考验。", weight:6},
      {choice:true, weight:6, text:"战士长让你选择专精方向：战斧、长弓还是长盾，这将决定你的战斗风格。", options:[
        {label:"战斧", result:"你选择了战斧，挥砍之间尽显狂野之力。", statEffect:{power:2}},
        {label:"长弓", result:"你选择了长弓，练出了一双能百步穿杨的眼力。", statEffect:{luck:2}},
        {label:"长盾", result:"你选择了长盾，从此站在战线最前，如磐石般不可撼动。", statEffect:{health:2}}
      ]},
      {text:"你独自完成了雪原试炼，在极寒之地中挺过了整整三天三夜，归来时整个部落都为你欢呼。", weight:6},
      {text:"一位游吟诗人在村中吟唱了一段关于『诸神黄昏』的古老预言，让你对命运有了新的思索。", weight:6, setFlag:"norse_prophecy"},
      {text:"你跟着村中的铁匠学习了基础的锻造手艺，打出的第一件武器虽然粗糙，却也让长老们对你另眼相待。", weight:6, setFlag:"norse_smithing"},
      {text:"你参加了一场专为年轻战士举办的『英灵试炼』，虽然过程艰苦，却也让你对荣耀有了新的理解。", weight:6},
      {text:"你比同龄的孩子更早握起了武器，几年下来，身手已经隐隐超过了不少年长的伙伴。", weight:6, cond:c=>hasFlag(c,"norse_early_warrior"), statEffect:{power:1}}
    ],
    adult:[
      {text:"部落的老先知临终前抓着你的手说：诸神黄昏的预言并不完整——真正的结局刻在世界树根须间的三块符文石上，找到它们，就能知晓诸神隐瞒的真相。", weight:5, setFlag:"norse_quest1"},
      {choice:true, weight:6, text:"战后清点时，一名敌方部落的孤儿蜷在废墟里，整个北境已无他的容身之处。", options:[{label:"收养他如亲生骨肉", result:"你把他领回了家，像亲生骨肉一样抚养——血脉分敌我，孩子不分。", statEffect:{charm:1}, setFlag:"norse_orphan"},{label:"派人送回敌方部落", result:"你派了可靠的人把他送回了敌方部落的远亲那里，仁至义尽。", statEffect:{wit:1}},{label:"交给神殿抚养", result:"你把他交给了神殿——诸神座下，不问出身。", statEffect:{luck:1}}]},
      {text:"你在长夜的篝火边学会了用古老的调子吟唱萨迦，部落的孩子们最爱缠着你讲那些英雄的故事。", weight:6},
      {text:"你正式成为了村落的战士，肩负起了守卫家园、抵御巨人袭扰的重任。", weight:10, achievement:"村落战士"},
      {text:"一位神秘的旅行者似乎对你格外关注，据说他见过世界树的根须。", weight:8},
      {choice:true, weight:6, text:"满月之夜，你体内那份狼性即将彻底失控，族人的性命危在旦夕，你必须做出选择。", cond:c=>hasFlag(c,"norse_wolf_curse"), options:[
        {label:"拼死压制，绝不伤害族人", result:"你拼尽全力压制住了那份狼性，虽然浑身伤痕，却也保住了全族人的性命，从此在族中被尊为守护者。", statEffect:{power:1,health:-1}, achievement:"血狼守护者"},
        {label:"远离村落，独自承受这份诅咒", result:"你选择了远离村落，独自在荒野中承受这份诅咒的反噬，孤独却也保全了所有人。", statEffect:{luck:1,charm:-1}},
        {label:"寻求萨满帮助，尝试解除诅咒", result:"你找到部落的萨满寻求帮助，几番周折后，那份狼性诅咒总算被压制了下来，只是代价你从未对外提起。", statEffect:{wit:1}}
      ]},
      {death:true, text:"一场惨烈的战役中，你力战数名巨人后气力耗尽，倒在了冰封的战场上。", weight:1, cause:"战死沙场"},
      {text:"族中长老终于把那枚誓言之环交到了你手中，郑重地告诉你这份传承背后的责任。", weight:6, cond:c=>hasFlag(c,"norse_oath_ring"), setFlag:"norse_oath_bearer"},
      {text:"你在一场夜宴上听闻了关于『英灵战宴』的传说，据说战死的勇士都会在那里继续宴饮欢歌。", weight:6},
      {text:"你在雪原上遭遇了一伙拦路的劫掠者，对方明显不怀好意。", weight:6, next:[
        {cond:c=>stat(c,"power")>=7, next:{text:"你挥舞战斧几下便打退了这伙劫掠者，还顺手缴获了他们抢来的财货。", statEffect:{wealth:1}}},
        {cond:c=>stat(c,"power")<=3, next:{text:"你打不过这伙劫掠者，只能留下随身财物才换来一条生路。", statEffect:{wealth:-1,health:-1}}},
        {next:{text:"一番对峙后，双方都不愿真的拼命，各自退去，倒也相安无事。", statEffect:{luck:1}}}
      ]},
      {text:"你打造的一件武器被证实拥有不同寻常的锋利，族人都说这是铁匠神在庇护你的手艺。", weight:6, cond:c=>hasFlag(c,"norse_smithing")},
      {text:"出生那夜彻夜未熄的炉火，那份庇护似乎从未真正离你远去——无论你做什么营生，总能在最危急的关头绝处逢生。", weight:6, cond:c=>hasFlag(c,"norse_smith_blessing"), statEffect:{luck:2}},
      {text:"你在一场部落间的比武中展现出了过人的实力，被邻近部落邀请加入他们的远征队伍。", weight:6, setFlag:"norse_expedition"},
      {choice:true, weight:6, text:"一名年轻战士向你请教如何面对必败的战局。", options:[
        {label:"传授破釜之法", result:"你传授了他破釜沉舟的打法，虽然凶险，一旦成功便能扭转必败之局。", statEffect:{power:1}},
        {label:"教他体面撤退", result:"你教了他如何体面地撤退，留住有用之身，才有下次翻盘的机会。", statEffect:{wit:1}},
        {label:"告诉他荣耀重于生死", result:"你告诉他，对战士而言，荣耀远比生死更加重要，这份信念让他日后成了令人敬佩的勇士。", statEffect:{charm:1}}
      ]}
    ],
    prime:[
      {text:"多年的远征让你寻回了两块符文石——最后一块，在冰霜巨人腹地的深渊祭坛上。", weight:12, cond:c=>hasFlag(c,"norse_quest1"), setFlag:"norse_quest2"},
      {text:"一位盲眼的先知抓住你的手腕，浑浊的眼珠直直地『看』着你：『你的灵魂上有裂缝——你不是第一次活着，对吗？』", weight:1, achievement:"位面裂隙", statEffect:{luck:1}},
      {text:"吟游诗人为你编了一首专属的战歌，如今北境的战士们冲锋时唱的就是你的名字。", weight:6, cond:c=>stat(c,"power")>=8 || transcendRank(c)>=2, statEffect:{charm:1}},
      {text:"你在一场惨烈的战役中击退了入侵的巨人大军，被各部落尊为「巨人克星」。", weight:10, cond:c=>stat(c,"power")>=8 || transcendRank(c)>=1, achievement:"巨人克星"},
      {text:"你被推举为部落联盟的战争统帅，肩负起了守护整片北境的重任。", weight:8},
      {choice:true, weight:6, text:"各部落就『该联合起来共御强敌还是各自为政』产生了分歧。", options:[
        {label:"支持联合共御", result:"你支持了联合共御的方案，各部落之间的默契渐渐深厚，北境也因此少了不少伤亡。", statEffect:{charm:1}, worldStateKey:"norse_tribeInfluence", worldStateDelta:2},
        {label:"支持各自为政", result:"你支持了各自为政的老规矩，强大的部落更加自主，弱小的部落却愈发孤立无援。", statEffect:{power:1}, worldStateKey:"norse_tribeInfluence", worldStateDelta:-1},
        {label:"不表态，静观其变", result:"你没有表态，这场争论最终不了了之。", statEffect:{luck:1}}
      ]},
      {text:"你彻底掌控了体内那份狼性的力量，从『诅咒』变成了你在战场上最锋利的武器。", weight:6, cond:c=>hasFlag(c,"norse_wolf_curse"), achievement:"驭狼者"},
      {text:"你带着符文石的指引找到了一处失落已久的古代遗迹，其中的发现震动了整片北境。", weight:6},
      {choice:true, weight:6, text:"部落议事会就『是否与邻近部落结盟对抗巨人』征询你的意见。", options:[
        {label:"支持结盟，合力御敌", result:"你支持了结盟，各部落合力御敌，往后面对巨人袭扰也多了几分底气。", statEffect:{charm:2}},
        {label:"反对结盟，独立自强", result:"你反对了结盟，主张独立自强，这份硬气虽然孤立了些，却也让族人更加团结。", statEffect:{power:1}},
        {label:"提议有条件结盟", result:"你提议在保留自主权的前提下有条件结盟，这份周全的考量最终成了各部落效仿的范本。", statEffect:{wit:1}}
      ]},
      {text:"你戴着那枚誓言之环立下的每一个誓言，都被族人视作不可违背的约定，你的威望由此更盛。", weight:6, cond:c=>hasFlag(c,"norse_oath_bearer")},
      {text:"你开始隐隐感觉到，那位游吟诗人吟唱的『诸神黄昏』预兆，似乎真的在这片土地上悄然显现。", weight:6, cond:c=>hasFlag(c,"norse_prophecy")},
      {text:"你打造武器的手艺已经名扬整片北境，各路战士都以拥有你亲手锻造的武器为荣。", weight:6, cond:c=>hasFlag(c,"norse_smithing")},
      {text:"你带领着那支远征队伍立下了赫赫战功，队伍里的战士们都心甘情愿地追随你。", weight:6, cond:c=>hasFlag(c,"norse_expedition")}
    ],
    elder:[
      {choice:true, weight:40, text:"世界树最高处的门在等你——推开它，你将去到连诸神黄昏都触及不到的地方。", cond:c=>!hasFlag(c,"norse_gate_closed") && hasFlag(c,"norse_beyond2") && hasTag(c,"norse_destiny") && worldStateVal(c,"norse_breakthrough")>=3, options:[{label:"推开诸神之上的门", riskyChance:0.5, successResult:"你迈出了那一步。", successAchievement:"超越规则者", successAscend:true, failResult:"你在跨越的瞬间被规则的边界撕碎——离得那么近，终究差了一步。", failDeath:true, failDeathChance:0.5, failCause:"湮灭于规则边界", regressResult:"门在你迈步的刹那合拢了——你被弹回原地，那扇门再也没有出现过。", regressEffect:{luck:-2}, regressSetFlag:"norse_gate_closed"},{label:"转身离开，留在此界", result:"你看了那扇门很久，最终转过身——这个世界还有你放不下的东西。门缓缓合拢，你听见了一声很轻的叹息。", statEffect:{charm:2,luck:1}, setFlag:"norse_gate_closed"}]},
      {text:"神席之上，你终于看清了诸神一直仰望的方向——世界树最高的枝头之上，有一扇连奥丁都未曾推开的门。", weight:18, cond:c=>hasFlag(c,"norse_beyond1") && worldStateVal(c,"norse_breakthrough")>=3, setFlag:"norse_beyond2"},
      {text:"世界树的叶落声里，你听见了一个比诸神更古老的声音——它说：诸神也在墙内。", weight:12, cond:c=>hasTag(c,"norse_destiny") && worldStateVal(c,"norse_breakthrough")>=2, setFlag:"norse_beyond1"},
      {choice:true, weight:30, repeatable:true, text:"半神化之后，你在梦中受邀列席了一次诸神的宴席——奥丁看着你说：英灵殿为你留了一个位置，但你也可以走另一条路。", cond:c=>worldStateVal(c,"norse_breakthrough")===2 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"争取神席", riskyChance:0.13, lifespanBonus:90, successEffect:{power:4,luck:2}, successResult:"诸神承认了你——你的名字被刻进了世界树的年轮里，北境的萨迦从此把你与诸神并列吟唱。", successAchievement:"触及法则", worldStateKey:"norse_breakthrough", worldStateDelta:1, failResult:"你在触及的瞬间被那股伟力彻底湮灭。", failDeath:true, failDeathChance:0.6, failCause:"神威碾碎", regressResult:"你在最后关头被弹了回来，侥幸保住性命，但存在状态受到了重创。", regressEffect:{wit:-2,health:-2}, regressLifespanPenalty:30},{label:"止步于此，敬畏规则", result:"你在门槛前停住了脚步——有些边界，看见过就已经足够。", statEffect:{wit:1}, startCooldown:true}]},
      {choice:true, weight:14, text:"冰霜巨人的腹地就在雪原尽头——取回最后一块符文石，你将成为唯一知晓诸神黄昏真相的凡人。", cond:c=>hasFlag(c,"norse_quest2"), options:[{label:"远征巨人腹地", riskyChance:0.38, lifespanBonus:12, successEffect:{wit:3,power:2,luck:2}, successResult:"当三块符文石拼合的瞬间，真相如极光般在你眼前展开——原来诸神黄昏不是终结，而是重生。你把这个秘密刻成了新的萨迦，北境的长夜从此有了盼头。", successAchievement:"毕生所求", failResult:"巨人的守卫比传说中更古老——你倒在祭坛前的雪地里，手还朝着符文石的方向。", failDeath:true, failDeathChance:0.35, failCause:"陨落雪原", regressResult:"远征在深渊边缘折戟，你带着冻掉的两根手指撤回了部落——最后一块符文石，成了你余生梦里反复出现的形状。", regressEffect:{power:-2,health:-2}},{label:"将两块符文石献给神殿", result:"你把两块符文石献给了神殿，让祭司们世代守护——也许某天，会有更年轻的英雄走完这最后一程。", statEffect:{charm:1,wit:1}}]},
      {choice:true, weight:30, repeatable:true, text:"献祭之后，先知说你已有资格追求最后的荣耀——半神化：饮下诸神的蜜酒，让凡人的血脉与神性交融。", cond:c=>worldStateVal(c,"norse_breakthrough")===1 && state.age>=(hasTag(c,"transcendent")?56:62) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?3:5)), options:[{label:"饮下诸神蜜酒", riskyChance:0.15, lifespanBonus:65, successEffect:{power:3,luck:3}, successResult:"交融成功——蜜酒的暖流淌过四肢百骸，你的血脉中从此流淌着一缕真正的神性，寿元与伤病都不再能轻易困住你。", successAchievement:"二度超脱", worldStateKey:"norse_breakthrough", worldStateDelta:1, failResult:"凡人的躯壳没能承受住神性的重量，你在灼热的白光中化为了飞灰。", failDeath:true, failDeathChance:0.55, failCause:"神性反噬", regressResult:"交融失败，神性被你的血脉排斥而出，你大病了整整一年才缓过来。", regressEffect:{power:-3,health:-2}, regressLifespanPenalty:22},{label:"不再冒险，安享余生", result:"你决定不再挑战命运的极限，安然接受岁月本来的模样。", statEffect:{luck:1}, startCooldown:true}]},
      {text:"你晚年把毕生的战斗技艺刻成了符文石碑，立在训练场边，年轻战士们开练之前都会去摸一摸。", weight:6},
      {text:"当年收养的那名敌方孤儿，如今成了两个部落之间和平的桥梁——长老们说，你收养的不是一个孩子，是整个北境未来的安宁。", weight:6, cond:c=>hasFlag(c,"norse_orphan"), statEffect:{charm:1}},
      {text:"你把自己一生的战斗经验编成了萨迦英雄叙事诗，由吟游诗人传唱至今。", weight:10},
      {text:"你在壁炉旁安享晚年，孙辈们围坐在你身边，缠着你讲述当年与巨人搏斗的往事。", weight:8},
      {text:"你把家传的符文石郑重地交给了族中最有天赋的年轻人，嘱咐他好好守护这份传承。", weight:6},
      {text:"你在临终前，那份体内的狼性力量忽然彻底平静下来，仿佛完成了它此生的使命。", weight:6, cond:c=>hasFlag(c,"norse_wolf_curse")},
      {text:"你把那枚誓言之环郑重地交给了下一代，重复了当年长老交予你时说过的每一句话。", weight:6, cond:c=>hasFlag(c,"norse_oath_bearer")},
      {text:"你在生命的尽头，仿佛已经能看到英灵战宴的宴席在远处若隐若现，微笑着阖上了双眼。", weight:6},
      {text:"你把自己打造武器的手艺毫无保留地传给了村中最有天赋的年轻人，看着炉火不熄，心里踏实。", weight:6, cond:c=>hasFlag(c,"norse_smithing")},
      {text:"你在生命的尽头，仿佛又看到了当年那场极光占卜显示的抉择，如今终于尘埃落定，心中一片安然。", weight:6},
      {choice:true, weight:5, repeatable:true, text:"一位年迈的先知告诉你，向奥丁献上一场凶险的献祭仪式，或许能换来延续的寿命——但奥丁的意志向来难以揣测。", cond:c=>worldStateVal(c,"norse_breakthrough")===0 && state.age>=(hasTag(c,"transcendent")?51:52) && (state.age-state.lastBreakthroughAge>=(hasTag(c,"transcendent")?8:12)), options:[
        {label:"举行凶险的献祭仪式", riskyChance:0.28, lifespanBonus:45, successEffect:{power:10,wit:4,luck:2},
         successResult:"奥丁似乎垂听了你的献祭，一股神秘的力量涌入你的身体，寿命被硬生生延续了下去，浑身也涌动着一股难以言喻的战意。", successAchievement:"突破天命", worldStateKey:"norse_breakthrough", worldStateDelta:1,
         failResult:"奥丁的意志无情地降下，献祭台上，你的生命瞬间被彻底夺走。", failDeath:true, failDeathChance:0.6, failCause:"献祭反噬",
         regressResult:"奥丁的意志无情地降下，你侥幸没有被彻底夺去性命，只是那份反噬之力让你元气大伤，往日的勇武大不如前。", regressEffect:{power:-2,health:-1}, regressLifespanPenalty:5},
        {label:"只献上简单的祭品", riskyChance:0.75, lifespanBonus:8,
         successResult:"你只献上了简单的祭品，效果有限，却也稳妥地续了几年寿命。",
         failResult:"这次献祭没什么明显效果，好在也没什么风险。"},
        {label:"拒绝献祭，坦然赴死", result:"你拒绝了这场献祭，决定坦然面对死亡，把这份从容留给自己。", statEffect:{luck:1}, startCooldown:true}
      ]},
      {choice:true, weight:6, text:"女武神已经在门外等候，你必须决定用什么样的方式迎接她的到来。", options:[
        {label:"手持武器，战意昂扬地迎接", result:"你手持武器，战意昂扬地迎接了女武神的到来，一如你此生的模样。", statEffect:{power:1}},
        {label:"平静安然，含笑迎接", result:"你平静安然地含笑迎接了女武神，没有半分不舍，只有满足。", statEffect:{luck:1}},
        {label:"召集族人共同送行", result:"你召集了族人共同送行，让这最后一程，也充满了族人的陪伴与祝福。", statEffect:{charm:1}}
      ]},

      {text:"突破之后，你在战场上几乎无人能挡，年轻战士们都以能与你并肩作战为荣。", weight:6, cond:c=>worldStateVal(c,"norse_breakthrough")>=1 && stat(c,"power")>=8},
      {text:"这些年部落联盟的默契渐渐深厚，你亲眼见证了北境因此少了许多本可以避免的伤亡。", weight:6, cond:c=>worldStateVal(c,"norse_tribeInfluence")>=2},
      {text:"各部落始终各自为政，你看着强敌年复一年地蚕食着这片土地，心里明白，这终究不是长久之计。", weight:6, cond:c=>worldStateVal(c,"norse_tribeInfluence")<=-1}
    ]
  }
};

/* ========================= 工具函数 ========================= */
function rnd(n){ return Math.floor(Math.random()*n); }
function pick(arr){ return arr[rnd(arr.length)]; }
function weightedPick(list){
  const total = list.reduce((s,x)=>s+x.weight,0);
  let r = Math.random()*total;
  for(const item of list){ r -= item.weight; if(r<=0) return item; }
  return list[list.length-1];
}

/* 百岁之后的岁月侧重：修行本身成为生活的主旋律（修炼类可重复事件权重×2）；
   而随着寿元一点点逼近上限，"冲击下一重境界"会越来越频繁地占据心头——
   突破契机的出现概率随寿限进度渐增（寿限过半后开始上浮，最高×4）。 */
function dynamicEventWeight(e){
  let w = e.weight || 1;
  if(state.age >= 100){
    if(e.repeatable && !e.choice) w *= 2;
    if(e.choice && e.options && e.options.some(o=>o.worldStateKey)){
      const base = (WORLD_BASE_LIFESPAN[state.ctx.world] || [78,18])[0];
      const ratio = state.age / Math.max(1, base + state.lifespanBonus);
      w *= (1 + Math.max(0, Math.min(3, (ratio-0.5)*4)));
    }
  }
  return w;
}
function weightedPickDynamic(list){
  const total = list.reduce((s,x)=>s+dynamicEventWeight(x),0);
  let r = Math.random()*total;
  for(const item of list){ r -= dynamicEventWeight(item); if(r<=0) return item; }
  return list[list.length-1];
}

/* 突破阶梯注册表：开局时扫描全部世界的事件池，把每个世界"从第几层通往第几层"的
   突破选项登记在案——供"寿元将尽、强行冲关"这类引擎级机制直接取用。 */
const BREAKTHROUGH_LADDER = {};
function buildBreakthroughLadder(){
  const scan = (world, ev) => {
    if(!ev.choice || !ev.options) return;
    const opt = ev.options.find(o=>o.worldStateKey && o.riskyChance!==undefined);
    if(!opt) return;
    if(opt.worldStateKey!=="qixiu_realm" && !opt.worldStateKey.endsWith("_breakthrough")) return;
    const src = String(ev.cond||"");
    const m = src.match(/\)===(\d)/);
    const from = m ? parseInt(m[1],10) : 0;
    (BREAKTHROUGH_LADDER[world] = BREAKTHROUGH_LADDER[world] || {})[from] = opt;
  };
  Object.keys(WORLD_EVENTS).forEach(w=>{
    ["youth","adult","prime","elder"].forEach(st=>{
      (WORLD_EVENTS[w][st]||[]).forEach(ev=>scan(w, ev));
    });
  });
}
buildBreakthroughLadder();
/* 属性量表语义：1~10 是凡人量表的极限；11 及以上是"超凡量级"——
   只有突破境界、达成毕生宏愿这类传奇成功（uncapped路径）才能把属性推过10。
   凡人（超凡位阶为0）的传奇上限是25——靠宏愿封神的凡人英雄可以超凡入圣到这个高度；
   而真正踏上超凡阶梯（位阶≥1）的存在，属性不设上限——大乘修士、飞升候选者的力量
   本就不该被一个数字框住。放开上限是安全的：超凡增益只来自一生有限次的传奇成功，
   来源有界，数值自然有界。
   普通事件的属性增益依然封顶在凡人量表内（已经超凡的属性不会被普通增益进一步推高），
   但绝不会把既有的超凡属性"打回"凡人上限——超凡者的力量不会因为一次寻常的历练而缩水。 */
function applyStatEffect(effect, uncapped){
  Object.keys(effect).forEach(k=>{
    const raw = state.stats[k] + effect[k];
    if(uncapped){
      const legendCap = transcendRank(state.ctx) >= 1 ? Infinity : 25;
      state.stats[k] = Math.max(1, Math.min(legendCap, raw));
    } else {
      const cap = Math.max(10, state.stats[k]); // 普通增益不越过10，但不裁剪已有的超凡值
      state.stats[k] = Math.max(1, Math.min(cap, raw));
    }
  });
}

/* ========================= 世界变化：让玩家的选择真正累积成"世界的变化" =========================
   与flag不同，flag只记录"发生过没有"这种是非状态；worldState记录的是数值型、可以持续累积的变量
   （比如某片土地的"民心""繁荣度""动荡程度"），玩家多年间的一系列选择会不断叠加或削减这个数值，
   后续事件再依据这个数值的高低，让文案真正体现出"这个世界因为你，已经变得不一样了"。 */
function adjustWorldState(key, delta){
  if(!key || !delta) return;
  state.worldState[key] = (state.worldState[key]||0) + delta;
}
function worldStateVal(ctx, key){
  return (ctx.worldState && ctx.worldState[key]) || 0;
}

/* 超凡位阶：统一衡量一个角色"超脱凡俗的程度"——
   修仙界按境界（筑基1/金丹2/元婴3/化神4/大乘5），其余世界按寿命突破的层数（一重1/二重2/三重3）。
   事件可以据此区分"凡人"与"超凡者"，让高境界者遇到与其实力相称的剧情与归宿。 */
function transcendRank(ctx){
  return ctx.world==="qixiu"
    ? worldStateVal(ctx, "qixiu_realm")
    : worldStateVal(ctx, ctx.world+"_breakthrough");
}

/* ========================= 借鉴 lifeRestartZero 的"事件即时链"思路 =========================
   参考项目里每个事件可以声明 branch/postEvent：一件事解决之后，会根据当下的属性状态，
   直接、确定地跳转到某个具体的后续事件，而不是像我原来的flag机制那样，只是把"以后有机会响应"
   这件事悄悄记下来，能不能真正在后续人生中被抽到，全凭运气。
   这里引入的 `next` 字段就是对应的能力：一个事件（或选择项的结果）解决后，如果带有 next，
   就会在同一年之内，立刻、确定地把 next 指向的后续事件也展示出来，形成真正紧密的因果链条。
   next 可以是：
     - 一个事件对象：无条件地立刻触发这个后续事件；
     - 一个 [{cond, next}, ...] 数组：依次检查条件，命中的第一项对应的事件立刻触发（借鉴对方的branch）。
   任何事件也可以标记 repeatable:false 以外的 onlyChained:true——表示这件事从不会被随机抽到，
   只能作为某条链的下一环出现（对应对方的 NoRandom）。 */
function resolveNextChain(ev, ctx){
  if(!ev.next) return false;
  let target = null;
  if(Array.isArray(ev.next)){
    for(const branch of ev.next){
      if(!branch.cond || branch.cond(ctx)){ target = branch.next; break; }
    }
  } else {
    target = ev.next;
  }
  if(!target) return false;

  if(target.death){
    state.log.push({age:state.age, text:resolveText(target, ctx), type:"death"});
    state.alive = false;
    finishLife(target.cause || "意外离世");
    return true;
  }

  if(target.statEffect) applyStatEffect(target.statEffect, target.uncappedEffect);
  if(target.setFlag) state.flags.add(target.setFlag);
  if(target.worldStateKey) adjustWorldState(target.worldStateKey, target.worldStateDelta!==undefined?target.worldStateDelta:1);
  state.log.push({age:state.age, text:resolveText(target, ctx), type: target.achievement ? "milestone" : (target.logType||"")});
  if(target.achievement && state.achievements.indexOf(target.achievement)===-1){
    state.achievements.push(target.achievement);
    unlockAchievement(target.achievement);
  }
  return resolveNextChain(target, ctx);
}

function weightedTalentDraw(pool, count){
  const bag=[];
  pool.forEach(t=>{ for(let i=0;i<RARITY_WEIGHT[t.rarity];i++) bag.push(t); });
  const chosen=[]; const usedIds=new Set();
  while(chosen.length<count && usedIds.size<pool.length){
    const t = pick(bag);
    if(!usedIds.has(t.id)){ usedIds.add(t.id); chosen.push(t); }
  }
  return chosen;
}

/* ========================= 成就系统：持久化存储 =========================
   window.storage 是 Claude.ai 内置 artifact 的专属存储接口，只有在 Claude.ai 里直接运行时才存在；
   一旦把游戏打包成独立网页（比如部署到自己的域名、或者直接用浏览器打开本地文件），
   window.storage 就不存在了——这也是之前"每次打开都是全新的"的根本原因。
   这里补上 localStorage 作为通用浏览器环境下的存储方案：只要是同一个浏览器、同一个来源(origin)，
   进度和成就就会被浏览器本地保留下来，下次再打开也能读取回来。两种存储会同时尝试写入，
   哪种环境可用就用哪种，确保无论是在 Claude.ai 里玩，还是把文件保存下来单独打开，都能记住进度。 */
const HAS_ARTIFACT_STORAGE = typeof window !== "undefined" && !!window.storage;
const HAS_LOCAL_STORAGE = (()=>{
  if(typeof window === "undefined" || !window.localStorage) return false;
  try{ window.localStorage.setItem("__isekai_probe__","1"); window.localStorage.removeItem("__isekai_probe__"); return true; }
  catch(e){ return false; } // 部分浏览器的隐私模式下 localStorage 存在但会抛错，需要提前探测
})();
const LOCAL_STORAGE_PREFIX = "isekai_restart_";

async function storageGetValue(key){
  if(HAS_ARTIFACT_STORAGE){
    try{ const res = await window.storage.get(key, false); if(res && res.value!=null) return res.value; }
    catch(e){ /* 尚未有存档，继续尝试下一种存储方式 */ }
  }
  if(HAS_LOCAL_STORAGE){
    try{ const v = window.localStorage.getItem(LOCAL_STORAGE_PREFIX+key); if(v!=null) return v; }
    catch(e){ /* 静默忽略 */ }
  }
  return null;
}
async function storageSetValue(key, value){
  if(HAS_ARTIFACT_STORAGE){
    try{ await window.storage.set(key, value, false); }catch(e){ /* 静默忽略 */ }
  }
  if(HAS_LOCAL_STORAGE){
    try{ window.localStorage.setItem(LOCAL_STORAGE_PREFIX+key, value); }catch(e){ /* 静默忽略 */ }
  }
}

/* ========================= 局外成长（跨局持久成长） =========================
   "局外成长"指的是：即便每一局的世界观、天赋、事件都是从零随机开始，
   玩家跨越很多局积累下来的"经历过多少段人生"这件事本身，也应该被这个游戏记住、并给出回馈——
   否则"重开模拟器"就真的只是一次性的东西，而不是一个可以长期把玩的游戏。
   设计上刻意保持"温和"：解锁的都是小优化、小惊喜、纪念性内容，绝不会让游戏变得"一眼看穿"或者
   直接堆数值碾压过去的随机性——核心的生死、突破、结局依然完全看这一局的运气与选择。 */
const META_MILESTONES = [
  {lives:5,  id:"meta_luck1",   name:"薄有气运",   desc:"此后每一局开局都会额外获得 +1 幸运。"},
  {lives:15, id:"meta_reroll",  name:"命运重掷",   desc:"往后每局开局面对三个世界观选项时，多一次重新抽取的机会。"},
  {lives:30, id:"meta_talent",  name:"轮回之力",   desc:"命运天赋池中，从此可能抽到「轮回之力」这一独特天赋。"},
  {lives:50, id:"meta_luck2",   name:"气运渐丰",   desc:"此后每一局开局再额外获得 +1 幸运（与「薄有气运」叠加）。"},
  {lives:100,id:"meta_master",  name:"轮回大师",   desc:"这份纪念会作为专属印记，出现在此后每一局的终章画面上。"}
];
function defaultMetaProgress(){
  return {totalLivesCompleted:0, unlockedMilestones:[]};
}
function checkMetaMilestones(){
  const mp = state.metaProgress || (state.metaProgress = defaultMetaProgress());
  mp.totalLivesCompleted++;
  const newlyUnlocked = [];
  META_MILESTONES.forEach(m=>{
    if(mp.totalLivesCompleted>=m.lives && !mp.unlockedMilestones.includes(m.id)){
      mp.unlockedMilestones.push(m.id);
      newlyUnlocked.push(m);
    }
  });
  savePersistedMetaProgress();
  return newlyUnlocked;
}
function hasMetaMilestone(id){
  return !!(state.metaProgress && state.metaProgress.unlockedMilestones.includes(id));
}

async function loadPersistedData(){
  if(!HAS_ARTIFACT_STORAGE && !HAS_LOCAL_STORAGE) return;
  try{
    const v = await storageGetValue("unlocked_achievements");
    if(v) state.unlockedAchievements = new Set(JSON.parse(v));
  }catch(e){ /* 尚未有存档，保持空集合 */ }
  try{
    const v2 = await storageGetValue("play_stats");
    if(v2) state.playStats = Object.assign(
      {totalLives:0, worldsPlayed:[], hiddenEndingsUnlocked:[]},
      JSON.parse(v2)
    );
  }catch(e){ /* 尚未有存档，保持默认值 */ }
  try{
    const v3 = await storageGetValue("meta_progress");
    if(v3) state.metaProgress = Object.assign(defaultMetaProgress(), JSON.parse(v3));
    else state.metaProgress = defaultMetaProgress();
  }catch(e){ state.metaProgress = defaultMetaProgress(); }
}

async function savePersistedAchievements(){
  if(!HAS_ARTIFACT_STORAGE && !HAS_LOCAL_STORAGE) return;
  await storageSetValue("unlocked_achievements", JSON.stringify([...state.unlockedAchievements]));
}
async function savePersistedStats(){
  if(!HAS_ARTIFACT_STORAGE && !HAS_LOCAL_STORAGE) return;
  await storageSetValue("play_stats", JSON.stringify(state.playStats));
}
async function savePersistedMetaProgress(){
  if(!HAS_ARTIFACT_STORAGE && !HAS_LOCAL_STORAGE) return;
  await storageSetValue("meta_progress", JSON.stringify(state.metaProgress));
}

/* 解锁一个成就：id 必须与 ACHIEVEMENT_CATALOG 中的 id 完全一致。
   已解锁过的成就不会重复计入「本局新解锁」列表。 */
function unlockAchievement(id){
  if(state.unlockedAchievements.has(id)) return;
  state.unlockedAchievements.add(id);
  state.newlyUnlockedThisLife.push(id);
  savePersistedAchievements();
}

/* 结算一局人生结束时的跨局统计与「元成就」判定 */
function checkMetaAchievements(){
  state.playStats.totalLives = (state.playStats.totalLives||0) + 1;
  if(state.playStats.totalLives===1) unlockAchievement("初次转生");
  if(state.playStats.totalLives>=10) unlockAchievement("屡败屡战");

  (state.worldsVisitedThisLife || new Set([state.worldview.id])).forEach(wid=>{
    if(!state.playStats.worldsPlayed.includes(wid)){
      state.playStats.worldsPlayed.push(wid);
    }
  });
  if(state.playStats.worldsPlayed.length>=WORLDVIEWS.length) unlockAchievement("阅遍诸界");

  if(state.isHiddenEnding){
    unlockAchievement("天命之子");
    if(!state.playStats.hiddenEndingsUnlocked.includes(state.worldview.id)){
      state.playStats.hiddenEndingsUnlocked.push(state.worldview.id);
    }
    if(state.playStats.hiddenEndingsUnlocked.length>=WORLDVIEWS.length) unlockAchievement("命运收藏家");
  }

  if(state.age>=90) unlockAchievement("长命百岁");
  if(!state.alive && state.age<20) unlockAchievement("英年早逝");
  if(CORE_STAT_KEYS.every(k=>state.stats[k]>=10)) unlockAchievement("满级传说");

  // 隐藏成就判定
  const talentTags = new Set();
  state.chosenTalents.forEach(t=> t.tags.forEach(tag=>talentTags.add(tag)));
  const talentIds = state.chosenTalents.map(t=>t.id);

  if(state.chosenTalents.length===3 && state.chosenTalents.every(t=>t.rarity==="legendary")){
    unlockAchievement("天选暴发户");
  }
  if(state.chosenTalents.length===3 && state.chosenTalents.every(t=>t.rarity==="flaw")){
    unlockAchievement("开局地狱难度");
  }
  if(talentTags.has("deathflag") && !state.alive){
    unlockAchievement("Flag应验");
  }
  if(talentTags.has("villain") && state.alive){
    unlockAchievement("这个反派人不错");
  }
  if(state.reincarnation.id.endsWith("_outcast") && state.isHiddenEnding){
    unlockAchievement("逆天改命");
  }
  if(!state.autoPlayUsedThisLife){
    unlockAchievement("手动挡玩家");
  }
  if(talentIds.includes("twinsoul") && talentIds.includes("prophet")){
    unlockAchievement("灵魂本源共鸣");
  }
  if(computeScore()<30 && state.achievements.length>=1){
    unlockAchievement("虽败犹荣");
  }

  savePersistedStats();
}

function baseBudgetUsed(){
  // 加点模式下，花费的点数就是"当前值 - 天赋/投胎方式带来的基础值"的直接差额，1点对应1点，
  // 不再有等级曲线，也就不会再出现"退还的点数比想象中多或少"这种反直觉的情况。
  return STAT_KEYS.reduce((s,k)=>s+Math.max(0, state.stats[k]-(state.baseStats?state.baseStats[k]:1)),0);
}
function remainingBudget(){
  return state.budgetTotal - baseBudgetUsed();
}

/* 首页展示的"扫码开始游戏"二维码，固定指向游戏的正式部署地址。
   只在首次用到时生成一次并缓存下来，避免每次重新渲染首页都重复计算。 */
const START_GAME_URL = "https://lighting1130.github.io/isekai-restart/";
let _startGameQRSvg = null;
function getStartGameQRSvg(){
  if(_startGameQRSvg) return _startGameQRSvg;
  try{
    const qr = qrcode(0, "M");
    qr.addData(START_GAME_URL);
    qr.make();
    // 用内嵌SVG而不是createDataURL生成的GIF格式data URL：
    // 手写的GIF编码器在个别手机浏览器上解码不稳定，是二维码显示不出来的常见原因；
    // SVG是标准的HTML元素，直接嵌进页面里，不需要额外的图片解码步骤，兼容性要可靠得多。
    _startGameQRSvg = qr.createSvgTag({cellSize:4, margin:8});
  }catch(e){ _startGameQRSvg = null; }
  return _startGameQRSvg;
}

    "阅遍诸界": Math.min((state.playStats.worldsPlayed||[]).length,12)+" / 12",

  const sections = categories.map(cat=>{
    const items = ACHIEVEMENT_CATALOG.filter(a=>a.category===cat);

      const isUnlocked = unlocked.has(a.id);

        return `<div class="achieve-card locked">

          <div class="achieve-body">

      return `<div class="achieve-card ${isUnlocked?"unlocked":"locked"}">

  return `
