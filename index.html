<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>异世界重开模拟器</title>

<!-- PWA: 安装到主屏幕/桌面所需的清单与图标 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0c22">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="异世界重开">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg-0:#0f0c22;
    --bg-1:#171233;
    --panel:#221a45;
    --panel-2:#2b2154;
    --line: rgba(216,178,106,0.18);
    --text:#ece4ff;
    --text-dim:#a99bd6;
    --gold:#d8b26a;
    --violet:#9075e0;
    --danger:#e0615c;
    --success:#6fd9a0;
    --font-display:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
    --font-body:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(144,117,224,0.25), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(216,178,106,0.12), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
    color:var(--text);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  #app{width:100%;max-width:720px;}

  /* 顶部纹样 */
  .rune-divider{
    display:flex;align-items:center;gap:10px;
    color:var(--gold); opacity:.85; margin:0 0 18px;
    font-size:12px; letter-spacing:.3em;
  }
  .rune-divider::before,.rune-divider::after{
    content:"";flex:1;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  h1.title{
    font-family:var(--font-display);
    text-align:center;
    font-size:34px;
    letter-spacing:.12em;
    margin:4px 0 2px;
    background:linear-gradient(180deg,#f2e2b8,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 24px rgba(216,178,106,0.25);
  }
  .subtitle{
    text-align:center;color:var(--text-dim);font-size:13px;
    letter-spacing:.05em; margin-bottom:22px;
  }

  /* 命书卡片 */
  .scroll{
    position:relative;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:14px;
    padding:26px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
    margin-bottom:18px;
  }
  .scroll::before, .scroll::after{
    content:"◆";
    position:absolute; color:var(--gold); opacity:.5; font-size:10px;
  }
  .scroll::before{top:10px;left:12px;}
  .scroll::after{top:10px;right:12px;}

  .section-label{
    font-family:var(--font-display);
    color:var(--gold); font-size:15px; letter-spacing:.15em;
    margin:0 0 14px; display:flex; align-items:center; gap:8px;
  }
  .section-label .idx{
    font-size:11px;color:var(--text-dim);border:1px solid var(--line);
    padding:1px 7px;border-radius:20px;
  }

  p, .desc{color:var(--text-dim); line-height:1.7; font-size:14px;}

  /* 按钮 */
  .btn{
    font-family:var(--font-body);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 20px;
    border-radius:9px;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .btn:hover{border-color:var(--gold); box-shadow:0 0 0 1px rgba(216,178,106,0.25);}
  .btn:active{transform:scale(.97);}
  .btn.primary{
    background:linear-gradient(180deg,#e9c98a,var(--gold));
    color:#241a09; border:none; font-weight:600;
  }
  .btn.primary:hover{box-shadow:0 6px 20px rgba(216,178,106,0.35);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}
  .btn-row.center{justify-content:center;}

  /* 转生方式 / 天赋 卡片 */
  .card-grid{display:grid; gap:12px;}
  .pick-card{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.02);
    border-radius:11px;
    padding:16px 16px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .pick-card:hover{border-color:var(--violet); background:rgba(144,117,224,0.08); transform:translateY(-1px);}
  .pick-card.selected{border-color:var(--gold); background:rgba(216,178,106,0.10);}
  .pick-card h3{margin:0 0 6px; font-family:var(--font-display); font-size:16px; color:var(--text);}
  .pick-card p{margin:0; font-size:13px;}
  .tag-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
  .mod-tag{
    font-size:11px; padding:2px 8px; border-radius:20px;
    border:1px solid var(--line); color:var(--text-dim);
  }
  .mod-tag.pos{color:var(--success); border-color:rgba(111,217,160,0.35);}
  .mod-tag.neg{color:var(--danger); border-color:rgba(224,97,92,0.35);}

  .rarity-badge{
    font-size:11px; padding:2px 9px; border-radius:20px; font-weight:600;
    display:inline-block; margin-bottom:8px; letter-spacing:.05em;
  }
  .rarity-legendary{background:rgba(216,178,106,0.15); color:var(--gold); border:1px solid rgba(216,178,106,0.4);}
  .rarity-epic{background:rgba(144,117,224,0.15); color:#b9a4ff; border:1px solid rgba(144,117,224,0.4);}
  .rarity-rare{background:rgba(97,168,224,0.15); color:#8fc4f2; border:1px solid rgba(97,168,224,0.4);}
  .rarity-common{background:rgba(111,217,160,0.12); color:var(--success); border:1px solid rgba(111,217,160,0.35);}
  .rarity-flaw{background:rgba(224,97,92,0.12); color:var(--danger); border:1px solid rgba(224,97,92,0.35);}

  .chosen-strip{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .chosen-chip{
    font-size:12px; padding:5px 12px; border-radius:20px;
    border:1px solid var(--gold); color:var(--gold); background:rgba(216,178,106,0.08);
  }
  .chosen-chip.empty{color:var(--text-dim); border-color:var(--line); background:none;}

  /* 属性分配 */
  .stat-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-bottom:1px dashed var(--line);
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-name{width:64px; font-size:14px; color:var(--text); flex-shrink:0;}
  .stat-bar{
    flex:1; height:9px; border-radius:6px; background:rgba(255,255,255,0.06);
    overflow:hidden; position:relative;
  }
  .stat-bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--violet),var(--gold));}
  .stat-num{width:28px; text-align:right; font-family:var(--font-display); color:var(--gold); font-size:15px;}
  .stat-ctrl{display:flex; gap:4px;}
  .stat-ctrl button{
    width:26px;height:26px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); cursor:pointer; font-size:14px; line-height:1;
  }
  .stat-ctrl button:disabled{opacity:.3;cursor:not-allowed;}
  .stat-cost-hint{
    width:66px; flex-shrink:0; text-align:right;
    font-size:11px; color:var(--text-dim); opacity:.75;
  }

  .budget-line{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; font-size:13px; color:var(--text-dim);
  }
  .budget-line b{color:var(--gold); font-size:16px; font-family:var(--font-display);}

  /* 罗盘 */
  .compass-wrap{display:flex; justify-content:center; margin:6px 0 16px;}

  /* 模拟日志 */
  .status-bar{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:14px; padding:10px 12px;
    background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:10px;
  }
  .status-chip{
    display:flex; align-items:baseline; gap:4px;
    font-size:11px; padding:3px 9px; border-radius:20px;
    border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim);
  }
  .status-value{font-family:var(--font-display); font-size:13px; color:var(--gold); font-weight:600;}

  .log-wrap{max-height:420px; overflow-y:auto; padding-right:4px;}
  .log-wrap::-webkit-scrollbar{width:6px;}
  .log-wrap::-webkit-scrollbar-thumb{background:var(--panel-2); border-radius:3px;}
  .log-entry{
    display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);
    animation:fadeIn .35s ease;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-age{
    flex-shrink:0; width:52px; text-align:right; font-family:var(--font-display);
    color:var(--gold); font-size:13px; padding-top:1px;
  }
  .log-text{font-size:14px; line-height:1.65; color:var(--text);}
  .log-text.death{color:var(--danger);}
  .log-text.milestone{color:var(--gold);}
  .log-text.fortune{color:var(--success);}
  .log-text.misfortune{color:#e0a15c;}
  .log-text.choice{color:var(--violet); font-weight:600;}

  .choice-panel{
    border:1px solid var(--violet); border-radius:11px;
    background:rgba(144,117,224,0.08); padding:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .choice-hint{
    font-size:12px; color:#b9a4ff; text-align:center;
    letter-spacing:.1em; margin-bottom:4px;
  }
  .choice-option{
    width:100%; text-align:left; background:var(--panel-2);
    border:1px solid var(--line); padding:11px 14px;
  }
  .choice-option:hover{border-color:var(--violet);}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .progress-line{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--text-dim); margin-bottom:12px;
  }
  .speed-toggle{display:flex; gap:6px;}
  .speed-toggle button{
    font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--line);
    background:none; color:var(--text-dim); cursor:pointer;
  }
  .speed-toggle button.active{border-color:var(--gold); color:var(--gold);}

  /* 结局 */
  .ending-title{
    text-align:center; font-family:var(--font-display); font-size:26px;
    color:var(--gold); margin:6px 0 4px;
  }
  .ending-sub{text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:18px;}
  .score-box{
    display:flex; justify-content:center; align-items:baseline; gap:8px; margin-bottom:20px;
  }
  .score-num{font-family:var(--font-display); font-size:44px; color:var(--gold);}
  .score-label{font-size:12px; color:var(--text-dim);}
  .achieve-list{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 4px;}
  .achieve-chip{
    font-size:12px; padding:4px 11px; border-radius:20px;
    border:1px solid rgba(144,117,224,0.4); color:#b9a4ff; background:rgba(144,117,224,0.08);
  }

  .footer-note{text-align:center; color:var(--text-dim); font-size:11px; margin-top:22px; letter-spacing:.05em;}

  /* 成就殿堂 */
  .achieve-summary{
    text-align:center; color:var(--gold); font-family:var(--font-display);
    font-size:15px; margin-bottom:16px; letter-spacing:.05em;
  }
  .achieve-card{
    display:flex; align-items:flex-start; gap:12px;
    border:1px solid var(--line); border-radius:11px;
    padding:13px 14px; margin-bottom:10px;
    background:rgba(255,255,255,0.02);
  }
  .achieve-card.unlocked{border-color:rgba(216,178,106,0.45); background:rgba(216,178,106,0.06);}
  .achieve-icon{
    flex-shrink:0; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; border:1px solid var(--line); background:var(--panel-2);
  }
  .achieve-card.unlocked .achieve-icon{
    border-color:var(--gold); color:var(--gold); background:rgba(216,178,106,0.12);
  }
  .achieve-card.locked .achieve-icon{ color:var(--text-dim); opacity:.6; }
  .achieve-body{flex:1;}
  .achieve-name{font-size:14px; color:var(--text); font-weight:600; margin-bottom:2px;}
  .achieve-card.locked .achieve-name{color:var(--text-dim);}
  .achieve-desc{font-size:12px; color:var(--text-dim); line-height:1.5;}
  .achieve-progress{font-size:11px; color:var(--gold); margin-top:4px;}

  .new-unlock-banner{
    border:1px solid var(--gold); border-radius:10px;
    background:rgba(216,178,106,0.1); padding:12px 14px;
    margin-bottom:16px; font-size:13px; color:var(--gold); text-align:center;
  }

  @media (max-width:480px){
    h1.title{font-size:26px;}
    .scroll{padding:18px 16px;}
    .stat-name{width:52px; font-size:13px;}
    .stat-row{flex-wrap:wrap; row-gap:6px;}
    .stat-cost-hint{width:100%; text-align:left; padding-left:64px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
"use strict";

/* ========================= 数据层 ========================= */

const STAT_KEYS = ["power","wit","charm","luck","origin","health","wealth"];
const STAT_LABEL = { power:"战力", wit:"悟性", charm:"魅力", luck:"气运", origin:"出身", health:"健康", wealth:"财富" };
/* health/wealth 这两项新属性不受天赋与投胎方式影响，统一从中等水平(5)起步，
   主要靠属性分配环节的手动加点、以及人生模拟过程中大量事件的实时影响来变化——
   健康值会直接影响每年的意外死亡概率，财富值则会解锁/触发一些与经济状况相关的事件分支。 */
const NEUTRAL_STAT_KEYS = ["health","wealth"];
const NEUTRAL_STAT_BASELINE = 5;
/* 「命运积分」「结局分层」「隐藏结局」这几套此前已经过反复测算校准的判定逻辑，
   都只基于最初的五维属性（战力/悟性/魅力/气运/出身）——健康与财富是后加的两项新属性，
   起始基准值为5，如果直接混入这些计算会让基准分数整体上浮，打乱之前校准好的门槛，
   所以这里单独留一份不含健康/财富的"核心五维"列表，专门给这些计算使用。 */
const CORE_STAT_KEYS = ["power","wit","charm","luck","origin"];

const WORLDVIEWS = [
  {id:"qixiu", name:"灵气复苏 · 修仙界", tagline:"渡劫飞升，逆天改命",
   desc:"天地灵气复苏，凡人可修炼成仙，肉体亦可飞升，寿元长达万载。"},
  {id:"magic", name:"阿卡纳大陆 · 剑与魔法", tagline:"魔法与剑，勇者的史诗",
   desc:"经典的剑与魔法世界，魔王与勇者的传说代代相传，永不落幕。"},
  {id:"scifi", name:"二一二七 · 星际科技位面", tagline:"星辰大海，机甲纵横",
   desc:"星际殖民时代，基因改造与机甲战争主宰着人类文明的走向。"},
  {id:"warhammer", name:"战锤纪元 · 黑暗千年", tagline:"唯有战争永恒",
   desc:"人类帝国孤悬于亿万星海之间，战争、信仰与背叛从未停歇。"},
  {id:"yaoguai", name:"妖怪横行 · 东方异闻录", tagline:"人妖殊途，缘起江湖",
   desc:"阴阳杂糅的东方古国，妖魔鬼怪与修行之人共存于市井之间。"},
  {id:"cyberpunk", name:"机械废土 · 核冬纪元", tagline:"钢铁与荒芜并存",
   desc:"核战之后的废土世界，义体改造与赛博网络重塑了人类文明。"},
  {id:"steampunk", name:"蒸汽纪元 · 齿轮与秩序", tagline:"以蒸汽为血，以秩序为骨",
   desc:"维多利亚风格的蒸汽机械帝国，飞艇与齿轮装置主宰着这个讲究规矩与阶级的世界。"},
  {id:"zombie", name:"丧尸围城 · 末日纪元", tagline:"在废墟与尸潮中挣扎求生",
   desc:"一场突如其来的病毒灾变让文明分崩离析，幸存者们在丧尸横行的废墟都市中艰难求生。"},
  {id:"westworld", name:"荒野西部 · 枪火纪元", tagline:"快枪与赏金的荒芜大陆",
   desc:"一片充斥着牛仔、赏金猎人与铁路矿脉的荒芜西部大陆，规矩全靠腰间的手枪来说话。"},
  {id:"urbanpower", name:"都市异能 · 觉醒纪元", tagline:"钢筋水泥下涌动的超凡力量",
   desc:"看似平凡的现代都市之下，隐藏着一群悄然觉醒超凡能力的人们，游走在秩序与失控的边缘。"},
  {id:"pirates", name:"大航海 · 风暴纪元", tagline:"扬帆于未知海域的黄金时代",
   desc:"大航海黄金时代的浩瀚海域，海盗、商船与传说中的宝藏在惊涛骇浪间交织出无数冒险故事。"},
  {id:"norse", name:"诸神黄昏 · 北欧神域", tagline:"凡人与诸神共存的神话时代",
   desc:"北欧神话中巨人、诸神与凡人共同生活的世界，命运女神的丝线早已为世界织好了终结的预兆。"}
];

const REINCARNATIONS_BY_WORLD = {
  qixiu: [
    { id:"qixiu_baby", name:"凡胎转生 · 从零开始",
      desc:"魂穿凡人婴儿之躯，在灵气尚且稀薄的凡俗之家降生，一切修仙之路都要从头开始。",
      startAge:0, mod:{},
      opening:"在一声嘹亮的啼哭中，你降生在了一户普通的凡人农家，屋外的灵气稀薄得几乎难以察觉。" },
    { id:"qixiu_noble", name:"世家夺舍 · 嫡系子弟",
      desc:"灵魂占据了一名修真世家嫡系子弟的躯体，含着灵石汤匙出生，却也继承了原主人留下的麻烦。",
      startAge:0, mod:{origin:2, power:-1},
      opening:"你悠悠转醒，发现自己躺在铺着灵纹锦缎的婴儿床里，房梁上悬着家族历代供奉的护法符箓。" },
    { id:"qixiu_outcast", name:"仙门弃徒 · 绝境重生",
      desc:"你转生成了一名被宗门放弃、判定再无修炼价值的弃徒，境遇凄凉，却也因此无人再来打扰你的秘密。",
      startAge:0, mod:{origin:-2, luck:-1},
      opening:"你在宗门后山的柴房里悠悠转醒，账册上记着你的名字——一个早已被判定「毫无灵根」的弃徒。" },
    { id:"qixiu_summon", name:"雷劫夺体 · 半步筑基",
      desc:"你的灵魂在一场天劫降临的瞬间强行夺取了一名筑基修士的躯体，一睁眼便已站在生死存亡的关口。",
      startAge:16, mod:{power:2, luck:-1},
      opening:"漫天雷霆炸响的刹那，你睁开了眼睛——借来的这具躯体，正立于渡劫的雷云之下。" },
    { id:"qixiu_prodigy", name:"灵根神童 · 天纵之才",
      desc:"你生来就展现出远超同龄人的灵根禀赋，宗门上下都对你寄予厚望，压力也随之而来。",
      startAge:0, mod:{wit:2, luck:-1},

/* 事件池：age:[min,max]  cond(ctx)=>bool   effect(ctx)=>void   weight   once   achievement  death */
function hasTag(ctx, tag){ return ctx.tags.has(tag); }
function hasFlag(ctx, flag){ return ctx.flags.has(flag); }
function stat(ctx, key){ return ctx.stats[key]; }
/* 事件的 text 字段可以是普通字符串（通用文案），也可以是按世界观区分的对象
   （如 {qixiu:"...", magic:"...", ...}），resolveText 负责按当前世界观取出对应文案 */
function resolveText(ev, ctx){
  if(typeof ev.text === "string") return ev.text;
  return ev.text[ctx.world] || ev.text.magic || Object.values(ev.text)[0];
}

    {text:"你在一场公开辩论会上舌灿莲花，把对手说得哑口无言，赢得了「铁齿铜牙」的外号。", weight:6},

    {text:"你在小院里种满了从各地带回的奇花异草，晚年常常在花丛间流连忘返。", weight:6},

    {text:"你收到了一封来自远方老友的信，信里絮絮叨叨地写满了这些年的琐碎近况。", weight:6},

/* ========================= 工具函数 ========================= */
function rnd(n){ return Math.floor(Math.random()*n); }
function pick(arr){ return arr[rnd(arr.length)]; }
function weightedPick(list){
  const total = list.reduce((s,x)=>s+x.weight,0);
  let r = Math.random()*total;
  for(const item of list){ r -= item.weight; if(r<=0) return item; }
  return list[list.length-1];
}
function applyStatEffect(effect){
  Object.keys(effect).forEach(k=>{
    state.stats[k] = Math.max(1, Math.min(10, state.stats[k] + effect[k]));
  });
}
function weightedTalentDraw(pool, count){
  const bag=[];
  pool.forEach(t=>{ for(let i=0;i<RARITY_WEIGHT[t.rarity];i++) bag.push(t); });
  const chosen=[]; const usedIds=new Set();
  while(chosen.length<count && usedIds.size<pool.length){
    const t = pick(bag);
    if(!usedIds.has(t.id)){ usedIds.add(t.id); chosen.push(t); }
  }
  return chosen;
}
function costOf(level){ return level*(level+1)/2; }
function escapeModText(mod){
  return Object.keys(mod).map(k=>{
    const v = mod[k];
    return `<span class="mod-tag ${v>0?'pos':'neg'}">${STAT_LABEL[k]}${v>0?'+':''}${v}</span>`;
  }).join("");
}

/* ========================= 成就系统：持久化存储 ========================= */
const HAS_STORAGE = typeof window !== "undefined" && !!window.storage;

async function loadPersistedData(){
  if(!HAS_STORAGE) return;
  try{
    const res = await window.storage.get("unlocked_achievements", false);
    if(res && res.value) state.unlockedAchievements = new Set(JSON.parse(res.value));
  }catch(e){ /* 尚未有存档，保持空集合 */ }
  try{
    const res2 = await window.storage.get("play_stats", false);
    if(res2 && res2.value) state.playStats = Object.assign(
      {totalLives:0, worldsPlayed:[], hiddenEndingsUnlocked:[]},
      JSON.parse(res2.value)
    );
  }catch(e){ /* 尚未有存档，保持默认值 */ }
}

async function savePersistedAchievements(){
  if(!HAS_STORAGE) return;
  try{ await window.storage.set("unlocked_achievements", JSON.stringify([...state.unlockedAchievements]), false); }
  catch(e){ /* 存储失败时静默忽略，不影响游戏本身进行 */ }
}
async function savePersistedStats(){
  if(!HAS_STORAGE) return;
  try{ await window.storage.set("play_stats", JSON.stringify(state.playStats), false); }
  catch(e){ /* 存储失败时静默忽略 */ }
}

/* 解锁一个成就：id 必须与 ACHIEVEMENT_CATALOG 中的 id 完全一致。
   已解锁过的成就不会重复计入「本局新解锁」列表。 */
function unlockAchievement(id){
  if(state.unlockedAchievements.has(id)) return;
  state.unlockedAchievements.add(id);
  state.newlyUnlockedThisLife.push(id);
  savePersistedAchievements();
}

/* 结算一局人生结束时的跨局统计与「元成就」判定 */
function checkMetaAchievements(){
  state.playStats.totalLives = (state.playStats.totalLives||0) + 1;
  if(state.playStats.totalLives===1) unlockAchievement("初次转生");
  if(state.playStats.totalLives>=10) unlockAchievement("屡败屡战");

  if(!state.playStats.worldsPlayed.includes(state.worldview.id)){
    state.playStats.worldsPlayed.push(state.worldview.id);
  }
  if(state.playStats.worldsPlayed.length>=WORLDVIEWS.length) unlockAchievement("阅遍诸界");

  if(state.isHiddenEnding){
    unlockAchievement("天命之子");
    if(!state.playStats.hiddenEndingsUnlocked.includes(state.worldview.id)){
      state.playStats.hiddenEndingsUnlocked.push(state.worldview.id);
    }
    if(state.playStats.hiddenEndingsUnlocked.length>=WORLDVIEWS.length) unlockAchievement("命运收藏家");
  }

  if(state.age>=90) unlockAchievement("长命百岁");
  if(!state.alive && state.age<20) unlockAchievement("英年早逝");
  if(STAT_KEYS.every(k=>state.stats[k]>=10)) unlockAchievement("满级传说");

  // 隐藏成就判定
  const talentTags = new Set();
  state.chosenTalents.forEach(t=> t.tags.forEach(tag=>talentTags.add(tag)));
  const talentIds = state.chosenTalents.map(t=>t.id);

  if(state.chosenTalents.length===3 && state.chosenTalents.every(t=>t.rarity==="legendary")){
    unlockAchievement("天选暴发户");
  }
  if(state.chosenTalents.length===3 && state.chosenTalents.every(t=>t.rarity==="flaw")){
    unlockAchievement("开局地狱难度");
  }
  if(talentTags.has("deathflag") && !state.alive){
    unlockAchievement("Flag应验");
  }
  if(talentTags.has("villain") && state.alive){
    unlockAchievement("这个反派人不错");
  }
  if(state.reincarnation.id.endsWith("_outcast") && state.isHiddenEnding){
    unlockAchievement("逆天改命");
  }
  if(!state.autoPlayUsedThisLife){
    unlockAchievement("手动挡玩家");
  }
  if(talentIds.includes("twinsoul") && talentIds.includes("prophet")){
    unlockAchievement("灵魂本源共鸣");
  }
  if(computeScore()<30 && state.achievements.length>=1){
    unlockAchievement("虽败犹荣");
  }

  savePersistedStats();
}

function baseBudgetUsed(){
  return STAT_KEYS.reduce((s,k)=>s+costOf(state.stats[k]),0);
}
function remainingBudget(){
  // 天赋与投胎方式带来的属性加成不占用玩家可分配的点数：
  // 可用总额 = 手动分配点数(budgetTotal) + 天赋加成本身消耗的"点数"(floorCost)
  return state.budgetTotal + (state.floorCost||0) - baseBudgetUsed();
}

  else if(state.screen==="reincarnation") html += renderReincarnation();
  else if(state.screen==="talent") html += renderTalent();
  else if(state.screen==="stats") html += renderStats();
  else if(state.screen==="sim") html += renderSim();
  else if(state.screen==="ending") html += renderEnding();

function renderStats(){
  const remain = Math.max(0, remainingBudget());
  const rows = STAT_KEYS.map(k=>{
    const v = state.stats[k];
    const pct = Math.round(v/10*100);
    const nextCost = costOf(v+1)-costOf(v);
    const backCost = v>1 ? costOf(v)-costOf(v-1) : 0;
    const canInc = v<10 && nextCost<=remain;
    const canDec = v>1;
    return `<div class="stat-row">
      <div class="stat-name">${STAT_LABEL[k]}</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
      <div class="stat-num">${v}</div>
      <div class="stat-ctrl">
        <button data-stat-dec="${k}" ${canDec?"":"disabled"} title="${canDec?`退还 ${backCost} 点`:""}">−</button>
        <button data-stat-inc="${k}" ${canInc?"":"disabled"} title="${v<10?`花费 ${nextCost} 点`:"已达上限"}">＋</button>
      </div>
      <div class="stat-cost-hint">${v<10 ? `下一级 −${nextCost}` : "已满级"}</div>
    </div>`;
  }).join("");

  return `
  <div class="scroll">
    <div class="section-label">第四步 · 属性分配 <span class="idx">04</span></div>
    <div class="budget-line"><span>剩余点数</span><b>${remain}</b></div>
    <p style="margin-top:-8px;">属性等级越高，每提升一级所需的点数也越多（第2级起依次为 2、3、4…点），所以同样点一次「＋」，高等级属性掉的点数会明显更多——这是设计如此，并非漏洞。</p>

function renderAchievements(){
  const unlocked = state.unlockedAchievements;
  const unlockedCount = ACHIEVEMENT_CATALOG.filter(a=>unlocked.has(a.id)).length;

  // 少数「特殊成就」有明确的数值进度，额外显示一行进度提示
  const progressHints = {
    "屡败屡战": Math.min(state.playStats.totalLives||0,10)+" / 10",
    "阅遍诸界": Math.min((state.playStats.worldsPlayed||[]).length,12)+" / 12",
    "命运收藏家": Math.min((state.playStats.hiddenEndingsUnlocked||[]).length,12)+" / 12"
  };

  const categories = ["特殊成就","世界成就","隐藏成就"];
  const sections = categories.map(cat=>{
    const items = ACHIEVEMENT_CATALOG.filter(a=>a.category===cat);

      const isUnlocked = unlocked.has(a.id);

          <div class="achieve-body">

/* ========================= 事件绑定 ========================= */
function bindEvents(){
  const $ = sel => app.querySelector(sel);
  const $$ = sel => app.querySelectorAll(sel);

  if($("#btn-start")) $("#btn-start").onclick = ()=>{
    state.worldviewOptions = drawWorldviews();
    state.worldview = null;
    state.screen="worldview";
    render();
  };

  $$("[data-worldview]").forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute("data-worldview");
      state.worldview = state.worldviewOptions.find(w=>w.id===id);
      render();
    };
  });
  if($("#btn-to-reincarnation")) $("#btn-to-reincarnation").onclick = ()=>{
    state.reincarnationOptions = drawReincarnationOptions(state.worldview.id);
    state.reincarnation = null;
    state.screen="reincarnation";
    render();
  };

  $$("[data-reincarnation]").forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute("data-reincarnation");
      state.reincarnation = state.reincarnationOptions.find(r=>r.id===id);
      render();
    };
  });
  if($("#btn-to-talent")) $("#btn-to-talent").onclick = ()=>{
    startTalentDraw();
    state.screen="talent";
    render();
  };

  $$("[data-talent-idx]").forEach(el=>{
    el.onclick = ()=>{
      const idx = parseInt(el.getAttribute("data-talent-idx"),10);
      const round = state.talentRounds[state.currentRound];
      const chosen = round.options[idx];
      state.chosenTalents.push(chosen);
      state.currentRound++;
      if(state.currentRound < 3) prepareRound(state.currentRound);
      render();
    };
  });
  if($("#btn-to-stats")) $("#btn-to-stats").onclick = ()=>{
    applyTalentAndReincarnationMods();
    state.screen="stats";
    render();
  };

  $$("[data-stat-inc]").forEach(el=>{
    el.onclick = ()=>{
      const k = el.getAttribute("data-stat-inc");
      const cost = costOf(state.stats[k]+1)-costOf(state.stats[k]);
      if(state.stats[k]<10 && cost<=remainingBudget()){ state.stats[k]++; render(); }
    };
  });
  $$("[data-stat-dec]").forEach(el=>{
    el.onclick = ()=>{
      const k = el.getAttribute("data-stat-dec");
      if(state.stats[k]>1){ state.stats[k]--; render(); }
    };
  });
  if($("#btn-stat-random")) $("#btn-stat-random").onclick = ()=>{
    randomizeStats();
    render();
  };
  if($("#btn-to-sim")) $("#btn-to-sim").onclick = ()=>{
    startSimulation();
    state.screen="sim";
    render();
  };

  $$("[data-speed]").forEach(el=>{
    el.onclick = ()=>{
      state.speed = el.getAttribute("data-speed");
      render();
      scheduleNextTick();
    };
  });
  if($("#btn-toggle-autoplay")) $("#btn-toggle-autoplay").onclick = ()=>{
    state.autoPlay = !state.autoPlay;
    if(state.autoPlay){
      state.autoPlayUsedThisLife = true;
      render();
      scheduleNextTick();
    } else {
      if(state.simTimer) clearTimeout(state.simTimer);
      render();
    }
  };
  if($("#btn-manual-step")) $("#btn-manual-step").onclick = ()=>{
    stepAge();
  };
  $$("[data-choice-idx]").forEach(el=>{
    el.onclick = ()=>{
      const idx = parseInt(el.getAttribute("data-choice-idx"),10);
      resolveChoice(idx);
    };
  });
  if($("#btn-to-ending")) $("#btn-to-ending").onclick = ()=>{
    state.screen="ending";
    render();
  };
  if($("#btn-restart")) $("#btn-restart").onclick = ()=>{
    resetState();
    render();
  };
  if($("#btn-view-achievements")) $("#btn-view-achievements").onclick = ()=>{
    state.achievementsFrom = state.screen;
    state.screen = "achievements";
    render();
  };
  if($("#btn-achievements-back")) $("#btn-achievements-back").onclick = ()=>{
    state.screen = state.achievementsFrom || "intro";
    render();
  };

  const logWrap = $("#log-wrap");
  if(logWrap) logWrap.scrollTop = logWrap.scrollHeight;
}

/* ========================= 逻辑：世界观抽取 ========================= */
function drawWorldviews(){
  const pool = WORLDVIEWS.slice();
  const result = [];
  while(result.length<3 && pool.length){
    const idx = rnd(pool.length);
    result.push(pool.splice(idx,1)[0]);
  }
  return result;
}

function drawReincarnationOptions(worldId){
  const pool = REINCARNATIONS_BY_WORLD[worldId].slice();
  const result = [];
  while(result.length<3 && pool.length){
    const idx = rnd(pool.length);
    result.push(pool.splice(idx,1)[0]);
  }
  return result;
}

/* ========================= 逻辑：天赋抽取 ========================= */
function startTalentDraw(){
  state.talentRounds = [];
  state.currentRound = 0;
  state.chosenTalents = [];
  prepareRound(0);
}
function availableTalentPool(){
  return TALENTS.filter(t=> !t.world || t.world===state.worldview.id);
}
function prepareRound(idx){
  const options = weightedTalentDraw(availableTalentPool().filter(t=>!state.chosenTalents.includes(t)), 3);
  state.talentRounds[idx] = { options, chosen:null };
}

function applyTalentAndReincarnationMods(){
  // reset stats baseline：健康/财富从中等水平起步，其余五维属性从1起步交由天赋与投胎方式决定
  STAT_KEYS.forEach(k=> state.stats[k] = NEUTRAL_STAT_KEYS.includes(k) ? NEUTRAL_STAT_BASELINE : 1);
  const rMod = state.reincarnation.mod;
  Object.keys(rMod).forEach(k=> state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+rMod[k])) );
  state.chosenTalents.forEach(t=>{
    Object.keys(t.mod).forEach(k=> state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+t.mod[k])) );
  });
  state.baseStats = Object.assign({}, state.stats);
  state.floorCost = STAT_KEYS.reduce((s,k)=>s+costOf(state.baseStats[k]),0);
}

/* ========================= 逻辑：属性分配 ========================= */
function randomizeStats(){
  const base = state.baseStats || {power:1,wit:1,charm:1,luck:1,origin:1,health:NEUTRAL_STAT_BASELINE,wealth:NEUTRAL_STAT_BASELINE};
  STAT_KEYS.forEach(k=> state.stats[k]=base[k]);
  let remain = state.budgetTotal; // 天赋加成不占用这部分手动分配额度
  let guard = 500;
  while(remain>0 && guard-->0){
    const k = pick(STAT_KEYS);
    if(state.stats[k]>=10) continue;
    const cost = costOf(state.stats[k]+1)-costOf(state.stats[k]);
    if(cost<=remain){
      state.stats[k]++;
      remain -= cost;
    }
    if(STAT_KEYS.every(kk=>state.stats[kk]>=10)) break;
  }
}

/* ========================= 逻辑：人生模拟 ========================= */
function getTagSet(){
  const s = new Set();
  state.chosenTalents.forEach(t=> t.tags.forEach(tag=>s.add(tag)));
  return s;
}
function stageForAge(age){
  if(age<=9) return "infant";
  if(age<=15) return "youth";
  if(age<=30) return "adult";
  if(age<=50) return "prime";
  return "elder";
}
function deathChance(age, ctx){
  let base;
  if(age<16) base=0.004;
  else if(age<=50) base=0.006;
  else base = 0.010 + (age-50)*0.006;
  const powerLuck = (ctx.stats.power + ctx.stats.luck)/2;
  base *= Math.max(0.25, 1 - (powerLuck-5)*0.06);
  // 健康值同样直接影响意外死亡概率：体弱多病的人更容易遭遇不测，身强体健则更容易化险为夷
  const health = ctx.stats.health!==undefined ? ctx.stats.health : 5;
  base *= Math.max(0.4, 1 - (health-5)*0.08);
  return Math.min(base, 0.6);
}

function startSimulation(){
  state.log = [];
  state.achievements = [];
  state.newlyUnlockedThisLife = [];
  state.finished = false;
  state.isHiddenEnding = false;
  state.autoPlay = false;
  state.autoPlayUsedThisLife = false;
  state.alive = true;
  state.causeOfEnd = null;
  state.age = state.reincarnation.startAge;
  const tags = getTagSet();
  state.flags = new Set();
  state.pendingChoice = null;
  state.ctx = { stats: state.stats, tags, world: state.worldview.id, flags: state.flags };
  state.usedOnce = new Set();

  state.log.push({age:state.age, text: `【${state.worldview.name}】${state.reincarnation.opening}`, type:"milestone"});

  scheduleNextTick();
}

function speedDelay(){
  return state.speed==="slow" ? 650 : state.speed==="fast" ? 90 : 280;
}

function scheduleNextTick(){
  if(state.simTimer) clearTimeout(state.simTimer);
  if(state.screen!=="sim" || state.finished || !state.autoPlay) return;
  state.simTimer = setTimeout(stepAge, speedDelay());
}

function stepAge(){
  if(!state.alive || state.finished) return;

  state.age++;
  const maxNaturalAge = 78 + rnd(18);

  // natural end
  if(state.age >= maxNaturalAge){
    if(checkHiddenEnding(state.ctx)){
      state.isHiddenEnding = true;
      finishLife(HIDDEN_ENDINGS[state.ctx.world].text);
    } else {
      finishLife(computeNaturalEndText());
    }
    return;
  }

  const stageKey = stageForAge(state.age);
  const pool = EVENTS[stageKey];
  const ctx = state.ctx;
  const worldPool = (WORLD_EVENTS[ctx.world] && WORLD_EVENTS[ctx.world][stageKey]) || [];

  // death roll first (skip on the very first simulated tick to avoid instant death feel)
  const dchance = deathChance(state.age, ctx);
  const deathPool = pool.filter(e=>e.death && (!e.cond || e.cond(ctx)))
    .concat(worldPool.filter(e=>e.death && (!e.cond || e.cond(ctx))));
  if(deathPool.length && Math.random()<dchance){
    const dEvent = weightedPick(deathPool);
    state.log.push({age:state.age, text:resolveText(dEvent, ctx), type:"death"});
    state.alive=false;
    finishLife(dEvent.cause||"意外离世");
    return;
  }

  let eligible = pool.filter(e=>!e.death && (!e.cond || e.cond(ctx)) && !state.usedOnce.has(e));
  eligible = eligible.concat(worldPool.filter(e=>!e.death && (!e.cond || e.cond(ctx)) && !state.usedOnce.has(e)));

  // 意外事件（纯粹的运气好坏，与世界观、天赋无关）：幼年阶段不参与，之后每年都有机会掺进来
  if(state.age>=10){
    const randomPool = RANDOM_EVENTS.fortune.concat(RANDOM_EVENTS.misfortune)
      .filter(e=>!state.usedOnce.has(e));
    eligible = eligible.concat(randomPool);
  }

  // 若该阶段符合条件、且尚未使用过的事件已经耗尽，这一年就安静地过去，
  // 绝不重复展示同一条已经出现过的事件文本。
  if(eligible.length){
    const ev = weightedPick(eligible);
    state.usedOnce.add(ev);

    // 选择型事件：暂停模拟，等待玩家从多个选项中做出决定，选择结果会真实影响属性与后续剧情
    if(ev.choice){
      state.pendingChoice = ev;
      state.simTimer = null;
      state.log.push({age:state.age, text:ev.text, type:"choice"});
      render();
      return;
    }

    if(ev.statEffect) applyStatEffect(ev.statEffect);
    if(ev.setFlag) state.flags.add(ev.setFlag);
    const isFortune = RANDOM_EVENTS.fortune.indexOf(ev)!==-1;
    const isMisfortune = RANDOM_EVENTS.misfortune.indexOf(ev)!==-1;
    const logType = isFortune ? "fortune" : isMisfortune ? "misfortune" : (ev.achievement ? "milestone":"");
    state.log.push({age:state.age, text:resolveText(ev, ctx), type: logType});
    if(ev.achievement && state.achievements.indexOf(ev.achievement)===-1){
      state.achievements.push(ev.achievement);
      unlockAchievement(ev.achievement);
    }
  }

  render();
  scheduleNextTick();
}

/* 玩家在选择型事件中做出决定后调用：应用该选项的效果，并恢复模拟 */
function resolveChoice(optionIdx){
  const ev = state.pendingChoice;
  if(!ev) return;
  const opt = ev.options[optionIdx];
  if(opt.statEffect) applyStatEffect(opt.statEffect);
  if(opt.setFlag) state.flags.add(opt.setFlag);
  state.log.push({age:state.age, text:opt.result, type: opt.achievement ? "milestone" : (opt.logType||"")});
  if(opt.achievement && state.achievements.indexOf(opt.achievement)===-1){
    state.achievements.push(opt.achievement);
    unlockAchievement(opt.achievement);
  }
  state.pendingChoice = null;
  render();
  scheduleNextTick();
}

function computeNaturalEndText(){
  const score = computeScore();
  // 「羽化飞升」是最高档的自然结局，条件刻意设得极为苛刻：
  // 不仅命运积分要够高，五维属性还不能有明显短板，人生成就也要足够丰富——
  // 实测下来，随机游玩几乎不可能达成，只有刻意优化build才有极小概率触及。
  const noWeakStat = CORE_STAT_KEYS.every(k=>state.stats[k]>=4);
  const richLife = state.achievements.length>=5;
  if(score>=200 && noWeakStat && richLife) return ENDINGS.ascend;

  // 其余情况按命运积分分为九档，从「崩坏残生」到「旷世传奇」，
  // 再按此生最突出的属性挑选对应的收尾文案（健康/财富没有对应的收尾文案，故不参与评选）；
  // 分数越低，结局也越接近真正意义上的悲剧收场。
  const dominant = CORE_STAT_KEYS.reduce((best,k)=> state.stats[k]>state.stats[best] ? k : best, CORE_STAT_KEYS[0]);
  if(score>=180) return ENDINGS.legend[dominant];
  if(score>=160) return ENDINGS.renowned[dominant];
  if(score>=140) return ENDINGS.content[dominant];
  if(score>=120) return ENDINGS.stable[dominant];
  if(score>=100) return ENDINGS.plain[dominant];
  if(score>=80) return ENDINGS.quiet[dominant];
  if(score>=60) return ENDINGS.wasted[dominant];
  if(score>=40) return ENDINGS.destitute[dominant];
  return ENDINGS.ruin[dominant];
}

/* 隐藏结局判定：条件极为苛刻——
   1) 必须选中了该世界观的专属天赋（传说/史诗级）
   2) 五维属性总和达到极高水准，且没有明显短板
   3) 一生中收集到足够多的成就
   4) 即便前三项全部满足，最终仍要经过一次"命运是否眷顾"的随机考验 */
function checkHiddenEnding(ctx){
  const hasSignatureTalent = state.chosenTalents.some(t => t.world === ctx.world);
  const statSum = CORE_STAT_KEYS.reduce((s,k)=>s+state.stats[k], 0);
  const noWeakStat = CORE_STAT_KEYS.every(k=>state.stats[k]>=3);
  const meetsStatBar = statSum>=22 && noWeakStat;
  const meetsAchievements = state.achievements.length>=4;
  if(hasSignatureTalent && meetsStatBar && meetsAchievements){
    return Math.random() < 0.35;
  }
  return false;
}

function finishLife(causeOrText){
  state.finished = true;
  if(state.alive){
    state.log.push({age:state.age, text:causeOrText, type:"milestone"});
    state.causeOfEnd = state.isHiddenEnding ? "命运的垂青" : "自然终老";
  } else {
    state.causeOfEnd = causeOrText;
  }
  checkMetaAchievements();
  render();
}

/* ========================= 逻辑：结局评分 ========================= */
function computeScore(){
  const statSum = CORE_STAT_KEYS.reduce((s,k)=>s+state.stats[k],0);
  // 健康与财富的基准值是5（而非其余五维的1），若直接并入statSum会让每局的基准分数
  // 整体上浮，打乱已经校准过的结局分层与隐藏结局门槛，所以单独按「偏离基准值多少」计分，
  // 让这两项属性依然能实实在在地影响命运积分，又不至于扰乱原有的评分尺度。
  const vitalityScore = NEUTRAL_STAT_KEYS.reduce((s,k)=>s+(state.stats[k]-NEUTRAL_STAT_BASELINE),0) * 3;
  const rarityScore = state.chosenTalents.reduce((s,t)=>{
    const map={legendary:22, epic:14, rare:8, common:3, flaw:-4};
    return s+map[t.rarity];
  },0);
  const achieveScore = state.achievements.length*14;
  const ageScore = Math.min(20, Math.floor(state.age/5));
  return Math.max(0, statSum*4 + vitalityScore + rarityScore + achieveScore + ageScore);
}
function computeTitle(score){
  if(score>=230) return "异世界之神";
  if(score>=180) return "传说勇者";
  if(score>=130) return "一方豪杰";
  if(score>=90) return "崭露头角的冒险者";
  if(score>=50) return "平凡的异世界过客";
  return "路人甲";
}

/* ========================= 重置 ========================= */
function resetState(){
  state.screen="intro";
  state.worldview=null;
  state.worldviewOptions=[];
  state.reincarnation=null;
  state.reincarnationOptions=[];
  state.talentRounds=[];
  state.currentRound=0;
  state.chosenTalents=[];
  state.stats={power:1,wit:1,charm:1,luck:1,origin:1,health:5,wealth:5};
  state.baseStats=null;
  state.floorCost=0;
  state.log=[];
  state.age=0;
  state.alive=true;
  state.achievements=[];
  state.causeOfEnd=null;
  state.finished=false;
  state.isHiddenEnding=false;
  state.autoPlay=false;
  state.flags=null;
  state.pendingChoice=null;
  if(state.simTimer) clearTimeout(state.simTimer);
}

render();
loadPersistedData().then(()=>{ render(); });
})();
</script>

<script>
  // 注册 Service Worker：让游戏可以被"安装"到主屏幕/桌面，并支持离线打开。
  // 只有通过 http(s) 正式部署后才会生效，用 file:// 直接双击打开时浏览器会自动跳过，不影响正常游玩。
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {
        // 静默失败即可：本地直接打开文件、或未部署在 http(s) 环境下都属于正常情况
      });
    });
  }
</script>
