/* ========================= 事件绑定 ========================= */
function bindEvents(){
  const $ = sel => app.querySelector(sel);
  const $$ = sel => app.querySelectorAll(sel);

  if($("#btn-start")) $("#btn-start").onclick = ()=>{
    state.worldviewOptions = drawWorldviews();
    state.worldview = null;
    state.screen="worldview";
    render();
  };

  $$("[data-worldview]").forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute("data-worldview");
      state.worldview = state.worldviewOptions.find(w=>w.id===id);
      render();
    };
  });
  if($("#btn-world-reroll")) $("#btn-world-reroll").onclick = ()=>{
    state.worldviewOptions = drawWorldviews();
    state.worldview = null;
    state.worldRerollUsed = true;
    render();
  };
  if($("#btn-to-reincarnation")) $("#btn-to-reincarnation").onclick = ()=>{
    state.reincarnationOptions = drawReincarnationOptions(state.worldview.id);
    state.reincarnation = null;
    state.screen="reincarnation";
    render();
  };

  $$("[data-reincarnation]").forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute("data-reincarnation");
      state.reincarnation = state.reincarnationOptions.find(r=>r.id===id);
      render();
    };
  });
  if($("#btn-to-talent")) $("#btn-to-talent").onclick = ()=>{
    startTalentDraw();
    state.screen="talent";
    render();
  };

  $$("[data-talent-idx]").forEach(el=>{
    el.onclick = ()=>{
      const idx = parseInt(el.getAttribute("data-talent-idx"),10);
      const round = state.talentRounds[state.currentRound];
      const chosen = round.options[idx];
      state.chosenTalents.push(chosen);
      state.currentRound++;
      if(state.currentRound < 3) prepareRound(state.currentRound);
      render();
    };
  });
  if($("#btn-to-stats")) $("#btn-to-stats").onclick = ()=>{
    applyTalentAndReincarnationMods();
    state.screen="stats";
    render();
  };

  $$("[data-stat-inc]").forEach(el=>{
    el.onclick = ()=>{
      const k = el.getAttribute("data-stat-inc");
      if(state.stats[k]<10 && remainingBudget()>=1){ state.stats[k]++; render(); }
    };
  });
  $$("[data-stat-dec]").forEach(el=>{
    el.onclick = ()=>{
      const k = el.getAttribute("data-stat-dec");
      const floor = state.baseStats ? state.baseStats[k] : 1;
      if(state.stats[k]>floor){ state.stats[k]--; render(); }
    };
  });
  if($("#btn-stat-random")) $("#btn-stat-random").onclick = ()=>{
    randomizeStats();
    render();
  };
  if($("#btn-to-sim")) $("#btn-to-sim").onclick = ()=>{
    startSimulation();
    state.screen="sim";
    render();
  };

  $$("[data-speed]").forEach(el=>{
    el.onclick = ()=>{
      state.speed = el.getAttribute("data-speed");
      render();
      scheduleNextTick();
    };
  });
  if($("#btn-toggle-autoplay")) $("#btn-toggle-autoplay").onclick = ()=>{
    state.autoPlay = !state.autoPlay;
    if(state.autoPlay){
      state.autoPlayUsedThisLife = true;
      render();
      scheduleNextTick();
    } else {
      if(state.simTimer) clearTimeout(state.simTimer);
      render();
    }
  };
  if($("#btn-manual-step")) $("#btn-manual-step").onclick = ()=>{
    stepAge();
  };
  $$("[data-choice-idx]").forEach(el=>{
    el.onclick = ()=>{
      const idx = parseInt(el.getAttribute("data-choice-idx"),10);
      resolveChoice(idx);
    };
  });
  if($("#btn-to-ending")) $("#btn-to-ending").onclick = ()=>{
    state.screen="ending";
    render();
  };
  if($("#btn-restart")) $("#btn-restart").onclick = ()=>{
    resetState();
    render();
  };
  if($("#btn-view-achievements")) $("#btn-view-achievements").onclick = ()=>{
    state.achievementsFrom = state.screen;
    state.screen = "achievements";
    render();
  };
  if($("#btn-achievements-back")) $("#btn-achievements-back").onclick = ()=>{
    state.screen = state.achievementsFrom || "intro";
    render();
  };
  if($("#btn-view-lifereview")) $("#btn-view-lifereview").onclick = ()=>{
    state.screen = "lifereview";
    render();
  };
  if($("#btn-lifereview-back")) $("#btn-lifereview-back").onclick = ()=>{
    state.screen = "ending";
    render();
  };

  const logWrap = $("#log-wrap");
  if(logWrap) logWrap.scrollTop = logWrap.scrollHeight;
}

/* ========================= 逻辑：世界观抽取 ========================= */
function drawWorldviews(){
  const pool = WORLDVIEWS.slice();
  const result = [];
  while(result.length<3 && pool.length){
    const idx = rnd(pool.length);
    result.push(pool.splice(idx,1)[0]);
  }
  return result;
}

function drawReincarnationOptions(worldId){
  const pool = REINCARNATIONS_BY_WORLD[worldId].slice();
  const result = [];
  while(result.length<3 && pool.length){
    const idx = rnd(pool.length);
    result.push(pool.splice(idx,1)[0]);
  }
  return result;
}

/* ========================= 逻辑：天赋抽取 ========================= */
function startTalentDraw(){
  state.talentRounds = [];
  state.currentRound = 0;
  state.chosenTalents = [];
  prepareRound(0);
}
function availableTalentPool(){
  const lockedGender = state.reincarnation && state.reincarnation.gender;
  return TALENTS.filter(t=> (!t.world || t.world===state.worldview.id)
    && (!t.requiresMeta || hasMetaMilestone(t.requiresMeta))
    && !(lockedGender==="female" && t.tags && t.tags.includes("male_confirmed"))
    && !(lockedGender==="male" && t.tags && t.tags.includes("female_confirmed")));
}
function prepareRound(idx){
  // 已选天赋中若声明了互斥关系（如"男儿身"与"女儿身"），需要把互斥的那一项也从候选池中剔除，
  // 避免同一世人生里同时抽到两个自相矛盾的天赋。
  const excluded = new Set();
  state.chosenTalents.forEach(t=>{ if(t.excludes) t.excludes.forEach(id=>excluded.add(id)); });
  const options = weightedTalentDraw(availableTalentPool().filter(t=>!state.chosenTalents.includes(t) && !excluded.has(t.id)), 3);
  state.talentRounds[idx] = { options, chosen:null };
}

function applyTalentAndReincarnationMods(){
  // 属性分配阶段展示的是纯粹未经加工的起始底子：五维从1开始，健康/财富从中等水平起步。
  // 投胎方式、命运天赋、以及局外成长带来的加成都先按下不表，等这段人生正式展开时才会真正叠加上去，
  // 分配阶段自然也就无从得知这些加成具体是多少。
  STAT_KEYS.forEach(k=> state.stats[k] = NEUTRAL_STAT_KEYS.includes(k) ? NEUTRAL_STAT_BASELINE : 1);
  state.baseStats = Object.assign({}, state.stats);
}

/* 人生正式开始时才真正叠加的隐藏加成：投胎方式与命运天赋带来的属性加持，
   以及局外成长解锁的永久幸运——分配阶段选择时看不到具体数值，直到此刻才会真正生效。 */
function applyHiddenStatBonuses(){
  const rMod = state.reincarnation.mod;
  Object.keys(rMod).forEach(k=> state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+rMod[k])) );
  state.chosenTalents.forEach(t=>{
    Object.keys(t.mod).forEach(k=> state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+t.mod[k])) );
  });
  let metaLuckBonus = 0;
  if(hasMetaMilestone("meta_luck1")) metaLuckBonus += 1;
  if(hasMetaMilestone("meta_luck2")) metaLuckBonus += 1;
  if(metaLuckBonus>0) state.stats.luck = Math.max(1, Math.min(10, state.stats.luck+metaLuckBonus));
}

/* ========================= 逻辑：属性分配 ========================= */
function randomizeStats(){
  const base = state.baseStats || {power:1,wit:1,charm:1,luck:1,origin:1,health:NEUTRAL_STAT_BASELINE,wealth:NEUTRAL_STAT_BASELINE};
  STAT_KEYS.forEach(k=> state.stats[k]=base[k]);
  let remain = state.budgetTotal; // 天赋加成不占用这部分手动分配额度
  let guard = 500;
  while(remain>0 && guard-->0){
    const k = pick(STAT_KEYS);
    if(state.stats[k]>=10) continue;
    state.stats[k]++;
    remain -= 1;
    if(STAT_KEYS.every(kk=>state.stats[kk]>=10)) break;
  }
}

/* ========================= 逻辑：人生模拟 ========================= */
function getTagSet(){
  const s = new Set();
  state.chosenTalents.forEach(t=> t.tags.forEach(tag=>s.add(tag)));
  return s;
}
function stageForAge(age){
  if(age<=9) return "infant";
  if(age<=15) return "youth";
  if(age<=30) return "adult";
  if(age<=50) return "prime";
  return "elder";
}
/* 各世界观的自然寿命基线：[基础岁数, 随机浮动范围]。
   低魔/严酷世界回归其时代与环境应有的正常寿数（19世纪西部、维京时代、末世废土），
   高魔/高科技世界则因治愈魔法或未来医疗而更长寿；
   修仙界灵气充沛，连凡人都比别处长寿——而真正修炼有成者，
   寿元会随境界层层叠加（筑基百余岁、金丹两百余、元婴四百余、化神近千、大乘近两千），
   这正是修仙者与凡人的根本分野。 */
const WORLD_BASE_LIFESPAN = {
  qixiu:      [95, 15],  // 灵气充沛，凡人亦寿
  magic:      [85, 15],  // 治愈魔法普及
  scifi:      [95, 20],  // 未来医疗
  warhammer:  [70, 15],  // 残酷的帝国，战争与劳役
  yaoguai:    [80, 15],  // 山野灵秀之地
  cyberpunk:  [68, 15],  // 废土污染与暴力
  steampunk:  [75, 15],  // 工业烟尘弥漫
  zombie:     [62, 14],  // 末世，活着已是奢侈
  westworld:  [72, 14],  // 19世纪边疆的正常寿数
  urbanpower: [82, 14],  // 现代医疗水平
  pirates:    [66, 15],  // 大航海时代，海上凶险
  norse:      [70, 15]   // 维京时代的凛冬与征战
};

function deathChance(age, ctx){
  /* 衰老带来的死亡风险不再按绝对年龄计算，而是按"活到了当前寿限的几成"来计算——
     寿限由所在世界的自然基线加上历次突破累积的寿元共同决定。
     这样一来，凡人到七八十岁风险陡增是正常衰老；而突破重塑了肉身的修士，
     一百岁不过是漫长寿元的青壮年，自然不该按凡人的迟暮来算风险。 */
  const baseLife = (WORLD_BASE_LIFESPAN[ctx.world] || [78, 18])[0];
  const span = baseLife + state.lifespanBonus;
  const ratio = age / span;
  /* 超凡者的衰老曲线：修炼与突破本身就是最好的养生。
     修仙界以境界(qixiu_realm)计，其余世界以各自的寿命突破层数计——
     无畏机甲里的老兵、意识数字化的行者、饮过诸神蜜酒的半神……
     这些已经重塑了存在状态的人，衰老来得更晚（风险爬坡的起点随层数后移），
     寻常的病痛意外也更难伤到他们（整体风险随层数折减）。
     这让功成身退的超凡者能够真正活满自己应有的寿数，而不是在漫长
     岁月里被凡人尺度的意外一点点磨死。 */
  const realm = ctx.world==="qixiu"
    ? ((ctx.worldState && ctx.worldState.qixiu_realm) || 0)
    : ((ctx.worldState && ctx.worldState[ctx.world+"_breakthrough"]) || 0);
  const agingStart = 0.62 + realm*0.05;
  let base;
  if(age<16) base=0.004;
  else if(ratio<=agingStart) base=0.006;
  else base = 0.010 + (ratio-agingStart)*0.55;
  if(realm>0) base *= Math.max(0.25, 1 - realm*0.15);
  const powerLuck = (ctx.stats.power + ctx.stats.luck)/2;
  base *= Math.max(0.25, 1 - (powerLuck-5)*0.06);
  // 健康值同样直接影响意外死亡概率：体弱多病的人更容易遭遇不测，身强体健则更容易化险为夷
  const health = ctx.stats.health!==undefined ? ctx.stats.health : 5;
  base *= Math.max(0.4, 1 - (health-5)*0.08);
  // 每一次成功突破寿元上限，都意味着肉身/存在状态被彻底重塑，往后的岁月里也更加不容易死于意外
  base *= Math.max(0.1, 1 - state.breakthroughCount*0.22);
  return Math.min(base, 0.6);
}

function startSimulation(){
  applyHiddenStatBonuses();
  state.log = [];
  state.achievements = [];
  state.newlyUnlockedThisLife = [];
  state.finished = false;
  state.isHiddenEnding = false;
  state.autoPlay = false;
  state.autoPlayUsedThisLife = false;
  state.alive = true;
  state.causeOfEnd = null;
  state.age = state.reincarnation.startAge;
  const tags = getTagSet();
  state.flags = new Set();
  state.lifespanBonus = 0;
  state.breakthroughLuck = 0;
  // 有些人的寿数生来就写得更长（或更短）——命运天赋自带的寿命增减在此叠加
  state.chosenTalents.forEach(t=>{ if(t.lifespan) state.lifespanBonus += t.lifespan; });
  state.breakthroughCount = 0;
  state.lastBreakthroughAge = -999;
  state.worldsVisitedThisLife = new Set([state.worldview.id]);
  state.pendingChoice = null;
  state.worldState = {}; // 每一局重新开始，世界的变化也从零累积
  // 性别默认随机决定；若持有"男儿身"/"女儿身"这类命运天赋，则直接锁定对应性别，不再随机
  const tagSet = tags;
  if(state.reincarnation.gender) state.gender = state.reincarnation.gender; // 投胎方式本身限定性别时（如女武神战士），以此为准
  else if(tagSet.has("male_confirmed")) state.gender = "male";
  else if(tagSet.has("female_confirmed")) state.gender = "female";
  else state.gender = Math.random()<0.5 ? "male" : "female";
  state.ctx = { stats: state.stats, tags, world: state.worldview.id, flags: state.flags, gender: state.gender, worldState: state.worldState };
  state.usedOnce = new Set();

  const genderText = state.gender==="male" ? "男" : "女";
  state.log.push({age:state.age, text: `【${state.worldview.name} · ${genderText}】${state.reincarnation.opening}`, type:"milestone"});

  scheduleNextTick();
}

function speedDelay(){
  return state.speed==="slow" ? 650 : state.speed==="fast" ? 90 : 280;
}

function scheduleNextTick(){
  if(state.simTimer) clearTimeout(state.simTimer);
  if(state.screen!=="sim" || state.finished || !state.autoPlay) return;
  state.simTimer = setTimeout(stepAge, speedDelay());
}
/* ========================= 逻辑：轮回转世 ========================= */
/* 有别于"二次穿越"（换到另一个世界观，但年龄不变），"轮回转世"特指在同一个世界观内重新投胎——
   既然是重新投胎，年龄就必须真正回到新生命的起点，此后的事件才能正确地从头开始，
   而不是让一个刚刚"转世"的婴儿继续顶着垂暮之年的年纪活在原来的阶段里。 */
function triggerReincarnation(carryMemory){
  const world = state.worldview;
  const reincOptions = REINCARNATIONS_BY_WORLD[world.id];
  const newReinc = reincOptions[rnd(reincOptions.length)];

  // 转世投入了一具全新的躯体，性别也会重新决定——投胎方式限定性别时以其为准，其次是命运天赋
  if(newReinc.gender) state.gender = newReinc.gender;
  else if(state.ctx.tags.has("male_confirmed")) state.gender = "male";
  else if(state.ctx.tags.has("female_confirmed")) state.gender = "female";
  else state.gender = Math.random()<0.5 ? "male" : "female";
  state.ctx.gender = state.gender;

  state.reincarnation = newReinc;
  state.age = newReinc.startAge;
  state.usedOnce = new Set(); // 全新的一世，之前用过的事件（尤其是幼年阶段的内容）可以重新出现

  // 境界修为、寿命突破这些都是"炼"在旧躯壳上的东西——转世投入全新的凡胎之后，
  // 一切超凡状态归零，需要重头再修（记忆与见识可以带走，肉身的造化带不走）。
  // 这同时避免了刚出生的转世之身莫名触发"当年突破留下的隐患"这类前世回响。
  if(state.worldState){
    Object.keys(state.worldState).forEach(k=>{
      if(k==="qixiu_realm" || k.endsWith("_breakthrough")) delete state.worldState[k];
    });
  }
  state.breakthroughCount = 0;
  state.lastBreakthroughAge = -999;
  state.lifespanBonus = 0;
  state.breakthroughLuck = 0; // 际遇与心魔都属于前尘，新的一世从头修心
  // 突破的造化带不走，但天赋里写定的寿数是刻在魂上的——新的一世依然生效
  state.chosenTalents.forEach(t=>{ if(t.lifespan) state.lifespanBonus += t.lifespan; });

  if(carryMemory){
    // 带着记忆转世：保留前世积累的属性成长，只是在此基础上叠加新投胎方式带来的变化
    Object.keys(newReinc.mod).forEach(k=>{
      state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+newReinc.mod[k]));
    });
    state.log.push({
      age: state.age,
      text: `【带着记忆的轮回】你带着前世的记忆与感悟转世重生，回到了生命的起点——${newReinc.opening}`,
      type: "milestone"
    });
  } else {
    // 忘却今生：彻底重新开始，属性回到新投胎方式的基础起点，不再保留前世的积累
    STAT_KEYS.forEach(k => state.stats[k] = NEUTRAL_STAT_KEYS.includes(k) ? NEUTRAL_STAT_BASELINE : 1);
    Object.keys(newReinc.mod).forEach(k=>{
      state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+newReinc.mod[k]));
    });
    state.log.push({
      age: state.age,
      text: `【轮回】你忘却了今生的一切，灵魂踏上轮回之路，重新回到了生命的起点——${newReinc.opening}`,
      type: "milestone"
    });
  }
}


/* 极小概率下，一段人生途中会毫无征兆地被卷入又一场穿越——新的世界、新的投胎方式全部随机决定，
   此后的所有事件都会完全遵循新世界观的事件池与专属内容，仿佛命运又开了一次玩笑。 */
function triggerCrossWorldTransmigration(){
  const oldWorld = state.worldview;
  const oldAge = state.age;
  const candidates = WORLDVIEWS.filter(w=>w.id!==oldWorld.id);
  const newWorld = candidates[rnd(candidates.length)];
  const newReincOptions = REINCARNATIONS_BY_WORLD[newWorld.id];
  const newReinc = newReincOptions[rnd(newReincOptions.length)];

  // 这次穿越究竟是"肉体穿越"（整个人连躯体一起被带走，年龄自然不变），
  // 还是"灵魂穿越"（只有灵魂被卷走，还要再确定是附身到别人已经活了一段时间的躯体上，
  // 还是彻底重生成一个呱呱坠地的婴儿）——三者概率各不相同，且会直接决定接下来的年龄，
  // 年龄一旦确定，后续所有事件自然会跟着 stageForAge() 正确切换到对应的人生阶段。
  const roll = Math.random();
  let mode, newAge;
  if(roll < 0.5){
    mode = "body";
    newAge = oldAge;
  } else if(roll < 0.75){
    mode = "possess";
    newAge = 10 + rnd(60); // 附身到一具已经在世上活了一段时间的躯体，年龄10~69岁不等
  } else {
    mode = "reborn";
    newAge = newReinc.startAge; // 彻底重生，年龄回到新投胎方式对应的起点
  }

  state.worldview = newWorld;
  state.reincarnation = newReinc;
  // 灵魂重生是彻底的新生，若新投胎方式限定了性别（如女武神战士），性别随之确定；
  // 肉体穿越与灵魂附身则延续现有躯体/宿体的既定性别，不做改动。
  if(mode === "reborn" && newReinc.gender){
    state.gender = newReinc.gender;
    state.ctx.gender = state.gender;
  }
  state.ctx.world = newWorld.id;
  state.worldsVisitedThisLife.add(newWorld.id);
  state.age = newAge;

  // 灵魂重生等于开启了全新的一世，之前用过的事件（尤其是幼年阶段的内容）可以重新出现；
  // 肉体穿越与灵魂附身都还算是"同一条命"的延续，不需要重置。
  if(mode === "reborn") state.usedOnce = new Set();

  // 新投胎方式的属性加成会在当前属性基础上叠加，象征这次突如其来的变化
  Object.keys(newReinc.mod).forEach(k=>{
    state.stats[k] = Math.max(1, Math.min(10, state.stats[k]+newReinc.mod[k]));
  });

  let announcement;
  if(mode === "body"){
    announcement = `【命运的又一次玩笑 · 肉体穿越】你连同这具身体一起，毫无征兆地被卷入了又一场穿越，从「${oldWorld.name}」跌入了「${newWorld.name}」——${newReinc.opening}`;
  } else if(mode === "possess"){
    announcement = `【命运的又一次玩笑 · 灵魂附身】一股天旋地转之感袭来，你的灵魂脱离了原本的身体，不由自主地附上了「${newWorld.name}」里一具${newAge}岁、正过着自己人生的陌生躯体——${newReinc.opening}`;
  } else {
    announcement = `【命运的又一次玩笑 · 灵魂重生】一股天旋地转之感袭来，你的灵魂脱离了原本的身体，一头栽进了「${newWorld.name}」的轮回之中，重新变成了一个呱呱坠地的婴儿——${newReinc.opening}`;
  }

  state.log.push({age: state.age, text: announcement, type: "milestone"});
  if(state.achievements.indexOf("命运的又一次玩笑")===-1){
    state.achievements.push("命运的又一次玩笑");
    unlockAchievement("命运的又一次玩笑");
  }
}

/* 时间流速分层：凡人的岁月一年一年地过；而当寿数迈过百岁、千岁、万岁，
   时间在超凡者的感知里会越流越快——十年一瞬、百年一瞬、千年一瞬。
   这既符合"山中方一日，世上已千年"的修行体感，也让千年万年的境界跨度
   在游玩节奏上依然紧凑。死亡风险按步长做复利换算，跨度再大也分毫不差。 */
function simTimeStep(age){
  if(age>=10000) return 1000;
  if(age>=1000) return 100;
  if(age>=100) return 10;
  return 1;
}

function attemptDesperateBreakthrough(){
  const world = state.ctx.world;
  const key = world==="qixiu" ? "qixiu_realm" : world+"_breakthrough";
  const rank = worldStateVal(state.ctx, key);
  const opt = BREAKTHROUGH_LADDER[world] && BREAKTHROUGH_LADDER[world][rank];
  if(!opt) return "none"; // 已在此界之巅，油尽灯枯，坦然赴死
  const transcendentBonus = hasTag(state.ctx, "transcendent") ? 0.1 : 0;
  const chance = Math.max(0.02, Math.min(0.95, opt.riskyChance*0.5 + transcendentBonus + (state.breakthroughLuck||0)));
  state.breakthroughLuck = 0;
  state.lastBreakthroughAge = state.age;
  state.log.push({age:state.age, text:"寿元将尽的这一刻，你把心一横——与其坐等油尽灯枯，不如以残躯搏一线天机！你不顾一切地强行冲击了下一重关口……", type:"choice"});
  if(Math.random() < chance){
    if(opt.lifespanBonus) state.lifespanBonus += opt.lifespanBonus;
    if(opt.successEffect) applyStatEffect(opt.successEffect, true);
    state.breakthroughCount++;
    adjustWorldState(opt.worldStateKey, opt.worldStateDelta!==undefined?opt.worldStateDelta:1);
    state.log.push({age:state.age, text:opt.successResult + "（向死而生——你在寿尽的最后一刻搏出了新生。）", type:"milestone"});
    if(opt.successAchievement && state.achievements.indexOf(opt.successAchievement)===-1){
      state.achievements.push(opt.successAchievement);
      unlockAchievement(opt.successAchievement);
    }
    if(state.achievements.indexOf("向死而生")===-1){
      state.achievements.push("向死而生");
      unlockAchievement("向死而生");
    }
    return "survived";
  }
  state.log.push({age:state.age, text:"……可惜，天不假年。仓促冲关的力量在半途溃散，你与那道关口之间，终究隔着一线迈不过去的天堑。你含笑闭上了眼——至少，你是站着走完最后一程的。", type:"death"});
  state.alive = false;
  finishLife("寿尽关前");
  return "died";
}

function stepAge(){
  if(!state.alive || state.finished) return;

  const tstep = simTimeStep(state.age);
  state.age += tstep;
  const baseLife = WORLD_BASE_LIFESPAN[state.ctx.world] || [78, 18];
  const maxNaturalAge = baseLife[0] + rnd(baseLife[1]) + state.lifespanBonus;

  // natural end
  if(state.age >= maxNaturalAge){
    /* 向死而生：寿元将尽的这一刻，若前方还有未曾登临的境界，角色不会坐等油尽灯枯——
       以残躯强行冲击下一重关口。仓促冲关，胜算减半：成则寿元重续、境界更上一层；
       败则身死道消。这是修行者与天争命的最后一搏，也是所有世界共通的终局戏码。 */
    const desperate = attemptDesperateBreakthrough();
    if(desperate === "survived"){ render(); scheduleNextTick(); return; }
    if(desperate === "died"){ return; }
    if(checkHiddenEnding(state.ctx)){
      state.isHiddenEnding = true;
      finishLife(HIDDEN_ENDINGS[state.ctx.world].text);
    } else {
      finishLife(computeNaturalEndText());
    }
    return;
  }

  const stageKey = stageForAge(state.age);
  const pool = EVENTS[stageKey];
  const ctx = state.ctx;
  const worldPool = (WORLD_EVENTS[ctx.world] && WORLD_EVENTS[ctx.world][stageKey]) || [];

  // 二次穿越：极小概率下会被卷入又一场穿越，直接空降到另一个世界观，此后完全遵循新世界观的内容
  if(state.age>=10 && state.age<=70 && Math.random() < 0.0025){
    triggerCrossWorldTransmigration();
    render();
    scheduleNextTick();
    return;
  }

  // death roll first (skip on the very first simulated tick to avoid instant death feel)
  const dchance = deathChance(state.age, ctx);
  const deathPool = pool.filter(e=>e.death && (!e.cond || e.cond(ctx)))
    .concat(worldPool.filter(e=>e.death && (!e.cond || e.cond(ctx))));
  if(deathPool.length && Math.random() < (1 - Math.pow(1-dchance, tstep))){
    const dEvent = weightedPick(deathPool);
    state.log.push({age:state.age, text:resolveText(dEvent, ctx), type:"death"});
    state.alive=false;
    finishLife(dEvent.cause||"意外离世");
    return;
  }

  let eligible = pool.filter(e=>!e.death && !e.onlyChained && (!e.cond || e.cond(ctx)) && !state.usedOnce.has(e));
  eligible = eligible.concat(worldPool.filter(e=>!e.death && !e.onlyChained && (!e.cond || e.cond(ctx)) && !state.usedOnce.has(e)));

  // 意外事件（纯粹的运气好坏，与世界观、天赋无关）：幼年阶段不参与，之后每年都有机会掺进来
  if(state.age>=10){
    const randomPool = RANDOM_EVENTS.fortune.concat(RANDOM_EVENTS.misfortune)
      .filter(e=>!state.usedOnce.has(e));
    eligible = eligible.concat(randomPool);
  }

  // 若该阶段符合条件、且尚未使用过的事件已经耗尽，这一年就安静地过去，
  // 绝不重复展示同一条已经出现过的事件文本。
  if(eligible.length){
    const ev = weightedPickDynamic(eligible);
    if(!ev.repeatable) state.usedOnce.add(ev);

    // 选择型事件：暂停模拟，等待玩家从多个选项中做出决定，选择结果会真实影响属性与后续剧情
    if(ev.choice){
      state.pendingChoice = ev;
      state.simTimer = null;
      state.log.push({age:state.age, text:resolveText(ev, ctx), type:"choice"});
      render();
      return;
    }

    if(ev.statEffect) applyStatEffect(ev.statEffect);
    if(ev.breakthroughLuck) state.breakthroughLuck = Math.max(-0.25, Math.min(0.25, state.breakthroughLuck + ev.breakthroughLuck));
    if(ev.setFlag) state.flags.add(ev.setFlag);
    if(ev.worldStateKey) adjustWorldState(ev.worldStateKey, ev.worldStateDelta!==undefined?ev.worldStateDelta:1);
    const isFortune = RANDOM_EVENTS.fortune.indexOf(ev)!==-1;
    const isMisfortune = RANDOM_EVENTS.misfortune.indexOf(ev)!==-1;
    const logType = isFortune ? "fortune" : isMisfortune ? "misfortune" : (ev.achievement ? "milestone":"");
    state.log.push({age:state.age, text:resolveText(ev, ctx), type: logType});
    if(ev.achievement && state.achievements.indexOf(ev.achievement)===-1){
      state.achievements.push(ev.achievement);
      unlockAchievement(ev.achievement);
    }
    // 事件即时链：若这件事声明了next，紧接着在同一年内继续展开后续的确定性因果
    if(resolveNextChain(ev, ctx)){ render(); return; }
  }

  render();
  scheduleNextTick();
}

/* 玩家在选择型事件中做出决定后调用：应用该选项的效果，并恢复模拟 */
function resolveChoice(optionIdx){
  const ev = state.pendingChoice;
  if(!ev) return;
  const opt = ev.options[optionIdx];
  state.pendingChoice = null;

  // 带repeatable标记的事件（目前特指"突破寿元"）：无论选了哪个选项，都记录一次冷却起点，
  // 确保下一次同样的突破机会要等足够长的年数才会再度出现。
  if(ev.repeatable) state.lastBreakthroughAge = state.age;

  // 带风险的概率型选项：例如"突破寿元"——成功则真实延长寿命上限并大幅提升属性；
  // 失败也不一定当场身死，还有一定概率是"修为倒退"式的惨烈代价，侥幸活下来。
  if(opt.riskyChance !== undefined){
    // 持有"天生异数"天赋的角色，突破成功率会获得实质性的加成
    const transcendentBonus = hasTag(state.ctx, "transcendent") ? 0.1 : 0;
    // 突破气运：此前的际遇（高人指点、灵药、顿悟）与阴影（心魔、暗伤）在此刻兑现，
    // 并在这次冲关后清零——机缘护佑一次冲关，心魔也随一次生死历练涤荡
    const effChance = Math.max(0.02, Math.min(0.95, opt.riskyChance + transcendentBonus + (state.breakthroughLuck||0)));
    if(opt.worldStateKey || opt.lifespanBonus) state.breakthroughLuck = 0;
    const success = Math.random() < effChance;
    if(success){
      if(opt.lifespanBonus) state.lifespanBonus += opt.lifespanBonus;
      if(opt.successEffect) applyStatEffect(opt.successEffect, true);
      state.breakthroughCount++;
      if(opt.worldStateKey) adjustWorldState(opt.worldStateKey, opt.worldStateDelta!==undefined?opt.worldStateDelta:1);
      state.log.push({age:state.age, text:opt.successResult, type:"milestone"});
      if(opt.successAchievement && state.achievements.indexOf(opt.successAchievement)===-1){
        state.achievements.push(opt.successAchievement);
        unlockAchievement(opt.successAchievement);
      }
      if(opt.successAscend){
        // 超脱规则：这段人生就此圆满落幕，以本世界的隐藏结局收束——
        // 不是死亡，而是走出了这个世界的规则之外。
        state.isHiddenEnding = true;
        finishLife(HIDDEN_ENDINGS[state.ctx.world].text);
        return;
      }
      render();
      scheduleNextTick();
    } else if(opt.failDeath){
      // 失败后还要再判一次：是当场身死，还是侥幸活下来但要承受"修为倒退"式的代价
      const dies = Math.random() < (opt.failDeathChance !== undefined ? opt.failDeathChance : 1);
      if(dies){
        state.log.push({age:state.age, text:opt.failResult, type:"death"});
        state.alive = false;
        finishLife(opt.failCause || "渡劫失败");
      } else {
        if(opt.regressEffect) applyStatEffect(opt.regressEffect);
        if(opt.regressLifespanPenalty) state.lifespanBonus = Math.max(0, state.lifespanBonus - opt.regressLifespanPenalty);
        if(opt.regressSetFlag) state.flags.add(opt.regressSetFlag);
        state.log.push({age:state.age, text: opt.regressResult || opt.failResult, type:"misfortune"});
        render();
        scheduleNextTick();
      }
    } else {
      if(opt.failEffect) applyStatEffect(opt.failEffect);
      state.log.push({age:state.age, text:opt.failResult, type:"misfortune"});
      render();
      scheduleNextTick();
    }
    return;
  }

  // 轮回转世型选项：不再是简单的属性加成，而是真正让年龄回到新生命的起点，
  // 后续事件也会随之正确地从头开始，而不是让"转世"只停留在一句台词上。
  if(opt.reincarnate){
    if(opt.achievement && state.achievements.indexOf(opt.achievement)===-1){
      state.achievements.push(opt.achievement);
      unlockAchievement(opt.achievement);
    }
    triggerReincarnation(opt.reincarnate === "memory");
    render();
    scheduleNextTick();
    return;
  }

  if(opt.statEffect) applyStatEffect(opt.statEffect);
  if(opt.setFlag) state.flags.add(opt.setFlag);
  if(opt.breakthroughLuck) state.breakthroughLuck = Math.max(-0.25, Math.min(0.25, state.breakthroughLuck + opt.breakthroughLuck));
  if(opt.startCooldown) state.lastBreakthroughAge = state.age; // 婉拒突破契机：时机窗口就此错过，须待下一次冷却结束
  if(opt.worldStateKey) adjustWorldState(opt.worldStateKey, opt.worldStateDelta!==undefined?opt.worldStateDelta:1);
  state.log.push({age:state.age, text:opt.result, type: opt.achievement ? "milestone" : (opt.logType||"")});
  if(opt.achievement && state.achievements.indexOf(opt.achievement)===-1){
    state.achievements.push(opt.achievement);
    unlockAchievement(opt.achievement);
  }
  if(opt.endLife){
    // 有些选择本身就是"如何走完最后一程"的答案——选定即落幕，体面而完整
    state.alive = false;
    finishLife(opt.endCause || "生命落幕");
    return;
  }
  // 事件即时链：选择的结果如果声明了next，紧接着在同一年内展开后续的确定性因果
  if(resolveNextChain(opt, state.ctx)){ render(); return; }
  render();
  scheduleNextTick();
}

function computeNaturalEndText(){
  const score = computeScore();
  // 「羽化飞升」是最高档的自然结局，条件刻意设得极为苛刻：
  // 不仅命运积分要够高，五维属性还不能有明显短板，人生成就也要足够丰富——
  // 实测下来，随机游玩几乎不可能达成，只有刻意优化build才有极小概率触及。
  const noWeakStat = CORE_STAT_KEYS.every(k=>state.stats[k]>=4);
  const richLife = state.achievements.length>=5;
  // 除了积分达标这条路径，连续成功突破寿元三次以上（类似修仙路上的连续渡劫成功）
  // 也是另一条通往飞升的路，象征着靠自身实力硬生生突破了寿命的天数——
  // 门槛特意从两次提高到三次，配合突破本身更低的成功率，让这条路径也变得极为罕见。
  if((score>=200 && noWeakStat && richLife) || state.breakthroughCount>=3) return ENDINGS.ascend;

  // 其余情况按命运积分分为九档，从「崩坏残生」到「旷世传奇」，
  // 再按此生最突出的属性挑选对应的收尾文案（健康/财富没有对应的收尾文案，故不参与评选）；
  // 分数越低，结局也越接近真正意义上的悲剧收场。
  const dominant = CORE_STAT_KEYS.reduce((best,k)=> state.stats[k]>state.stats[best] ? k : best, CORE_STAT_KEYS[0]);
  if(score>=180) return ENDINGS.legend[dominant];
  if(score>=160) return ENDINGS.renowned[dominant];
  if(score>=140) return ENDINGS.content[dominant];
  if(score>=120) return ENDINGS.stable[dominant];
  if(score>=100) return ENDINGS.plain[dominant];
  if(score>=80) return ENDINGS.quiet[dominant];
  if(score>=60) return ENDINGS.wasted[dominant];
  if(score>=40) return ENDINGS.destitute[dominant];
  return ENDINGS.ruin[dominant];
}

/* 隐藏结局判定：条件极为苛刻——
   1) 必须选中了该世界观的专属天赋（传说/史诗级）
   2) 五维属性总和达到极高水准，且没有明显短板
   3) 一生中收集到足够多的成就
   4) 即便前三项全部满足，最终仍要经过一次"命运是否眷顾"的随机考验 */
function checkHiddenEnding(ctx){
  const hasSignatureTalent = state.chosenTalents.some(t => t.world === ctx.world);
  const statSum = CORE_STAT_KEYS.reduce((s,k)=>s+state.stats[k], 0);
  const noWeakStat = CORE_STAT_KEYS.every(k=>state.stats[k]>=3);
  const meetsStatBar = statSum>=22 && noWeakStat;
  const meetsAchievements = state.achievements.length>=4;
  if(hasSignatureTalent && meetsStatBar && meetsAchievements){
    return Math.random() < 0.35;
  }
  return false;
}

function finishLife(causeOrText){
  state.finished = true;
  if(state.alive){
    state.log.push({age:state.age, text:causeOrText, type:"milestone"});
    state.causeOfEnd = state.isHiddenEnding ? "命运的垂青" : "自然终老";
  } else {
    state.causeOfEnd = causeOrText;
  }
  checkMetaAchievements();
  state.newlyUnlockedMilestones = checkMetaMilestones();
  render();
}

/* ========================= 逻辑：结局评分 ========================= */
function computeScore(){
  const statSum = CORE_STAT_KEYS.reduce((s,k)=>s+state.stats[k],0);
  // 健康与财富的基准值是5（而非其余五维的1），若直接并入statSum会让每局的基准分数
  // 整体上浮，打乱已经校准过的结局分层与隐藏结局门槛，所以单独按「偏离基准值多少」计分，
  // 让这两项属性依然能实实在在地影响命运积分，又不至于扰乱原有的评分尺度。
  const vitalityScore = NEUTRAL_STAT_KEYS.reduce((s,k)=>s+(state.stats[k]-NEUTRAL_STAT_BASELINE),0) * 3;
  const rarityScore = state.chosenTalents.reduce((s,t)=>{
    const map={legendary:22, epic:14, rare:8, common:3, flaw:-4};
    return s+map[t.rarity];
  },0);
  const achieveScore = state.achievements.length*14;
  const ageScore = Math.min(20, Math.floor(state.age/5));
  return Math.max(0, statSum*4 + vitalityScore + rarityScore + achieveScore + ageScore);
}
const CHOICE_HINT_BY_WORLD = {

/* 称号不再与"命运积分"这套评分公式绑定，而是直接依据这一生真实发生过的事情来总结：
   收获了多少人生成就、有没有触发过隐藏结局、成功突破过几次寿元、活了多大年纪——
   这样同样是"传说"级的称号，指向的都是这一生具体做成了什么事，而不是一个抽象的分数达标。 */
/* 称号档位改为主要依据角色真实的"修为"——也就是五维属性的总和——来判定，
   毕竟像"元婴真人"这样的称号，指向的应该是实打实的境界高低，而不是攒了多少个成就。
   隐藏结局与多次成功突破寿元仍然保留为直通最高档的特殊路径，因为那两者本身就代表着
   超越常人修为的真正意义上的"脱凡入圣"。 */
function computeLifeSummaryTier(world){
  if(world === "qixiu"){
    // 修仙界的称号直接对应实际修炼到的境界——筑基长老就该是真的筑基了，金丹供奉就该是真的凝丹了，
    // 不再用笼统的属性总和去猜，避免"明明没突破过，称号却显示金丹"这种名不副实的情况。
    return Math.min(5, worldStateVal(state.ctx, "qixiu_realm"));
  }
  const statSum = CORE_STAT_KEYS.reduce((s,k)=>s+state.stats[k],0);
  if(state.isHiddenEnding || state.breakthroughCount>=2 || statSum>=55) return 5;
  if(statSum>=40 || state.breakthroughCount>=1) return 4;
  if(statSum>=30) return 3;
  if(statSum>=22) return 2;
  if(statSum>=15) return 1;
  return 0;
}
function computeTitle(world){
  const tiers = TITLES_BY_WORLD[world] || TITLES_BY_WORLD.qixiu;
  return tiers[computeLifeSummaryTier(world)];
}

/* ========================= 重置 ========================= */
function resetState(){
  state.screen="intro";
  state.worldview=null;
  state.worldviewOptions=[];
  state.reincarnation=null;
  state.reincarnationOptions=[];
  state.talentRounds=[];
  state.currentRound=0;
  state.chosenTalents=[];
  state.stats={power:1,wit:1,charm:1,luck:1,origin:1,health:5,wealth:5};
  state.baseStats=null;
  state.log=[];
  state.age=0;
  state.alive=true;
  state.achievements=[];
  state.causeOfEnd=null;
  state.finished=false;
  state.isHiddenEnding=false;
  state.autoPlay=false;
  state.flags=null;
  state.lifespanBonus=0;
  state.breakthroughLuck=0;
  state.breakthroughCount=0;
  state.lastBreakthroughAge=-999;
  state.gender=null;
  state.worldState=null;
  state.worldsVisitedThisLife=null;
  state.pendingChoice=null;
  state.newlyUnlockedMilestones=[];
  state.worldRerollUsed=false;
  if(state.simTimer) clearTimeout(state.simTimer);
}

render();
loadPersistedData().then(()=>{ render(); });
})();

<script>
  // 注册 Service Worker：让游戏可以被"安装"到主屏幕/桌面，并支持离线打开。
  // 只有通过 http(s) 正式部署后才会生效，用 file:// 直接双击打开时浏览器会自动跳过，不影响正常游玩。
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {
        // 静默失败即可：本地直接打开文件、或未部署在 http(s) 环境下都属于正常情况
      });
    });
  }
</script>
