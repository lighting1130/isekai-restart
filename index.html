<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- PWA: 安装到主屏幕/桌面所需的清单与图标 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0c22">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="异世界重开">
<meta name="mobile-web-app-capable" content="yes">

<title>异世界重开模拟器</title>
<style>
  :root{
    --bg-0:#0f0c22;
    --bg-1:#171233;
    --panel:#221a45;
    --panel-2:#2b2154;
    --line: rgba(216,178,106,0.18);
    --text:#ece4ff;
    --text-dim:#a99bd6;
    --gold:#d8b26a;
    --violet:#9075e0;
    --danger:#e0615c;
    --success:#6fd9a0;
    --font-display:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
    --font-body:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(144,117,224,0.25), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(216,178,106,0.12), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
    color:var(--text);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  #app{width:100%;max-width:720px;}

  /* 顶部纹样 */
  .rune-divider{
    display:flex;align-items:center;gap:10px;
    color:var(--gold); opacity:.85; margin:0 0 18px;
    font-size:12px; letter-spacing:.3em;
  }
  .rune-divider::before,.rune-divider::after{
    content:"";flex:1;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  h1.title{
    font-family:var(--font-display);
    text-align:center;
    font-size:34px;
    letter-spacing:.12em;
    margin:4px 0 2px;
    background:linear-gradient(180deg,#f2e2b8,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 24px rgba(216,178,106,0.25);
  }
  .subtitle{
    text-align:center;color:var(--text-dim);font-size:13px;
    letter-spacing:.05em; margin-bottom:22px;
  }

  /* 命书卡片 */
  .scroll{
    position:relative;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:14px;
    padding:26px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
    margin-bottom:18px;
  }
  .scroll::before, .scroll::after{
    content:"◆";
    position:absolute; color:var(--gold); opacity:.5; font-size:10px;
  }
  .scroll::before{top:10px;left:12px;}
  .scroll::after{top:10px;right:12px;}

  .section-label{
    font-family:var(--font-display);
    color:var(--gold); font-size:15px; letter-spacing:.15em;
    margin:0 0 14px; display:flex; align-items:center; gap:8px;
  }
  .section-label .idx{
    font-size:11px;color:var(--text-dim);border:1px solid var(--line);
    padding:1px 7px;border-radius:20px;
  }

  p, .desc{color:var(--text-dim); line-height:1.7; font-size:14px;}

  /* 按钮 */
  .btn{
    font-family:var(--font-body);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 20px;
    border-radius:9px;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .btn:hover{border-color:var(--gold); box-shadow:0 0 0 1px rgba(216,178,106,0.25);}
  .btn:active{transform:scale(.97);}
  .btn.primary{
    background:linear-gradient(180deg,#e9c98a,var(--gold));
    color:#241a09; border:none; font-weight:600;
  }
  .btn.primary:hover{box-shadow:0 6px 20px rgba(216,178,106,0.35);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}
  .btn-row.center{justify-content:center;}

  /* 转生方式 / 天赋 卡片 */
  .card-grid{display:grid; gap:12px;}
  .pick-card{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.02);
    border-radius:11px;
    padding:16px 16px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .pick-card:hover{border-color:var(--violet); background:rgba(144,117,224,0.08); transform:translateY(-1px);}
  .pick-card.selected{border-color:var(--gold); background:rgba(216,178,106,0.10);}
  .pick-card h3{margin:0 0 6px; font-family:var(--font-display); font-size:16px; color:var(--text);}
  .pick-card p{margin:0; font-size:13px;}
  .tag-row{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
  .mod-tag{
    font-size:11px; padding:2px 8px; border-radius:20px;
    border:1px solid var(--line); color:var(--text-dim);
  }
  .mod-tag.pos{color:var(--success); border-color:rgba(111,217,160,0.35);}
  .mod-tag.neg{color:var(--danger); border-color:rgba(224,97,92,0.35);}

  .rarity-badge{
    font-size:11px; padding:2px 9px; border-radius:20px; font-weight:600;
    display:inline-block; margin-bottom:8px; letter-spacing:.05em;
  }
  .rarity-legendary{background:rgba(216,178,106,0.15); color:var(--gold); border:1px solid rgba(216,178,106,0.4);}
  .rarity-epic{background:rgba(144,117,224,0.15); color:#b9a4ff; border:1px solid rgba(144,117,224,0.4);}
  .rarity-rare{background:rgba(97,168,224,0.15); color:#8fc4f2; border:1px solid rgba(97,168,224,0.4);}
  .rarity-common{background:rgba(111,217,160,0.12); color:var(--success); border:1px solid rgba(111,217,160,0.35);}
  .rarity-flaw{background:rgba(224,97,92,0.12); color:var(--danger); border:1px solid rgba(224,97,92,0.35);}

  .chosen-strip{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .chosen-chip{
    font-size:12px; padding:5px 12px; border-radius:20px;
    border:1px solid var(--gold); color:var(--gold); background:rgba(216,178,106,0.08);
  }
  .chosen-chip.empty{color:var(--text-dim); border-color:var(--line); background:none;}

  /* 属性分配 */
  .stat-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-bottom:1px dashed var(--line);
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-name{width:64px; font-size:14px; color:var(--text); flex-shrink:0;}
  .stat-bar{
    flex:1; height:9px; border-radius:6px; background:rgba(255,255,255,0.06);
    overflow:hidden; position:relative;
  }
  .stat-bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--violet),var(--gold));}
  .stat-num{width:28px; text-align:right; font-family:var(--font-display); color:var(--gold); font-size:15px;}
  .stat-ctrl{display:flex; gap:4px;}
  .stat-ctrl button{
    width:26px;height:26px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); cursor:pointer; font-size:14px; line-height:1;
  }
  .stat-ctrl button:disabled{opacity:.3;cursor:not-allowed;}
  .stat-cost-hint{
    width:66px; flex-shrink:0; text-align:right;
    font-size:11px; color:var(--text-dim); opacity:.75;
  }

  .budget-line{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; font-size:13px; color:var(--text-dim);
  }
  .budget-line b{color:var(--gold); font-size:16px; font-family:var(--font-display);}

  /* 罗盘 */
  .compass-wrap{display:flex; justify-content:center; margin:6px 0 16px;}

  /* 模拟日志 */
  .status-bar{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:14px; padding:10px 12px;
    background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:10px;
  }
  .status-chip{
    display:flex; align-items:baseline; gap:4px;
    font-size:11px; padding:3px 9px; border-radius:20px;
    border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim);
  }
  .status-value{font-family:var(--font-display); font-size:13px; color:var(--gold); font-weight:600;}

  .log-wrap{max-height:420px; overflow-y:auto; padding-right:4px;}
  .log-wrap::-webkit-scrollbar{width:6px;}
  .log-wrap::-webkit-scrollbar-thumb{background:var(--panel-2); border-radius:3px;}
  .log-entry{
    display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);
    animation:fadeIn .35s ease;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-age{
    flex-shrink:0; width:52px; text-align:right; font-family:var(--font-display);
    color:var(--gold); font-size:13px; padding-top:1px;
  }
  .log-text{font-size:14px; line-height:1.65; color:var(--text);}
  .log-text.death{color:var(--danger);}
  .log-text.milestone{color:var(--gold);}
  .log-text.fortune{color:var(--success);}
  .log-text.misfortune{color:#e0a15c;}
  .log-text.choice{color:var(--violet); font-weight:600;}

  .choice-panel{
    border:1px solid var(--violet); border-radius:11px;
    background:rgba(144,117,224,0.08); padding:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .choice-hint{
    font-size:12px; color:#b9a4ff; text-align:center;
    letter-spacing:.1em; margin-bottom:4px;
  }
  .choice-option{
    width:100%; text-align:left; background:var(--panel-2);
    border:1px solid var(--line); padding:11px 14px;
  }
  .choice-option:hover{border-color:var(--violet);}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .progress-line{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--text-dim); margin-bottom:12px;
  }
  .speed-toggle{display:flex; gap:6px;}
  .speed-toggle button{
    font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--line);
    background:none; color:var(--text-dim); cursor:pointer;
  }
  .speed-toggle button.active{border-color:var(--gold); color:var(--gold);}

  /* 结局 */
  .ending-title{
    text-align:center; font-family:var(--font-display); font-size:26px;
    color:var(--gold); margin:6px 0 4px;
  }
  .ending-sub{text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:18px;}
  .score-box{
    display:flex; justify-content:center; align-items:baseline; gap:8px; margin-bottom:20px;
  }
  .score-num{font-family:var(--font-display); font-size:44px; color:var(--gold);}
  .score-label{font-size:12px; color:var(--text-dim);}
  .achieve-list{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 4px;}
  .achieve-chip{
    font-size:12px; padding:4px 11px; border-radius:20px;
    border:1px solid rgba(144,117,224,0.4); color:#b9a4ff; background:rgba(144,117,224,0.08);
  }

  .footer-note{text-align:center; color:var(--text-dim); font-size:11px; margin-top:22px; letter-spacing:.05em;}

  /* 成就殿堂 */
  .achieve-summary{
    text-align:center; color:var(--gold); font-family:var(--font-display);
    font-size:15px; margin-bottom:16px; letter-spacing:.05em;
  }
  .achieve-card{
    display:flex; align-items:flex-start; gap:12px;
    border:1px solid var(--line); border-radius:11px;
    padding:13px 14px; margin-bottom:10px;
    background:rgba(255,255,255,0.02);
  }
  .achieve-card.unlocked{border-color:rgba(216,178,106,0.45); background:rgba(216,178,106,0.06);}
  .achieve-icon{
    flex-shrink:0; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; border:1px solid var(--line); background:var(--panel-2);
  }
  .achieve-card.unlocked .achieve-icon{
    border-color:var(--gold); color:var(--gold); background:rgba(216,178,106,0.12);
  }
  .achieve-card.locked .achieve-icon{ color:var(--text-dim); opacity:.6; }
  .achieve-body{flex:1;}
  .achieve-name{font-size:14px; color:var(--text); font-weight:600; margin-bottom:2px;}
  .achieve-card.locked .achieve-name{color:var(--text-dim);}
  .achieve-desc{font-size:12px; color:var(--text-dim); line-height:1.5;}
  .achieve-progress{font-size:11px; color:var(--gold); margin-top:4px;}

  .new-unlock-banner{
    border:1px solid var(--gold); border-radius:10px;
    background:rgba(216,178,106,0.1); padding:12px 14px;
    margin-bottom:16px; font-size:13px; color:var(--gold); text-align:center;
  }

  @media (max-width:480px){
    h1.title{font-size:26px;}
    .scroll{padding:18px 16px;}
    .stat-name{width:52px; font-size:13px;}
    .stat-row{flex-wrap:wrap; row-gap:6px;}
    .stat-cost-hint{width:100%; text-align:left; padding-left:64px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
"use strict";

/* ========================= 数据层 ========================= */

const STAT_KEYS = ["power","wit","charm","luck","origin","health","wealth"];
const STAT_LABEL = { power:"战力", wit:"悟性", charm:"魅力", luck:"气运", origin:"出身", health:"健康", wealth:"财富" };
/* health/wealth 这两项新属性不受天赋与投胎方式影响，统一从中等水平(5)起步，
   主要靠属性分配环节的手动加点、以及人生模拟过程中大量事件的实时影响来变化——
   健康值会直接影响每年的意外死亡概率，财富值则会解锁/触发一些与经济状况相关的事件分支。 */
const NEUTRAL_STAT_KEYS = ["health","wealth"];
const NEUTRAL_STAT_BASELINE = 5;
/* 「命运积分」「结局分层」「隐藏结局」这几套此前已经过反复测算校准的判定逻辑，
   都只基于最初的五维属性（战力/悟性/魅力/气运/出身）——健康与财富是后加的两项新属性，
   起始基准值为5，如果直接混入这些计算会让基准分数整体上浮，打乱之前校准好的门槛，
   所以这里单独留一份不含健康/财富的"核心五维"列表，专门给这些计算使用。 */
const CORE_STAT_KEYS = ["power","wit","charm","luck","origin"];

const WORLDVIEWS = [
  {id:"qixiu", name:"灵气复苏 · 修仙界", tagline:"渡劫飞升，逆天改命",
   desc:"天地灵气复苏，凡人可修炼成仙，肉体亦可飞升，寿元长达万载。"},
  {id:"magic", name:"阿卡纳大陆 · 剑与魔法", tagline:"魔法与剑，勇者的史诗",
   desc:"经典的剑与魔法世界，魔王与勇者的传说代代相传，永不落幕。"},
  {id:"scifi", name:"二一二七 · 星际科技位面", tagline:"星辰大海，机甲纵横",
   desc:"星际殖民时代，基因改造与机甲战争主宰着人类文明的走向。"},
  {id:"warhammer", name:"战锤纪元 · 黑暗千年", tagline:"唯有战争永恒",

  {id:"yaoguai", name:"妖怪横行 · 东方异闻录", tagline:"人妖殊途，缘起江湖",
   desc:"阴阳杂糅的东方古国，妖魔鬼怪与修行之人共存于市井之间。"},
  {id:"cyberpunk", name:"机械废土 · 核冬纪元", tagline:"钢铁与荒芜并存",
   desc:"核战之后的废土世界，义体改造与赛博网络重塑了人类文明。"},
  {id:"steampunk", name:"蒸汽纪元 · 齿轮与秩序", tagline:"以蒸汽为血，以秩序为骨",
   desc:"维多利亚风格的蒸汽机械帝国，飞艇与齿轮装置主宰着这个讲究规矩与阶级的世界。"},
  {id:"zombie", name:"丧尸围城 · 末日纪元", tagline:"在废墟与尸潮中挣扎求生",
   desc:"一场突如其来的病毒灾变让文明分崩离析，幸存者们在丧尸横行的废墟都市中艰难求生。"},
  {id:"westworld", name:"荒野西部 · 枪火纪元", tagline:"快枪与赏金的荒芜大陆",
   desc:"一片充斥着牛仔、赏金猎人与铁路矿脉的荒芜西部大陆，规矩全靠腰间的手枪来说话。"},
  {id:"urbanpower", name:"都市异能 · 觉醒纪元", tagline:"钢筋水泥下涌动的超凡力量",
   desc:"看似平凡的现代都市之下，隐藏着一群悄然觉醒超凡能力的人们，游走在秩序与失控的边缘。"},
  {id:"pirates", name:"大航海 · 风暴纪元", tagline:"扬帆于未知海域的黄金时代",
   desc:"大航海黄金时代的浩瀚海域，海盗、商船与传说中的宝藏在惊涛骇浪间交织出无数冒险故事。"},
  {id:"norse", name:"诸神黄昏 · 北欧神域", tagline:"凡人与诸神共存的神话时代",
   desc:"北欧神话中巨人、诸神与凡人共同生活的世界，命运女神的丝线早已为世界织好了终结的预兆。"}
];

const REINCARNATIONS_BY_WORLD = {
  qixiu: [
    { id:"qixiu_baby", name:"凡胎转生 · 从零开始",
      desc:"魂穿凡人婴儿之躯，在灵气尚且稀薄的凡俗之家降生，一切修仙之路都要从头开始。",
      startAge:0, mod:{},
      opening:"在一声嘹亮的啼哭中，你降生在了一户普通的凡人农家，屋外的灵气稀薄得几乎难以察觉。" },
    { id:"qixiu_noble", name:"世家夺舍 · 嫡系子弟",

      startAge:0, mod:{origin:2, power:-1},
      opening:"你悠悠转醒，发现自己躺在铺着灵纹锦缎的婴儿床里，房梁上悬着家族历代供奉的护法符箓。" },
    { id:"qixiu_outcast", name:"仙门弃徒 · 绝境重生",
      desc:"你转生成了一名被宗门放弃、判定再无修炼价值的弃徒，境遇凄凉，却也因此无人再来打扰你的秘密。",
      startAge:0, mod:{origin:-2, luck:-1},
      opening:"你在宗门后山的柴房里悠悠转醒，账册上记着你的名字——一个早已被判定「毫无灵根」的弃徒。" },
    { id:"qixiu_summon", name:"雷劫夺体 · 半步筑基",
      desc:"你的灵魂在一场天劫降临的瞬间强行夺取了一名筑基修士的躯体，一睁眼便已站在生死存亡的关口。",
      startAge:16, mod:{power:2, luck:-1},
      opening:"漫天雷霆炸响的刹那，你睁开了眼睛——借来的这具躯体，正立于渡劫的雷云之下。" },
    { id:"qixiu_prodigy", name:"灵根神童 · 天纵之才",
      desc:"你生来就展现出远超同龄人的灵根禀赋，宗门上下都对你寄予厚望，压力也随之而来。",
      startAge:0, mod:{wit:2, luck:-1},

/* 事件池：age:[min,max]  cond(ctx)=>bool   effect(ctx)=>void   weight   once   achievement  death */
function hasTag(ctx, tag){ return ctx.tags.has(tag); }
function hasFlag(ctx, flag){ return ctx.flags.has(flag); }
function stat(ctx, key){ return ctx.stats[key]; }
/* 事件的 text 字段可以是普通字符串（通用文案），也可以是按世界观区分的对象
   （如 {qixiu:"...", magic:"...", ...}），resolveText 负责按当前世界观取出对应文案 */
function resolveText(ev, ctx){
  if(typeof ev.text === "string") return ev.text;
  return ev.text[ctx.world] || ev.text.magic || Object.values(ev.text)[0];
}

      magic:"你在学院的课堂上总是走神，魔法基础课接连挂了三次科，被同学戏称为「吊车尾」。",
      scifi:"你在殖民地的课堂上总是走神，基础理论课接连挂了三次科，被同学戏称为「吊车尾」。",
      warhammer:"你在新兵训练中总是分心，战术条令课接连挂了三次科，被战友戏称为「吊车尾」。",
      yaoguai:"你在道观的课堂上总是走神，符箓入门课接连挂了三次科，被师兄弟戏称为「吊车尾」。",
      cyberpunk:"你在技术营的课堂上总是走神，编程基础课接连挂了三次科，被同伴戏称为「吊车尾」。"
    }, weight:8, cond:c=>stat(c,"wit")<=3},
    {text:"你结识了一个同样来自地球的转生者，两人相视一笑，从此成了臭味相投的损友。", weight:7},
    {text:{
      qixiu:"宗门弟子堂前贴出了招募告示，你鼓起勇气报了名，成为一名记名弟子。",
      magic:"冒险者公会门口贴出了招募告示，你鼓起勇气报了名，成为一名见习冒险者。",
      scifi:"殖民地防卫队门口贴出了招募告示，你鼓起勇气报了名，成为一名见习学员。",
      warhammer:"帝国军团门口贴出了征募告示，你鼓起勇气报了名，成为一名见习新兵。",
      yaoguai:"驱邪门派门口贴出了收徒告示，你鼓起勇气报了名，成为一名见习弟子。",
      cyberpunk:"拾荒者公会门口贴出了招募告示，你鼓起勇气报了名，成为一名见习学徒。"
    }, weight:8},
    {text:"你在打工搬货时不小心一拳打穿了仓库的石墙，负责登记的人对你刮目相看。", weight:7, cond:c=>stat(c,"power")>=7},
    {text:"你养的契约灵兽突然产生了异变，一夜之间长成了半个村子大的巨兽。", weight:6, cond:c=>hasTag(c,"familiar")},
    {text:"一次重要的考核中，你莫名其妙打破了三百年来的历史记录，成了传说中的插班生。", weight:5, cond:c=>hasTag(c,"memory")},
    {text:"你暗恋的邻家青梅竹马要随家人搬去繁华的大城市，你追到车站却始终没能说出口。", weight:6},
    {text:"一次团体训练中，你独自一人闯入了本该由资历更深的人负责的危险区域。", weight:5},
    {text:{
      qixiu:"你在一次课堂展示中随手引动的灵气波动，被误认为是失传已久的秘术，引来不少侧目。",
      magic:"你在一次课堂展示中随手施展的小魔法，被误认为是失传已久的禁咒，引来不少侧目。",
      scifi:"你在一次课堂展示中随手表现出的基因反应，被误认为是绝密的实验数据，引来不少侧目。",
      warhammer:"你在一次训练展示中不经意流露的力量征兆，被误认为是帝皇亲赐的祝福，引来不少侧目。",
      yaoguai:"你在一次课堂展示中随手引动的妖气波动，被误认为是失传已久的秘法，引来不少侧目。",
      cyberpunk:"你在一次课堂展示中随手展现的义体反应，被误认为是黑市禁售的顶级改装，引来不少侧目。"
    }, weight:5, cond:c=>hasTag(c,"elf")},
    {text:"你在一场公开辩论会上舌灿莲花，把对手说得哑口无言，赢得了「铁齿铜牙」的外号。", weight:6},
    {text:"你在同学之间的插科打诨中总能一针见血，渐渐成了班里公认的开心果。", weight:6, cond:c=>hasTag(c,"tsukkomi")},
    {text:"你靠脑子而不是拳头解决了一场同学间的纠纷，从此赢得了「智多星」的称号。", weight:5, cond:c=>stat(c,"wit")>=7&&stat(c,"power")<=4},
    {text:"你偷偷报名参加了城里的地下擂台赛，虽然输得很惨，却也因此结识了不少江湖人。", weight:5},
    {text:"你在体育课上随手一投，篮球划出的弧线让体育老师当场愣住，怀疑自己是不是看错了。", weight:5, cond:c=>hasTag(c,"hiddenboss")},
    {text:"你在毕业旅行中偶然救下了一只受伤的小动物，它此后就一直跟在你身边不肯离去。", weight:5},
    {text:"你靠着课余打工攒下的钱，凑齐了人生中第一件像样的装备，攥在手里格外珍惜。", weight:5, cond:c=>stat(c,"origin")<=3&&stat(c,"power")>=6},
    {text:"你暗中参加了一场地下拍卖会，误打误撞拍下了一件来历不明却意外好用的物件。", weight:5},
    {text:"你在一次全区统考中轻松拿下第一，主考官反复核对试卷，怀疑是不是出了什么差错。", weight:6, cond:c=>hasTag(c,"genius")},
    {text:"你总觉得脑海深处有另一个「自己」在小声提醒你什么，虽然听不真切，却总能在关键时刻帮你避开麻烦。", weight:6, cond:c=>hasTag(c,"twin")},
    {death:true, text:{
      qixiu:"一次历练任务中，你贸然闯入了标注为「绝对禁地」的上古遗迹深处，从此再未归来。",
      magic:"一次实习任务中，你贸然闯入了标注为「绝对禁区」的地下城深处，从此再未归来。",
      scifi:"一次实习任务中，你贸然闯入了标注为「绝对禁区」的废弃空间站深处，从此再未归来。",
      warhammer:"一次实习任务中，你贸然闯入了标注为「绝对禁区」的异形巢穴深处，从此再未归来。",
      yaoguai:"一次历练任务中，你贸然闯入了标注为「绝对禁地」的古墓深处，从此再未归来。",
      cyberpunk:"一次实习任务中，你贸然闯入了标注为「绝对禁区」的深层辐射废墟，从此再未归来。"
    }, weight:1, cause:"实习事故"},
    {death:true, text:"一次意外的坠落事故中，你没能抓稳手边的绳索，就此香消玉殒。", weight:1, cond:c=>stat(c,"health")<=3, cause:"意外坠落"},
    {death:true, text:"你因一时逞强跳进了湍急的河流，却再也没能游上岸。", weight:1, cause:"溺水身亡"},
    {choice:true, weight:5, text:"老师安排你和一个平时说不上话的同学做同桌，你要不要主动破冰？", options:[
      {label:"主动破冰，试着交朋友", result:"你主动开口破了冰，两人渐渐从陌生的同桌变成了能说得上话的朋友。", statEffect:{charm:1}},
      {label:"保持距离，各干各的", result:"你选择保持距离，两人相处得平淡却也算不上尴尬。", statEffect:{wit:1}},
      {label:"找借口申请换座位", result:"你找了个借口申请换了座位，省了不少麻烦，却也少了一段可能的缘分。", statEffect:{luck:-1}}
    ]},
    {choice:true, weight:5, text:"你意外得知一个能让自己在考试中作弊而不被发现的办法，要不要用？", options:[
      {label:"用了，求个好成绩", result:"你动用了那个办法，成绩确实好看了不少，心里却始终有点不踏实。", statEffect:{luck:1,charm:-1}},
      {label:"不用，靠自己真本事", result:"你没有动用那个办法，靠着自己的真本事考完了这一场，心安理得。", statEffect:{wit:1}},
      {label:"举报这个漏洞", result:"你把这个漏洞举报了上去，虽然得罪了个别人，却也赢得了老师的信任。", statEffect:{charm:1}}
    ]},
    {choice:true, weight:5, text:"你被选中代表班级参加一场演讲比赛，主题任你选，你却一时没了主意。", options:[
      {label:"讲个人经历，真情实感", result:"你讲了自己的一段真实经历，台下不少人都听得动容。", statEffect:{charm:1}},
      {label:"讲宏大主题，展现视野", result:"你选了个宏大的主题，一番论述下来，评委都对你的视野赞不绝口。", statEffect:{wit:1}},
      {label:"讲点幽默的，博个笑声", result:"你选了个轻松幽默的话题，全场笑声不断，气氛倒是格外热闹。", statEffect:{luck:1}}
    ]},
    {choice:true, weight:5, text:"你意外被卷入了一场关于该不该给流浪动物喂食的班级争论。", options:[
      {label:"坚持喂养，风雨无阻", result:"你坚持给流浪动物喂食，风雨无阻，班上有人说你多事，也有人默默佩服你。", statEffect:{charm:1}},
      {label:"觉得应该交给专业机构", result:"你提出这事该交给专业机构处理，这份理性的观点也说服了不少同学。", statEffect:{wit:1}},
      {label:"不掺和，事不关己", result:"你选择了不掺和这场争论，事不关己，日子照常过着，心里却总觉得少了点什么。", statEffect:{luck:-1}}
    ]},
    {choice:true, weight:5, text:"你喜欢上了班里一个人，却发现自己的好朋友似乎也对同一个人有意思。", options:[
      {label:"主动退让，把机会让给朋友", result:"你选择了主动退让，把这份机会让给了朋友，心里五味杂陈，却也守住了这份友情。", statEffect:{charm:1,luck:-1}},
      {label:"坦白心意，正面竞争", result:"你坦白了自己的心意，选择正面竞争，这份坦荡倒也让人刮目相看。", statEffect:{power:1}},
      {label:"什么都不说，把心事藏起来", result:"你什么都没说，把这份心事悄悄藏进了心底，谁也没让人看出端倪。", statEffect:{wit:1}}
    ]}
  ],
  adult: [ // 16-30
    {text:"当年那个针锋相对的同学如今也小有成就，你们又一次在某个场合针锋相对，谁都不肯让谁。", weight:6, cond:c=>hasFlag(c,"rival_met"), setFlag:"rival_escalated"},
    {text:"你终于查明了当年那件信物背后的真相——你的身世，远比想象中更加不凡。", weight:6, cond:c=>hasFlag(c,"secret_lineage"), setFlag:"lineage_revealed", statEffect:{origin:2}},
    {text:"一个眼神清澈的年轻人执意要拜你为师，软磨硬泡了许久，你最终答应收下了这个徒弟。", weight:5, setFlag:"took_apprentice"},
    {text:"那位神秘人忽然登门，说是时候兑现当年欠下的人情了，还提出了一个不大不小的请求。", weight:6, cond:c=>hasFlag(c,"owes_favor"), setFlag:"favor_called"},
    {choice:true, weight:6, text:"多年后，与当年如出一辙的灾难征兆再次出现，你要不要主动站出来提醒大家？", cond:c=>hasFlag(c,"disaster_survivor"), options:[
      {label:"挺身而出，大声示警", result:"你挺身而出大声示警，起初没什么人信，直到灾难真的降临，大家才明白你救了所有人。", statEffect:{charm:2}, achievement:"未雨绸缪"},
      {label:"独自准备，先保住自己", result:"你没有声张，只是悄悄为自己准备了后路，灾难来临时你全身而退，心里却难免有些不是滋味。", statEffect:{luck:1,charm:-1}},
      {label:"选择相信这次不会再发生", result:"你说服自己这次应该不会再发生，选择了照常生活——事后证明，你赌对了，一切安然无恙。", statEffect:{luck:1}}

    {choice:true, weight:6, text:"任务途中同伴受伤严重，撤退还是继续，你必须当机立断。", options:[

      {label:"冒险继续，争取两全其美", result:"你选择冒险继续，一边应付任务一边照顾同伴，惊险万分地做到了两全其美。", statEffect:{power:1,health:-1}},
      {label:"兵分两路，各自行动", result:"你决定兵分两路，一部分人撤退，一部分人继续——这个折中的决定，最后勉强称得上圆满。", statEffect:{wit:1}}
    ]},
    {text:"你终于学有所成，回到当年恩师门下拜谢，恩师欣慰地看着你，说自己没有看错人。", weight:6, cond:c=>hasFlag(c,"mentor_found"), setFlag:"mentor_honored", statEffect:{wit:1}},
    {text:"你在一次机缘巧合下对一个人一见倾心，却因为种种缘故，一直没能鼓起勇气挑明心意。", weight:5, setFlag:"secret_crush"},
    {choice:true, weight:6, text:"你路遇一场打劫，受害者的呼救声传入耳中，你必须当场做出选择。", options:[
      {label:"挺身而出，出手相助", result:"你毫不犹豫地挺身而出，击退了劫匪，事后受害者对你千恩万谢，这件事很快就在周围传开了。", statEffect:{power:1,charm:1}, achievement:"路见不平"},
      {label:"悄悄记下细节，暗中报官", result:"你不动声色地绕开，暗中把细节告诉了官府，既避开了正面冲突的风险，也算尽了一份力。", statEffect:{wit:1}},
      {label:"视若无睹，转身离开", result:"你选择了视若无睹，转身离开，心里却始终留下了一根刺，往后很长一段时间都无法真正释怀。", statEffect:{luck:-1,charm:-1}}
    ]},

    }, weight:7, cond:c=>hasTag(c,"system")},
    {text:{
      qixiu:"你报名参加了宗门举办的论武大会，一路过关斩将，最终风光地站上了冠军的擂台。",
      magic:"你报名参加了王国举办的比武大会，一路过关斩将，最终风光地站上了冠军的领奖台。",
      scifi:"你报名参加了殖民地举办的格斗竞技赛，一路过关斩将，最终风光地站上了冠军的领奖台。",
      warhammer:"你报名参加了军团举办的角斗大赛，一路过关斩将，最终风光地站上了冠军的领奖台。",
      yaoguai:"你报名参加了江湖举办的比武大会，一路过关斩将，最终风光地站上了冠军的擂台。",
      cyberpunk:"你报名参加了废土举办的地下格斗赛，一路过关斩将，最终风光地站上了冠军的领奖台。"
    }, weight:7, achievement:"比武大会冠军"},
    {text:{
      qixiu:"你莫名其妙地被卷入了掌门之位的继承之争，稀里糊涂地成了某位少主最重要的盟友。",
      magic:"你莫名其妙地被卷入了王位继承之争，稀里糊涂地成了某位王子最重要的盟友。",
      scifi:"你莫名其妙地被卷入了殖民地总督的继任之争，稀里糊涂地成了某位候选人最重要的盟友。",
      warhammer:"你莫名其妙地被卷入了军团指挥权的继承之争，稀里糊涂地成了某位继承人最重要的盟友。",
      yaoguai:"你莫名其妙地被卷入了城隍之位的继承之争，稀里糊涂地成了某位少城隍最重要的盟友。",
      cyberpunk:"你莫名其妙地被卷入了帮派老大之位的继承之争，稀里糊涂地成了某位少主最重要的盟友。"
    }, weight:6, cond:c=>stat(c,"origin")>=6},
    {text:{
      qixiu:"你在游历中救下了一位落难的仙门女修，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      magic:"你在旅途中救下了一位落难的精灵少女，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      scifi:"你在任务中救下了一位落难的殖民地女科研员，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      warhammer:"你在战场上救下了一位落难的随军女祭司，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      yaoguai:"你在山野中救下了一位落难的狐族少女，她说要以身相许来报答救命之恩，被你婉言谢绝。",
      cyberpunk:"你在废土上救下了一位落难的黑市女商人，她说要以身相许来报答救命之恩，被你婉言谢绝。"
    }, weight:6},
    {text:"你对着队友随口说了句「这次任务结束我就退休结婚」，队友们的脸色瞬间都变得很奇怪。", weight:6, cond:c=>hasTag(c,"deathflag")},
    {text:{
      qixiu:"你无意间路过了传说中的「真龙秘境」，一条上古真龙对你异常亲切，仿佛与你相识已久。",
      magic:"你无意间路过了传说中的「龙之谷」，一条巨龙对你异常亲切，仿佛与你相识已久。",
      scifi:"你无意间路过了传说中的「巨兽禁区」，一头深空巨兽对你异常亲切，仿佛与你相识已久。",
      warhammer:"你无意间路过了传说中的「泰坦墓场」，一台沉睡的泰坦机甲对你异常亲切，仿佛与你相识已久。",
      yaoguai:"你无意间路过了传说中的「应龙潭」，一条应龙对你异常亲切，仿佛与你相识已久。",
      cyberpunk:"你无意间路过了传说中的「机械巨兽禁区」，一台古老的机械巨兽对你异常亲切，仿佛与你相识已久。"
    }, weight:6, cond:c=>hasTag(c,"dragon")},
    {text:"不知为何，你的所作所为总是被人误解成反派，通缉令都快贴满了这片土地的每一个角落。", weight:6, cond:c=>hasTag(c,"villain")},
    {text:"你开了一家专卖地球风味小吃的餐馆，凭借「可乐」和「炸鸡」意外成了当地最火的网红店。", weight:6},
    {text:{
      qixiu:"魔道邪修的一位大能似乎对你颇为忌惮，特意派出精锐弟子想要提前将你除掉。",
      magic:"魔王军的一位高层似乎对你颇为忌惮，特意派出精锐部队想要提前将你除掉。",
      scifi:"敌对势力的一位高层似乎对你颇为忌惮，特意派出精锐部队想要提前将你除掉。",
      warhammer:"混沌势力的一位头目似乎对你颇为忌惮，特意派出精锐异形想要提前将你除掉。",
      yaoguai:"妖界的一位大妖似乎对你颇为忌惮，特意派出精锐妖兵想要提前将你除掉。",
      cyberpunk:"敌对帮派的一位头目似乎对你颇为忌惮，特意派出精锐打手想要提前将你除掉。"
    }, weight:6, cond:c=>stat(c,"power")>=6},
    {text:{
      qixiu:"你偶然习得了一门出神入化的剑诀，一套剑招使出，连围观的宗门长老都自愧不如。",
      magic:"你偶然习得了一手出神入化的剑法，一套剑招使出，连围观的骑士团长都自愧不如。",
      scifi:"你偶然习得了一手出神入化的近战格斗术，一套招式使出，连围观的教官都自愧不如。",
      warhammer:"你偶然习得了一手出神入化的近身搏杀技，一套招式使出，连围观的连长都自愧不如。",
      yaoguai:"你偶然习得了一门出神入化的剑术，一套剑招使出，连围观的掌门都自愧不如。",
      cyberpunk:"你偶然习得了一手出神入化的义体格斗术，一套招式使出，连围观的帮派老大都自愧不如。"
    }, weight:6, cond:c=>hasTag(c,"swordsman")},
    {text:{
      qixiu:"曾经并肩作战的道友，因为一场变故彻底走火入魔，成了邪修的干将，与你在战场上兵戎相见。",
      magic:"曾经并肩作战的挚友，因为一场变故彻底黑化，成了魔王军的干部，与你在战场上兵戎相见。",
      scifi:"曾经并肩作战的战友，因为一场变故彻底叛变，成了敌对势力的高层，与你在战场上兵戎相见。",
      warhammer:"曾经并肩作战的兄弟，因为一场变故被混沌腐化，成了异形的傀儡，与你在战场上兵戎相见。",
      yaoguai:"曾经并肩作战的师兄弟，因为一场变故彻底入魔，成了妖界的干将，与你在战场上兵戎相见。",
      cyberpunk:"曾经并肩作战的兄弟，因为一场变故彻底黑化，成了敌对帮派的骨干，与你在战场上兵戎相见。"
    }, weight:5, cond:c=>hasTag(c,"blackening")},
    {text:"你被误认成了传说中「深藏不露的隐藏大佬」，一群小混混上门挑衅后被你的气场吓退了。", weight:5, cond:c=>hasTag(c,"hiddenboss")},
    {text:{
      qixiu:"你在宗门的功勋榜上稳步攀升，任务完成度渐渐成了新弟子们争相模仿的标杆。",
      magic:"你在冒险者公会的排行榜上稳步攀升，任务完成度渐渐成了新人们争相模仿的标杆。",
      scifi:"你在殖民地防卫队的战绩榜上稳步攀升，任务完成度渐渐成了新人们争相模仿的标杆。",
      warhammer:"你在军团的战功榜上稳步攀升，任务完成度渐渐成了新兵们争相模仿的标杆。",
      yaoguai:"你在门派的功绩簿上稳步攀升，降妖数量渐渐成了新弟子们争相模仿的标杆。",
      cyberpunk:"你在拾荒者公会的排行榜上稳步攀升，任务完成度渐渐成了新人们争相模仿的标杆。"
    }, weight:5},
    {text:{
      qixiu:"你在门派论剑大会上一鸣惊人，剑锋所指，几乎无人能挡，被誉为剑修界的一颗新星。",
      magic:"你在剑术大会上一鸣惊人，剑锋所指，几乎无人能挡，被誉为剑术界的一颗新星。",
      scifi:"你在格斗竞技赛上一鸣惊人，出手所指，几乎无人能挡，被誉为格斗界的一颗新星。",
      warhammer:"你在近身搏杀赛上一鸣惊人，出手所指，几乎无人能挡，被誉为军团里的一颗新星。",
      yaoguai:"你在江湖论剑大会上一鸣惊人，剑锋所指，几乎无人能挡，被誉为剑修界的一颗新星。",
      cyberpunk:"你在地下格斗赛上一鸣惊人，出手所指，几乎无人能挡，被誉为格斗圈的一颗新星。"
    }, weight:6, cond:c=>hasTag(c,"swordsman")},
    {text:"系统面板悄悄弹出提示：「本周任务完成度100%，宿主经验值大幅提升」。", weight:6, cond:c=>hasTag(c,"system")},
    {text:"你凭借三寸不烂之舌，兵不血刃地化解了一场本该大打出手的冲突。", weight:5, cond:c=>stat(c,"charm")>=7&&stat(c,"power")<=4},
    {text:{
      qixiu:"你无意间救下了一位乔装出行的宗主之女，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      magic:"你无意间救下了一位乔装出行的公主，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      scifi:"你无意间救下了一位乔装出行的总督千金，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      warhammer:"你无意间救下了一位乔装出行的贵族继承人，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      yaoguai:"你无意间救下了一位乔装出行的城隍之女，对方非要以身相许，被你婉拒后两人反倒成了知己。",
      cyberpunk:"你无意间救下了一位乔装出行的帮派老大之女，对方非要以身相许，被你婉拒后两人反倒成了知己。"
    }, weight:5},
    {text:"你的契约灵兽突然开口说出了人话，把你自己都吓了一跳。", weight:5, cond:c=>hasTag(c,"familiar")},
    {text:"你明明什么都没做，却总是莫名其妙地被卷进各种麻烦事里，百口莫辩。", weight:5, cond:c=>stat(c,"luck")<=3},
    {text:"你在冒险途中偶遇了另一位同样来自地球的转生者，两人抱头痛哭，聊起了各自的辛酸血泪史。", weight:5},
    {text:{
      qixiu:"你从外门弟子一路拼杀，硬是靠实力挤进了宗门核心弟子的圈子。",
      magic:"你从底层冒险者一路拼杀，硬是靠实力挤进了王都精英冒险者的圈子。",
      scifi:"你从底层学员一路拼杀，硬是靠实力挤进了殖民地精英机甲师的圈子。",
      warhammer:"你从底层新兵一路拼杀，硬是靠实力挤进了军团精锐部队的圈子。",
      yaoguai:"你从底层弟子一路拼杀，硬是靠实力挤进了门派核心弟子的圈子。",
      cyberpunk:"你从底层拾荒者一路拼杀，硬是靠实力挤进了废土精英拾荒队的圈子。"
    }, weight:5, cond:c=>stat(c,"origin")<=3&&stat(c,"power")>=7},
    {text:{
      qixiu:"山中的隐世仙族对你格外礼遇，甚至邀请你参加了灵山深处的秘密祭典。",
      magic:"精灵长老族对你格外礼遇，甚至邀请你参加了森林深处的秘密祭典。",
      scifi:"殖民地的元老议会对你格外礼遇，甚至邀请你参加了核心舱深处的机密仪式。",
      warhammer:"教团的高阶祭司对你格外礼遇，甚至邀请你参加了圣殿深处的秘密仪式。",
      yaoguai:"山中的狐族长老对你格外礼遇，甚至邀请你参加了深山狐窟的秘密祭典。",
      cyberpunk:"废土的地下长老会对你格外礼遇，甚至邀请你参加了地下堡垒深处的秘密仪式。"
    }, weight:5, cond:c=>hasTag(c,"elf")},
    {text:"你在酒馆里随口吹的一个牛，阴差阳错地成真了，把你自己都整不会了。", weight:5},
    {text:"命运的齿轮似乎又一次为你转动，一个足以改变这个世界格局的机会悄然降临。", weight:5, cond:c=>hasTag(c,"chosen")},
    {text:{
      qixiu:"你的英勇事迹被说书先生编成了传奇话本，传诵在江湖的每一个角落。",
      magic:"你的英勇事迹被吟游诗人编成了歌谣，传唱在大陆的每一个角落。",
      scifi:"你的英勇事迹被全息主播剪成了热门影像，传播在殖民地的每一个角落。",
      warhammer:"你的英勇事迹被军旅诗人编成了战歌，传唱在军团的每一个角落。",
      yaoguai:"你的英勇事迹被说书先生编成了传奇话本，传诵在江湖的每一个角落。",
      cyberpunk:"你的英勇事迹被街头主播剪成了热门视频，传播在废土的每一个角落。"
    }, weight:5, cond:c=>stat(c,"power")>=7&&stat(c,"charm")>=7},
    {text:"你信誓旦旦地说「这次一定不会有事」，队友们齐刷刷地往后退了一步。", weight:5, cond:c=>hasTag(c,"deathflag")},
    {text:"你参与了一场跨境的商队护卫任务，途中结识的商人后来成了你重要的合作伙伴。", weight:5},
    {text:"你苦苦劝说昔日的挚友回头，却始终没能拦住他一步步滑向深渊。", weight:5, cond:c=>hasTag(c,"blackening")},
    {text:"你做了一个语焉不详却异常真实的梦，没过几天梦中的场景真的发生了，把你自己都吓了一跳。", weight:5, cond:c=>hasTag(c,"prophecy")},
    {text:"你在一次几乎必死的意外中奇迹生还，郎中反复检查也查不出所以然，只当是运气使然。", weight:5, cond:c=>hasTag(c,"immortal")},
    {text:"你在路边随手翻了翻旧货摊，淘到的东西转手一卖，竟赚了一笔实实在在的意外之财。", weight:5, cond:c=>hasTag(c,"richluck")},
    {text:"你把多年前一件鸡毛蒜皮的小事记恨到了现在，气得对方百思不得其解你到底在气什么。", weight:5, cond:c=>hasTag(c,"cursed")},
    {death:true, text:{
      qixiu:"在与魔道邪修先锋的决战中，你力竭倒地，未能等到援军赶来的那一刻。",
      magic:"在与魔王军先锋部队的决战中，你力竭倒地，未能等到援军赶来的那一刻。",
      scifi:"在与外星先锋部队的决战中，你力竭倒地，未能等到援军赶来的那一刻。",
      warhammer:"在与异形先锋部队的决战中，你力竭倒地，未能等到援军赶来的那一刻。",
      yaoguai:"在与妖兵先锋的决战中，你力竭倒地，未能等到援军赶来的那一刻。",
      cyberpunk:"在与敌对帮派先锋的决战中，你力竭倒地，未能等到援军赶来的那一刻。"
    }, weight:1, cause:"战死沙场"},
    {death:true, text:"曾经的挚友黑化后与你在战场上兵戎相见，最终一剑刺穿了你的胸膛。", weight:1, cond:c=>hasTag(c,"blackening"), cause:"死于挚友之手"},
    {death:true, text:"一场突如其来的重病缠上了你，医者摇头叹息，说这病本就凶险，你终究没能挺过去。", weight:1, cond:c=>stat(c,"health")<=3, cause:"重病缠身"},
    {death:true, text:"你因还不上一笔巨额债务，被讨债的人失手打死在了街头，死状凄惨。", weight:1, cond:c=>stat(c,"wealth")<=2, cause:"讨债惨案"},
    {death:true, text:"一场突如其来的天灾降临，你在自家屋舍坍塌的瞬间被埋在了废墟之下。", weight:1, cause:"天灾降临"},
    {choice:true, weight:5, text:"领导把一个棘手但露脸的项目交给了你，你却发现同事都不太想接。", options:[
      {label:"迎难而上，抓住机会", result:"你迎难而上接下了项目，虽然过程艰辛，最终却也漂亮地完成了任务。", statEffect:{power:1,health:-1}},
      {label:"婉拒，留给更合适的人", result:"你婉拒了这个项目，把机会留给了你认为更合适的人。", statEffect:{wit:1}},
      {label:"争取更多资源后再接", result:"你先争取到了更多的资源支持，才点头接下了这个项目，这份周全让人放心。", statEffect:{origin:1}}
    ]},
    {choice:true, weight:5, text:"你目睹了一场当街的争吵，双方情绪都很激动，眼看要动手。", options:[
      {label:"上前劝阻", result:"你上前劝阻了这场争吵，虽然过程中被推了几下，好在最终平息了事态。", statEffect:{charm:1,health:-1}},
      {label:"报警后远远等着", result:"你报了警之后远远等着，稳妥地避开了直接的冲突。", statEffect:{wit:1}},
      {label:"绕道离开，不惹麻烦", result:"你选择了绕道离开，不想惹上这桩麻烦事，事后却也有些说不清的不安。", statEffect:{luck:-1}}
    ]},
    {choice:true, weight:5, text:"一位老朋友向你借一笔不小的钱，理由却说得含糊不清。", options:[
      {label:"相信朋友，借出去", result:"你选择相信这位老朋友，把钱借了出去，这份情分你看得比钱更重。", statEffect:{charm:1,wealth:-2}},
      {label:"婉拒，说自己周转不开", result:"你婉拒了这个请求，找了个理由说自己周转不开，多少保住了自己的钱袋子。", statEffect:{wealth:1,charm:-1}},
      {label:"借一半，留个余地", result:"你只借出了一半，既顾了情分，也留了自己的余地。", statEffect:{wit:1}}
    ]},
    {choice:true, weight:5, text:"你的伴侣提出想要辞职创业，你必须表态支持还是反对。", options:[
      {label:"全力支持，一起冒险", result:"你全力支持了伴侣的决定，两人一起冒险，虽然日子紧了点，感情却更加牢固。", statEffect:{charm:1,wealth:-1}},
      {label:"反对，劝其稳妥为上", result:"你反对了这个决定，劝伴侣稳妥为上，这份现实虽然扫了兴，却也是出于关心。", statEffect:{wit:1}},

      {text:"接生的女巫翻遍了她那本厚厚的占卜书，也没能算出你此生命运的走向，只留下意味深长的叹息。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中时，一位游历四方的精灵法师主动提出想收养你，你的父母必须做出决定。", options:[
        {label:"同意，让精灵法师带走抚养", result:"父母最终同意了，你自幼便跟着那位精灵法师游历四方。", statEffect:{wit:1,charm:1,origin:-1}, setFlag:"magic_elf_raised"},
        {label:"拒绝，留在人类家庭中长大", result:"父母拒绝了这个提议，坚持要把你留在身边亲自抚养长大。", statEffect:{origin:1}},
        {label:"折中，让精灵法师定期探望教导", result:"双方各退一步，精灵法师定期前来探望教导，你的成长多了几分奇妙的色彩。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"你收到了梦寐以求的魔法学院录取通知书，怀揣忐忑与期待踏上了前往学院的马车。", weight:10},
      {text:"你在入学考试中独自破解了一道困扰教授们多年的古代符文谜题，一时间名声大噪。", weight:8, cond:c=>stat(c,"wit")>=7},
      {text:"你在图书馆的角落里结识了一位沉默寡言的同学，两人一见如故，很快成了形影不离的搭档。", weight:8},
      {text:"你在魔法学院的元素亲和测试中，罕见地对两种以上元素都展现出了不俗的天赋。", weight:7},
      {text:"你误闯进学院禁地，撞见了一场秘密的魔法契约仪式，从此对『契约魔法』产生了浓厚的兴趣。", weight:6},
      {text:"你在野外课程中救下了一头受伤的幼龙，对方虽不能言语，眼神里却满是依恋。", weight:6, setFlag:"magic_dragon_youth"},
      {choice:true, weight:6, text:"魔法学院的教务处让你选择主修方向：元素系、召唤系还是附魔系，这将决定你往后的法术道路。", options:[
        {label:"元素系，锋芒毕露", result:"你选择了元素系，从此法术锋芒毕露，威力惊人。", statEffect:{power:2}},
        {label:"召唤系，广结善缘", result:"你选择了召唤系，学会了与各类生物沟通契约，人脉也随之广阔起来。", statEffect:{charm:2}},
        {label:"附魔系，精工细作", result:"你选择了附魔系，从此专精于打造各类附魔器物，日子过得踏实富足。", statEffect:{wealth:2}}
      ]},
      {text:"你在校内的元素控制课上不慎引发了小规模的失控，虽然吓坏了同学，却也因此摸清了自己的能力上限。", weight:6},
      {text:"你参加了学院间的魔法竞技赛，虽然首战失利，却也从此结识了一群志同道合的对手。", weight:6},
      {text:"你参加了学院组织的魔法竞拍会，误打误撞拍下了一件连教授都没能认出的神秘法器。", weight:6},
      {text:"你被选为学院禁书库的临时守护者，负责看管那些不能轻易示人的危险典籍。", weight:6},
      {text:"你自幼跟着精灵法师游历四方，见识远比同龄人更广，谈吐间总带着几分从容气度。", weight:6, cond:c=>hasFlag(c,"magic_elf_raised"), statEffect:{charm:1}}
    ],
    adult:[
      {text:"你在毕业典礼上正式获得了「持证魔法师」的资格认证，胸前别上了属于自己的法师徽章。", weight:10, achievement:"持证魔法师"},
      {text:"你只身一人平定了边境城镇的一场魔物暴乱，从此被当地居民亲切地称为「守护者」。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你与一位圣骑士并肩作战，击退了一群企图渗透王城的魔王军谍报人员。", weight:6},
      {text:"你签下了人生中第一份正式的魔法契约，从此多了一份需要恪守的责任与力量。", weight:6},
      {choice:true, weight:6, text:"当年你救下的那头幼龙如今已濒临死境，兽医说除非有人愿意与它签订生死相连的契约，否则它命不久矣。", cond:c=>hasFlag(c,"magic_dragon_youth"), options:[
        {label:"签订契约，与它共同承担风险", result:"你毫不犹豫地与幼龙签订了契约，从此两人一龙的命运紧紧相连。", statEffect:{power:1,luck:-1}, setFlag:"magic_dragon_bond", achievement:"生死相托"},
        {label:"找专业驯龙师帮忙，稳妥为上", result:"你找来了专业的驯龙师帮忙，虽然稳妥，却也因此错过了这段独特的缘分。", statEffect:{wit:1}},
        {label:"遗憾放手，尊重自然规律", result:"你最终选择了放手，虽然心里满是遗憾，却也明白这是对生命规律的尊重。", statEffect:{luck:1}}
      ]},
      {death:true, text:"一次禁咒实验意外失控，法力反噬彻底撕裂了你的魂魄，再无生还的可能。", weight:1, cause:"禁咒反噬"},
      {text:"你在探索一处古老的魔法遗迹时，意外触发了一段封存已久的防御法术，惊险脱身后收获颇丰。", weight:6},
      {text:"你受托翻译一份记载着失传咒语的传说卷轴，过程中数次险些走火入魔，好在最终平安完成。", weight:6},
      {text:"你无意间被卷入了两大魔法学院之间的百年争端，被迫要在两个母校之间选择立场。", weight:6},
      {text:"你驯养的元素精灵在一次意外中吞噬了过量的魔力，濒临暴走，你必须冷静应对。", weight:6, cond:c=>hasFlag(c,"magic_elemental_spirit")}
    ],
    prime:[
      {text:"你受王国委托前往边境平息了一场精灵与人类之间的冲突，声望在大陆上迅速传开。", weight:10, achievement:"边境和事佬"},
      {text:"王室正式册封你为宫廷魔导师，从此你的名字被郑重地载入了王国的编年史册。", weight:8, cond:c=>hasTag(c,"royalmagic")},
      {text:"你受邀主持了一届魔法学院的毕业典礼，看着台下满怀憧憬的新人，恍惚看到了当年懵懂的自己。", weight:7},
      {text:"你受邀参与了王国魔法议会的年度大典，你的一项理论被正式收录进了官方魔法典籍。", weight:6, cond:c=>stat(c,"wit")>=7},
      {text:"你与那头幼龙一同长大，如今它已成了令人闻风丧胆的成年巨龙，你们俩的传说也随之流传开来。", weight:6, cond:c=>hasFlag(c,"magic_dragon_bond"), achievement:"龙裔之友", statEffect:{power:1}},
      {text:"你在边境建立了一座小型的魔法学堂，专门教授那些没钱进正规学院的孩子。", weight:6},
      {choice:true, weight:6, text:"王国境内爆发了一场关于魔法立法的争论，议会请你以持证魔法师的身份发表立场。", options:[
        {label:"支持严格管控魔法", result:"你支持严格管控魔法的使用，虽然招来了一些非议，却也在王室那里赢得了信任。", statEffect:{origin:2}},
        {label:"支持魔法自由化", result:"你支持魔法自由化，主张人人皆可修习，此举在民间为你赢得了不小的声望。", statEffect:{luck:2}},
        {label:"保持中立，谁也不站", result:"你选择了保持中立，两边都不得罪，日子过得反倒轻省不少。", statEffect:{wit:2}}
      ]},
      {text:"你受邀参加王国举办的魔法博览会，你展示的一项新咒语引起了各国魔法师的关注。", weight:6},
      {text:"你收留了一名因家族纷争而流离失所的年轻法师学徒，把她当成了自己的孩子一般教养。", weight:6},
      {text:"你调解了那场持续百年的学院争端，让两所母校终于放下芥蒂，共同举办了联合典礼。", weight:6},
      {text:"你培育的元素精灵终于完全成熟，成了整片大陆罕见的稀有生灵，各方都想一睹真容。", weight:6, cond:c=>hasFlag(c,"magic_elemental_spirit")}
    ],
    elder:[
      {text:"你将自己毕生钻研的魔法奥秘编纂成书，郑重地存放进了魔法学院的禁书阁，供后人瞻仰。", weight:10},
      {text:"你在魔法塔顶层设立了一处静谧的观星台，晚年常在此地推演星辰运转与魔法本源之间的关联。", weight:8},
      {text:"你收养多年的幼龙如今已经长大，临别前依依不舍地用龙语向你道别。", weight:6, cond:c=>hasFlag(c,"magic_dragon_bond")},
      {text:"你在暮年时终于学会了那句年轻时怎么也发不准的高阶咒语，笑说这辈子总算没白学魔法。", weight:7},
      {text:"你把自己一生研究的失传咒语整理成了一本厚厚的合集，取名为《咒语溯源》，献给了魔法学院。", weight:6},
      {text:"你晚年时常受邀参加各地的魔法交流会，虽然行动不便，讲起理论来依然神采奕奕。", weight:6},
      {text:"你把自己收藏多年的稀有法器悉数捐赠给了魔法学院的展览馆，供后人瞻仰学习。", weight:6},
      {text:"你与陪伴多年的元素精灵一同看过了大陆上的四季变换，如今终于要一同安然谢幕。", weight:6, cond:c=>hasFlag(c,"magic_elemental_spirit")},
      {choice:true, weight:6, text:"魔法学院请你在退休前指定一位继承人接掌你的研究方向，你必须做出选择。", options:[
        {label:"选择最有天赋的学生", result:"你选择了那位最有天赋的学生作为继承人，你的研究方向从此有了更进一步的可能。", statEffect:{wit:2}},
        {label:"选择最勤奋踏实的学生", result:"你选择了那位最勤奋踏实的学生，对方虽不算最有天赋，却把你的研究稳稳地延续了下去。", statEffect:{wealth:1,charm:1}},
        {label:"谁都不选，把研究成果公开给所有人", result:"你谁都没有指定，而是把毕生的研究成果毫无保留地公开给了所有人，此举在学界引起了不小的震动。", statEffect:{charm:2}, achievement:"广播智慧"}
      ]}
    ]
  },
  scifi: {
    infant:[
      {text:"你在人工子宫舱中降生，出生记录在第一时间就被同步进了殖民地的中央数据库。", weight:10, cond:c=>state.age===0},
      {text:"你出生时的生命体征数据被自动上传，殖民地的中央AI罕见地给你的基因序列打出了极高的评级。", weight:9, cond:c=>(stat(c,"wit")>=7) && state.age===0},
      {text:"医疔舱的扫描仪在你出生的瞬间突然报错重启，工程师们排查了整整三天也没找到原因。", weight:7, cond:c=>state.age===0},
      {text:"你出生时，殖民地的中央AI主动申请成为你的专属监护助手，这在殖民地历史上极为罕见。", weight:7, cond:c=>state.age===0},

      {text:"医疗舱的机械臂第一次抱起你时，忽然停顿了整整三秒，谁也不知道那三秒里发生了什么。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，殖民地正在进行一次大规模的舰队演习，警报声与庆生的欢呼声奇妙地交织在了一起。", weight:6, cond:c=>state.age===0},
      {text:"你的出生数据被自动归档进了殖民地的星际贸易数据库，编号栏上却莫名其妙多打印了一行乱码。", weight:6, cond:c=>state.age===0},
      {text:"你出生时，殖民地的建造部门正在为新一座太空站的选址争论不休，你的出生记录意外成了他们打赌的彩头。", weight:6, cond:c=>state.age===0},
      {text:"医生给你做基因检测时，系统罕见地弹出了一条『数据异常，建议复查』的提示，复查后却又一切正常。", weight:6},
      {choice:true, weight:6, text:"你尚在人工子宫舱中时，殖民地的基因优化委员会提议对你的基因序列进行一次强化实验，你的监护人需要做出选择。", options:[

        {label:"拒绝，保持天然基因", result:"监护人拒绝了这次实验，坚持让你保持最天然的基因状态。", statEffect:{luck:1}},
        {label:"申请延后决定，先观察", result:"监护人申请了延后决定，想先观察一段时间再做打算。", statEffect:{wit:1}}
      ]}
    ],
    youth:[

      {text:"你在格斗训练营里连续击败了所有高年级学员，教官破格让你提前参加了实战考核。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你偷偷改装了教学机甲的核心程序，虽然当场被抓了个正着，却也因此被科研部门的人暗中看中。", weight:7},
      {text:"你在殖民地的青少年编程大赛中，独自写出了一套让所有评委都看不懂的算法。", weight:6},

      {choice:true, weight:6, text:"殖民地议会让你选择加入哪个专业序列：机甲驾驶、深空探索还是基因工程，这将决定你的职业轨道。", options:[

        {label:"深空探索序列", result:"你选择了深空探索序列，往后的日子里总要与未知打交道。", statEffect:{luck:2}},
        {label:"基因工程序列", result:"你选择了基因工程序列，钻研起了生命科学的奥秘。", statEffect:{wit:2}}

      {text:"你在一次模拟星际贸易谈判课上表现出色，被老师评价为『天生的谈判家』。", weight:6},
      {text:"你第一次经历了长途跃迁带来的时间膨胀效应，回到家才发现同龄的朋友们都已经长大了不少。", weight:6},
      {text:"你亲眼目睹了一场小型星舰事故的应急处理，那种紧张有序的场面让你对『秩序』有了全新的认识。", weight:6},
      {text:"你参与了殖民地青少年议会的模拟选举，虽然只是练习，却也让你尝到了从政的复杂滋味。", weight:6},
      {text:"当年那次基因强化实验的效果渐渐显现，你的身体素质明显强于同龄的学员。", weight:6, cond:c=>hasFlag(c,"scifi_enhanced"), statEffect:{power:1}},
      {text:"你发现殖民地的克隆技术档案里，有一份关于你自己的加密备份记录，内容却无法读取。", weight:6, setFlag:"scifi_clone_mystery"}
    ],

      {text:"你破解了一段来自深空的神秘信号，为整个殖民地争取到了极其宝贵的预警时间。", weight:8, cond:c=>stat(c,"wit")>=7},
      {text:"殖民地爆发了一场小规模的资源分配叛乱，你被夹在了管理层与普通居民之间，左右为难。", weight:6},

        {label:"私下上报更高层，走正规渠道", result:"你选择了私下上报更高层，虽然过程缓慢，事情最终还是得到了妥善处理。", statEffect:{wit:1}},
        {label:"保持沉默，不淌这浑水", result:"你最终选择了保持沉默，这件事后来不了了之，你却始终觉得心里压着一块石头。", statEffect:{luck:-1}}

      {death:true, text:"一场护航任务中，你的座机在跃迁通道里彻底失联，殖民地的记录里只留下了一段静默的信号。", weight:1, cause:"跃迁失踪"},
      {text:"你参与了一场关于机械伦理的公开辩论，主题是『AI是否该拥有与人类相同的权利』，你的发言引发了广泛讨论。", weight:6},
      {text:"你所在的舰队在一次演习中遭遇了突发故障，你临危不乱地协助控制中心化解了危机。", weight:6},

      {text:"你终于破解了那份克隆备份记录，其中的内容暗示殖民地高层似乎一直在暗中监控着你的成长。", weight:6, cond:c=>hasFlag(c,"scifi_clone_mystery"), setFlag:"scifi_clone_revealed"}

      {text:"你主导了一次跨星系的殖民地救援行动，成功阻止了一场即将爆发的资源战争。", weight:10, achievement:"星际救援英雄"},
      {text:"你的基因样本被列为殖民地的保护资产，无数科研机构都争相想要研究你身上的秘密。", weight:8, cond:c=>hasTag(c,"genemod")},
      {text:"你主持设计了新一代殖民舰的核心引擎，让人类探索的脚步得以踏向更加遥远的星域。", weight:7},
      {text:"科研部门终于破解了你出生时那段量子纠缠信号的含义——那竟是来自遥远未来的你，留给自己的一句提醒。", weight:6, cond:c=>hasFlag(c,"scifi_quantum_signal"), achievement:"跨越时空的低语", statEffect:{wit:1,luck:1}},
      {text:"殖民地叛乱的余波再起，你被推举出面调停，最终促成了一份双方都能接受的协议。", weight:6},
      {text:"你那具沉睡的克隆体忽然自主苏醒，两个『你』第一次面对面，气氛说不出的诡异。", weight:6},
      {choice:true, weight:6, text:"殖民地的资源分配委员会请你就『是否向外星遗迹追加投资』表态。", options:[
        {label:"支持追加投资，探索未知", result:"你支持了追加投资，虽然短期内资源紧张了些，长远看却收获颇丰。", statEffect:{wit:1,wealth:-1}},
        {label:"反对投资，优先民生", result:"你反对了这笔投资，主张优先改善民生，此举在普通居民中很受欢迎。", statEffect:{charm:1}},
        {label:"提议折中方案", result:"你提出了一份折中方案，两边都不算满意，却也都能接受。", statEffect:{origin:1}}
      ]},
      {text:"你主导建立了殖民地与邻近星系的第一条正式贸易航线，为双方带来了可观的收益。", weight:6},
      {text:"你经历的那次时间膨胀效应让你比同龄人多出了几分沉稳，如今你也成了年轻船员们眼中的『老资历』。", weight:6},
      {text:"你凭借在太空站建造中的贡献，被推举参选殖民地议会的席位，从工程师转型成了政客。", weight:6},
      {text:"那个展现出自主意识的AI最终被证实是真正的『觉醒』，你成了这一历史性事件的见证人。", weight:6, cond:c=>hasFlag(c,"scifi_ai_awakening")},
      {choice:true, weight:6, text:"你决定要不要正面质问殖民地高层关于那份监控记录的真相。", cond:c=>hasFlag(c,"scifi_clone_revealed"), options:[
        {label:"正面对峙，要个说法", result:"你正面对峙，逼得殖民地高层不得不给出了一个说法——原来你从出生起就被列为特殊观察对象，这份真相让你久久无法平静。", statEffect:{charm:1,luck:-1}, achievement:"真相在握"},
        {label:"隐忍不发，暗中调查更多", result:"你选择了隐忍不发，暗中继续调查更多的细节，这份谨慎让你渐渐摸清了事情的全貌。", statEffect:{wit:1}},
        {label:"既往不咎，专注自己的生活", result:"你最终选择了既往不咎，不再纠结这份监控记录，专注过好自己的生活。", statEffect:{luck:1}}
      ]}
    ],
    elder:[
      {text:"你的意识在临终前被完整上传进了星际网络，从此以数据的形式在星海之间永远存在。", weight:10},
      {text:"你在退役仪式上把毕生的航行日志上传进了公共数据库，供后来的星际旅人查阅参考。", weight:8},
      {text:"你把陪伴多年的AI伙伴的核心程序备份了下来，希望它能以某种形式继续存在下去。", weight:6},
      {text:"你与自己的克隆体达成了某种奇妙的默契，两人一同安静地度过了晚年。", weight:6},
      {text:"你把自己参与过的星际贸易谈判经验整理成教材，成了殖民地商学院的标准课程。", weight:6},
      {text:"你在退休前最后一次登上了那支曾经服役过的舰队，看着崭新的舰体，恍惚间百感交集。", weight:6},
      {text:"你把自己参选、任职殖民地议会的这段经历写成了回忆录，希望能给后来者一些参考。", weight:6},
      {text:"你与那个觉醒的AI成了跨越种族的忘年之交，两人时常一起讨论关于『存在』的哲学问题。", weight:6, cond:c=>hasFlag(c,"scifi_ai_awakening")},
      {choice:true, weight:6, text:"殖民地议会请你在退休前决定，是否将你毕生的核心专利技术公开共享。", options:[
        {label:"公开共享，造福殖民地", result:"你选择将核心专利公开共享，殖民地的整体技术水平因此得到了显著提升。", statEffect:{charm:2}, achievement:"技术共享者"},
        {label:"保留专利，留给家族后代", result:"你选择保留了这份专利，作为一份实实在在的财富留给了家族后代。", statEffect:{wealth:2}},
        {label:"捐给科研机构，继续深化研究", result:"你把专利捐给了科研机构，希望这份技术能在专业的手中继续深化下去。", statEffect:{wit:1,luck:1}}
      ]}
    ]
  },
  warhammer: {
    infant:[
      {text:"教士在你出生时进行了照例的信仰筛查，你体内异常的力量波动让在场所有人都倒吸了一口凉气。", weight:10, cond:c=>state.age===0},
      {text:"教团的裁决官在你的出生记录上郑重盖下了罕见的「特别关注」印章，随即匆匆离去。", weight:8, cond:c=>state.age===0},
      {text:"村中的老兵看到你的第一眼，就默默放下了手中的酒杯，低声说了句「愿帝皇庇佑这孩子」。", weight:7},
      {text:"教团的净化仪式在你身上意外持续了比常规多三倍的时间，负责的教士脱下兜帽后，脸上写满了困惑。", weight:6},
      {text:"你出生的工业行星那天罕见地风平浪静，老矿工都说这种日子出生的孩子，命里注定要经历大风大浪。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中时，家里供奉的帝皇雕像忽然裂开了一道细纹，没人说得清这是不是凶兆。", weight:6, cond:c=>state.age<=1},
      {text:"教团的记录官在整理你的出生档案时，发现表格上不知被谁提前填好了你的名字，事后查无此人。", weight:6, cond:c=>state.age===0},
      {text:"你出生的那个工业行星，那天罕见地停止了所有生产线的运转，仿佛整个世界都在等待着什么。", weight:6, cond:c=>state.age===0},
      {text:"教团的记录官为你占卜前程时，罗盘的指针罕见地连续转了三圈才停下，负责占卜的教士脸色凝重。", weight:6},
      {text:"你出生的那间医疗站，那天接连治好了七名本已被判定救不回来的重伤员，医生都说这是你带来的运气。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，教团的甄选官对你的力量波动格外感兴趣，提议将你早早送入见习营，你的家人必须表态。", options:[
        {label:"同意，送去见习营", result:"家人同意了这个提议，你自幼便被送进了见习营接受训练。", statEffect:{power:1,charm:-1}, setFlag:"warhammer_early_recruit"},
        {label:"拒绝，留在家中多陪伴几年", result:"家人拒绝了这个提议，坚持要多留你在身边陪伴几年。", statEffect:{charm:1}},
        {label:"申请延期甄选", result:"家人申请了延期甄选，想给你多一点时间准备。", statEffect:{wit:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"帝国的征募官找上了门来，你告别故乡，登上了驶向前线的运兵船，从此再未回头。", weight:10},
      {text:"你在新兵训练营的实弹演习中打出了全营最高的战绩，教官当场记下了你的名字。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你亲眼目睹了人生中第一场与异形的遭遇战，从那天起，你彻底明白了「战争永无止境」的含义。", weight:7},
      {text:"你在训练中结识了一位出生入死的战友，两人约定，往后无论走到哪个战场都要彼此照应。", weight:6, setFlag:"warhammer_brother"},
      {text:"你第一次直面混沌污染的痕迹，那种扑面而来的诡异感让你终生难忘。", weight:6},
      {text:"一位老兵把随身多年的圣物护符转交给了你，只说了句『它救过我很多次，希望也能护你周全』。", weight:6, setFlag:"warhammer_relic"},
      {choice:true, weight:6, text:"军团让你选择专精方向：突击兵、狙击手还是重装步兵，这将决定你未来的战斗风格。", options:[
        {label:"突击兵，速攻破阵", result:"你选择了突击兵，从此习惯了速攻破阵的打法。", statEffect:{power:2}},
        {label:"狙击手，一击致命", result:"你选择了狙击手，练出了一双能一击致命的沉稳双眼。", statEffect:{wit:2}},
        {label:"重装步兵，坚如磐石", result:"你选择了重装步兵，从此扛起重甲，坚如磐石地守住每一道战线。", statEffect:{health:2}}
      ]},
      {text:"你在训练营里因为一次违反军规的冲动之举被处以禁闭，事后却因祸得福地结识了一位良师。", weight:6},
      {text:"你第一次参加了随军的战地布道仪式，教士的话语让你对『帝皇』二字有了全新的理解。", weight:6},
      {text:"你在战场医疗培训中展现出了远超同龄人的沉稳，教官破格让你提前接触了真正的战地救护。", weight:6, setFlag:"warhammer_medic"},
      {text:"你被派去协助解剖一头缴获的异形尸体，那种诡异的生理构造让你终生难忘。", weight:6}
    ],
    adult:[
      {text:"你在与异形大军的殊死搏斗中活了下来，被亲手授予了象征荣耀的帝国勋章。", weight:10, achievement:"帝国勋章"},
      {text:"你在濒死之际隐约听到了帝皇清晰的低语，浑身伤势竟奇迹般地开始迅速愈合。", weight:8, cond:c=>hasTag(c,"emperorwhisper")},
      {text:"你与那位约定同生共死的战友并肩作战，在一场殊死之战中互相救了对方一命。", weight:6, cond:c=>hasFlag(c,"warhammer_brother")},
      {text:"军团里的审判官对你进行了一次突袭式的忠诚审查，气氛压抑得让所有人都喘不过气。", weight:6},
      {text:"你驾驶的机甲的机魂忽然发出了从未有过的异常波动，仿佛在向你传递某种警告。", weight:6},
      {choice:true, weight:6, text:"审判官怀疑你的机甲遭到了混沌污染，要求立刻销毁，你却坚信这只是误会。", options:[
        {label:"据理力争，坚持为机甲辩护", result:"你据理力争，最终证明了机甲的清白，审判官虽面无表情，却也不再追究。", statEffect:{wit:1,power:1}, achievement:"据理力争"},
        {label:"服从命令，忍痛销毁机甲", result:"你选择了服从命令，忍痛看着陪伴多年的机甲被销毁，心里空落落的。", statEffect:{origin:1}},
        {label:"暗中把机甲藏起来，抗命不遵", result:"你冒着抗命的风险，暗中把机甲藏了起来——这个决定，日后究竟是福是祸，谁也说不清。", statEffect:{luck:-1,power:1}}
      ]},
      {death:true, text:"混沌的低语最终侵蚀了你的意志，你倒在了自己曾经誓死守卫的战线之内。", weight:1, cause:"意志沦陷"},
      {choice:true, weight:6, text:"教团请你就『是否处决一名疑似被混沌污染但尚未确证的战友』表态。", options:[
        {label:"主张处决，绝不姑息", result:"你主张立即处决，绝不姑息，虽然保住了军团的安全，却也让不少战友对你心生忌惮。", statEffect:{power:1,charm:-1}},
        {label:"主张继续观察，给他机会", result:"你主张继续观察，给对方一个证明自己的机会，这份宽厚让战友们对你更加信服。", statEffect:{charm:1}},
        {label:"拒绝表态，交由上级决定", result:"你拒绝了表态，把这个艰难的决定交给了上级，自己乐得清闲。", statEffect:{wit:1}}
      ]},
      {text:"你负责押运一批缴获的异形标本回后方研究，途中标本险些逃脱，你临危处置避免了一场浩劫。", weight:6},
      {text:"你受邀前往帝国圣殿朝圣，站在那座宏伟的建筑前，你第一次真切感受到了信仰的重量。", weight:6},
      {text:"你在一次惨烈的战斗中及时救治了数名濒死的战友，军团特意为你颁发了战地医疗勋章。", weight:6, cond:c=>hasFlag(c,"warhammer_medic")},
      {text:"你被授予了亲手缝制军团旗帜的荣誉，这面旗帜此后将跟随军团征战四方。", weight:6, setFlag:"warhammer_banner"},
      {text:"你因为比同龄人更早接受训练，在正式入伍时已经展现出超乎寻常的适应力，教官都说你像是天生的军人。", weight:6, cond:c=>hasFlag(c,"warhammer_early_recruit"), statEffect:{power:1}}
    ],
    prime:[
      {text:"你率领一支残破不堪的军团死守住了一座至关重要的星门要塞，为帝国争取了宝贵的喘息之机。", weight:10, achievement:"星门守卫者"},
      {text:"你被正式擢升为军团指挥官，麾下的战士们都尊称你为「不朽的钢铁意志」。", weight:8, cond:c=>stat(c,"origin")>=7},
      {text:"你带领残部走出了被称为「死亡禁区」的坠毁战舰残骸，从此成了军团中人尽皆知的传奇。", weight:7},
      {text:"那位与你并肩多年的战友在一场战役中壮烈牺牲，你独自完成了他未竟的任务，替他讨回了公道。", weight:6, cond:c=>hasFlag(c,"warhammer_brother")},
      {text:"你被授予了一件传承久远的圣物，教团称这是对你多年忠诚与战功的认可。", weight:6},
      {text:"你驾驶的机甲机魂终于与你彻底磨合，往后的每一场战斗，它都仿佛能预判你的下一个动作。", weight:6},
      {text:"你被任命为一整支新兵训练营的教官，看着那些懵懂的新面孔，仿佛看到了当年的自己。", weight:6},
      {text:"你主导了一次对异形巢穴的清剿行动，虽然代价惨重，却也彻底扫除了这片星区的威胁。", weight:6},
      {text:"你主导建立了一套更完善的战场医疗体系，往后军团的伤亡率因此大幅降低。", weight:6, cond:c=>hasFlag(c,"warhammer_medic")},
      {text:"你登上了一艘全新服役的星际战舰，作为随舰军医参与了这艘战舰的首次远征。", weight:6},
      {choice:true, weight:6, text:"你被要求评选一名年轻士官接任你的部分职责，你必须做出选择。", options:[
        {label:"选最勇猛的那个", result:"你选择了那位最勇猛的士官，往后战场上少不了几分锐气。", statEffect:{power:1}},
        {label:"选最沉稳的那个", result:"你选择了那位最沉稳的士官，麾下的战士们也因此多了几分安定感。", statEffect:{wit:1}},
        {label:"选最受士兵爱戴的那个", result:"你选择了那位最受士兵爱戴的士官，军团上下都对这个决定心服口服。", statEffect:{charm:1}}
      ]}
    ],
    elder:[
      {text:"在生命的最后一刻，你的躯体被虔诚地封入无畏机甲的圣龛之中，继续为帝皇而战，直至永远。", weight:10},
      {text:"你在临终前只留下一句遗言：「即使身死，帝国的战旗也绝不会倒下」，随后被追授了殉道者之名。", weight:8},
      {text:"你把那位战友当年留下的遗物郑重地交给了他的后人，告诉他们那个人曾经是多么了不起的战士。", weight:6, cond:c=>hasFlag(c,"warhammer_brother")},
      {text:"你把随身多年的圣物护符转交给了一名新兵，重复了当年那句『它救过我很多次』。", weight:6, cond:c=>hasFlag(c,"warhammer_relic"), achievement:"衣钵相传"},
      {text:"你把毕生的战场经验编写成了一份军规补编，如今已经成为军团新兵的必修教材。", weight:6},
      {text:"你在生命的最后时光，再次前往了那座帝国圣殿，在圣光下安静地闭上了眼睛。", weight:6},
      {text:"你把自己毕生的战场医疗经验整理成册，成了帝国医疗兵的标准教材。", weight:6, cond:c=>hasFlag(c,"warhammer_medic")},
      {text:"你亲手缝制的那面军团旗帜如今已经破损不堪，却依然骄傲地飘扬在军团的最前线。", weight:6, cond:c=>hasFlag(c,"warhammer_banner")},
      {choice:true, weight:6, text:"帝皇的意志似乎在召唤你回归星辰，你必须决定如何度过生命的最后时刻。", options:[
        {label:"主动请战，战死沙场", result:"你主动请战，最终战死在了沙场之上，这是你能想到最体面的归宿。", statEffect:{power:2,health:-2}},
        {label:"静待自然终老，把余生交给祈祷", result:"你选择静待自然终老，把余生交给了日复一日的祈祷，心境反倒愈发澄澈。", statEffect:{luck:1}},
        {label:"把身躯献祭给机魂研究", result:"你自愿把身躯献祭给了机魂研究，用自己的方式为帝国的未来添了一份力。", statEffect:{origin:2}, achievement:"以身献祭"}
      ]}
    ]
  },
  yaoguai: {
    infant:[
      {text:"接生婆掀开襁褓的一角，隐约瞥见你眉心有一道若隐若现的淡淡印记，吓得连声念起了避邪的咒语。", weight:10, cond:c=>state.age===0},
      {text:"你出生那晚，院子里的野猫围着摇篮转了整整三圈，随后齐齐冲着夜空长嚎了一声。", weight:8, cond:c=>state.age===0},
      {text:"算命先生翻遍了手中的黄历，也没算出你的生辰八字究竟对应哪一卦象，摇着头匆匆离去。", weight:7, cond:c=>state.age<=1},
      {text:"你出生时天边一道流星划过，村里的瞎眼阿婆摸着你的脸说：『这孩子的眼睛，看得见不该看的东西』。", weight:6, cond:c=>state.age===0},
      {text:"你满月那天，家里那面传了三代的铜镜忽然自己转了个方向，朝着你的摇篮照去。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，附近山上的野狐竟破天荒地跑到院子里对着你的方向叩首，吓坏了看守的老仆。", weight:6, cond:c=>state.age<=1},
      {text:"你出生那晚，村里那座常年香火不旺的山神庙忽然彻夜灯火通明，没人知道是谁点的。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，一只从未见过的白色异鸟落在你家屋檐上，叫了三声后便振翅离去。", weight:6, cond:c=>state.age<=1},
      {text:"你满月时，家里那只老猫忽然对着空气拱起了背，仿佛在警告什么看不见的东西。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，村里的道长与游医就该如何『镇住』你身上那道奇异印记争论不休，家人必须选一个法子。", options:[
        {label:"请道长做法镇压", result:"家人请道长为你做法镇压，一番折腾后，那道印记暂时安静了下来。", statEffect:{power:1,luck:-1}, setFlag:"yaoguai_sealed"},
        {label:"请游医开药调养", result:"家人请游医开了几副药慢慢调养，身子倒也渐渐养得结实。", statEffect:{health:1}},
        {label:"什么都不做，顺其自然", result:"家人商量了半天，最终决定什么都不做，顺其自然地看你长大。", statEffect:{luck:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"你被城隍庙里的老道长收为徒弟，开始学习驱邪捉妖、画符念咒的本领。", weight:10},
      {text:"镇上的一只小狐妖时常变成人形来找你玩耍，村民们都当你俩是青梅竹马的玩伴，浑然不知真相。", weight:8, cond:c=>stat(c,"charm")>=7},
      {text:"你误打误撞闯入了后山的一处古墓，侥幸捡回一条命，却也因此染上了些不同寻常的体质。", weight:7},
      {text:"你无意间用一枚老铜钱照出了一个躲在暗处的鬼魅，从此对这类『照妖』的手段起了兴趣。", weight:6},
      {text:"你和一个同样出身贫寒的同门义结金兰，两人发誓今后有福同享、有难同当。", weight:6, setFlag:"yaoguai_sworn"},
      {text:"你在深山中捡到了一面泛着幽光的古镜，镜子里似乎藏着一段被遗忘的往事。", weight:6, setFlag:"yaoguai_mirror"},
      {choice:true, weight:6, text:"城隍庙的老道长让你选择修行方向：符箓、剑术还是丹药，这将决定你往后的道法根基。", options:[
        {label:"符箓一脉", result:"你选择了符箓一脉，画符念咒渐渐成了你的拿手好戏。", statEffect:{wit:2}},
        {label:"剑术一脉", result:"你选择了剑术一脉，一手剑法练得越发凌厉。", statEffect:{power:2}},
        {label:"丹药一脉", result:"你选择了丹药一脉，从此在坊间靠一手炼丹的本事攒下了不少家底。", statEffect:{wealth:2}}
      ]},
      {text:"你误打误撞闯入了一处只在夜半开市的『妖市』，见识了不少人间难得一见的奇珍异宝。", weight:6},
      {text:"你跟着师父学会了布置基础的驱邪符阵，第一次独自布阵时手忙脚乱，却也侥幸成功了。", weight:6},
      {text:"你参加了坊间举办的降妖擂台赛，虽然年纪最小，却也凭着一手小聪明赢了一场漂亮仗。", weight:6},
      {text:"你偶然拜访了一位隐居深山多年的隐士，对方看你顺眼，随口指点了你几句道法心得。", weight:6, setFlag:"yaoguai_hermit"},
      {text:"当年那道法镇压的印记渐渐显露出真容，你隐约能感觉到体内封着一丝不同寻常的力量。", weight:6, cond:c=>hasFlag(c,"yaoguai_sealed"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"你在一场夜半的妖乱中初次降服了一只作祟多年的山精，从此在坊间也算小有名气。", weight:10, achievement:"降妖有成"},
      {text:"你与一位倾城的狐族少女萍水相逢，她笑着说这是「几世修来的缘分」，从此常伴你左右。", weight:8, cond:c=>hasTag(c,"foxblood")},
      {text:"你在江湖上因为一次误伤妖族而被列入了『妖界通缉令』，往后行走江湖都要多加小心。", weight:6},
      {text:"那面古镜忽然在夜里自行发光，镜中人影竟对你说出了一句意味深长的警示。", weight:6, cond:c=>hasFlag(c,"yaoguai_mirror")},
      {text:"你那位义结金兰的兄弟因为一场变故身陷囹圄，你不得不动用所有人脉去为他奔走。", weight:6, cond:c=>hasFlag(c,"yaoguai_sworn")},
      {choice:true, weight:6, text:"一只被通缉多年的妖怪找上门来求你帮忙洗清冤屈，你却不确定它说的是真是假。", options:[
        {label:"选择相信，出手相助", result:"你选择相信了它，几番调查后果然发现另有真凶，你也因此结识了一位特殊的『妖友』。", statEffect:{charm:1,luck:1}, achievement:"人妖之信"},
        {label:"谨慎调查，先弄清真相", result:"你没有轻易表态，先花了不少功夫查证，最终才谨慎地做出了决定。", statEffect:{wit:1}},
        {label:"拒绝插手，明哲保身", result:"你选择了拒绝插手这件事，虽然事后有些愧疚，却也躲开了一场说不清的麻烦。", statEffect:{luck:-1}}
      ]},
      {death:true, text:"一场镇压百年凶灵的法事中，你耗尽了周身法力，与凶灵同归于尽，魂飞魄散。", weight:1, cause:"以身镇灵"},
      {text:"你连续多日梦到一个自称是你『前世』的陌生人，对方反复叮嘱你小心一场即将到来的劫数。", weight:6, setFlag:"yaoguai_pastlife"},
      {text:"你在一次降妖行动中遭遇了棋逢对手的高手，一番交手后，你们竟惜才地结为了忘年之交。", weight:6},
      {text:"你参加了妖界特意为人间修士举办的『妖界考试』，成绩虽不出众，却也长了不少见识。", weight:6},
      {text:"你所在的驱魔世家因为一场纠纷卷入了江湖恩怨，你不得不出面周旋，替家族挽回声誉。", weight:6}
    ],
    prime:[
      {text:"你游历大江南北，与形形色色的妖怪化敌为友，甚至结拜了一位性情爽朗的狐仙义妹。", weight:10, achievement:"人妖之交"},
      {text:"你在江湖上开了一间不起眼的小道观，专为往来的百姓答疑解惑、驱邪辟灾。", weight:8},
      {text:"你被朝廷请去镇守一方水患多发的辖地，此后那片水域再也没有闹过妖乱。", weight:7},
      {text:"你终于查清了那面古镜背后的秘密——那竟是前世欠下的一笔轮回债，如今终于到了偿还的时候。", weight:6, cond:c=>hasFlag(c,"yaoguai_mirror"), achievement:"轮回债偿", statEffect:{wit:1}},
      {text:"你成功洗清了『妖界通缉』的污名，还因此在正邪两道都攒下了不小的名声。", weight:6},
      {text:"你那位患难兄弟出狱后特意登门道谢，两人相拥而泣，多年的情分丝毫未减。", weight:6, cond:c=>hasFlag(c,"yaoguai_sworn")},
      {choice:true, weight:6, text:"一位妖界长老提议与人间修士建立正式的『人妖互不侵犯』盟约，请你作为见证人表态。", options:[
        {label:"支持盟约，促成和平", result:"你力促这份盟约的达成，为人妖两界换来了一段难得的和平岁月。", statEffect:{charm:2}},
        {label:"反对盟约，人妖终有一战", result:"你反对了这份盟约，坚信人妖之间终有一战，这份立场为你招来了不少非议。", statEffect:{power:1}},
        {label:"保持中立，静观其变", result:"你选择了保持中立，静观其变，谁也没得罪，却也谁都没帮上。", statEffect:{luck:1}}
      ]},
      {text:"你重修了村里那座香火不旺的山神庙，此后附近的妖乱竟真的少了大半，村民都说这是你的功德。", weight:6},
      {text:"你梦中那位『前世』的警示最终应验，好在你早有准备，从容渡过了那场劫数。", weight:6, cond:c=>hasFlag(c,"yaoguai_pastlife")},
      {text:"你在降妖擂台赛的成年组别里一举夺魁，从此在江湖上有了『降妖魁首』的名号。", weight:6},
      {text:"你时常回山中拜访那位隐士，两人渐渐成了忘年之交，时常彻夜畴论道法。", weight:6, cond:c=>hasFlag(c,"yaoguai_hermit")}
    ],
    elder:[
      {text:"你于风清月朗之夜悄然羽化，坊间都传说你最终修成了半仙之体，隐入了深山之中。", weight:10},
      {text:"你临终前将一身道法尽数传给了闻讯赶来的徒弟，笑着说「这江湖，往后就交给你们了」。", weight:8},
      {text:"你与那位义结金兰的兄弟一同白发苍苍，约定死后也要葬在同一处，做一世的邻居。", weight:6, cond:c=>hasFlag(c,"yaoguai_sworn")},
      {text:"你临终前那双『看得见不该看的东西』的眼睛，第一次清清楚楚地看见了自己这一生的模样。", weight:6},
      {text:"你把自己毕生所学的驱邪符阵整理成册，配上详细的图解，供后来的年轻道士参详。", weight:6},
      {text:"你临终前又一次梦到了那位『前世』，对方只是微笑着向你挥了挥手，仿佛在说时候到了。", weight:6, cond:c=>hasFlag(c,"yaoguai_pastlife")},
      {text:"你把自己这些年参悟的道法心得整理成册，托人送去给那位隐居深山的老友，也算是一份谢礼。", weight:6, cond:c=>hasFlag(c,"yaoguai_hermit")},
      {text:"你把家族这些年积累的驱魔心得毫无保留地传给了下一代，嘱咐他们守好这份家业。", weight:6},
      {choice:true, weight:6, text:"你即将魂飞魄散，一位神秘的引路人邀你前往轮回，你必须做出选择。", options:[
        {label:"欣然赴轮回，忘却今生", result:"你欣然踏上了轮回之路，带着一身轻松，去往下一世。", statEffect:{luck:1}},
        {label:"拒绝轮回，执念化作游魂守护乡土", result:"你拒绝了轮回，执念化作一缕游魂，此后一直默默守护着这片乡土。", statEffect:{power:1,health:-1}, achievement:"执念不灭"},
        {label:"请求带着记忆转世", result:"你请求带着今生的记忆转世，引路人应允了，你的下一世将带着这份特殊的传承。", statEffect:{wit:1}}
      ]}
    ]
  },
  cyberpunk: {
    infant:[
      {text:"你出生在废土边缘的地下避难所里，出生证明是用一块从旧世界废墟里捡来的芯片刻录的。", weight:10, cond:c=>state.age===0},
      {text:"你出生那天，避难所的老式广播突然自动播放了一段来自旧世界的儿歌，随后又戛然而止。", weight:8, cond:c=>state.age===0},
      {text:"医疗官检查你的血样时，发现里面残留着微量的旧时代辐射抗体，直呼这简直是个奇迹。", weight:7},
      {text:"你出生时避难所的空气过滤器发出了刺耳的警报，事后检查却什么故障都没查到，工程师们百思不得其解。", weight:6, cond:c=>state.age===0},
      {text:"你的第一次体检报告显示，你的神经系统对义体的排异反应异常低，这在废土上算是种稀有的『天赋』。", weight:6, cond:c=>state.age===0},
      {text:"你尚在襁褓中，避难所深处那台早已报废的老式AI忽然自行开机，反复念叨着一段谁也听不懂的代码。", weight:6, cond:c=>state.age<=1},
      {text:"你出生时避难所外的变异植物群突然集体绽放出了诡异的荧光，持续了整整一夜才消散。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，避难所的老式无线电意外收到了一段来自远方的求救信号，此后再未响起过。", weight:6, setFlag:"cyberpunk_distress", cond:c=>state.age===0},
      {text:"你出生那天，避难所的黑市正在拍卖一批稀有的旧世界义体零件，喊价声隔着好几层墙都能听见。", weight:6, cond:c=>state.age===0},
      {text:"医生给你做基因扫描时，仪器莫名其妙地卡死重启了三次，最后一次才终于显示出正常的结果。", weight:6},
      {choice:true, weight:6, text:"你尚在襁褓中，避难所的医疗官提议给你植入一枚实验性的神经芯片，你的监护人必须做出选择。", options:[
        {label:"同意植入实验芯片", result:"监护人同意了这次植入，那枚实验芯片从此就留在了你的脑后。", statEffect:{wit:1,health:-1}, setFlag:"cyberpunk_early_chip"},
        {label:"拒绝，保持自然状态", result:"监护人拒绝了这个提议，坚持让你保持最自然的状态长大。", statEffect:{luck:1}},
        {label:"申请更换成更保守的方案", result:"监护人申请更换了一套更保守的方案，风险小了不少。", statEffect:{power:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"你在黑市换来了人生中第一件义体改造——一只机械手臂，从此在废土上多了几分活下去的底气。", weight:10},
      {text:"你在废土帮派的地下拳赛里连续获胜，靠着赢来的奖金给自己添置了第二件义体。", weight:8, cond:c=>stat(c,"power")>=7},
      {text:"你在垃圾场里意外挖出了一台还能运转的旧世界终端，从里面读到了不少早已失传的禁忌知识。", weight:7},
      {text:"你在垃圾场里翻出了一枚闪烁着微弱蓝光的核心密钥，谁也不知道它究竟是什么东西的钥匙。", weight:6, setFlag:"cyberpunk_key"},
      {text:"你第一次尝试黑入据点的安保系统，虽然差点被抓，却也因此在黑客圈子里小有名气。", weight:6},
      {text:"两个帮派在你眼前爆发了一场火并，你侥幸躲过了流弹，却也因此看清了废土的残酷法则。", weight:6},
      {choice:true, weight:6, text:"黑市的义体商让你选择改装方向：战斗型、潜行型还是黑客型义体，这将决定你的生存方式。", options:[
        {label:"战斗型义体", result:"你选择了战斗型义体，从此浑身的改装都透着一股狠劲。", statEffect:{power:2}},
        {label:"潜行型义体", result:"你选择了潜行型义体，从此行动悄无声息，运气也似乎跟着好了不少。", statEffect:{luck:2}},
        {label:"黑客型义体", result:"你选择了黑客型义体，脑后的插槛让你在数据世界里如鱼得水。", statEffect:{wit:2}}
      ]},
      {text:"你在数据黑市上第一次尝试倒卖信息，虽然赚得不多，却也因此摸清了这一行的门道。", weight:6},
      {text:"你结识了一个没有任何身份档案的『黑户』义体人，两人因为同样的边缘处境而惜惜相惜。", weight:6, setFlag:"cyberpunk_blackmarket_friend"},
      {text:"你参加了废土上颇有名气的赛车比赛，驾驶着一台拼装的破车，居然一路冲进了决赛圈。", weight:6, setFlag:"cyberpunk_racer"},
      {text:"你在地下格斗场里打出了名堂，虽然只是业余选手，观众却都记住了你的绰号。", weight:6},
      {text:"那枚幼时植入的实验芯片渐渐显现出作用，你处理信息的速度明显比旁人快出一截。", weight:6, cond:c=>hasFlag(c,"cyberpunk_early_chip"), statEffect:{wit:1}}
    ],
    adult:[
      {text:"你加入了废土上小有名气的拾荒者公会，凭借过硬的本领很快就在圈子里闯出了名号。", weight:10, achievement:"废土拾荒者"},
      {text:"你的义体在一次交火中严重受损，黑市医生检查后却说这具身体的适配度「简直是为战斗而生」。", weight:8, cond:c=>hasTag(c,"cyberlimb")},
      {text:"你的义体第一次出现了严重的排异反应，黑市医生说这次多亏你的神经系统底子好，才没酿成大祸。", weight:6},
      {text:"你在一次黑入行动中意外唤醒了一个残留在旧系统里的『AI幽灵』，它似乎还记得核战前的世界。", weight:6, setFlag:"cyberpunk_ghost"},
      {text:"那枚神秘的核心密钥忽然有了反应，指向了废土深处一处从未被人发现的旧世界设施。", weight:6, cond:c=>hasFlag(c,"cyberpunk_key")},
      {choice:true, weight:6, text:"那个残留的AI幽灵向你提出了一个请求——帮它找到旧世界里，它曾经『守护』的那个人的后代。", cond:c=>hasFlag(c,"cyberpunk_ghost"), options:[
        {label:"答应它，展开一场跨越时代的寻人", result:"你答应了它的请求，历经周折终于帮它找到了那个人的后代，AI幽灵消散前，似乎露出了释然的神情。", statEffect:{charm:1,wit:1}, achievement:"跨世纪的托付"},
        {label:"婉拒，这不是你该承担的事", result:"你婉拒了这个请求，这不是你该承担的事——你如此安慰自己，却始终觉得心里有些说不出的遗憾。", statEffect:{luck:-1}},
        {label:"先了解清楚情况，再做决定", result:"你没有立刻答应，而是先花时间了解了整件事的来龙去脉，这份谨慎后来证明是对的。", statEffect:{wit:1}}
      ]},
      {death:true, text:"一次深入辐射区的探索行动中，你的义体系统突然过载烧毁，倒在了漫天黄沙之中。", weight:1, cause:"义体过载"},
      {text:"你被卷入了一场帮派间的信息战，靠着一手漂亮的数据伪造暗中扭转了局势。", weight:6},
      {text:"你开始在废土上经营起了一档地下电台节目，专门播报各据点的最新消息，渐渐有了固定听众。", weight:6, setFlag:"cyberpunk_radio"},

      {text:"你的电台节目成了废土上最有影响力的信息来源，各大势力都开始重视起你的一言一语。", weight:6, cond:c=>hasFlag(c,"cyberpunk_radio")},
      {text:"你帮那位『黑户』义体人伪造了一份完整的身份档案，对方从此终于能光明正大地行走废土。", weight:6, cond:c=>hasFlag(c,"cyberpunk_blackmarket_friend")},
      {text:"你凭着赛车比赛积累的名气，开了一间专门改装赛车的车行，生意做得红红火火。", weight:6, cond:c=>hasFlag(c,"cyberpunk_racer")},
      {text:"你终于查明了那个数据幽灵的真实身份，两人从虚拟空间的对手变成了现实中的合作伙伴。", weight:6, cond:c=>hasFlag(c,"cyberpunk_data_ghost")}

    elder:[

      {text:"你把毕生搜集的旧世界残卷整理成册，交给聚居地的孩子们，作为重建文明的一颗种子。", weight:8},
      {text:"你把那台曾经自行开机的老式AI核心妥善地保存了下来，当作留给后人的一份特殊遗产。", weight:6},

      {choice:true, weight:6, text:"你的意识面临最后的抉择——是让身体自然衰竭，还是把意识上传进废土仅存的一台旧式服务器。", options:[

        {label:"把身体捐给义体研究", result:"你把身体捐给了义体研究，用自己的方式为废土的医疗事业留下了最后一份贡献。", statEffect:{health:-1,charm:1}}

    youth:[
      {text:"你被幸存者营地选中，加入了少年侦察队，学习如何在废墟中安静地行动。", weight:10},
      {text:"你在一次物资搜寻任务中，独自应对了一只丧尸的偷袭，全须全尾地回到了营地。", weight:8},
      {text:"你在一次物资争夺中侥幸活了下来，也第一次真切地感受到了幸存者之间同样残酷的竞争。", weight:6},
      {text:"你无意间发现营地的科研人员在偷偷进行丧尸驯化实验，这件事让你彻夜难以入眠。", weight:6, setFlag:"zombie_experiment"},
      {text:"你被一位年长的幸存者教会了辨认变异丧尸的技巧，对方却在教会你之后不久就消失了，再没人见过他。", weight:6},
      {choice:true, weight:6, text:"营地让你选择专精方向：侦察兵、重火力还是医疗兵，这将决定你在队伍中的定位。", options:[
        {label:"侦察兵", result:"你选择了侦察兵，练出了一双能提前察觉危险的敏锐直觉。", statEffect:{luck:2}},
        {label:"重火力", result:"你选择了重火力，扛起武器就是队伍里最让人安心的存在。", statEffect:{power:2}},
        {label:"医疗兵", result:"你选择了医疗兵，从此不少人的命都是从你手里捡回来的。", statEffect:{health:2}}
      ]},
      {text:"你在幸存者之间的交易市场上第一次做成了一笔买卖，虽然吃了点小亏，却也长了见识。", weight:6},
      {text:"你偶尔会闪回起病毒爆发前的记忆片段，那些片段模糊却珍贵，是你为数不多的慰藉。", weight:6, setFlag:"zombie_flashback"},
      {text:"你无意间发现了一处从未被人找到的物资囤积点，虽然被要求上报，你却偷偷藏起了一小部分。", weight:6, setFlag:"zombie_hoard"},
      {text:"你跟着营地的科研人员参与了一次丧尸解剖研究，那种直面真相的过程让你彻夜难眠。", weight:6},
      {text:"当年那剂试验疫苗似乎起了作用，你对病毒感染的抵抗力明显强于同龄的孩子。", weight:6, cond:c=>hasFlag(c,"zombie_early_vaccine"), statEffect:{health:1}}
    ],
    adult:[
      {text:"你正式成为营地的核心战斗员，肩负起了每一次外出搜寻任务的安全重任。", weight:10, achievement:"核心战斗员"},
      {text:"营地里流传着一种未知变异丧尸的消息，所有人都隐隐觉得这与你有关。", weight:8},
      {text:"你曾经信任的一位幸存者伙伴，为了自己活命而出卖了整支队伍，你侥幸逃过一劫，却也从此不再轻信旁人。", weight:6, setFlag:"zombie_betrayal"},
      {text:"你亲眼目睹了那项丧尸驯化实验的『成果』——一只勉强听命的丧尸，这个发现让整个营地陷入了争论。", weight:6, cond:c=>hasFlag(c,"zombie_experiment")},
      {text:"你的血液被证实真的携带某种特殊抗体，营地的医生请求抽取更多血样用于研究疫苗。", weight:6, cond:c=>hasFlag(c,"zombie_bloodtype")},
      {choice:true, weight:6, text:"你终于找到了当年出卖队伍那个人的下落，他如今就在附近的另一处营地苟且求生。", cond:c=>hasFlag(c,"zombie_betrayal"), options:[
        {label:"找上门去，讨一个说法", result:"你找上门去讨了个说法，对方吓得瘫软在地——你到底还是没能下得去手，只是撂下一句话就转身离开了。", statEffect:{charm:-1,luck:1}},
        {label:"放下过去，不再追究", result:"你最终选择了放下这段过去，不再追究，日子还长，没必要困在旧仇里。", statEffect:{luck:1}},
        {label:"暗中举报，让他为过去负责", result:"你暗中把他的下落透露给了当年幸存者的家属，剩下的事，你选择不再插手。", statEffect:{wit:1,charm:-1}}
      ]},
      {death:true, text:"一次外出搜寻物资时，你被数量庞大的丧尸群团团围住，寡不敌众。", weight:1, cause:"力竭殒命"},
      {choice:true, weight:6, text:"营地议事会就『是否接纳一批陌生的幸存者』征询你的意见。", options:[
        {label:"支持接纳，人多力量大", result:"你支持接纳了这批陌生的幸存者，人多力量大，营地的防御也因此更加牢固。", statEffect:{charm:2}},
        {label:"反对接纳，资源有限", result:"你反对了这个提议，主张资源有限、优先自保，这份谨慎虽不讨喜，却也不无道理。", statEffect:{wealth:1}},
        {label:"提议先隔离观察", result:"你提议先隔离观察一段时间再做决定，这份周全考虑最终成了营地处理类似问题的惯例。", statEffect:{wit:1}}
      ]},
      {text:"你带队追寻当年那段求救信号的来源，虽然最终一无所获，却也因此发现了一片未被污染的净土。", weight:6, cond:c=>hasFlag(c,"zombie_signal"), setFlag:"zombie_haven"},
      {text:"你在幸存者交易市场上凭着精明的头脑积累了不小的资源，渐渐成了市场里说得上话的人物。", weight:6},
      {text:"你被任命为营地广播站的负责人，每天的播报渐渐成了所有幸存者一天中最期待的时刻。", weight:6, setFlag:"zombie_broadcast"},
      {text:"你偷藏物资的事情最终被人发现，营地为此展开了一场关于『个人与集体』的激烈讨论。", weight:6, cond:c=>hasFlag(c,"zombie_hoard"), setFlag:"zombie_debate"}
    ],
    prime:[
      {text:"你带队清剿了盘踞在城郊多年的丧尸巢穴，为营地扩张争取到了宝贵的空间。", weight:10, achievement:"巢穴清剿者"},
      {text:"你建立起了一套完整的哨戒体系，让营地的夜晚第一次有了真正意义上的安宁。", weight:8},
      {text:"基于你血液研发的初代疫苗终于问世，虽然还不完美，却已经能大幅降低感染几率。", weight:6, cond:c=>hasFlag(c,"zombie_bloodtype"), achievement:"血液里的希望", statEffect:{charm:1}},
      {text:"那场关于丧尸驯化实验的争论最终以销毁实验体告终，你也因为立场鲜明而在营地里树立了威望。", weight:6, cond:c=>hasFlag(c,"zombie_experiment")},
      {text:"你把那片发现的净土开发成了营地的新家园，带着幸存者们迁移过去，日子渐渐好转了起来。", weight:6, cond:c=>hasFlag(c,"zombie_haven")},
      {text:"你那些关于病毒爆发前的记忆闪回渐渐拼凑出了完整的画面，你把它们讲述给了年轻一代。", weight:6, cond:c=>hasFlag(c,"zombie_flashback")},
      {text:"你主持的广播站如今已经成了周边几个营地共享的信息枢纽，你的声音成了这片废墟里的一份安心。", weight:6, cond:c=>hasFlag(c,"zombie_broadcast")},
      {text:"那场关于『个人与集体』的讨论最终推动营地制定了更公平的物资分配制度，你也算是因祸得福。", weight:6, cond:c=>hasFlag(c,"zombie_debate")},
      {choice:true, weight:6, text:"营地决定要不要把你多年搜集的稀有物资分一部分给邻近的另一个营地，你需要表态。", options:[
        {label:"支持分享，共渡难关", result:"你支持了分享，两个营地因此结下了共渡难关的情分。", statEffect:{charm:2}},
        {label:"反对分享，自己人优先", result:"你反对了分享，主张自己人优先，这份现实虽不讨喜，却也保住了营地的根基。", statEffect:{wealth:1}},
        {label:"提议以物换物", result:"你提议以物换物，两边各取所需，这份精明让营地里的人对你更加信服。", statEffect:{wit:1}}
      ]}
    ],
    elder:[
      {text:"你把这些年摸索出的求生经验编写成册，成为新一代幸存者人手一份的生存手册。", weight:10},
      {text:"你在自己一手建起的安全区里安享晚年，看着当年的废墟渐渐重新长出了绿意。", weight:8},
      {text:"以你血液为基础研发的疫苗如今已经推广开来，你从没想过自己会以这种方式『拯救』了这么多人。", weight:6, cond:c=>hasFlag(c,"zombie_bloodtype")},
      {text:"你在安全区的晚年生活里，偶尔还会想起那个消失的老幸存者，希望他在某个地方，也活得还算好。", weight:6},
      {text:"你在新家园的门前种满了当年那种诡异发光的变异植物，如今看来，倒也算是一种别样的风景。", weight:6},
      {text:"你把自己关于旧世界的记忆一点一点讲给了孩子们，成了营地里活着的历史书。", weight:6, cond:c=>hasFlag(c,"zombie_flashback")},
      {text:"你把自己主持广播站这些年积累的经验记录下来，交给了接替你的年轻播音员。", weight:6, cond:c=>hasFlag(c,"zombie_broadcast")},
      {text:"你晚年时常想起当年那场关于物资分配的讨论，觉得那或许是自己这一生做得最有意义的一件事。", weight:6, cond:c=>hasFlag(c,"zombie_debate")},
      {choice:true, weight:6, text:"你即将走到生命的终点，营地就该不该为你举办一场正式的葬礼产生了争论。", options:[
        {label:"支持隆重葬礼，纪念这些年的贡献", result:"营地为你举办了一场隆重的葬礼，纪念你这些年为大家做出的贡献。", statEffect:{charm:2}},
        {label:"反对，一切从简", result:"你坚持一切从简，不想给活着的人添麻烦，这份朴素让人心生敬意。", statEffect:{luck:1}},
        {label:"提议把仪式变成一场生存技巧传授课", result:"你提议把这场仪式变成最后一堂生存技巧课，把毕生所学再教一遍给年轻人。", statEffect:{wit:1}}
      ]}
    ]
  },
  westworld: {
    infant:[
      {text:"你出生时，镇上酒馆正好响起一阵枪战，接生的大夫是在桌子底下把你接生下来的。", weight:10, cond:c=>state.age===0},
      {text:"你满月那天，一群路过的商队特意停下来，送了你一顶小小的牛仔帽作为礼物。", weight:8, cond:c=>state.age===0},
      {text:"你出生那天，一支路过的商队特意停下来，说要沾沾这个『枪火之夜』降生孩子的运气。", weight:6, cond:c=>state.age===0},
      {text:"镇上的印第安向导路过你家时，破例进门看了你一眼，临走前留下一句『这孩子与荒野有缘』。", weight:6},
      {text:"你满月那天，镇上唯一的一台留声机放的曲子莫名其妙卡带反复重播，倒像是特意在为你庆生。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，镇上的矿工正在酝酿一场罢工，紧张的气氛却丝毫没有影响你响亮的啼哭。", weight:6, setFlag:"westworld_strike", cond:c=>state.age===0},
      {text:"你满月时，一位路过的猎人送了你一枚打磨光滑的响尾蛇尾骨，说是能带来好运。", weight:6, cond:c=>state.age===0},
      {text:"你出生那天，镇上的马术表演正好在进行最后一场压轴表演，观众的喝彩声几乎盖过了你的啼哭。", weight:6, cond:c=>state.age===0},
      {text:"接生的大夫是镇上铁匠的妻子，她笑着说你这孩子出生时的哭声，跟她丈夫打铁的节奏一样有力。", weight:6, cond:c=>state.age===0},
      {choice:true, weight:6, text:"你尚在襁褓中，镇上的牧师与猎人就你该受洗还是该学野外生存争论不休，家人必须选一个先来。", options:[
        {label:"先受洗，走正道", result:"家人决定先让你受洗，走一条正正当当的路。", statEffect:{charm:1}},
        {label:"先学生存，硬气一点", result:"家人决定先让你学野外生存，从小就把你当成半个猎人来养。", statEffect:{power:1}, setFlag:"westworld_survivalist"},
        {label:"两者都要，家人格外操劳", result:"家人决定两者都要，为此格外操劳了几年，好在你也算不负所望。", statEffect:{health:-1,wit:1}}
      ], cond:c=>state.age<=1}
    ],
    youth:[
      {text:"你在镇上的靶场里第一次摸到手枪，教官说你的手感好得不像个新手。", weight:10},
      {text:"你在一次镇上的骚乱中，冷静地帮着大人疏散了受惊的孩子，被镇长记在了心里。", weight:8},
      {text:"你在一次意外中救了一位路过的印第安少年，对方的部落从此对你多了几分善意与信任。", weight:6, setFlag:"westworld_tribe_bond"},
      {text:"你无意间听到了铁路大亨手下密谋侵占矿脉的对话，虽然不明白具体内情，却隐隐觉得这事不简单。", weight:6, setFlag:"westworld_railroad_plot"},
      {text:"一位神秘的流浪歌手在镇上驻留了几天，临走前弹唱了一曲专门讲你故事的小调，让你哭笑不得。", weight:6},
      {choice:true, weight:6, text:"镇上的枪匠让你选择专精武器：左轮手枪、猎枪还是套索，这将决定你的作战方式。", options:[
        {label:"左轮手枪", result:"你选择了左轮手枪，从此拔枪的速度快得让人来不及反应。", statEffect:{power:2}},
        {label:"猎枪", result:"你选择了猎枪，扛着它走在路上，寻常宵小都不敢招惹你。", statEffect:{health:2}},
        {label:"套索", result:"你选择了套索，练出了一手令人拍案叫绝的绳上功夫。", statEffect:{luck:2}}
      ]},
      {text:"你参加了镇上一年一次的牛仔竞技会，虽然只是个孩子组别，也让你尝到了赢的滋味。", weight:6},
      {text:"你无意间撞见了一伙在边境走私违禁品的商人，吓得连夜逃回了家，好几天没敢出门。", weight:6, setFlag:"westworld_smugglers"},
      {text:"你在镇上的铁匠铺里帮工，渐渐学会了简单的锻造手艺，打出的第一把小刀虽然粗糙，却让你颇有成就感。", weight:6, setFlag:"westworld_smithy"},
      {text:"你跟着镇上的骑手们参加了一场马术表演，虽然摔了好几次，最终还是稳稳地完成了全场。", weight:6},
      {text:"你自幼被当成半个猎人来养，在荒野求生的本事上比同龄孩子扎实得多。", weight:6, cond:c=>hasFlag(c,"westworld_survivalist"), statEffect:{power:1}}
    ],
    adult:[
      {text:"你正式领到了赏金猎人执照，开始在这片荒芜的大陆上追捕悬赏名单上的通缉犯。", weight:10, achievement:"赏金猎人"},
      {text:"铁路公司的一位工头似乎对你颇为忌惮，暗中雇了人想要找你的麻烦。", weight:8},
      {text:"你被悬赏令误标成了通缉犯，费了好大力气才在赏金猎人的围捕中证明了自己的清白。", weight:6},
      {text:"你帮那个印第安部落挡下了铁路大亨强占矿脉的企图，从此在部落里落下了『荒野义士』的名声。", weight:6, cond:c=>hasFlag(c,"westworld_tribe_bond")},
      {choice:true, weight:6, text:"铁路大亨开出一笔巨款，想收买你对那场矿脉阴谋保持沉默，你必须做出选择。", cond:c=>hasFlag(c,"westworld_railroad_plot"), options:[
        {label:"拒绝收买，坚持揭露真相", result:"你毫不犹豫地拒绝了那笔巨款，坚持要把真相公之于众，这份硬气让你在西部声名大噪。", statEffect:{charm:1,luck:-1}, achievement:"荒野义士"},
        {label:"假意接受，暗中收集更多证据", result:"你表面上假意接受了那笔钱，暗地里却借机收集了更多确凿的证据，来了个反将一军。", statEffect:{wit:2}},
        {label:"接受收买，明哲保身", result:"你接受了那笔巨款，选择了明哲保身——只是往后每次路过那片矿脉，心里总有些说不出的滋味。", statEffect:{wealth:2,charm:-1}}
      ]},
      {death:true, text:"一场势均力敌的对决中，你慢了对方半拍，倒在了尘土飞扬的决斗场上。", weight:1, cause:"决斗落败"},
      {text:"你参与调解了那场持续已久的矿工罢工，凭着公道的态度让双方都握手言和。", weight:6, cond:c=>hasFlag(c,"westworld_strike")},
      {text:"你从一位垂垂老矣的枪手手中买下了一支传说中的古董手枪，从此爱若珍宝。", weight:6, setFlag:"westworld_antique_gun"},
      {text:"你被派驻到边境要塞协助守备，那段日子里见识了不少荒野上真正的刀光剑影。", weight:6, setFlag:"westworld_fort"},
      {text:"你在悬赏公告栏前意外撕下了一张自己名字都写错的悬赏令，一时间成了镇上的笑谈。", weight:6}
    ],
    prime:[
      {text:"你在一场惊心动魄的决斗中击败了赏金榜上排名第一的悬赏犯，声名传遍了整片大陆。", weight:10, achievement:"决斗之王"},
      {text:"你出资帮小镇修建了第一条像样的水渠，镇民们都说你是这片土地上的活菩萨。", weight:8},
      {text:"你彻底揭穿了铁路大亨侵占矿脉的阴谋，这件事轰动了整片西部，报纸上都印上了你的名字。", weight:6, cond:c=>hasFlag(c,"westworld_railroad_plot")},
      {text:"那个印第安部落正式认你做了荣誉族人，还教给你一套只在族内流传的追踪之术。", weight:6, cond:c=>hasFlag(c,"westworld_tribe_bond"), achievement:"荣誉族人", statEffect:{wit:1}},
      {choice:true, weight:6, text:"镇议会就『是否允许铁路公司在镇上修建新站』征询民意。", options:[
        {label:"支持修建，带来商机", result:"你支持了新站的修建，小镇因此热闹了不少，商机随之滚滚而来。", statEffect:{wealth:2}},
        {label:"反对修建，保护传统", result:"你反对了这个提议，主张保护小镇原有的样子，这份坚持为你赢得了不少老镇民的支持。", statEffect:{charm:1}},
        {label:"提议附加条件", result:"你提议在修建时附加一些保护条款，两边都能接受，事情也就这么定了下来。", statEffect:{wit:1}}
      ]},
      {text:"你在牛仔竞技会的成人组别里一举夺冠，成了整片西部小有名气的传奇牛仔。", weight:6},
      {text:"你查出了当年那伙边境走私商人的下落，一番较量后，彻底清除了这个隐患。", weight:6, cond:c=>hasFlag(c,"westworld_smugglers")},
      {text:"你凭借边境要塞守备的经历，被推举为镇上的治安官，专门负责维护这片荒野的秩序。", weight:6, cond:c=>hasFlag(c,"westworld_fort")},

        {label:"什么都不写，一块光碑", result:"你什么都没让人写，一块光碑立在那儿，反倒让人多了几分猜想的余地。", statEffect:{luck:1}}

  urbanpower: {
    infant:[

        {label:"拒绝，保护隐私", result:"监护人拒绝了这次筛查，坚持要保护你的隐私。", statEffect:{charm:1}},

      {choice:true, weight:6, text:"互助组织让你选择能力专精方向：战斗型、支援型还是潜伏型，这将决定你在组织中的角色。", options:[

      {text:"你偶然结识了一位神秘的隐秘导师，对方看你有潜力，答应私下指点你几招。", weight:6, setFlag:"urbanpower_mentor"},

      {choice:true, weight:6, text:"你目睹了一名新觉醒者因为无法控制力量而濒临『暴走』，你必须当场决定怎么处理。", options:[

        {label:"联系互助组织，寻求专业支援", result:"你第一时间联系了专业的互助组织，虽然慢了一步，最终还是妥善解决了这次危机。", statEffect:{wit:1}},
        {label:"保持距离，等风头过去", result:"你选择了保持距离，等这阵风头过去——事后你却始终没能说服自己，这是不是正确的决定。", statEffect:{luck:-1}}

      {death:true, text:"一次力量失控的对抗中，你耗尽了全部本源力量，再也没能站起来。", weight:1, cause:"本源枯竭"},

      {text:"你逐渐察觉自己的能力似乎是从家族血脉里遗传而来，这让你对自己的身世有了新的猜测。", weight:6, setFlag:"urbanpower_lineage"},
      {text:"你参加了地下举办的异能竞技赛，虽然首战便被淘汰，却也因此认清了自己能力的短板。", weight:6, setFlag:"urbanpower_arena"},
      {text:"你被卷入了对那间神秘异能实验室的调查，发现的真相远比你想象的更加复杂。", weight:6, cond:c=>hasFlag(c,"urbanpower_lab_nearby")}

      {text:"你建立起了一个专门帮助新觉醒者适应能力的互助中心，成了这个圈子里德高望重的前辈。", weight:8},
      {text:"你终于学会了完全掌控能力的副作用，从此使用起来再无后顾之忧。", weight:6},
      {text:"你与那个曾经的宿敌觉醒者不知不觉间成了并肩作战的战友，两人都说不清这段关系是怎么变的。", weight:6, cond:c=>hasFlag(c,"urbanpower_rival"), achievement:"殊途同归"},

      {text:"你被评定为这座城市里数一数二的高阶异能者，各方势力都对你礼遇有加。", weight:6, cond:c=>hasFlag(c,"urbanpower_rank")},

      {text:"你在异能竞技赛的舞台上东山再起，凭借着这些年的磨练一路杀入了决赛。", weight:6, cond:c=>hasFlag(c,"urbanpower_arena")},

/* ========================= 工具函数 ========================= */
function rnd(n){ return Math.floor(Math.random()*n); }
function pick(arr){ return arr[rnd(arr.length)]; }
function weightedPick(list){
  const total = list.reduce((s,x)=>s+x.weight,0);
  let r = Math.random()*total;
  for(const item of list){ r -= item.weight; if(r<=0) return item; }
  return list[list.length-1];
}
function applyStatEffect(effect){
  Object.keys(effect).forEach(k=>{
    state.stats[k] = Math.max(1, Math.min(10, state.stats[k] + effect[k]));
  });
}
function weightedTalentDraw(pool, count){
  const bag=[];
  pool.forEach(t=>{ for(let i=0;i<RARITY_WEIGHT[t.rarity];i++) bag.push(t); });
  const chosen=[]; const usedIds=new Set();
  while(chosen.length<count && usedIds.size<pool.length){
    const t = pick(bag);
    if(!usedIds.has(t.id)){ usedIds.add(t.id); chosen.push(t); }
  }
  return chosen;
}
function costOf(level){ return level*(level+1)/2; }
function escapeModText(mod){
  return Object.keys(mod).map(k=>{
    const v = mod[k];
    return `<span class="mod-tag ${v>0?'pos':'neg'}">${STAT_LABEL[k]}${v>0?'+':''}${v}</span>`;
  }).join("");
}

  talentRounds:[],   // 3 rounds, each: {options:[t,t,t], chosen:null}
  currentRound:0,
  chosenTalents:[],
  stats:{power:1,wit:1,charm:1,luck:1,origin:1,health:5,wealth:5},
  budgetTotal:26,
  log:[],
  age:0,
  alive:true,
  achievements:[],
  causeOfEnd:null,
  speed:"normal", // slow/normal/fast
  autoPlay:false,
  autoPlayUsedThisLife:false,
  simTimer:null,
  finished:false,
  isHiddenEnding:false,
  unlockedAchievements:new Set(),   // 跨局持久化：已解锁的成就id集合
  playStats:{totalLives:0, worldsPlayed:[], hiddenEndingsUnlocked:[]}, // 跨局持久化：统计数据
  newlyUnlockedThisLife:[],          // 本局新解锁的成就，结局页高亮展示用
  flags:null,                        // 本局事件连锁标记集合(Set)，运行时初始化
  pendingChoice:null,                // 当前等待玩家做出选择的分支事件
  achievementsFrom:"intro"           // 记录从哪个界面进入成就殿堂，方便返回
};

/* ========================= 成就系统：持久化存储 ========================= */
const HAS_STORAGE = typeof window !== "undefined" && !!window.storage;

async function loadPersistedData(){
  if(!HAS_STORAGE) return;
  try{
    const res = await window.storage.get("unlocked_achievements", false);
    if(res && res.value) state.unlockedAchievements = new Set(JSON.parse(res.value));
  }catch(e){ /* 尚未有存档，保持空集合 */ }
  try{
    const res2 = await window.storage.get("play_stats", false);
    if(res2 && res2.value) state.playStats = Object.assign(
      {totalLives:0, worldsPlayed:[], hiddenEndingsUnlocked:[]},
      JSON.parse(res2.value)
    );
  }catch(e){ /* 尚未有存档，保持默认值 */ }
}

async function savePersistedAchievements(){
  if(!HAS_STORAGE) return;
  try{ await window.storage.set("unlocked_achievements", JSON.stringify([...state.unlockedAchievements]), false); }
  catch(e){ /* 存储失败时静默忽略，不影响游戏本身进行 */ }
}
async function savePersistedStats(){
  if(!HAS_STORAGE) return;
  try{ await window.storage.set("play_stats", JSON.stringify(state.playStats), false); }
  catch(e){ /* 存储失败时静默忽略 */ }
}

/* 解锁一个成就：id 必须与 ACHIEVEMENT_CATALOG 中的 id 完全一致。
   已解锁过的成就不会重复计入「本局新解锁」列表。 */
function unlockAchievement(id){
  if(state.unlockedAchievements.has(id)) return;
  state.unlockedAchievements.add(id);
  state.newlyUnlockedThisLife.push(id);
  savePersistedAchievements();
}

/* 结算一局人生结束时的跨局统计与「元成就」判定 */
function checkMetaAchievements(){
  state.playStats.totalLives = (state.playStats.totalLives||0) + 1;
  if(state.playStats.totalLives===1) unlockAchievement("初次转生");
  if(state.playStats.totalLives>=10) unlockAchievement("屡败屡战");

  if(!state.playStats.worldsPlayed.includes(state.worldview.id)){
    state.playStats.worldsPlayed.push(state.worldview.id);
  }
  if(state.playStats.worldsPlayed.length>=WORLDVIEWS.length) unlockAchievement("阅遍诸界");

  if(state.isHiddenEnding){
    unlockAchievement("天命之子");
    if(!state.playStats.hiddenEndingsUnlocked.includes(state.worldview.id)){
      state.playStats.hiddenEndingsUnlocked.push(state.worldview.id);
    }
    if(state.playStats.hiddenEndingsUnlocked.length>=WORLDVIEWS.length) unlockAchievement("命运收藏家");
  }

  if(state.age>=90) unlockAchievement("长命百岁");
  if(!state.alive && state.age<20) unlockAchievement("英年早逝");
  if(STAT_KEYS.every(k=>state.stats[k]>=10)) unlockAchievement("满级传说");

  // 隐藏成就判定
  const talentTags = new Set();
  state.chosenTalents.forEach(t=> t.tags.forEach(tag=>talentTags.add(tag)));
  const talentIds = state.chosenTalents.map(t=>t.id);

  if(state.chosenTalents.length===3 && state.chosenTalents.every(t=>t.rarity==="legendary")){
    unlockAchievement("天选暴发户");
  }
  if(state.chosenTalents.length===3 && state.chosenTalents.every(t=>t.rarity==="flaw")){
    unlockAchievement("开局地狱难度");
  }
  if(talentTags.has("deathflag") && !state.alive){
    unlockAchievement("Flag应验");
  }
  if(talentTags.has("villain") && state.alive){
    unlockAchievement("这个反派人不错");
  }
  if(state.reincarnation.id.endsWith("_outcast") && state.isHiddenEnding){
    unlockAchievement("逆天改命");
  }
  if(!state.autoPlayUsedThisLife){
    unlockAchievement("手动挡玩家");
  }
  if(talentIds.includes("twinsoul") && talentIds.includes("prophet")){
    unlockAchievement("灵魂本源共鸣");
  }
  if(computeScore()<30 && state.achievements.length>=1){
    unlockAchievement("虽败犹荣");
  }

  savePersistedStats();
}

function baseBudgetUsed(){
  return STAT_KEYS.reduce((s,k)=>s+costOf(state.stats[k]),0);
}
function remainingBudget(){
  // 天赋与投胎方式带来的属性加成不占用玩家可分配的点数：
  // 可用总额 = 手动分配点数(budgetTotal) + 天赋加成本身消耗的"点数"(floorCost)
  return state.budgetTotal + (state.floorCost||0) - baseBudgetUsed();
}

const app = document.getElementById("app");

  if(state.screen==="intro") html += renderIntro();
  else if(state.screen==="worldview") html += renderWorldview();
  else if(state.screen==="reincarnation") html += renderReincarnation();
  else if(state.screen==="talent") html += renderTalent();
  else if(state.screen==="stats") html += renderStats();
  else if(state.screen==="sim") html += renderSim();
  else if(state.screen==="ending") html += renderEnding();

  html += `<div class="footer-note">灵感致敬《人生重开模拟器》 · 异世界主题重构版</div>`;

  bindEvents();

function renderStats(){
  const remain = Math.max(0, remainingBudget());
  const rows = STAT_KEYS.map(k=>{
    const v = state.stats[k];
    const pct = Math.round(v/10*100);
    const nextCost = costOf(v+1)-costOf(v);
    const backCost = v>1 ? costOf(v)-costOf(v-1) : 0;
    const canInc = v<10 && nextCost<=remain;
    const canDec = v>1;
    return `<div class="stat-row">
      <div class="stat-name">${STAT_LABEL[k]}</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
      <div class="stat-num">${v}</div>
      <div class="stat-ctrl">
        <button data-stat-dec="${k}" ${canDec?"":"disabled"} title="${canDec?`退还 ${backCost} 点`:""}">−</button>
        <button data-stat-inc="${k}" ${canInc?"":"disabled"} title="${v<10?`花费 ${nextCost} 点`:"已达上限"}">＋</button>
      </div>
      <div class="stat-cost-hint">${v<10 ? `下一级 −${nextCost}` : "已满级"}</div>
    </div>`;
  }).join("");

  return `
  <div class="scroll">
    <div class="section-label">第四步 · 属性分配 <span class="idx">04</span></div>
    <div class="budget-line"><span>剩余点数</span><b>${remain}</b></div>
    <p style="margin-top:-8px;">属性等级越高，每提升一级所需的点数也越多（第2级起依次为 2、3、4…点），所以同样点一次「＋」，高等级属性掉的点数会明显更多——这是设计如此，并非漏洞。</p>
    ${rows}
    <div class="btn-row">
      <button class="btn" id="btn-stat-random">随机分配</button>
      <button class="btn primary" id="btn-to-sim">踏入命运长河</button>
    </div>
  </div>`;
}

function renderEnding(){

    ${achieveHtml}
    ${newUnlockHtml}
    <div class="btn-row center">
      <button class="btn" id="btn-view-achievements">🏆 查看成就</button>
      <button class="btn primary" id="btn-restart">再次重开</button>
    </div>
